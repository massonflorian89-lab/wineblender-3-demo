<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" type="image/png" sizes="32x32" href="img/icon-wineblender-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="img/icon-wineblender-16.png">
<link rel="shortcut icon" href="img/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="img/icon-wineblender-180.png">
<meta name="theme-color" content="#6a1b2a">
<title>Tableau de bord — VitiFlux</title>
<link rel="stylesheet" href="theme.css">
<script>(function(){var t=localStorage.getItem('wb3_theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<style>
  /* .header-actions, .breadcrumb-flex, .tenant-pill → theme.css (composants partagés) */

  /* ── Hero greeting ───────────────────────────────────────── */
  .dash-hero {
    background: linear-gradient(135deg, #0d2137 0%, #1a3a55 60%, #2e5d7a 100%);
    border-radius: var(--radius-lg);
    padding: 14px 20px;
    color: #fff;
    margin-bottom: var(--space-4);
    display: flex;
    align-items: center;
    gap: var(--space-4);
    flex-wrap: wrap;
    position: relative;
    overflow: hidden;
  }
  .dash-hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: rgba(232,176,74,.08);
    pointer-events: none;
  }

  /* ── Hero weather background (dynamique, météo du jour) ─── */
  .hero-wx-bg {
    position: absolute; inset: 0; z-index: 0; overflow: hidden;
    border-radius: var(--radius-lg); pointer-events: none;
    transition: background 1.2s ease;
  }
  .hero-wx-bg::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(100deg, rgba(6,14,24,.55) 0%, rgba(6,14,24,.24) 45%, rgba(6,14,24,.05) 100%);
  }
  .hero-greeting, .hero-clock, .hero-actions, .weather-bar {
    position: relative; z-index: 1;
  }
  .hero-greeting .greet-line, .hero-clock { text-shadow: 0 1px 6px rgba(0,0,0,.35); }
  .dash-hero[data-wx="clear-day"]    .hero-wx-bg { background: linear-gradient(135deg,#1f6fad 0%,#3f9bd1 55%,#7fc4e8 100%); }
  .dash-hero[data-wx="clear-night"]  .hero-wx-bg { background: linear-gradient(135deg,#0a1830 0%,#152844 55%,#23406b 100%); }
  .dash-hero[data-wx="partly-day"]   .hero-wx-bg { background: linear-gradient(135deg,#2c6f95 0%,#4f93b0 55%,#8bb8c9 100%); }
  .dash-hero[data-wx="partly-night"] .hero-wx-bg { background: linear-gradient(135deg,#0d1f33 0%,#1c3550 55%,#2f4d6b 100%); }
  .dash-hero[data-wx="cloudy"]       .hero-wx-bg { background: linear-gradient(135deg,#445566 0%,#5d6f7e 55%,#7c8a96 100%); }
  .dash-hero[data-wx="fog"]          .hero-wx-bg { background: linear-gradient(135deg,#5b6670 0%,#7c8790 55%,#9aa3aa 100%); }
  .dash-hero[data-wx="rain"]         .hero-wx-bg { background: linear-gradient(135deg,#28384a 0%,#34495d 55%,#46606f 100%); }
  .dash-hero[data-wx="snow"]         .hero-wx-bg { background: linear-gradient(135deg,#3a4a5c 0%,#5b6f80 55%,#aebdc6 100%); }
  .dash-hero[data-wx="storm"]        .hero-wx-bg { background: linear-gradient(135deg,#15202b 0%,#22323f 55%,#324354 100%); }

  .wx-sun, .wx-moon, .wx-cloud, .wx-rain, .wx-snow, .wx-fog, .wx-lightning, .wx-stars { display: none; }

  .dash-hero[data-wx="clear-night"] .wx-stars,
  .dash-hero[data-wx="partly-night"] .wx-stars {
    display: block; position: absolute; inset: 0;
    background-image:
      radial-gradient(1.4px 1.4px, rgba(255,255,255,.9) 100%, transparent 100%),
      radial-gradient(1px 1px, rgba(255,255,255,.7) 100%, transparent 100%),
      radial-gradient(1.2px 1.2px, rgba(255,255,255,.8) 100%, transparent 100%);
    background-size: 180px 120px, 140px 90px, 220px 150px;
    background-position: 10% 20%, 70% 55%, 40% 10%;
    animation: wxStarTwinkle 4s ease-in-out infinite alternate;
  }
  @keyframes wxStarTwinkle { 0% { opacity: .55; } 100% { opacity: 1; } }

  .dash-hero[data-wx="clear-day"] .wx-sun,
  .dash-hero[data-wx="partly-day"] .wx-sun {
    display: block; position: absolute; top: -30px; right: 30px; width: 130px; height: 130px; border-radius: 50%;
    background: radial-gradient(circle, #ffe9b0 0%, #ffd166 45%, rgba(255,209,102,0) 75%);
    box-shadow: 0 0 50px 10px rgba(255,209,102,.18);
    animation: wxSunPulse 6s ease-in-out infinite;
  }
  @keyframes wxSunPulse { 0%,100% { transform:scale(1); opacity:.85; } 50% { transform:scale(1.08); opacity:1; } }

  .dash-hero[data-wx="clear-night"] .wx-moon,
  .dash-hero[data-wx="partly-night"] .wx-moon {
    display: block; position: absolute; top: -10px; right: 50px; width: 70px; height: 70px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fdfdf4 0%, #e7e7d6 55%, rgba(231,231,214,0) 78%);
    box-shadow: 0 0 30px rgba(253,253,244,.35);
    animation: wxMoonGlow 8s ease-in-out infinite;
  }
  @keyframes wxMoonGlow { 0%,100% { opacity:.75; } 50% { opacity:1; } }

  .dash-hero[data-wx="partly-day"] .wx-cloud,
  .dash-hero[data-wx="partly-night"] .wx-cloud,
  .dash-hero[data-wx="cloudy"] .wx-cloud,
  .dash-hero[data-wx="rain"] .wx-cloud,
  .dash-hero[data-wx="snow"] .wx-cloud,
  .dash-hero[data-wx="storm"] .wx-cloud {
    display: block;
  }
  .wx-cloud {
    position: absolute; border-radius: 50%; background: rgba(255,255,255,.18); filter: blur(1.5px);
    box-shadow:
      28px 7px 0 -5px rgba(255,255,255,.16),
      -26px 5px 0 -7px rgba(255,255,255,.14),
      8px -12px 0 -9px rgba(255,255,255,.13);
  }
  .wx-cloud-1 { width:140px; height:46px; top:12%; left:-12%; animation: wxDrift 38s linear infinite; }
  .wx-cloud-2 { width:100px; height:34px; top:36%; left:-22%; animation: wxDrift 52s linear infinite; animation-delay: -14s; opacity:.8; }
  .wx-cloud-3 { width:170px; height:54px; top:60%; left:-18%; animation: wxDrift 65s linear infinite; animation-delay: -30s; opacity:.65; }
  @keyframes wxDrift { from { transform: translateX(0); } to { transform: translateX(170%); } }

  .dash-hero[data-wx="rain"] .wx-rain,
  .dash-hero[data-wx="storm"] .wx-rain {
    display: block; position: absolute; inset: 0;
    background-image: repeating-linear-gradient(70deg, rgba(255,255,255,.22) 0px, rgba(255,255,255,.22) 1px, transparent 1px, transparent 14px);
    animation: wxRainFall .45s linear infinite;
    opacity: .55;
  }
  @keyframes wxRainFall { from { background-position: 0 0; } to { background-position: -30px 60px; } }

  .dash-hero[data-wx="snow"] .wx-snow {
    display: block; position: absolute; inset: 0;
    background-image:
      radial-gradient(circle, rgba(255,255,255,.9) 1.5px, transparent 1.6px),
      radial-gradient(circle, rgba(255,255,255,.7) 1.2px, transparent 1.3px);
    background-size: 60px 80px, 90px 110px;
    animation: wxSnowFall 6s linear infinite;
    opacity: .8;
  }
  @keyframes wxSnowFall { from { background-position: 0 0, 0 0; } to { background-position: 30px 160px, -40px 220px; } }

  .dash-hero[data-wx="fog"] .wx-fog {
    display: block; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 0%, rgba(255,255,255,.18) 50%, transparent 100%);
    animation: wxFogDrift 14s ease-in-out infinite;
  }
  @keyframes wxFogDrift { 0%,100% { transform: translateX(-4%); opacity:.6; } 50% { transform: translateX(4%); opacity:.9; } }

  .dash-hero[data-wx="storm"] .wx-lightning {
    display: block; position: absolute; inset: 0; background: #fff; opacity: 0;
    animation: wxLightning 7s infinite;
  }
  @keyframes wxLightning {
    0%, 92%, 100% { opacity: 0; }
    93% { opacity: .5; }
    94% { opacity: 0; }
    95% { opacity: .35; }
    96% { opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .wx-sun, .wx-moon, .wx-cloud, .wx-rain, .wx-snow, .wx-fog, .wx-lightning { animation: none !important; }
  }

  .hero-greeting { flex: 1; min-width: 200px; }
  .hero-greeting .greet-line {
    font-size: 19px; font-weight: 700; letter-spacing: -.2px;
    margin-bottom: 1px;
  }
  .hero-greeting .greet-date {
    font-size: 11.5px; opacity: .7;
  }
  .hero-clock {
    font-size: 28px; font-weight: 700; letter-spacing: -.5px;
    font-variant-numeric: tabular-nums; opacity: .92;
    flex-shrink: 0;
  }
  .hero-actions {
    display: flex; gap: var(--space-2); align-items: center; flex-shrink: 0;
    margin-left: auto;
  }
  .hero-btn {
    padding: 5px 11px; border-radius: 8px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all .15s; border: none;
  }
  .hero-btn-primary {
    background: #e8b04a; color: #0d2137;
  }
  .hero-btn-primary:hover { background: #f5c96a; }
  .hero-btn-ghost {
    background: rgba(255,255,255,.12); color: #fff;
    border: 1px solid rgba(255,255,255,.2);
  }
  .hero-btn-ghost:hover { background: rgba(255,255,255,.2); }
  .hero-btn-ghost.active { background: rgba(232,176,74,.2); border-color: #e8b04a; color: #e8b04a; }

  /* ── Weather bar (compacte, une seule ligne) ─────────────── */
  .weather-bar {
    width: 100%;
    margin-top: 10px;
    padding-top: 9px;
    border-top: 1px solid rgba(255,255,255,.14);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .weather-feature {
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    padding-right: 10px;
    border-right: 1px solid rgba(255,255,255,.16);
  }
  .wf-icon {
    font-size: 22px; line-height: 1; flex-shrink: 0;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,.3));
    animation: wfIconFloat 4.5s ease-in-out infinite;
  }
  @keyframes wfIconFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
  .wf-temp { font-size: 16px; font-weight: 800; letter-spacing: -.3px; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .wf-temp .wf-tmin { font-size: 11px; font-weight: 600; opacity: .6; margin-left: 2px; }
  .wf-label { font-size: 11.5px; font-weight: 600; opacity: .82; white-space: nowrap; }
  .wf-details { display: flex; flex-wrap: wrap; gap: 5px; }
  .wf-chip {
    display: flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.13);
    border-radius: 7px;
    padding: 3px 7px;
    white-space: nowrap;
  }
  .wf-chip .di-icon { font-size: 11px; flex-shrink: 0; }
  .wf-chip .di-val  { font-weight: 700; font-size: 11px; line-height: 1; }

  /* ── Weather strip (sélecteur de jour) ───────────────────── */
  .weather-strip {
    display: flex;
    gap: 5px;
    overflow-x: auto;
    scrollbar-width: none;
    margin-left: auto;
  }
  .weather-strip::-webkit-scrollbar { display: none; }
  .weather-day {
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.14);
    border-radius: 7px;
    padding: 3px 7px;
    text-align: center;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    flex-shrink: 0;
    min-width: 42px;
    line-height: 1.15;
  }
  .weather-day:hover { background: rgba(255,255,255,.16); border-color: rgba(255,255,255,.28); }
  .weather-day.today { border-color: #e8b04a; }
  .weather-day.selected {
    background: rgba(255,255,255,.2);
    box-shadow: 0 0 0 1.5px rgba(232,176,74,.5);
  }
  .wd-label { font-size: 8.5px; font-weight: 700; opacity: .65; text-transform: uppercase; letter-spacing: .3px; }
  .wd-icon  { font-size: 13px; margin: 1px 0; }
  .wd-temps { font-size: 10px; font-weight: 600; opacity: .88; }
  .wd-temps .tmax { color: #ffd080; }
  .wd-temps .tmin { opacity: .6; }

  /* ── Widget config panel ─────────────────────────────────── */
  .widget-config-panel {
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: var(--space-4);
    margin-bottom: var(--space-4);
    display: none;
  }
  .widget-config-panel.show { display: block; }
  .wcp-title {
    font-size: var(--text-caption); font-weight: 700; text-transform: uppercase;
    letter-spacing: .6px; color: var(--color-ink-tertiary);
    margin: 0 0 var(--space-3);
  }
  .wcp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: var(--space-2);
  }
  .wcp-item {
    display: flex; align-items: center; gap: var(--space-2);
    padding: 10px 12px;
    border: 1.5px solid var(--color-border);
    border-radius: var(--radius-md);
    cursor: pointer; transition: all .14s;
    background: var(--color-bg-subtle);
    user-select: none;
  }
  .wcp-item:hover { border-color: var(--color-primary); }
  .wcp-item.active { border-color: var(--color-primary); background: color-mix(in srgb, var(--color-primary) 8%, transparent); }
  .wcp-item .wcp-icon { font-size: 18px; flex-shrink: 0; }
  .wcp-item .wcp-lbl  { font-size: var(--text-callout); font-weight: 600; flex: 1; }
  .wcp-item .wcp-check { font-size: 16px; color: var(--color-primary); }

  /* ── Dashboard grid ─────────────────────────────────────── */
  .dash-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: var(--space-4);
  }
  @media (max-width:900px) { .dash-grid { grid-template-columns:1fr 1fr; } }
  @media (max-width:580px) { .dash-grid { grid-template-columns:1fr; } }

  .dash-widget {
    position: relative;
    background: var(--color-bg-elevated); border: 1px solid var(--color-border);
    border-radius: var(--radius-lg); padding: var(--space-4);
  }
  .dash-widget.dragging { opacity: .4; }
  .dash-widget.drag-over { outline: 2px dashed var(--color-primary); outline-offset: 2px; }
  .widget-drag-handle {
    position: absolute; top: var(--space-2); right: var(--space-2);
    cursor: grab; font-size: 14px; line-height: 1; color: var(--color-ink-tertiary);
    opacity: .3; transition: opacity .15s; user-select: none;
  }
  .dash-widget:hover .widget-drag-handle { opacity: .9; }
  .widget-drag-handle:active { cursor: grabbing; }
  .widget-title {
    font-size: var(--text-caption); font-weight: 700; text-transform: uppercase;
    letter-spacing: .6px; color: var(--color-ink-tertiary); margin: 0 0 var(--space-3);
    display: flex; align-items: center; gap: var(--space-1);
  }
  .widget-title a {
    margin-left: auto; font-size: 10px; font-weight: 600; text-decoration: none;
    color: var(--color-primary); letter-spacing: 0; text-transform: none;
    padding: 2px 8px; border: 1px solid var(--color-primary);
    border-radius: var(--radius-pill); transition: all .15s;
  }
  .widget-title a:hover { background: var(--color-primary); color: #fff; }

  /* Stats cards (KPI widget) */
  .kpi-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3);
  }
  .kpi-card {
    background: var(--color-bg-subtle); border: 1px solid var(--color-border);
    border-radius: var(--radius-md); padding: var(--space-3) var(--space-4);
    position: relative; overflow: hidden;
  }
  .kpi-card .accent-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .kpi-label { font-size: var(--text-caption); color: var(--color-ink-tertiary); font-weight: 500; margin-bottom:var(--space-1); }
  .kpi-value { font-size: 26px; font-weight: 700; color: var(--color-ink); line-height: 1.1; }
  .kpi-sub   { font-size: var(--text-caption); color: var(--color-ink-tertiary); margin-top: 2px; }

  /* Liste ops récentes */
  .op-list-item {
    display: flex; align-items: center; gap: var(--space-2);
    padding: var(--space-2) 0; border-bottom: 1px solid var(--color-border);
    cursor: pointer;
  }
  .op-list-item:last-child { border-bottom: none; }
  .op-list-item:hover { opacity: .8; }
  .op-icon-pill {
    width: 32px; height: 32px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size:var(--text-callout); flex-shrink: 0;
  }
  .op-info { flex: 1; min-width: 0; }
  .op-name { font-weight: 600; font-size: var(--text-callout); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .op-meta { font-size: var(--text-caption); color: var(--color-ink-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .op-date { font-size: var(--text-caption); color: var(--color-ink-tertiary); flex-shrink: 0; }

  /* Lots statut */
  .statut-row {
    display: flex; align-items: center; gap: var(--space-2);
    padding: var(--space-2) 0; border-bottom: 1px solid var(--color-border);
  }
  .statut-row:last-child { border-bottom: none; }
  .statut-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .statut-lbl { flex: 1; font-size: var(--text-callout); font-weight: 500; }
  .statut-count { font-size: var(--text-callout); font-weight: 700; color: var(--color-ink); }
  .statut-bar-bg { width: 80px; height: 6px; background: var(--color-bg-mute); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
  .statut-bar    { height: 100%; border-radius: 3px; transition: width .4s; }

  /* Contenants */
  .cont-row {
    display: flex; align-items: center; gap: var(--space-2);
    padding: var(--space-2) 0; border-bottom: 1px solid var(--color-border);
  }
  .cont-row:last-child { border-bottom: none; }
  .cont-icon { font-size: 16px; flex-shrink: 0; }
  .cont-info { flex: 1; min-width: 0; }
  .cont-name { font-weight: 600; font-size: var(--text-callout); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cont-desc { font-size: var(--text-caption); color: var(--color-ink-tertiary); }
  .cont-fill-bar { margin-top: 3px; height: 4px; background: var(--color-bg-mute); border-radius: 2px; overflow: hidden; }
  .cont-fill-inner { height: 100%; border-radius: 2px; }

  /* Alertes */
  .alert-item {
    display: flex; align-items: flex-start; gap: var(--space-2);
    padding: var(--space-2) 0; border-bottom: 1px solid var(--color-border);
  }
  .alert-item:last-child { border-bottom: none; }
  .alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .alert-msg  { flex: 1; font-size: var(--text-callout); color: var(--color-ink-secondary); }
  .alert-msg strong { color: var(--color-ink); }

  /* Apports */
  .apport-row {
    display: flex; align-items: center; gap: var(--space-2);
    padding: var(--space-2) 0; border-bottom: 1px solid var(--color-border);
  }
  .apport-row:last-child { border-bottom: none; }
  .apport-strip { width: 4px; height: 32px; border-radius: 2px; flex-shrink: 0; }
  .apport-info { flex: 1; min-width: 0; }
  .apport-name { font-weight: 600; font-size: var(--text-callout); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .apport-desc { font-size: var(--text-caption); color: var(--color-ink-tertiary); }
  .apport-vol  { font-size: var(--text-callout); font-weight: 700; flex-shrink: 0; }

  /* Span full width */
  .span-2 { grid-column: span 2; }
  .span-3 { grid-column: span 3; }
  @media (max-width:900px) { .span-2,.span-3 { grid-column: span 2; } }
  @media (max-width:580px) { .span-2,.span-3 { grid-column: span 1; } }

  /* ── Bouton + cockpit « Vendanges du jour » ───────────────────── */
  .hero-btn.active { background:#e8b04a; border-color:#e8b04a; color:#3a1f12; font-weight:700; }
  .vd-card .vd-kpis { display:flex; gap:var(--space-4); flex-wrap:wrap; padding:6px 0 10px; margin-bottom:6px; border-bottom:1px solid var(--color-border); }
  .vd-card .vd-kpi { text-align:center; min-width:62px; }
  .vd-card .vd-kpi .v { font-size:24px; font-weight:800; color:var(--color-primary); line-height:1.1; }
  .vd-card .vd-kpi .l { font-size:10px; text-transform:uppercase; letter-spacing:.4px; color:var(--color-ink-tertiary); }
  .vd-row { display:flex; align-items:center; gap:var(--space-2); padding:5px 0; border-bottom:1px solid var(--color-border); font-size:var(--text-caption); }
  .vd-row:last-child { border-bottom:none; }
  .vd-row .muted { color:var(--color-ink-tertiary); }
  .vd-row.done { opacity:.5; text-decoration:line-through; }
  .vd-row .vd-flags { margin-left:auto; font-size:10px; color:#b45309; text-align:right; }
  .vd-empty { padding:14px; text-align:center; color:var(--color-ink-tertiary); font-size:var(--text-caption); }
  .vd-badge { font-size:10px; font-weight:700; background:#e53935; color:#fff; padding:1px 7px; border-radius:10px; margin-left:6px; }
  .vd-late { margin-top:var(--space-2); font-size:var(--text-caption); color:#b45309; font-weight:600; }

  /* ── Widgets Dashboard ajoutés (DLUO / FA) — local, à consolider
     à la passe design system pré-Mobile ───────────────────────── */
  .dluo-row, .fa-row {
    display: flex; align-items: center; gap: var(--space-2);

  .cave-saine {

</style>

<script>
'use strict';

// ============================================================
// Données
// ============================================================
let lots       = [];
let contenants = [];
let operations = [];
let apports    = [];
let produitsLots  = [];   // widget DLUO
let lotContenants = [];   // compteur cuverie (lot↔contenant, statut)
let taches        = [];   // widget planning du jour
let anomaliesOenoPulse = []; // widget OenoPulse anomalies (mig 107)
let _alertesCount = 0;    // partagé renderAlertes → KPIs (évite duplication logique)
let _rtUnsub      = null; // désabonnement Realtime
let _rtTimer      = null; // débounce Realtime

async function logout() { await WB3Auth.signOut(); WB3Nav.navigateTop('app.html'); }

function toast(a, b){ if (window.WB3Toast) return WB3Toast.legacy(a, b); }

function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmt(n) { return Number(n||0).toLocaleString('fr-FR', {maximumFractionDigits:1}); }

// ============================================================
// Horloge et salutation
// ============================================================
function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('hero-clock').textContent = `${h}:${m}`;

  const jours = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const mois  = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  document.getElementById('greet-date').textContent =
    `${jours[now.getDay()]} ${now.getDate()} ${mois[now.getMonth()]} ${now.getFullYear()}`;
}

function updateGreeting(userName) {
  const h = new Date().getHours();
  let salut;
  if (h < 5)       salut = 'Bonne nuit';
  else if (h < 12) salut = 'Bonjour';
  else if (h < 18) salut = 'Bon après-midi';
  else             salut = 'Bonsoir';
  const name = userName ? ` ${userName}` : '';
  document.getElementById('greet-text').textContent = `${salut}${name} 👋`;
}

// ============================================================
// Météo (Open-Meteo, libre, sans clé API)
// ============================================================
const WMO_ICON = {
  0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',
  51:'🌦',53:'🌦',55:'🌧',56:'🌨',57:'❄️',
  61:'🌧',63:'🌧',65:'🌧',71:'🌨',73:'🌨',75:'❄️',
  77:'🌨',80:'🌦',81:'🌧',82:'⛈',85:'🌨',86:'❄️',
  95:'⛈',96:'⛈',99:'⛈',
};
const WMO_LABEL = {
  0:'Ensoleillé',1:'Partiellement nuageux',2:'Nuageux',3:'Couvert',
  45:'Brouillard',48:'Brouillard givrant',
  51:'Bruine légère',53:'Bruine modérée',55:'Bruine forte',
  61:'Pluie légère',63:'Pluie modérée',65:'Pluie forte',
  71:'Neige légère',73:'Neige modérée',75:'Neige forte',
  80:'Averses légères',81:'Averses',82:'Fortes averses',
  95:'Orage',96:'Orage + grêle',99:'Orage violent',
};
const WIND_DIR = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'];

let _weatherData = null;
let _selectedDay = 0;

async function loadWeather() {
  try {
    const pos = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, { timeout: 5000 })
    );
    const { latitude: lat, longitude: lon } = pos.coords;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}`
      + `&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,winddirection_10m_dominant,uv_index_max,sunrise,sunset`
      + `&hourly=relativehumidity_2m`
      + `&timezone=auto&forecast_days=7`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    _weatherData = await res.json();
    renderWeather();
  } catch(e) {
    document.getElementById('weather-strip').innerHTML =
      `<div style="opacity:.45;font-size:12px;align-self:center">⚠️ Météo indisponible (autorisation géolocalisation requise)</div>`;
  }
}

function renderWeather() {
  if (!_weatherData?.daily) return;
  const d = _weatherData.daily;
  const today = new Date().toISOString().slice(0,10);
  const days = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];

  const todayIdx = d.time.indexOf(today);
  _selectedDay = todayIdx >= 0 ? todayIdx : 0;
  applyHeroWeatherBg(d, _selectedDay);

  const strip = document.getElementById('weather-strip');
  strip.innerHTML = d.time.map((date, i) => {
    const isToday = date === today;
    const dow = days[new Date(date+'T12:00:00').getDay()];
    const label = isToday ? 'Auj.' : dow;
    const icon  = WMO_ICON[d.weathercode[i]] || '🌡';
    const tmax  = Math.round(d.temperature_2m_max[i]);
    const tmin  = Math.round(d.temperature_2m_min[i]);
    return `<div class="weather-day${isToday?' today':''}${i===_selectedDay?' selected':''}" data-wi="${i}" onclick="selectWeatherDay(${i})">
      <div class="wd-label">${label}</div>
      <div class="wd-icon">${icon}</div>
      <div class="wd-temps"><span class="tmax">${tmax}°</span> <span class="tmin">${tmin}°</span></div>
    </div>`;
  }).join('');

  renderWeatherFeature(_selectedDay);
}

function wxScene(code, isDay) {
  if (code === 0) return isDay ? 'clear-day' : 'clear-night';
  if (code === 1 || code === 2) return isDay ? 'partly-day' : 'partly-night';
  if (code === 3) return 'cloudy';
  if (code === 45 || code === 48) return 'fog';
  if (code === 95 || code === 96 || code === 99) return 'storm';
  if ([71,73,75,77,85,86].includes(code)) return 'snow';
  return 'rain'; // 51,53,55,56,57,61,63,65,80,81,82
}

function applyHeroWeatherBg(d, idx) {
  const hero = document.getElementById('dash-hero');
  if (!hero) return;
  const code = d.weathercode?.[idx];
  if (code == null) return;
  let isDay = true;
  const sunrise = d.sunrise?.[idx], sunset = d.sunset?.[idx];
  if (sunrise && sunset) {
    const now = new Date();
    isDay = now >= new Date(sunrise) && now <= new Date(sunset);
  }
  hero.dataset.wx = wxScene(code, isDay);
}

function selectWeatherDay(i) {
  _selectedDay = i;
  const d = _weatherData.daily;
  applyHeroWeatherBg(d, i);
  renderWeatherFeature(i);
  document.querySelectorAll('.weather-day').forEach((d2, idx) => {
    d2.classList.toggle('selected', idx === i);
  });
}

function renderWeatherFeature(i) {
  const d = _weatherData.daily;
  const feature = document.getElementById('weather-feature');
  if (!d || i == null || !d.time?.[i]) return;

  const today = new Date().toISOString().slice(0,10);
  const days = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const isToday = d.time[i] === today;
  const dayPrefix = isToday ? '' : days[new Date(d.time[i]+'T12:00:00').getDay()] + ' · ';

  // Humidity: average of hourly values for that day (24 values per day)
  const humStart = i * 24;
  const humVals  = (_weatherData.hourly?.relativehumidity_2m || []).slice(humStart, humStart + 24).filter(v => v != null);
  const humidity = humVals.length ? Math.round(humVals.reduce((s,v)=>s+v,0)/humVals.length) : null;

  const windDeg = d.winddirection_10m_dominant?.[i];
  const windDir = windDeg != null ? WIND_DIR[Math.round(windDeg / 22.5) % 16] : null;
  const code    = d.weathercode[i];
  const tmax    = Math.round(d.temperature_2m_max[i]);
  const tmin    = Math.round(d.temperature_2m_min[i]);

  document.getElementById('wf-icon').textContent = WMO_ICON[code] || '🌡';
  document.getElementById('wf-temp').innerHTML = `${tmax}°<span class="wf-tmin">/ ${tmin}°</span>`;
  document.getElementById('wf-label').textContent = dayPrefix + (WMO_LABEL[code] || `Code ${code}`);

  const chips = [
    { icon:'🌧', val: d.precipitation_sum[i] != null ? `${d.precipitation_sum[i]} mm` : '—', lbl:'Précipitations' },
    { icon:'💨', val: d.windspeed_10m_max[i] != null ? `${Math.round(d.windspeed_10m_max[i])} km/h${windDir?' '+windDir:''}` : '—', lbl:'Vent max' },
    humidity != null ? { icon:'💧', val:`${humidity} %`, lbl:'Humidité moy.' } : null,
    d.uv_index_max?.[i] != null ? { icon:'☀️', val:`UV ${d.uv_index_max[i]}`, lbl:'Indice UV max' } : null,
  ].filter(Boolean);

  document.getElementById('wf-details').innerHTML = chips.map(c =>
    `<div class="wf-chip" title="${escapeHtml(c.lbl)}">
      <span class="di-icon">${c.icon}</span>
      <span class="di-val">${escapeHtml(String(c.val))}</span>
    </div>`
  ).join('');

  feature.style.display = '';
}

// ============================================================
// Widgets — définition et gestion
// ============================================================
const WIDGET_DEFS = [
  { id:'kpis',           title:'Indicateurs clés',     icon:'📊', span:3, render: renderKPIs           },
  { id:'planning_jour',  title:'Planning du jour',      icon:'📅', span:1, render: renderPlanningJour   },
  { id:'lots_statut',    title:'Lots — statuts',        icon:'🍷', span:1, render: renderLotsStatut     },
  { id:'volumes_couleur',title:'Stock par couleur',     icon:'🎨', span:1, render: renderVolumesCouleur },
  { id:'ops_recentes',   title:'Opérations récentes',  icon:'⚙️', span:2, render: renderOpsRecentes    },
  { id:'alertes',        title:'Alertes cave',          icon:'🔔', span:1, render: renderAlertes        },
  { id:'alertes_so2',    title:'Alertes SO₂',          icon:'🧪', span:1, render: renderAlertesSo2     },
  { id:'contenants',     title:'Contenants occupés',    icon:'🛢', span:1, render: renderContenants     },
  { id:'apports',        title:'Apports récents',       icon:'🍇', span:1, render: renderApports        },
  { id:'fa_encours',     title:'FA en cours',           icon:'🌡', span:1, render: renderFaEncours      },
  { id:'produits_dluo',  title:'Stock produits — DLUO', icon:'📦', span:1, render: renderProduitsDluo   },
  { id:'anomalies_oenopulse', title:'OenoPulse — Anomalies cave', icon:'🍇', span:2, render: renderAnomaliesOenoPulse },
];

const DEFAULT_WIDGETS = ['kpis','planning_jour','lots_statut','volumes_couleur','ops_recentes','anomalies_oenopulse','alertes','alertes_so2','fa_encours','produits_dluo','contenants','apports'];
let activeWidgets = [...DEFAULT_WIDGETS];
let _configOpen   = false;
let modeVendange  = false;   // cockpit « Vendanges du jour » (préférence perso)

function toggleWidgetConfig() {
  _configOpen = !_configOpen;
  document.getElementById('widget-config-panel').classList.toggle('show', _configOpen);
  document.getElementById('btn-config-widgets').classList.toggle('active', _configOpen);
  if (_configOpen) renderWidgetConfig();
}

function renderWidgetConfig() {
  const grid = document.getElementById('wcp-grid');
  grid.innerHTML = WIDGET_DEFS.map(w => {
    const on = activeWidgets.includes(w.id);
    return `<div class="wcp-item${on?' active':''}" onclick="toggleWidget('${w.id}', this)">
      <span class="wcp-icon">${w.icon}</span>
      <span class="wcp-lbl">${escapeHtml(w.title)}</span>
      ${on ? '<span class="wcp-check">✓</span>' : '<span class="wcp-check" style="opacity:.2">○</span>'}
    </div>`;
  }).join('');
}

function toggleWidget(id, el) {
  const idx = activeWidgets.indexOf(id);
  if (idx >= 0) {
    if (activeWidgets.length <= 1) return;
    activeWidgets.splice(idx, 1);
    el.classList.remove('active');
    el.querySelector('.wcp-check').textContent = '○';
    el.querySelector('.wcp-check').style.opacity = '.2';
  } else {
    activeWidgets.push(id);
    el.classList.add('active');
    el.querySelector('.wcp-check').textContent = '✓';
    el.querySelector('.wcp-check').style.opacity = '1';
  }
  saveWidgetPrefs();
  renderDashboardGrid();
}

async function saveWidgetPrefs() {
  try { await WB3DB.setUserPref('dashboard', { active_widgets: activeWidgets, mode_vendange: modeVendange }); } catch(e) { /* silent */ }
}

async function loadWidgetPrefs() {
  try {
    const p = await WB3DB.getUserPref('dashboard');
    if (Array.isArray(p?.active_widgets) && p.active_widgets.length) {
      activeWidgets = p.active_widgets.filter(id => WIDGET_DEFS.some(w => w.id === id));
      if (!activeWidgets.length) activeWidgets = [...DEFAULT_WIDGETS];
    }
    modeVendange = !!p?.mode_vendange;
  } catch(e) { /* use defaults */ }
}

// ── Mode vendange : cockpit « Vendanges du jour » ─────────────
function toggleVendange() {
  modeVendange = !modeVendange;
  saveWidgetPrefs();
  applyMode();
}
function applyMode() {
  const cockpit = document.getElementById('vendange-cockpit');
  const grid    = document.getElementById('dash-grid');
  const cfg     = document.getElementById('widget-config-panel');
  const btn     = document.getElementById('btn-vendange');
  if (btn) btn.classList.toggle('active', modeVendange);
  if (modeVendange) {
    grid.style.display = 'none';
    cfg.classList.remove('show');
    document.getElementById('btn-config-widgets')?.classList.remove('active');
    _configOpen = false;
    cockpit.style.display = '';
    renderVendangeCockpit();
  } else {
    cockpit.style.display = 'none';
    grid.style.display = '';
  }
}

// Libellé court d'une tâche (sans dépendre du module planning).
function _vdTaskLabel(t) {
  const d = t.detail || {};
  if (t.type === 'transfert') return `${(d.sources||[]).join(', ')||'?'} → ${(d.destinations||[]).map(x=>x.cuve).filter(Boolean).join(', ')||'?'}`;
  if (t.type === 'sulfitage') return `${d.cuve||t.contenant_nom||'?'} = ${d.dose_kg!=null?fmt(d.dose_kg)+' '+(d.unite||'kg'):''} ${d.produit||''}`.trim();
  if (Array.isArray(d.cuves) && d.cuves.length) return d.cuves.join(', ');
  return t.titre || t.contenant_nom || (t.type||'').replace(/_/g,' ');
}
const VD_TASK_ICON = { transfert:'🔀', sulfitage:'⚗️', neige:'❄️', brassage:'🌀', soutirage:'🔄', analyse:'🔬', echantillon:'🧪', mise_en_bib:'📦', degustation:'👅', nettoyage:'🧹' };

async function renderVendangeCockpit() {
  const root = document.getElementById('vendange-cockpit');
  if (!root) return;
  const today = new Date().toISOString().slice(0,10);
  root.innerHTML = `<div class="loading-state" style="grid-column:span 3"><div class="spinner"></div>Vendanges du jour…</div>`;

  const [appo, cuves, taches] = await Promise.all([
    WB3DB.listTable('apports', {
      select: 'id,date_apport,apporteur,poids_kg,volume_hl,statut,cepage,lots(nom)',
      order: 'date_apport', ascending: false, limit: 300 }).catch(()=>[]),
    (WB3DB.queryCuverieEtat ? WB3DB.queryCuverieEtat() : Promise.resolve([])).catch(()=>[]),
    (WB3DB.listTaches ? WB3DB.listTaches({ from: '2000-01-01', to: today }) : Promise.resolve([])).catch(()=>[]),
  ]);

  // 1. Apports du jour
  const todayApp = (appo||[]).filter(a => a.date_apport === today && a.statut !== 'annule');
  const kg = todayApp.reduce((s,a)=>s+(Number(a.poids_kg)||0),0);
  const hl = todayApp.reduce((s,a)=>s+(Number(a.volume_hl)||0),0);
  const rdt = hl>0 ? kg/hl : null;
  // 2. Cuves en alerte
  const alertCuves = (cuves||[]).filter(c => c.niveau_alerte && c.niveau_alerte !== 'ok')
    .sort((a,b)=> (a.niveau_alerte==='critique'?0:1) - (b.niveau_alerte==='critique'?0:1));
  // 3 & 4. Tâches
  const todayTasks = (taches||[]).filter(t => t.date_prevue === today && t.statut !== 'annule');
  const lateTasks  = (taches||[]).filter(t => t.statut === 'a_faire' && t.date_prevue < today);

let _dragWidgetId = null;

function renderDashboardGrid() {
  const grid = document.getElementById('dash-grid');
  grid.innerHTML = '';
  activeWidgets.forEach(id => {
    const def = WIDGET_DEFS.find(w => w.id === id);
    if (!def) return;
    const div = document.createElement('div');
    div.className = `dash-widget${def.span > 1 ? ' span-'+def.span : ''}`;
    div.id = `w-${id}`;
    div.dataset.widgetId = id;
    div.innerHTML = `<span class="widget-drag-handle" draggable="true" title="Déplacer ce widget">⠿</span><div class="widget-body"><div class="loading-state"><div class="spinner"></div></div></div>`;
    grid.appendChild(div);
    bindWidgetDrag(div);
    def.render();
  });
}

// Réorganisation des widgets par drag-and-drop (poignée ⠿, persisté via
// activeWidgets — déjà la source de vérité de l'ordre, sauvegardée par
// saveWidgetPrefs()). La poignée est en dehors de .widget-body pour ne
// jamais être effacée par les renderX() qui font innerHTML sur ce dernier.
function bindWidgetDrag(div) {
  const handle = div.querySelector('.widget-drag-handle');
  handle.addEventListener('dragstart', e => {
    _dragWidgetId = div.dataset.widgetId;
    div.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', _dragWidgetId); } catch(_) {}
  });
  handle.addEventListener('dragend', () => {
    div.classList.remove('dragging');
    _dragWidgetId = null;
    document.querySelectorAll('.dash-widget.drag-over').forEach(d => d.classList.remove('drag-over'));
  });
  div.addEventListener('dragover', e => {
    if (!_dragWidgetId || _dragWidgetId === div.dataset.widgetId) return;
    e.preventDefault();
    div.classList.add('drag-over');
  });
  div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
  div.addEventListener('drop', e => {
    e.preventDefault();
    div.classList.remove('drag-over');
    const targetId = div.dataset.widgetId;
    if (!_dragWidgetId || _dragWidgetId === targetId) return;
    const from = activeWidgets.indexOf(_dragWidgetId);
    const to   = activeWidgets.indexOf(targetId);
    if (from < 0 || to < 0) return;
    activeWidgets.splice(from, 1);
    activeWidgets.splice(to, 0, _dragWidgetId);
    saveWidgetPrefs();
    renderDashboardGrid();
  });
}

async function loadAll() {
  const pLots = WB3DB.listTable('lots', {
    select: 'id,nom,couleur,millesime,statut,volume_actuel_hl,actif,created_at',
    order: 'created_at', ascending: false,
  }).then(d => { lots = d; renderLotsStatut(); renderVolumesCouleur(); renderKPIs(); renderAlertes(); })
    .catch(() => { lots = []; });

  // FIX bug pré-existant : 'volume_actuel_hl' n'existe PAS sur contenants.
  // Le volume réel = Σ lot_contenants.volume_hl (source de vérité du modèle WB3),
  // calculé via _recomputeContVolumes() une fois lot_contenants chargé.
  const pContenants = WB3DB.listTable('contenants', {
    select: 'id,nom,type,capacite_hl,actif',
    filter: { actif: true },
  }).then(d => { contenants = d; _recomputeContVolumes(); renderContenants(); renderKPIs(); renderAlertes(); })
    .catch(() => { contenants = []; });

  const pOperations = WB3DB.listTable('operations', {
    select: 'id,type_operation,date_operation,statut,volume_hl,operateur,operation_lots(lots(nom)),operation_contenants(contenants(nom))',
    order: 'date_operation', ascending: false, limit: 100,
  }).then(d => { operations = d; renderOpsRecentes(); renderKPIs(); })
    .catch(() => { operations = []; });

  // FIX bug pré-existant : colonnes réelles = apporteur / poids_kg
  // (pas nom_apporteur/quantite_kg) ; apports n'a pas de 'couleur'.
  const pApports = WB3DB.listTable('apports', {
    select: 'id,date_apport,apporteur,poids_kg,volume_hl,lot_id,lots(nom,couleur),statut',
    order: 'date_apport', ascending: false, limit: 30,
  }).then(d => { apports = d; renderApports(); })
    .catch(() => { apports = []; });

  const pAnalyses = WB3DB.queryAnalyses({ ascending: false })
    .then(d => { recentAnalyses = d; renderAlertesSo2(); renderFaEncours(); })
    .catch(() => { recentAnalyses = []; });

  // Stock produits (DLUO) — listTable filtre déjà archived_at IS NULL (043)
  const pProduits = WB3DB.listTable('produits_lots', {
    select: 'id,numero_lot,dluo,quantite_actuelle,unite,produits_catalogue(nom,categorie)',
    order: 'dluo', ascending: true,
  }).then(d => { produitsLots = d; renderProduitsDluo(); renderKPIs(); })
    .catch(() => { produitsLots = []; });

  // Lot↔contenant : volume réel par cuve + compteur FA. Source de vérité
  // du volume cave (contenants n'a pas de colonne volume).
  const pLotCont = WB3DB.listTable('lot_contenants', {
    select: 'contenant_id,volume_hl,lots(statut)',
  }).then(d => { lotContenants = d; _recomputeContVolumes(); renderContenants(); renderKPIs(); renderAlertes(); })
    .catch(() => { lotContenants = []; });

  // Planning : tâches des 30 derniers jours → aujourd'hui (suffisant pour
  // le badge « en retard » sans tirer tout l'historique du module planning).
  const todayStr30 = new Date().toISOString().slice(0,10);
  const pTaches = (WB3DB.listTaches
    ? WB3DB.listTaches({ from: new Date(Date.now()-30*86400000).toISOString().slice(0,10), to: todayStr30 })
    : Promise.resolve([]))
    .then(d => { taches = d; renderPlanningJour(); })
    .catch(() => { taches = []; });

  const pAnomalies = (WB3DB.queryAnomalies
    ? WB3DB.queryAnomalies()
    : Promise.resolve([]))
    .then(d => { anomaliesOenoPulse = d; renderAnomaliesOenoPulse(); })
    .catch(() => { anomaliesOenoPulse = []; });

  await Promise.allSettled([pLots, pContenants, pOperations, pApports, pAnalyses, pProduits, pLotCont, pTaches, pAnomalies]);
}

function _getWEl(id) { const w = document.getElementById(`w-${id}`); return w ? w.querySelector('.widget-body') : null; }

// Volume réel par cuve = Σ lot_contenants.volume_hl (contenants n'a PAS
// de colonne volume). Annote chaque contenant.volume_actuel_hl pour que
// tous les widgets existants (KPIs, alertes, contenants) restent inchangés.
function _recomputeContVolumes() {
  if (!contenants.length) return;
  const sum = {};
  (lotContenants || []).forEach(lc => {
    if (!lc.contenant_id) return;
    sum[lc.contenant_id] = (sum[lc.contenant_id] || 0) + (Number(lc.volume_hl) || 0);
  });
  contenants.forEach(c => { c.volume_actuel_hl = sum[c.id] || 0; });
}

// ── KPIs ─────────────────────────────────────────────────────
function renderKPIs() {
  const el = _getWEl('kpis');
  if (!el) return;
  const activeLots  = lots.filter(l => l.actif && l.statut !== 'sorti');
  const volume      = contenants.reduce((s,c) => s + (Number(c.volume_actuel_hl)||0), 0);
  const capacite    = contenants.reduce((s,c) => s + (Number(c.capacite_hl)||0), 0);
  const txOccup     = capacite > 0 ? Math.round(volume / capacite * 100) : null;
  const txColor     = txOccup == null ? '#9e9e9e' : txOccup >= 90 ? '#e53935' : txOccup >= 70 ? '#fb8c00' : '#43a047';
  const moisActuel  = new Date().toISOString().slice(0,7);
  const opsMonth    = operations.filter(o => (o.date_operation||'').startsWith(moisActuel)).length;
  const planifiees  = operations.filter(o => o.statut === 'planifie').length;
  // Ajouts : ops du jour, alertes du jour, compteur cuverie
  const todayISO    = new Date().toISOString().slice(0,10);
  const opsToday    = operations.filter(o => (o.date_operation||'') === todayISO && o.statut !== 'annule').length;
  const faContIds   = new Set(lotContenants.filter(lc => lc.lots?.statut === 'fa').map(lc => lc.contenant_id));
  const cuvesVides  = contenants.filter(c => c.actif && !(Number(c.volume_actuel_hl) > 0)).length;
  const cuvesPleines= contenants.filter(c => c.actif && c.capacite_hl && c.volume_actuel_hl
                        && (c.volume_actuel_hl / c.capacite_hl) >= 0.9).length;
  const cuvesFa     = contenants.filter(c => c.actif && faContIds.has(c.id)).length;

  el.innerHTML = `
    <div class="widget-title">📊 Indicateurs clés</div>
    <div class="kpi-grid" data-help="Les chiffres clés de ta cave en temps réel : lots actifs, volume total, taux d'occupation, opérations et alertes du jour.">
      <div class="kpi-card"><div class="accent-bar" style="background:var(--color-primary)"></div>
        <div class="kpi-label">Lots actifs</div><div class="kpi-value">${activeLots.length}</div>
      </div>
      <div class="kpi-card"><div class="accent-bar" style="background:#2e7d32"></div>
        <div class="kpi-label">Volume en cave</div><div class="kpi-value">${fmt(volume)}</div><div class="kpi-sub">hL</div>
      </div>
      <div class="kpi-card"><div class="accent-bar" style="background:${txColor}"></div>
        <div class="kpi-label">Taux occupation cave</div>
        <div class="kpi-value" style="color:${txColor}">${txOccup != null ? txOccup+'%' : '—'}</div>
        ${capacite > 0 ? `<div class="kpi-sub">${fmt(volume)} / ${fmt(capacite)} hL</div>` : ''}
      </div>
      <div class="kpi-card"><div class="accent-bar" style="background:#e65100"></div>
        <div class="kpi-label">Opérations ce mois</div><div class="kpi-value">${opsMonth}</div>
      </div>
      <div class="kpi-card"><div class="accent-bar" style="background:#1565c0"></div>
        <div class="kpi-label">Planifiées</div>
        <div class="kpi-value" style="${planifiees>0?'color:#1565c0':''}">${planifiees}</div>
      </div>
      <div class="kpi-card"><div class="accent-bar" style="background:#6a1b9a"></div>
        <div class="kpi-label">Opérations aujourd'hui</div><div class="kpi-value">${opsToday}</div>
      </div>
      <div class="kpi-card"><div class="accent-bar" style="background:${_alertesCount>0?'#e53935':'#43a047'}"></div>
        <div class="kpi-label">Alertes du jour</div>
        <div class="kpi-value" style="${_alertesCount>0?'color:#e53935':''}">${_alertesCount}</div>
      </div>
      <div class="kpi-card"><div class="accent-bar" style="background:#00897b"></div>
        <div class="kpi-label">Cuverie</div>
        <div class="kpi-value" style="font-size:18px">${cuvesVides} <span style="font-size:var(--text-caption);font-weight:500;color:var(--color-ink-tertiary)">vides</span></div>

    </div>`;
}

function renderLotsStatut() {
  const el = _getWEl('lots_statut');

  if (!activeLots.length) {

    return;

  const counts = {};
  activeLots.forEach(l => { counts[l.statut] = (counts[l.statut]||0) + 1; });
  const max = Math.max(...Object.values(counts));
  const rows = Object.entries(counts).sort(([,a],[,b]) => b-a).map(([statut, cnt]) => {
    const m = STATUT_META[statut] || { label:statut, dot:'#888' };
    const pct = Math.round(cnt/max*100);

      <span class="statut-dot" style="background:${m.dot}"></span>
      <span class="statut-lbl">${escapeHtml(m.label)}</span>

  }).join('');

}

    return;
  }

  // Latest analysis per lot (data is already sorted desc by date)
  const byLot = new Map();
  recentAnalyses.forEach(a => { if (a.lot_id && !byLot.has(a.lot_id)) byLot.set(a.lot_id, a); });

  const lotAnalyses = [...byLot.values()].filter(a => a.so2_libre != null);

  if (!lotAnalyses.length) {
    el.innerHTML = `<div class="widget-title">🧪 Alertes SO₂ libre</div>
      <div class="empty-state" style="padding:var(--space-4) 0">
        <div class="icon">🧪</div><div class="title">Pas de données SO₂ libre</div></div>`;
    return;
  }

  const { libre_bas, libre_haut } = _dashAnalyseThresholds;
  const sorted = [...lotAnalyses].sort((a, b) => a.so2_libre - b.so2_libre);
  const alertCount = sorted.filter(a => a.so2_libre < libre_haut).length;

  const rows = sorted.slice(0, 8).map(a => {
    const v    = a.so2_libre;
    const col  = v < libre_bas ? '#d32f2f' : v < libre_haut ? '#f57c00' : '#2e7d32';
    const bg   = v < libre_bas ? '#fff0f0' : v < libre_haut ? '#fff8ee' : '#f0faf0';
    const icon = v < libre_bas ? '🔴' : v < libre_haut ? '🟡' : '🟢';
    const lotNom = a.lots?.nom || '—';
    const date   = a.date_analyse
      ? new Date(a.date_analyse + 'T00:00:00').toLocaleDateString('fr-FR', { day:'2-digit', month:'short' })
      : '—';
    return `<div style="display:flex;align-items:center;gap:var(--space-2);padding:5px 0;border-bottom:1px solid var(--color-border)">
      <span style="font-size:12px;flex-shrink:0">${icon}</span>
      <button class="nav-chip" onclick="WB3Nav.navigate('lot-detail.html?id=${a.lot_id}')"
        style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;text-align:left">${escapeHtml(lotNom)}</button>
      <span style="font-size:var(--text-caption);color:${col};font-weight:700;background:${bg};padding:2px 7px;border-radius:var(--radius-pill);flex-shrink:0">${fmt(v)} mg/L</span>
      <span style="font-size:9px;color:var(--color-ink-quaternary);flex-shrink:0;white-space:nowrap">${date}</span>
    </div>`;
  }).join('');

  el.innerHTML = `<div class="widget-title">🧪 SO₂ libre — dernières analyses
    ${alertCount > 0 ? `<span style="font-size:10px;font-weight:600;background:#e53935;color:#fff;padding:1px 6px;border-radius:10px;margin-left:var(--space-1)">${alertCount}</span>` : ''}
    <a href="parametres.html?section=analyses" style="margin-left:auto;font-size:var(--text-caption);color:var(--color-ink-tertiary)">⚙️ Seuils</a>
  </div>
  <div style="font-size:9px;color:var(--color-ink-tertiary);margin-bottom:var(--space-2)">
    <span style="color:#2e7d32">●</span> ≥ ${libre_haut} mg/L &nbsp;
    <span style="color:#f57c00">●</span> ${libre_bas}–${libre_haut} &nbsp;
    <span style="color:#d32f2f">●</span> &lt; ${libre_bas} mg/L
  </div>
  ${rows}`;
}

function renderAlertes() {
  const el = _getWEl('alertes');
  if (!el) return;
  const alertes = [];
  const today7 = new Date(Date.now() + 7*86400000).toISOString().slice(0,10);
  const todayStr = new Date().toISOString().slice(0,10);

  // FA longue (> 25 jours)
  lots.filter(l => l.statut === 'fa' && l.actif).forEach(l => {
    const since = l.created_at ? Math.round((Date.now() - new Date(l.created_at).getTime()) / 86400000) : null;
    if (since && since > 25) alertes.push({ icon:'⚠️', lvl:'warn', msg:`<strong>${escapeHtml(l.nom)}</strong> — FA depuis ${since} j` });
  });

  // Cuves en vidange : contiennent du vin mais ne sont PAS pleines
  // (< 99 % de la capacité) → espace de tête = risque d'oxydation,
  // à ouiller. Seuil ajustable.
  const SEUIL_VIDANGE_PCT = 99;
  contenants.filter(c => c.actif && c.capacite_hl && c.volume_actuel_hl > 0).forEach(c => {
    const pct = Math.round(c.volume_actuel_hl / c.capacite_hl * 100);
    if (pct < SEUIL_VIDANGE_PCT) alertes.push({ icon:'🛢', lvl:'warn', msg:`<strong>${escapeHtml(c.nom)}</strong> — en vidange : ${pct}% (${fmt(c.volume_actuel_hl)} / ${fmt(c.capacite_hl)} hL)` });
  });

  // Opérations planifiées dans les 7 prochains jours
  const planProches = operations.filter(o => o.statut === 'planifie' && o.date_operation >= todayStr && o.date_operation <= today7);
  planProches.forEach(o => {
    const icon = OP_ICONS[o.type_operation] || '⚙️';
    alertes.push({ icon, lvl:'info', msg:`<strong>${escapeHtml(o.type_operation||'Op.')}</strong> planifiée le ${o.date_operation}` });
  });

  // Lots sans opération récente (FA/FML/élevage, > 30 j)
  lots.filter(l => l.actif && ['fa','fml','elevage'].includes(l.statut)).forEach(l => {
    const lastOp = operations.find(o => (o.operation_lots||[]).some(ol => ol.lots?.nom===l.nom));
    if (!lastOp) {
      alertes.push({ icon:'📋', lvl:'info', msg:`<strong>${escapeHtml(l.nom)}</strong> (${STATUT_META[l.statut]?.label||l.statut}) — aucune op.` });
    } else {
      const days = Math.round((Date.now() - new Date(lastOp.date_operation).getTime()) / 86400000);
      if (days > 30) alertes.push({ icon:'📋', lvl:'info', msg:`<strong>${escapeHtml(l.nom)}</strong> — dernière op. il y a ${days} j` });
    }
  });

  // Cuves vides sans volume renseigné
  const contsSansVol = contenants.filter(c => c.actif && c.capacite_hl && !c.volume_actuel_hl);
  if (contsSansVol.length)
    alertes.push({ icon:'🛢', lvl:'info', msg:`<strong>${contsSansVol.length} contenant${contsSansVol.length>1?'s':''} vide${contsSansVol.length>1?'s':''}</strong> — Volume non renseigné` });

  _alertesCount = alertes.length;          // partagé avec le KPI "Alertes du jour"
  if (document.getElementById('w-kpis')) renderKPIs();

  if (!alertes.length) {
    el.innerHTML = `<div class="widget-title">🔔 Alertes cave</div>
      <div class="empty-state" style="padding:var(--space-4) 0">
        <div class="icon">✅</div><div class="title">Aucune alerte</div><div class="desc">Tout semble en ordre.</div></div>`;
    return;
  }
  const lvlColor = { warn:'#e65100', info:'var(--color-ink-secondary)' };
  el.innerHTML = `<div class="widget-title">🔔 Alertes cave <span style="font-size:10px;font-weight:600;background:#e53935;color:#fff;padding:1px 6px;border-radius:10px;margin-left:var(--space-1)">${alertes.length}</span></div>` +
    alertes.slice(0,8).map(a =>
      `<div class="alert-item"><span class="alert-icon">${a.icon}</span><span class="alert-msg" style="color:${lvlColor[a.lvl]||'inherit'}">${a.msg}</span></div>`
    ).join('');
}

// ── FA en cours ───────────────────────────────────────────────
// Limites assumées :
//  • jour-J basé sur lots.date_entree (début de cuvée) faute de
//    champ "début FA" structuré — approché si la FA démarre plus tard.
//  • "FA stuck" nécessite ≥2 analyses avec densite ; espacement réel
//    souvent > 48 h en cave → flag "indéterminé" si suivi insuffisant.
function renderFaEncours() {
  const el = _getWEl('fa_encours');
  if (!el) return;
  const faLots = (lots || []).filter(l => l.actif && l.statut === 'fa');
  if (!faLots.length) {
    el.innerHTML = `<div class="widget-title">🌡 FA en cours <a href="lots.html">Voir →</a></div>
      <div class="empty-state" style="padding:var(--space-4) 0">
        <div class="icon">🌡</div><div class="title">Aucune FA en cours</div></div>`;
    return;
  }
  const now = Date.now();
  const rows = faLots.slice(0, 8).map(l => {
    // recentAnalyses est trié date desc ; analyses de ce lot avec densité
    const an = (recentAnalyses || [])
      .filter(a => a.lot_id === l.id && a.densite != null);
    const last = an[0], prev = an[1];
    const jourJ = l.date_entree
      ? Math.max(0, Math.round((now - new Date(l.date_entree + 'T00:00:00').getTime())/86400000))
      : (last ? Math.round((now - new Date(last.date_analyse+'T00:00:00').getTime())/86400000) : null);

    let badgeCls = 'fa-unknown', badgeTxt = 'densité ?';
    let densInfo = 'pas de densité';
    if (last) {
      densInfo = `dens. ${fmt(last.densite)}`;
      if (prev) {
        const dh = (new Date(last.date_analyse) - new Date(prev.date_analyse)) / 3600000;
        if (dh >= 48 && Number(last.densite) >= Number(prev.densite)) {
          badgeCls = 'fa-stuck'; badgeTxt = 'FA stuck ?';
        } else if (Number(last.densite) < Number(prev.densite)) {
          badgeCls = 'fa-ok'; badgeTxt = 'en baisse';
        } else {
          badgeCls = 'fa-unknown'; badgeTxt = 'suivi court';
        }
      } else {
        badgeCls = 'fa-unknown'; badgeTxt = '1 mesure';
      }
    }
    return `<div class="fa-row">
      <div class="fa-info">
        <div class="fa-name">${escapeHtml(l.nom)}</div>
        <div class="fa-desc">${jourJ!=null?`J+${jourJ}`:'—'} · ${escapeHtml(densInfo)}</div>
      </div>
      <span class="fa-badge ${badgeCls}">${escapeHtml(badgeTxt)}</span>
    </div>`;
  }).join('');
  el.innerHTML = `<div class="widget-title">🌡 FA en cours
    <span style="font-size:10px;font-weight:600;background:#ff7043;color:#fff;padding:1px 6px;border-radius:10px;margin-left:var(--space-1)">${faLots.length}</span>
    <a href="lots.html">Voir →</a></div>
    <div style="font-size:9px;color:var(--color-ink-tertiary);margin-bottom:var(--space-2)">
      « FA stuck ? » = densité non décroissante depuis &gt;48 h (indicatif, dépend du suivi)
    </div>${rows}`;
}

    const sevCls = a.severite === 'critique' ? 'anom-sev-critique' : 'anom-sev-attention';
    const sevLbl = a.severite === 'critique' ? 'Critique' : 'Attention';
    const href = a.lot_id ? `lot-detail.html?id=${a.lot_id}` : 'lots.html';
    return `<div class="anom-row" onclick="WB3Nav.navigate('${href}')">
      <span class="anom-icon">${icon}</span>
      <div class="anom-info">
        <div class="anom-lot">${escapeHtml(a.lot_nom || '—')}</div>
        <div class="anom-msg">${escapeHtml(a.message || '')}</div>
      </div>
      <span class="anom-sev ${sevCls}">${sevLbl}</span>
    </div>`;
  };

  const rows = [
    ...critiques.slice(0, 4),
    ...attentions.slice(0, Math.max(0, 6 - critiques.length)),
  ].map(renderRow).join('');

  const more = total > 6
    ? `<div style="text-align:center;padding:var(--space-2) 0;font-size:var(--text-caption);color:var(--color-ink-tertiary)">
        +${total - 6} autre(s) — <a href="assistant.html" style="color:var(--color-primary)">interroger OenoPulse →</a>
      </div>` : '';

  el.innerHTML = `<div class="widget-title">🍇 OenoPulse — Anomalies ${badge}
    <a href="assistant.html">OenoPulse →</a></div>
    ${rows}${more}`;
}

// ============================================================
// Realtime — auto-refresh sans reload (pattern standardisé 046)
// ============================================================
function setupRealtime() {
  if (_rtUnsub || typeof WB3DB.subscribeMany !== 'function') return;
  try {
    _rtUnsub = WB3DB.subscribeMany(
      ['lots','operations','contenants','analyses','produits_lots','lot_contenants'],
      () => {
        clearTimeout(_rtTimer);
        _rtTimer = setTimeout(() => { loadAll(); }, 800);  // débounce anti-rafale
      }
    );
    window.addEventListener('pagehide', () => { try { _rtUnsub && _rtUnsub(); } catch(e){} }, { once:true });
  } catch(e) { /* Realtime non critique : le bouton ↻ reste dispo */ }
}

// ============================================================
// Refresh
// ============================================================
async function refresh() {
  renderDashboardGrid();
  if (modeVendange) renderVendangeCockpit();
  loadAll();
  loadWeather();
}
</script>

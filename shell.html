<!DOCTYPE html>
<html lang="fr">
<head>

<link rel="icon" type="image/png" sizes="16x16" href="img/icon-wineblender-16.png">
<link rel="shortcut icon" href="img/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="img/icon-wineblender-180.png">

<link rel="manifest" href="manifest.json">

<title>VitiFlux</title>

<script>(function(){var t=localStorage.getItem('wb3_theme');if(t)document.documentElement.setAttribute('data-theme',t);var w=parseInt(localStorage.getItem('wb3_sidebar_width'),10);if(w>=180&&w<=400)document.documentElement.style.setProperty('--nav-w',w+'px');})();</script>
<style>
  :root {
    --nav-w:    220px;
    --nav-rail:  52px;
    --nav-bg:   var(--color-primary-deep, #0d2137);
    --nav-acc:  var(--color-accent, #e8b04a);
    --tb-h:      44px;
    --ph-h:      34px;
    --border:   var(--color-border, #e5e0d8);
    --bg:       var(--color-bg, #f7f3ee);
    --ink:      var(--color-ink, #1c1c1e);
    --muted:    var(--color-ink-tertiary, #6b6b70);
    --p:        var(--color-primary, #6a1b2a);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px; background: var(--bg); color: var(--ink);
  }

  /* ── Sidebar ──────────────────────────────────────────────────── */
  .shell-nav {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: var(--nav-w);
    background: var(--nav-bg);
    display: flex; flex-direction: column;
    z-index: 10; overflow: hidden;
    transition: width .22s ease;
    box-shadow: 2px 0 16px rgba(0,0,0,.18);
  }
  .shell-nav.collapsed { width: var(--nav-rail); }
  .shell-nav.wb3-large { width: max(var(--nav-w), 320px); }

  /* ── Poignée de redimensionnement (3 points, desktop only) ── */
  .shell-nav-grip {
    position: absolute; top: 0; right: 0; bottom: 0; width: 8px;
    cursor: col-resize; z-index: 20;
    display: flex; align-items: center; justify-content: center;
  }
  .shell-nav-grip::before {
    content: '⋮'; color: rgba(255,255,255,0);
    font-size: 15px; line-height: 1; transition: color .15s;
  }
  .shell-nav-grip:hover::before,
  body.shell-resizing .shell-nav-grip::before { color: rgba(255,255,255,.5); }
  body.shell-resizing { cursor: col-resize; user-select: none; }
  body.shell-resizing .shell-nav,
  body.shell-resizing .shell-body { transition: none !important; }
  @media (max-width: 767px) { .shell-nav-grip { display: none; } }
  @media (prefers-reduced-motion: reduce) { .shell-nav-grip::before { transition: none; } }

  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    padding: 15px 13px 14px; flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,.09);
    cursor: default;
  }
  .nav-logo .n-icon { font-size: 22px; flex-shrink: 0; }
  .nav-logo img.n-icon { width: 28px; height: 28px; object-fit: contain; display: block; }
  .nav-logo .n-text {
    font-weight: 700; font-size: 14.5px; letter-spacing: .3px;
    white-space: nowrap; overflow: hidden; color: #fff;
    transition: opacity .18s, max-width .22s; max-width: 200px;
  }
  .shell-nav.collapsed .nav-logo .n-text { opacity: 0; max-width: 0; }

  .nav-items { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 7px 0; }
  .nav-items::-webkit-scrollbar { width: 3px; }
  .nav-items::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); }

  .nav-sep { height: 1px; background: rgba(255,255,255,.08); margin: 5px 10px; }

  /* ── Bloc « Accès rapide » (épinglé) ── */
  .shell-nav-pinned { padding-bottom: 4px; margin-bottom: 2px; border-bottom: 1px solid rgba(255,255,255,.07); }

  /* ── En-tête de groupe (repliable) ── */
  .shell-nav-group {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 13px 5px; margin: 3px 5px 0;
    color: rgba(255,255,255,.42);
    font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px;
    cursor: pointer; user-select: none; white-space: nowrap; border-radius: 6px;
    transition: color .14s, background .14s;
  }
  .shell-nav-group:hover { color: rgba(255,255,255,.72); background: rgba(255,255,255,.05); }
  .shell-nav-group .g-emoji { font-size: 12px; flex-shrink: 0; }
  .shell-nav-group .g-label { flex: 1; overflow: hidden; transition: opacity .18s, max-width .22s; max-width: 200px; }
  .shell-nav-group .g-caret { flex-shrink: 0; font-size: 9px; opacity: .7; transition: transform .16s, opacity .18s; }
  .shell-nav-group.collapsed .g-caret { transform: rotate(-90deg); }
  .shell-nav-item.group-hidden { display: none; }
  /* Rail : en-têtes = fin séparateur */
  .shell-nav.collapsed .shell-nav-group {
    padding: 0; margin: 6px 12px; height: 1px;
    background: rgba(255,255,255,.08); overflow: hidden; pointer-events: none;
  }
  .shell-nav.collapsed .shell-nav-group .g-emoji,
  .shell-nav.collapsed .shell-nav-group .g-label,
  .shell-nav.collapsed .shell-nav-group .g-caret { opacity: 0; }

  .shell-nav-item {
    display: flex; align-items: center; gap: 11px;
    padding: 9px 13px; color: rgba(255,255,255,.65);
    font-size: 13px; font-weight: 500;
    border-radius: 8px; margin: 1px 5px;
    transition: background .14s, color .14s;
    position: relative; white-space: nowrap; cursor: pointer;
  }
  .shell-nav-item:hover { background: rgba(255,255,255,.09); color: rgba(255,255,255,.95); }
  .shell-nav-item.active { background: color-mix(in srgb, var(--nav-acc) 13%, transparent); color: #fff; font-weight: 600; }
  .shell-nav-item.active::before {
    content: ''; position: absolute; left: 0; top: 6px; bottom: 6px;
    width: 3px; border-radius: 0 2px 2px 0; background: var(--nav-acc);
  }
  .shell-nav-item .n-icon { display: flex; align-items: center; justify-content: center; width: 22px; height: 22px; flex-shrink: 0; }
  .shell-nav-item .n-icon svg { width: 18px; height: 18px; display: block; }
  .shell-nav-item .n-label {
    overflow: hidden; transition: opacity .18s, max-width .22s; max-width: 200px;
  }
  .shell-nav.collapsed .shell-nav-item .n-label { opacity: 0; max-width: 0; }

  .shell-nav.collapsed .shell-nav-item:hover::after {
    content: attr(data-label);
    position: absolute; left: calc(var(--nav-rail) + 6px); top: 50%;
    transform: translateY(-50%);
    background: var(--color-primary-soft, #1a3a55); color: #fff;
    padding: 5px 10px; border-radius: 6px;
    font-size: 12.5px; white-space: nowrap;
    box-shadow: 0 2px 10px rgba(0,0,0,.35);
    pointer-events: none; z-index: 400;
  }

  .nav-hamburger {
    margin-left: auto; flex-shrink: 0;
    background: none; border: none; color: rgba(255,255,255,.45);
    cursor: pointer; font-size: 17px; padding: 2px 6px;
    border-radius: 5px; line-height: 1;
    transition: color .14s, background .14s;
  }
  .nav-hamburger:hover { color: rgba(255,255,255,.9); background: rgba(255,255,255,.08); }
  /* En mode réduit : cacher l'icône, centrer le hamburger seul */
  .shell-nav.collapsed .nav-logo { gap: 0; justify-content: center; padding: 12px 5px; }
  .shell-nav.collapsed .nav-logo .n-icon { display: none; }
  .shell-nav.collapsed .nav-hamburger { margin-left: 0; }

  /* ── Bannière état réseau ─────────────────────────────────────── */
  #wb3-network-banner {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    flex-shrink: 0;
    font-size: 13px; font-weight: 600; letter-spacing: .2px;
    max-height: 0; overflow: hidden; opacity: 0;
    transition: max-height .25s ease, opacity .25s ease;
  }
  #wb3-network-banner.show { max-height: 36px; opacity: 1; }
  #wb3-network-banner.offline  { background: #b91c1c; color: #fff; }
  #wb3-network-banner.back     { background: #15803d; color: #fff; }

  /* ── Shell body ───────────────────────────────────────────────── */
  .shell-body {
    margin-left: var(--nav-w); height: 100vh;
    display: flex; flex-direction: column;
    transition: margin-left .22s ease; overflow: hidden;
  }
  .shell-body.nav-collapsed { margin-left: var(--nav-rail); }
  .shell-body.nav-large { margin-left: max(var(--nav-w), 320px); }
  @media (prefers-reduced-motion: reduce) {
    .shell-nav, .shell-body { transition: none; }
  }

  /* ── Toolbar ──────────────────────────────────────────────────── */
  .shell-toolbar {
    height: var(--tb-h); flex-shrink: 0;
    background: var(--color-bg-elevated); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    padding: 0 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,.04);
  }
  .shell-breadcrumb {
    font-weight: 600; font-size: 13.5px; color: var(--ink);
    min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 260px;
  }
  .tb-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
  .tb-spacer { flex: 1; }
  .tb-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 11px; background: none;
    border: 1px solid var(--border); border-radius: 7px;
    font-family: inherit; font-size: 12.5px; color: var(--ink);
    cursor: pointer; white-space: nowrap;
    transition: border-color .14s, background .14s;
  }
  .tb-btn:hover { border-color: var(--p); background: #faf5f0; }
  .tb-btn.active { background: var(--p); color: #fff; border-color: var(--p); }
  .tb-user {
    font-size: 12px; color: var(--muted);
    max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  /* Badge de rôle — toujours visible (jamais tronqué). */
  .tb-role {
    font-size: 11px; font-weight: 700; white-space: nowrap; flex-shrink: 0;
    padding: 2px 9px; border-radius: 999px; letter-spacing: .2px;
    background: #eef1f4; color: #44515f; border: 1px solid #dde3ea;
  }
  .tb-role[data-role="admin"]        { background: #fbeaec; color: #9a2230; border-color: #f2c9cf; }
  .tb-role[data-role="maitre_chais"] { background: #efe7fb; color: #5b3aa0; border-color: #ddccf3; }
  .tb-role[data-role="oenologue"]    { background: #e7f0fb; color: #2c5aa0; border-color: #ccdef3; }
  .tb-role[data-role="caviste"]      { background: #e8f5ee; color: #2f7d50; border-color: #cce9d7; }

  /* ── Content area ─────────────────────────────────────────────── */
  .shell-content { flex: 1; overflow: hidden; display: flex; position: relative; }

  /* ── Panes ────────────────────────────────────────────────────── */
  .shell-pane {
    flex: 1; overflow: hidden;
    display: flex; flex-direction: column; position: relative;
    border: 2px solid transparent; transition: border-color .14s;
  }
  .shell-content.split .shell-pane.active-pane { border-color: var(--nav-acc); }

  .shell-pane iframe { flex: 1; border: none; width: 100%; display: block; }

  /* ── Pane header (visible only in split) ───────────────────────── */
  .pane-header {
    display: none; align-items: center; gap: 6px;
    background: #f0ece5; border-bottom: 1px solid var(--border);
    padding: 4px 8px; height: var(--ph-h); flex-shrink: 0;
  }
  .shell-content.split .pane-header { display: flex; }

  .pane-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0; transition: background .14s;
  }
  .shell-pane.active-pane .pane-dot { background: var(--nav-acc); }

  .pane-picker {
    flex: 1; font-family: inherit; font-size: 12.5px;
    border: 1px solid var(--border); border-radius: 5px;
    padding: 2px 6px; background: var(--color-bg-elevated); color: var(--ink); cursor: pointer;
  }
  .pane-close {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 13px; padding: 2px 5px;
    border-radius: 4px; line-height: 1;
    transition: color .14s, background .14s;
  }
  .pane-close:hover { color: var(--p); background: rgba(0,0,0,.06); }

  /* ── Right pane hidden by default ──────────────────────────────── */
  #pane-right { display: none; }
  .shell-content.split #pane-right { display: flex; }

  /* ── Divider ──────────────────────────────────────────────────── */
  .shell-divider {
    width: 5px; cursor: col-resize; flex-shrink: 0;
    background: var(--border); position: relative;
    transition: background .14s; display: none;
  }
  .shell-content.split .shell-divider { display: block; }
  .shell-divider:hover { background: var(--p); }
  .shell-divider::after {
    content: '⋮'; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(0,0,0,.25); font-size: 14px; pointer-events: none;
  }

  /* ── Per-pane loading overlay ──────────────────────────────────── */
  .pane-loading {
    position: absolute; inset: 0; z-index: 5;
    background: rgba(247,243,238,.85);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--muted);
    pointer-events: none; opacity: 0; transition: opacity .2s;
  }
  .pane-loading.show { opacity: 1; }
</style>
</head>
<body>

<!-- ── Sidebar ────────────────────────────────────────────────── -->
<nav class="shell-nav" id="shell-nav">
  <div class="nav-logo">
    <img decoding="async" class="n-icon" src="img/icon-wineblender-192.png" alt="VitiFlux" />
    <span class="n-text">VitiFlux</span>
    <button class="nav-hamburger" id="nav-toggle" onclick="cycleNavState()" title="Barre : normale — clic → large ( [ )">☰</button>
  </div>
  <div class="nav-items" id="nav-items"></div>
  <div class="shell-nav-grip" id="shell-nav-grip"
       title="Glisser pour redimensionner · double-clic pour réinitialiser"
       aria-hidden="true"></div>
</nav>

<!-- ── Main body ──────────────────────────────────────────────── -->
<div class="shell-body" id="shell-body">

<!-- ── Bannière réseau (hors-ligne / reconnexion) ────────────── -->
<div id="wb3-network-banner" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- Toolbar -->
  <div class="shell-toolbar">
    <span class="shell-breadcrumb" id="shell-breadcrumb">Chargement…</span>
    <div class="tb-sep"></div>
    <div class="tb-spacer"></div>
    <button class="tb-btn" id="btn-search" onclick="shellSearchOpen()" title="Rechercher une cuve, un lot… (Ctrl+K)">
      🔎 <span style="font-size:10px;border:1px solid var(--border);border-radius:4px;padding:1px 5px;color:var(--muted)">⌘K</span>
    </button>
    <button class="tb-btn" id="btn-split" onclick="toggleSplit()" title="Afficher deux modules côte à côte">
      ⊞ Vue partagée
    </button>
    <div class="tb-sep"></div>
    <span class="tb-role" id="shell-role" style="display:none"></span>
    <span class="tb-user" id="shell-user"></span>
    <button class="tb-btn" onclick="shellLogout()">↪ Déconnexion</button>
  </div>

  <!-- Content -->
  <div class="shell-content" id="shell-content">

    <!-- Left pane -->
    <div class="shell-pane active-pane" id="pane-left">
      <div class="pane-header" id="ph-left">
        <div class="pane-dot"></div>
        <select class="pane-picker" id="picker-left"
                onchange="navigateFromPicker('left', this.value)"
                onclick="setActivePaneById('left')"></select>
        <button class="pane-close" onclick="closeSplit(event)" title="Fermer vue partagée">✕</button>
      </div>
      <iframe id="frame-left" src="" title="Volet principal"></iframe>
      <div class="pane-loading" id="load-left">Chargement…</div>
    </div>

    <!-- Draggable divider -->
    <div class="shell-divider" id="shell-divider"></div>

    <!-- Right pane -->
    <div class="shell-pane" id="pane-right">
      <div class="pane-header" id="ph-right">
        <div class="pane-dot"></div>
        <select class="pane-picker" id="picker-right"
                onchange="navigateFromPicker('right', this.value)"
                onclick="setActivePaneById('right')"></select>
        <button class="pane-close" onclick="closeSplit(event)" title="Fermer vue partagée">✕</button>
      </div>
      <iframe id="frame-right" src="" title="Volet secondaire"></iframe>
      <div class="pane-loading" id="load-right">Chargement…</div>
    </div>

  </div><!-- /.shell-content -->
</div><!-- /.shell-body -->

<script src="lib/supabase.min.js"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<script src="auth.js"></script>
<script src="wb3-help.js"></script>

let _collapsedGroups = (function () {
  try {
    const raw = JSON.parse(localStorage.getItem('wb3_nav_groups') || '[]');
    return new Set(Array.isArray(raw) ? raw : []);
  } catch (e) { return new Set(); }

// ── URL helpers ──────────────────────────────────────────────────
function embedUrl(href) {
  try {
    const url = new URL(href, window.location.href);
    url.searchParams.set('embedded', '1');
    return url.href;
  } catch {
    return href + (href.includes('?') ? '&' : '?') + 'embedded=1';
  }
}

// ── Label helpers ────────────────────────────────────────────────
function getLabelForHref(href) {
  const base   = (href || '').split('?')[0].split('/').pop();
  if (LABEL_OVERRIDES[base]) return LABEL_OVERRIDES[base];
  const mapped = PARENT_MAP[base] || base;
  const item   = NAV_ITEMS.filter(Boolean).find(i => i.href === mapped);
  const suffix = PARENT_MAP[base] ? ' ↗' : '';
  return item ? (item.icon + ' ' + item.label + suffix) : (base || '—');
}

// ── Nav active state ─────────────────────────────────────────────
function updateNavActive() {
  const href   = currentPages[activePaneId] || '';
  const base   = href.split('?')[0].split('/').pop();
  const mapped = PARENT_MAP[base] || base;
  document.querySelectorAll('.shell-nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.href === mapped);
  });
  // Le groupe de la page active reste visible même s'il est replié.
  _applyGroupCollapse();
}

function updatePanePicker(paneId, href) {
  const sel = document.getElementById('picker-' + paneId);
  if (!sel) return;
  const base   = (href || '').split('?')[0].split('/').pop();
  const mapped = PARENT_MAP[base] || base;
  if ([...sel.options].some(o => o.value === mapped)) sel.value = mapped;
}

// ── API publique pour les iframes embarquées ──────────────────────
// Accessible via window.parent.WB3Shell depuis un iframe ?embedded=1
window.WB3Shell = {
  navigate: function(href, paneId) { navigate(href, paneId); },
  setTheme: function(key) {
    if (key) {
      document.documentElement.setAttribute('data-theme', key);
      localStorage.setItem('wb3_theme', key);
    } else {
      document.documentElement.removeAttribute('data-theme');
      localStorage.removeItem('wb3_theme');
    }
    // Propager aux autres iframes ouvertes
    ['left', 'right'].forEach(function(p) {
      try {
        var frame = document.getElementById('frame-' + p);
        var doc = frame && frame.contentDocument;
        if (doc && doc.documentElement) {
          if (key) doc.documentElement.setAttribute('data-theme', key);
          else     doc.documentElement.removeAttribute('data-theme');
        }
      } catch(e) {}
    });
  },
};

// ── Navigate ─────────────────────────────────────────────────────
function navigate(href, paneId) {
  if (paneId == null) paneId = splitMode ? activePaneId : 'left';
  currentPages[paneId] = href;
  const frame = document.getElementById('frame-' + paneId);
  showLoading(paneId, true);
  frame.src = embedUrl(href);
  updateNavActive();
  updatePanePicker(paneId, href);
  if (paneId === activePaneId || !splitMode) {
    document.getElementById('shell-breadcrumb').textContent = getLabelForHref(href);
  }
}

function showLoading(paneId, on) {
  const el = document.getElementById('load-' + paneId);
  if (el) el.classList.toggle('show', on);
}

// ── Active pane (determines which pane gets nav clicks) ──────────
function setActivePaneById(paneId) {
  activePaneId = paneId;
  document.getElementById('pane-left').classList.toggle('active-pane',  paneId === 'left');
  document.getElementById('pane-right').classList.toggle('active-pane', paneId === 'right');
  updateNavActive();
  const page = currentPages[paneId];
  if (page) document.getElementById('shell-breadcrumb').textContent = getLabelForHref(page);
}

// ── Split view ───────────────────────────────────────────────────
function toggleSplit() {
  splitMode = !splitMode;

  document.getElementById('shell-content').classList.toggle('split', splitMode);
  const btn = document.getElementById('btn-split');
  btn.textContent = splitMode ? '⊟ Vue simple' : '⊞ Vue partagée';
  btn.classList.toggle('active', splitMode);
  if (splitMode) {
    if (!currentPages.right) navigate('operations.html', 'right');
    setActivePaneById('left');
  } else {
    setActivePaneById('left');
  }
}

function closeSplit(e) {
  if (e) e.stopPropagation();
  if (splitMode) toggleSplit();
}

function navigateFromPicker(paneId, href) {
  setActivePaneById(paneId);
  navigate(href, paneId);
}

function _navGlyph(s) { return s === 'rail' ? '»' : s === 'large' ? '«' : '☰'; }

function applyNavState(state, persist) {
  navState = state; navCollapsed = (state === 'rail');
  document.getElementById('shell-nav').classList.toggle('collapsed', state === 'rail');
  document.getElementById('shell-nav').classList.toggle('wb3-large', state === 'large');

    localStorage.setItem('wb3_nav_collapsed', state === 'rail' ? '1' : '0'); // compat
  } catch (e) {}
  if (persist) persistShellSidebar();
}
function cycleNavState() {
  const order = ['rail', 'normal', 'large'];
  applyNavState(order[(order.indexOf(navState) + 1) % 3], true);

function toggleCollapse() {   // Cmd/Ctrl+B : bascule rail ↔ normal
  applyNavState(navCollapsed ? 'normal' : 'rail', true);
}

let _iaEnabled = false;

// ── Build nav items (épinglés + groupes repliables) ───────────────
function _shellItemVisible(item) { return !(item.iaOnly && !_iaEnabled); }

function _shellActiveGroup() {
  const base   = (currentPages[activePaneId] || '').split('?')[0].split('/').pop();
  const mapped = PARENT_MAP[base] || base;
  const it     = NAV_ITEMS.filter(Boolean).find(i => i.href === mapped);
  return (it && it.group) ? it.group : null;
}

function buildNavItems() {
  const container = document.getElementById('nav-items');
  container.innerHTML = '';
  const activeGroup = _shellActiveGroup();

  const _makeItem = (item) => {
    const el = document.createElement('div');
    el.className   = 'shell-nav-item';
    el.dataset.href  = item.href;
    el.dataset.label = item.label;
    if (item.group) el.dataset.group = item.group;
    el.innerHTML = `<span class="n-icon">${item.iconHTML || item.icon}</span><span class="n-label">${item.label}</span>`;
    el.addEventListener('click', () => navigate(item.href));
    return el;
  };

  // 1) Bloc « Accès rapide » (épinglé)
  const pinned = NAV_ITEMS.filter(it => it && it.pinned && _shellItemVisible(it));
  if (pinned.length) {
    const zone = document.createElement('div');
    zone.className = 'shell-nav-pinned';
    pinned.forEach(it => zone.appendChild(_makeItem(it)));
    container.appendChild(zone);
  }

  // 2) Groupes repliables + items autonomes
  let lastGroup = null;
  NAV_ITEMS.forEach(item => {
    if (!item) {
      const sep = document.createElement('div');
      sep.className = 'nav-sep';
      container.appendChild(sep);
      lastGroup = null;
      return;
    }
    if (item.pinned) return;
    if (!_shellItemVisible(item)) return;       // iaOnly masqué → ignoré
    if (!item.group) { container.appendChild(_makeItem(item)); return; }
    if (item.group !== lastGroup) {             // en-tête au 1er item visible du groupe
      lastGroup = item.group;
      const g = NAV_GROUPS.find(x => x.key === item.group) || { key:item.group, label:item.group, emoji:'' };
      const collapsed = _collapsedGroups.has(g.key) && g.key !== activeGroup;
      const head = document.createElement('div');
      head.className = 'shell-nav-group' + (collapsed ? ' collapsed' : '');
      head.dataset.group = g.key;
      head.title = (collapsed ? 'Déplier' : 'Replier') + ' « ' + g.label + ' »';
      head.innerHTML = `<span class="g-emoji">${g.emoji}</span><span class="g-label">${g.label}</span><span class="g-caret">▾</span>`;
      head.addEventListener('click', () => toggleGroup(g.key));
      container.appendChild(head);
    }
    const el = _makeItem(item);
    if (_collapsedGroups.has(item.group) && item.group !== activeGroup) el.classList.add('group-hidden');
    container.appendChild(el);
  });
}

// Réapplique l'état replié au DOM (groupe de la page active toujours déplié).
// Pas de persistance : naviguer vers un groupe replié l'affiche temporairement.
function _applyGroupCollapse() {
  const activeGroup = _shellActiveGroup();
  NAV_GROUPS.forEach(g => {
    const collapsed = _collapsedGroups.has(g.key) && g.key !== activeGroup;
    const head = document.querySelector('.shell-nav-group[data-group="' + g.key + '"]');
    if (head) head.classList.toggle('collapsed', collapsed);
    document.querySelectorAll('.shell-nav-item[data-group="' + g.key + '"]').forEach(el => {
      el.classList.toggle('group-hidden', collapsed);
    });
  });
}

// Repli/dépli manuel d'un groupe → persiste (serveur + localStorage).
function toggleGroup(key) {
  const collapsing = !_collapsedGroups.has(key);
  if (collapsing) _collapsedGroups.add(key); else _collapsedGroups.delete(key);
  _applyGroupCollapse();
  const head = document.querySelector('.shell-nav-group[data-group="' + key + '"]');
  if (head) {
    const lbl = head.querySelector('.g-label');
    head.title = (collapsing ? 'Déplier' : 'Replier') + ' « ' + (lbl ? lbl.textContent : '') + ' »';
  }
  _persistNavGroups();
}

function _persistNavGroups() {
  const arr = Array.from(_collapsedGroups);
  try { localStorage.setItem('wb3_nav_groups', JSON.stringify(arr)); } catch (e) {}
  try { if (window.WB3DB && WB3DB.setUserPref) WB3DB.setUserPref('nav_groups', { collapsed: arr }).catch(() => {}); } catch (e) {}
}

// Charge l'état serveur (source de vérité) et réapplique.
async function restoreNavGroups() {
  try {
    if (!window.WB3DB || !WB3DB.getUserPref) return;
    const pref = await WB3DB.getUserPref('nav_groups');
    if (!pref || !Array.isArray(pref.collapsed)) return;
    _collapsedGroups = new Set(pref.collapsed);
    try { localStorage.setItem('wb3_nav_groups', JSON.stringify(pref.collapsed)); } catch (e) {}
    _applyGroupCollapse();
  } catch (e) { /* no-op */ }
}

// ── Build pane page pickers ───────────────────────────────────────
function buildPanePickers() {
  ['left', 'right'].forEach(paneId => {
    const sel = document.getElementById('picker-' + paneId);
    sel.innerHTML = '';
    NAV_ITEMS.filter(Boolean).filter(item => !item.iaOnly || _iaEnabled).forEach(item => {
      const opt = document.createElement('option');
      opt.value = item.href;
      opt.textContent = item.icon + ' ' + item.label;
      sel.appendChild(opt);
    });
  });
}

// ── Draggable divider ─────────────────────────────────────────────
function initDivider() {
  const divider = document.getElementById('shell-divider');
  let dragging = false;

  divider.addEventListener('mousedown', e => {
    dragging = true;
    document.getElementById('frame-left').style.pointerEvents  = 'none';
    document.getElementById('frame-right').style.pointerEvents = 'none';
    document.body.style.cursor     = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const rect = document.getElementById('shell-content').getBoundingClientRect();
    const pct  = Math.max(20, Math.min(80, (e.clientX - rect.left) / rect.width * 100));
    const paneL = document.getElementById('pane-left');
    paneL.style.flex  = 'none';
    paneL.style.width = pct + '%';
    const paneR = document.getElementById('pane-right');
    paneR.style.flex  = '1';
    paneR.style.width = '';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    document.getElementById('frame-left').style.pointerEvents  = '';
    document.getElementById('frame-right').style.pointerEvents = '';
    document.body.style.cursor     = '';
    document.body.style.userSelect = '';
  });
}

// ── Redimensionnement de la sidebar (drag du bord droit) ─────────
//   Persistance : user_preferences (module 'ui_sidebar', par user+tenant)
//   + cache localStorage `wb3_sidebar_width` (anti-FOUC, comme le thème).
//   Desktop uniquement ; bornes 180–400 px. Cohérent avec nav.js.
function readNavWidth() {
  const v = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--nav-w'), 10);
  return (v && v >= 180 && v <= 400) ? v : 220;
}
// Persistance combinée largeur (W1) + état (W3) sous la même clé 'ui_sidebar'.
function persistShellSidebar() {
  const payload = { width: readNavWidth(), state: navState };
  try { localStorage.setItem('wb3_sidebar_width', String(payload.width)); } catch (e) {}
  try { localStorage.setItem('wb3_nav_state', payload.state); } catch (e) {}
  try {
    if (window.WB3DB && WB3DB.setUserPref) WB3DB.setUserPref('ui_sidebar', payload).catch(() => {});
  } catch (e) {}
}
function saveNavWidth(w) {
  w = Math.max(180, Math.min(400, Math.round(w)));
  document.documentElement.style.setProperty('--nav-w', w + 'px');
  persistShellSidebar();
}
function initSidebarResize() {
  const grip = document.getElementById('shell-nav-grip');
  if (!grip) return;
  let dragging = false, startX = 0, startW = 220;
  function onMove(e) {
    if (!dragging) return;
    let w = startW + (e.clientX - startX);
    w = Math.max(180, Math.min(400, w));
    document.documentElement.style.setProperty('--nav-w', w + 'px');
  }
  function onUp() {
    if (!dragging) return;
    dragging = false;
    document.body.classList.remove('shell-resizing');
    document.getElementById('frame-left').style.pointerEvents  = '';
    document.getElementById('frame-right').style.pointerEvents = '';
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    saveNavWidth(readNavWidth());
  }
  grip.addEventListener('mousedown', e => {
    if (window.innerWidth < 768) return;       // mobile : resize désactivé
    if (e.button !== 0) return;
    if (navCollapsed) toggleCollapse();        // rail → mode normal AVANT resize
    dragging = true;
    startX = e.clientX;
    startW = readNavWidth();
    document.body.classList.add('shell-resizing');
    // Empêche les iframes d'avaler le mousemove (même garde que le divider).
    document.getElementById('frame-left').style.pointerEvents  = 'none';
    document.getElementById('frame-right').style.pointerEvents = 'none';
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    e.preventDefault();
  });
  grip.addEventListener('dblclick', () => {
    document.documentElement.style.setProperty('--nav-w', '220px');
    saveNavWidth(220);
    // Feedback discret (flash du grip). Reflow forcé → rejoue à chaque double-clic.
    grip.classList.remove('wb3-grip-flash'); void grip.offsetWidth; grip.classList.add('wb3-grip-flash');
  });
}

// ── Frame focus → set active pane ────────────────────────────────
function initFrameFocusDetection() {
  window.addEventListener('blur', () => {
    if (!splitMode) return;
    const focused = document.activeElement;
    if (focused === document.getElementById('frame-left'))  setActivePaneById('left');
    if (focused === document.getElementById('frame-right')) setActivePaneById('right');
  });
}

// ── Frame load listeners ──────────────────────────────────────────
function initFrameLoadListeners() {
  ['left', 'right'].forEach(paneId => {
    const frame = document.getElementById('frame-' + paneId);
    frame.addEventListener('load', () => {
      showLoading(paneId, false);
      try {
        const path = frame.contentWindow.location.pathname.split('/').pop();
        if (path && path !== 'about:blank') {
          currentPages[paneId] = path;
          updatePanePicker(paneId, path);
          if (paneId === activePaneId || !splitMode) {
            updateNavActive();
            document.getElementById('shell-breadcrumb').textContent = getLabelForHref(path);
          }
        }
      } catch (e) { /* cross-origin guard — should not happen */ }
    });
  });
}

// ── Recherche universelle (command-palette) ───────────────────────
const shellSearch = (function () {
  let _box = null, _cache = null, _items = [], _hi = 0, _loading = false;
  const GROUP_ORDER = ['cuve','lot','analyse','echantillon','produit','operation'];
  const GROUP_LABELS = { cuve:'Cuves', lot:'Lots', analyse:'Analyses', echantillon:'Échantillons', produit:'Produits', operation:'Opérations' };

  function _esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }

  function _inject() {
    if (document.getElementById('_srch-style')) return;
    const st = document.createElement('style'); st.id = '_srch-style';
    st.textContent =
      '.wb3-srch-bd{position:fixed;inset:0;background:rgba(12,22,36,.45);z-index:3200;display:flex;align-items:flex-start;justify-content:center;padding:10vh 16px 16px;}' +
      '.wb3-srch{background:var(--color-bg-elevated,#fff);color:var(--ink,#1a1a1a);width:min(660px,100%);max-height:75vh;border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.4);overflow:hidden;display:flex;flex-direction:column;}' +
      '.wb3-srch-head{display:flex;align-items:center;border-bottom:1px solid var(--border,#e2e5e9);}' +
      '.wb3-srch-ic-in{padding:0 14px;font-size:17px;flex-shrink:0;}' +
      '.wb3-srch-in{flex:1;border:none;outline:none;font:inherit;font-size:15px;padding:15px 14px 15px 0;background:none;color:inherit;}' +
      '.wb3-srch-hint{font-size:11px;color:var(--muted,#999);padding:0 14px;white-space:nowrap;}' +
      '.wb3-srch-res{overflow:auto;padding:6px 0;}' +
      '.wb3-srch-grp{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted,#999);padding:10px 18px 3px;}' +
      '.wb3-srch-it{display:flex;align-items:center;gap:11px;padding:8px 18px;cursor:pointer;border-radius:0;}' +
      '.wb3-srch-it.hi,.wb3-srch-it:hover{background:rgba(0,0,0,.05);}' +
      '.wb3-srch-icon{font-size:17px;width:24px;text-align:center;flex-shrink:0;}' +
      '.wb3-srch-body{flex:1;min-width:0;}' +
      '.wb3-srch-nm{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}' +
      '.wb3-srch-sub{font-size:11.5px;color:var(--muted,#888);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}' +
      '.wb3-srch-badge{font-size:10px;padding:1px 7px;border-radius:999px;border:1px solid var(--border,#ddd);color:var(--muted,#888);white-space:nowrap;flex-shrink:0;}' +
      '.wb3-srch-empty{padding:24px 18px;color:var(--muted,#888);font-size:13px;text-align:center;}' +
      '.wb3-srch-footer{border-top:1px solid var(--border,#eee);padding:7px 18px;font-size:11px;color:var(--muted,#aaa);display:flex;gap:12px;}';
    document.head.appendChild(st);
  }

  async function _load() {
    if (_cache) return _cache;
    if (_loading) return [];
    _loading = true;
    const out = [];
    try {
      const tenantId = WB3DB.getCurrentTenantId?.();
      const [cuves, lots, analyses, echantillons, produits] = await Promise.all([
        WB3DB.queryCuverieEtat  ? WB3DB.queryCuverieEtat().catch(()=>[]) : Promise.resolve([]),
        WB3DB.listTable ? WB3DB.listTable('lots', { select:'id,nom,millesime,statut,couleur,actif', order:'nom' }).catch(()=>[]) : Promise.resolve([]),
        WB3DB.queryAnalyses ? WB3DB.queryAnalyses({ limit: 400 }).catch(()=>[]) : Promise.resolve([]),
        tenantId && WB3DB.client
          ? WB3DB.client.from('echantillons').select('id,reference,client_nom,date_envoi,lot_id,lots(nom,millesime)').eq('tenant_id', tenantId).is('archived_at', null).order('created_at', { ascending: false }).limit(300).then(r=>r.data||[]).catch(()=>[])
          : Promise.resolve([]),
        WB3DB.listTable ? WB3DB.listTable('produits', { select:'id,nom,type,categorie', order:'nom' }).catch(()=>[]) : Promise.resolve([]),
      ]);

      // Cuves
      (cuves || []).forEach(c => out.push({
        type: 'cuve', icon: '🛢', badge: c.type || '',
        name: c.contenant_nom || '—',
        sub: c.lot_nom ? `${c.lot_nom}${c.millesime ? ' ' + c.millesime : ''} · ${c.volume_total_hl ?? 0} hL` : 'vide',
        hay: [c.contenant_nom, c.lot_nom, c.millesime, String(c.volume_total_hl||'')].filter(Boolean).join(' ').toLowerCase(),
        href: `contenant-detail.html?id=${encodeURIComponent(c.contenant_id)}`,
      }));

      // Lots
      (lots || []).filter(l => l.actif !== false).forEach(l => out.push({
        type: 'lot', icon: '🍷', badge: l.millesime || '',
        name: l.nom || '—',
        sub: [l.couleur, l.statut].filter(Boolean).join(' · '),
        hay: [l.nom, l.millesime, l.couleur, l.statut].filter(Boolean).join(' ').toLowerCase(),
        href: `lot-detail.html?id=${encodeURIComponent(l.id)}`,
      }));

      // Analyses → regroupées par lot (dédupliquées)
      const analyseByLot = new Map();
      (analyses || []).forEach(a => {
        if (!a.lots) return;
        const lotId = a.lots.id;
        if (!analyseByLot.has(lotId)) {
          analyseByLot.set(lotId, { count: 0, lastDate: a.date_analyse, lot: a.lots });
        }
        const entry = analyseByLot.get(lotId);
        entry.count++;
        if (!entry.lastDate || a.date_analyse > entry.lastDate) entry.lastDate = a.date_analyse;
      });
      analyseByLot.forEach((v, lotId) => {
        const l = v.lot;
        const nm = l.nom + (l.millesime ? ' ' + l.millesime : '');
        out.push({
          type: 'analyse', icon: '🔬', badge: `${v.count} analyse${v.count > 1 ? 's' : ''}`,
          name: nm,
          sub: v.lastDate ? `Dernière le ${v.lastDate.slice(0, 10)}` : '',
          hay: [l.nom, l.millesime, 'analyse'].join(' ').toLowerCase(),
          href: `lot-detail.html?id=${encodeURIComponent(lotId)}`,
        });
      });

      // Échantillons
      (echantillons || []).forEach(e => {
        const lotNm = e.lots ? (e.lots.nom + (e.lots.millesime ? ' ' + e.lots.millesime : '')) : '';
        out.push({
          type: 'echantillon', icon: '🍾', badge: e.date_envoi ? e.date_envoi.slice(0,10) : '',
          name: e.reference || e.client_nom || '—',
          sub: [e.client_nom, lotNm].filter(Boolean).join(' · '),
          hay: [e.reference, e.client_nom, lotNm].filter(Boolean).join(' ').toLowerCase(),
          href: 'echantillons.html',
        });
      });

      // Produits
      (produits || []).forEach(p => out.push({
        type: 'produit', icon: '🧪', badge: p.type || '',
        name: p.nom || '—',
        sub: p.categorie || '',
        hay: [p.nom, p.type, p.categorie].filter(Boolean).join(' ').toLowerCase(),
        href: 'produits.html',
      }));

    } catch (_) {}
    _loading = false; _cache = out; return out;
  }

  function _render(q) {
    const res = _box.querySelector('.wb3-srch-res');
    const t = (q || '').trim().toLowerCase();
    let list = _cache || [];
    if (t) list = list.filter(x => x.hay.includes(t));
    list = list.slice(0, 60); _items = list; _hi = 0;
    if (!list.length) {
      res.innerHTML = `<div class="wb3-srch-empty">${_cache === null ? 'Chargement…' : 'Aucun résultat pour « ' + _esc(q) + ' »'}</div>`;
      return;
    }
    const groups = {};
    list.forEach((x, i) => { if (!groups[x.type]) groups[x.type] = []; groups[x.type].push({ ...x, i }); });
    let html = '';
    GROUP_ORDER.forEach(type => {
      if (!groups[type]?.length) return;
      html += `<div class="wb3-srch-grp">${GROUP_LABELS[type]}</div>` + groups[type].slice(0, 10).map(_row).join('');
    });
    res.innerHTML = html;
    res.querySelectorAll('.wb3-srch-it').forEach(el => {
      el.addEventListener('mousedown', e => { e.preventDefault(); _go(+el.dataset.i); });
    });
    // Surligner le premier résultat
    const first = res.querySelector('.wb3-srch-it');
    if (first) { _hi = +first.dataset.i; first.classList.add('hi'); }
  }

  function _row(x) {
    return `<div class="wb3-srch-it" data-i="${x.i}">` +
      `<span class="wb3-srch-icon">${x.icon}</span>` +
      `<span class="wb3-srch-body"><div class="wb3-srch-nm">${_esc(x.name)}</div>${x.sub ? `<div class="wb3-srch-sub">${_esc(x.sub)}</div>` : ''}</span>` +
      (x.badge ? `<span class="wb3-srch-badge">${_esc(x.badge)}</span>` : '') +
      `</div>`;
  }

  function _hilite() {
    _box.querySelectorAll('.wb3-srch-it').forEach(el => el.classList.toggle('hi', +el.dataset.i === _hi));
    const hi = _box.querySelector('.wb3-srch-it.hi');
    if (hi) hi.scrollIntoView({ block: 'nearest' });
  }

  function _go(i) { const x = _items[i]; if (!x) return; close(); navigate(x.href); }
  function close() { if (_box) { _box.remove(); _box = null; document.removeEventListener('keydown', _onKey, true); } }

  function _onKey(e) {
    if (!_box) return;
    if (e.key === 'Escape') { e.preventDefault(); close(); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); _hi = Math.min(_hi + 1, _items.length - 1); _hilite(); }
    else if (e.key === 'ArrowUp')   { e.preventDefault(); _hi = Math.max(_hi - 1, 0); _hilite(); }
    else if (e.key === 'Enter')     { e.preventDefault(); _go(_hi); }
  }

  return async function open() {
    if (_box) return; _inject();
    _box = document.createElement('div'); _box.className = 'wb3-srch-bd';
    _box.innerHTML =
      `<div class="wb3-srch" role="dialog" aria-modal="true">` +
        `<div class="wb3-srch-head"><span class="wb3-srch-ic-in">🔎</span><input class="wb3-srch-in" placeholder="Cuve, lot, analyse, échantillon, produit…" autocomplete="off"><span class="wb3-srch-hint">Échap pour fermer</span></div>` +
        `<div class="wb3-srch-res"></div>` +
        `<div class="wb3-srch-footer"><span>↑↓ Naviguer</span><span>↵ Ouvrir</span><span>Esc Fermer</span></div>` +
      `</div>`;
    document.body.appendChild(_box);
    _box.addEventListener('mousedown', e => { if (e.target === _box) close(); });
    const inp = _box.querySelector('.wb3-srch-in');
    inp.addEventListener('input', () => _render(inp.value));
    document.addEventListener('keydown', _onKey, true);
    inp.focus();
    _render('');       // "Chargement…"
    await _load();
    _render(inp.value);
  };
})();
function shellSearchOpen() { shellSearch(); }

// ── Auth ──────────────────────────────────────────────────────────
async function shellLogout() {
  await WB3Auth.signOut();
  window.location.href = 'app.html';
}

WB3Auth.onAuthChange(({ user }) => {
  if (!user) window.location.href = 'app.html';
});

// ── Socle 2 : bannière capacités backend ─────────────────────────
async function checkBackendCapabilitiesUI() {
  if (!WB3DB.checkBackendCapabilities) return; // db.js antérieur à socle 2
  let cap;
  try { cap = await WB3DB.checkBackendCapabilities(); }
  catch (e) { console.warn('[Shell] checkBackendCapabilities KO', e); return; }
  if (!cap) return;

  // Tout va bien (ou mode dev) → rien à afficher.
  if (cap.ok && cap.missingRecommended.length === 0) return;
  if (window.WB3_DEV_MODE) {
    console.warn('[Shell] WB3_DEV_MODE actif — capacités manquantes ignorées :', cap);
    return;
  }

  const label = k => (cap.labels && cap.labels[k]) || k;
  const blocking = cap.missingCritical.length > 0;
  const list = (blocking ? cap.missingCritical : cap.missingRecommended)
    .map(label).map(s => '• ' + s).join('<br>');

  const bar = document.createElement('div');
  bar.id = 'wb3-cap-banner';
  bar.style.cssText = [
    'position:fixed', 'left:0', 'right:0', 'top:0', 'z-index:99999',
    'padding:12px 18px', 'font:14px/1.4 system-ui,sans-serif',
    'box-shadow:0 2px 8px rgba(0,0,0,.25)',
    blocking ? 'background:#7f1d1d' : 'background:#92400e',
    'color:#fff',
  ].join(';');
  bar.innerHTML =
    '<strong>' + (blocking
      ? '⛔ Backend incomplet — certaines actions sont bloquées'
      : '⚠️ Backend partiel — fonctionnalités dégradées') + '</strong>'
    + '<div style="margin-top:6px;opacity:.95">Migration(s) manquante(s) :<br>' + list + '</div>'
    + '<div style="margin-top:6px;opacity:.85;font-size:12px">'
    + (blocking
        ? 'Contactez l\'administrateur. Les opérations critiques refuseront de s\'exécuter pour protéger la cohérence des données.'
        : 'L\'application fonctionne mais certaines vues/champs peuvent manquer.')
    + ' (schéma : ' + (cap.version || 'inconnu') + ')</div>';

  document.body.appendChild(bar);
  // Décale le contenu sous la bannière pour ne rien masquer.
  document.body.style.paddingTop = bar.offsetHeight + 'px';
}

// ── Init ──────────────────────────────────────────────────────────
(async function init() {
  if (!window.WB3DB || !window.WB3Auth) {
    console.error('[Shell] Modules WB3 manquants');
    window.location.href = 'app.html';
    return;
  }

  try {
    await WB3Auth.restoreSession();
  } catch (e) {
    console.warn('[Shell] restoreSession error', e);
  }

  const user = WB3DB.getCurrentUser();
  if (!user) {
    window.location.href = 'app.html';
    return;
  }

  const tenant = WB3DB.getCurrentTenant();
  const ROLE_LBL = { admin: 'Administrateur', maitre_chais: 'Maître de chais', oenologue: 'Œnologue', caviste: 'Caviste' };
  document.getElementById('shell-user').textContent =
    user.email + (tenant ? ' · ' + tenant.nom : '');
  const roleEl = document.getElementById('shell-role');
  if (roleEl) {
    const r = tenant && tenant.role;
    roleEl.textContent = r ? (ROLE_LBL[r] || r) : '';
    roleEl.dataset.role = r || '';
    roleEl.style.display = r ? '' : 'none';
  }

  // Socle 2 — contrôle de capacités backend (après auth + tenant → pas de
  // faux positif). Capacité critique manquante → bannière bloquante.
  checkBackendCapabilitiesUI();

  // Charger le thème depuis Supabase (localStorage est déjà appliqué en head)
  try {
    const pref = await WB3DB.getUserPref('apparence');
    if (pref && typeof pref.theme !== 'undefined') {
      WB3Shell.setTheme(pref.theme || '');
    }
  } catch(e) { /* on reste sur le localStorage */ }

  // Largeur de la sidebar : source durable par utilisateur (le cache
  // localStorage est déjà appliqué en <head> pour éviter le FOUC).
  try {
    const swp = await WB3DB.getUserPref('ui_sidebar');
    const w = swp && Number(swp.width);
    if (w && w >= 180 && w <= 400) {
      document.documentElement.style.setProperty('--nav-w', w + 'px');
      try { localStorage.setItem('wb3_sidebar_width', String(w)); } catch(e) {}
    }
    if (swp && (swp.state === 'rail' || swp.state === 'normal' || swp.state === 'large')) {
      applyNavState(swp.state, false);   // restaure l'état (W3)
    }
  } catch(e) { /* cache / défaut conservé */ }

  applyNavState(navState, false);   // applique rail / normal / large (W3)

  // Charger l'état du module IA pour afficher/masquer l'entrée nav
  try {
    const tol = await WB3DB.getTolerances({ force: true }).catch(() => ({}));
    _iaEnabled = tol.ia_module_enabled === true;
  } catch (_) { _iaEnabled = false; }

  buildNavItems();
  buildPanePickers();
  restoreNavGroups();   // état des groupes repliés (source de vérité serveur)
  initDivider();
  initSidebarResize();
  initFrameFocusDetection();
  initFrameLoadListeners();

  // Raccourcis sidebar (W3) : « [ » cycle rail→normal→large ; Cmd/Ctrl+B
  // réduit/agrandit (rail↔normal). Ignorés si la frappe vise un champ de saisie.
  document.addEventListener('keydown', e => {
    if (window.innerWidth < 768) return;
    const t = e.target;
    if (t && (/^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName) || t.isContentEditable)) return;
    if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) { e.preventDefault(); shellSearchOpen(); }
    else if ((e.metaKey || e.ctrlKey) && (e.key === 'b' || e.key === 'B')) { e.preventDefault(); toggleCollapse(); }
    else if (!e.metaKey && !e.ctrlKey && !e.altKey && e.key === '[') { e.preventDefault(); cycleNavState(); }
  });

  // postMessage depuis les iframes (ex. parametres.html après save IA)
  window.addEventListener('message', e => {
    if (!e.data || typeof e.data !== 'object') return;
    if (e.data.type === 'wb3:ia-changed') {
      _iaEnabled = e.data.enabled === true;
      buildNavItems();
      buildPanePickers();
    }
  });

  // Load initial page (default: dashboard)
  navigate('dashboard.html', 'left');

  // Restore split mode if was active
  if (localStorage.getItem('wb3_split') === '1') toggleSplit();
})();
</script>

<!-- ── Détection réseau ──────────────────────────────────────── -->
<script>
(function() {
  'use strict';
  var banner = document.getElementById('wb3-network-banner');
  if (!banner) return;

  var _timer = null;

  function showOffline() {
    clearTimeout(_timer);
    banner.className = 'show offline';
    banner.textContent = '⚠ Hors-ligne — les modifications ne peuvent pas être enregistrées pour l\'instant';
  }

  function showBack() {
    clearTimeout(_timer);
    banner.className = 'show back';
    banner.textContent = '✓ Connexion rétablie';
    _timer = setTimeout(function() { banner.className = ''; banner.textContent = ''; }, 3500);
    // Rejouer la file d'écriture hors-ligne (db.js)
    if (window.WB3DB && typeof WB3DB.replayOfflineQueue === 'function') {
      WB3DB.replayOfflineQueue().catch(function(e) { console.warn('[WB3] replay offline:', e); });
    }
  }

  window.addEventListener('offline', showOffline);
  window.addEventListener('online', showBack);

  // Si déjà hors-ligne au chargement de la page
  if (!navigator.onLine) showOffline();
})();
</script>

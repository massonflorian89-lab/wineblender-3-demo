<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" type="image/png" sizes="32x32" href="img/icon-wineblender-32.png">
<meta name="theme-color" content="#6a1b2a">
<title>OenoPulse — VitiFlux</title>
<link rel="stylesheet" href="theme.css">
<script>(function(){var t=localStorage.getItem('wb3_theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<style>
  /* Conteneur en rangée : chat (flex) + drawer historique (largeur animée) */
  .chat-layout {
    --hist-w: min(320px, 42vw);
    display: flex;
    height: calc(100vh - 60px);
    width: 100%;
    overflow: hidden;
  }
  /* En mode embarqué le header est masqué → pleine hauteur de fenêtre */
  body.embedded .chat-layout { height: 100vh; }
  .chat-wrap {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 0 clamp(8px, 2vw, 32px);
    box-sizing: border-box;
  }
  /* Drawer : pousse et comprime le chat (pas de survol) */
  .hist-drawer {
    flex-shrink: 0;
    width: 0;
    overflow: hidden;
    background: var(--color-bg-elevated);
    border-left: 1px solid var(--color-border);
    transition: width .26s cubic-bezier(.4,0,.2,1);
  }
  .hist-drawer.open { width: var(--hist-w); }
  .hist-inner {
    width: var(--hist-w);
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  .hist-head {
    padding: 12px 14px;
    border-bottom: 1px solid var(--color-border);
    display: flex; align-items: center; gap: 6px;
    flex-shrink: 0;
  }
  .hist-head .ht { font-weight: 600; font-size: 14px; margin-right: auto; color: var(--color-ink); }
  .hist-x {
    background: none; border: none;
    cursor: pointer; border-radius: 6px; padding: 3px 6px;
    line-height: 1; color: var(--color-ink-tertiary); font-size: 18px;
  }
  .hist-x:hover { color: var(--color-ink); }
  .h-list { flex: 1; overflow-y: auto; padding: 4px; }
  .h-empty { padding: 24px 14px; text-align: center; font-size: 13px; color: var(--color-ink-tertiary); }
  .h-item { padding: 8px 12px; border-radius: 8px; display: flex; gap: 8px; align-items: flex-start; cursor: pointer; }
  .h-item:hover { background: var(--color-bg-subtle); }
  .h-item:hover .h-del { opacity: 1; }
  .h-info { flex: 1; min-width: 0; }
  .h-title { overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; color: var(--color-ink); line-height: 1.4; font-size: 13px; }
  .h-meta { font-size: 11px; color: var(--color-ink-tertiary); margin-top: 3px; white-space: nowrap; }
  .h-del { opacity: 0; background: none; border: none; font-size: 13px; padding: 2px 5px; cursor: pointer; color: var(--color-ink-tertiary); border-radius: 4px; flex-shrink: 0; transition: opacity .15s; }
  .h-del:hover { background: #fee2e2; color: #dc2626; }
  /* Barre d'outils toujours visible (le .wb-header est masqué en mode embedded) */
  .chat-toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 0; flex-shrink: 0;
    border-bottom: 1px solid var(--color-border);
  }
  .chat-toolbar .ct-title {
    font-weight: 600; font-size: 14px; color: var(--color-ink-secondary);
    margin-right: auto;
  }
  .ct-btn {
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: 5px 11px; font-size: 12.5px; cursor: pointer;
    color: var(--color-ink-secondary); font-family: inherit;
    transition: border-color .14s, background .14s;
  }
  .ct-btn:hover { border-color: var(--color-primary); background: var(--color-primary-subtle); }
  .chat-history {
    flex: 1;
    overflow-y: auto;
    padding: var(--space-5) 0;
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }
  .msg {
    display: flex;
    gap: var(--space-3);
    align-items: flex-start;
  }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    background: var(--color-bg-subtle);
    border: 1px solid var(--color-border);
  }
  .msg.user .msg-avatar { background: var(--color-primary-subtle); }
  .msg-body {
    max-width: 78%;
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: var(--space-3) var(--space-4);
    font-size: var(--text-callout);
    line-height: 1.55;
    word-break: break-word;
    overflow-x: auto;
  }
  /* Texte brut : pendant le streaming et messages utilisateur */
  .msg-body.streaming, .msg.user .msg-body { white-space: pre-wrap; }
  .msg.user .msg-body {
    background: var(--color-primary-subtle);
    border-color: transparent;
    text-align: right;
  }
  .msg-body.streaming::after {
    content: '▋';
    animation: blink .8s step-end infinite;
    color: var(--color-primary);
  }
  @keyframes blink { 0%,100% { opacity:1 } 50% { opacity:0 } }
  /* ── Markdown rendu ── */
  .msg-body p { margin: 0 0 .6em; }
  .msg-body p:last-child { margin-bottom: 0; }
  .msg-body ul, .msg-body ol { padding-left: 1.4em; margin: .4em 0; }
  .msg-body li { margin: .15em 0; }
  .msg-body h1,.msg-body h2,.msg-body h3 { margin: .6em 0 .25em; font-weight: 600; line-height: 1.3; }
  .msg-body h2 { font-size: 1.05em; }
  .msg-body h3 { font-size: .97em; }
  .msg-body strong { font-weight: 600; }
  .msg-body em { font-style: italic; }
  .msg-body code {
    background: var(--color-bg-subtle);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: .88em;
    font-family: 'Menlo', 'Consolas', monospace;
  }
  .msg-body pre {
    background: var(--color-bg-subtle);
    border-radius: var(--radius-md);
    padding: var(--space-3);
    overflow-x: auto;
    margin: .5em 0;
    white-space: pre;
  }
  .msg-body pre code { background: none; padding: 0; font-size: .85em; }
  /* Tables responsive */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: .5em 0; }
  .msg-body table {
    border-collapse: collapse;
    width: max-content;
    min-width: 100%;
    font-size: 12.5px;
  }
  .msg-body th {
    background: var(--color-bg-subtle);
    font-weight: 600;
    border: 1px solid var(--color-border);
    padding: 6px 12px;
    text-align: left;
    white-space: nowrap;
    word-break: normal;
  }
  .msg-body td { border: 1px solid var(--color-border); padding: 6px 12px; white-space: nowrap; word-break: normal; }
  .msg-body tr:hover td { background: var(--color-bg-subtle); }
  .msg-body blockquote {
    border-left: 3px solid var(--color-primary);
    margin: .5em 0;
    padding-left: .8em;
    color: var(--color-ink-secondary);
  }
  /* ── AI bubble (plus large pour les tableaux) ── */
  .ai-content { display: flex; flex-direction: column; gap: 4px; max-width: 94%; min-width: 0; }
  .msg.assistant .msg-body { max-width: 100%; }
  /* ── Charts ── */
  .chart-wrap { position: relative; margin: .6em 0; max-height: 300px; }
  /* (historique géré en JS dans le document parent) */
  /* ── Token badge dans la bulle ── */
  .tok-info { font-size: 11px; color: var(--color-ink-tertiary, #9ca3af); padding: 3px 0 0; min-height: 16px; line-height: 1.4; }

  .tool-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    background: var(--color-bg-subtle);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-pill);
    padding: 2px 8px;
    color: var(--color-ink-tertiary);
    margin: 4px 2px 0;
  }
  .tool-chip.done { color: #16a34a; border-color: #bbf7d0; background: #f0fdf4; }

  .chat-bar {
    border-top: 1px solid var(--color-border);
    padding: var(--space-3) 0 var(--space-4);
    background: var(--color-bg);
  }
  .chat-form {
    display: flex;
    gap: var(--space-2);
    align-items: flex-end;
  }
  #chat-input {
    flex: 1;
    resize: none;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 10px 14px;
    font-size: var(--text-callout);
    font-family: inherit;
    background: var(--color-bg-elevated);
    color: var(--color-ink);
    line-height: 1.45;
    max-height: 160px;
    overflow-y: auto;
    outline: none;
    transition: border-color .14s;
  }
  #chat-input:focus { border-color: var(--color-primary); }
  #chat-send {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: var(--color-primary);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .14s;
  }
  #chat-send:disabled { background: var(--color-ink-tertiary); cursor: default; }
  #chat-send:not(:disabled):hover { background: var(--color-primary-hover, #8b1a2a); }

  .model-bar {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-2) 0 0;
    font-size: 12px;
    color: var(--color-ink-tertiary);
  }
  .model-bar select {
    font-size: 12px;
    padding: 2px 6px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    background: var(--color-bg-elevated);
    color: var(--color-ink-secondary);
  }

  .empty-chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--space-3);
    color: var(--color-ink-tertiary);
    text-align: center;
  }
  .empty-chat .icon { font-size: 40px; }
  .empty-chat h2 { font-size: var(--text-title-2); color: var(--color-ink-secondary); margin: 0; }
  .empty-chat p  { font-size: var(--text-callout); max-width: 380px; margin: 0; }

  .suggestion-row {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
    justify-content: center;
    margin-top: var(--space-2);
  }
  .suggestion-btn {
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    color: var(--color-ink-secondary);
    transition: border-color .14s, background .14s;
  }
  .suggestion-btn:hover { border-color: var(--color-primary); background: var(--color-primary-subtle); }

  .error-banner {
    background: #fff0f0;
    border: 1px solid #fca5a5;
    border-radius: var(--radius-md);
    padding: var(--space-3) var(--space-4);
    font-size: 13px;
    color: #dc2626;
  }
</style>
</head>
<body>

<header class="wb-header">
  <div class="breadcrumb-flex">
    <a href="app.html" class="home"><img decoding="async" class="home-logo" src="img/icon-wineblender-192.png" alt="">VitiFlux</a>
    <span class="sep">/</span>
    <h1 style="font-size:var(--text-callout);font-weight:600;margin:0">🍇 OenoPulse</h1>
  </div>
  <div class="header-actions">
    <span class="tenant-pill" id="tenant-pill">—</span>
    <button class="btn btn--header" onclick="logout()">Déconnexion</button>
  </div>
</header>


<main class="wb-main" style="padding:0;overflow:hidden">
  <div class="chat-layout">
  <div class="chat-wrap">

    <div class="chat-toolbar">
      <span class="ct-title">🍇 OenoPulse</span>
      <button type="button" class="ct-btn" onclick="openHistory()" title="Historique des conversations">📋 Historique</button>
      <button type="button" class="ct-btn" id="btn-clear" title="Nouvelle conversation">↺ Nouveau</button>
    </div>

    <div class="chat-history" id="chat-history">
      <div class="empty-chat" id="empty-state">
        <div class="icon">🍷</div>
        <h2>Bonjour, je suis OenoPulse</h2>
        <p>Posez-moi des questions sur vos lots, cuves, analyses ou l'état de votre cave.</p>
        <div class="suggestion-row" id="suggestions">
          <button class="suggestion-btn" onclick="useSuggestion(this)">Quel est l'état de ma cave aujourd'hui ?</button>
          <button class="suggestion-btn" onclick="useSuggestion(this)">Quels lots ont des analyses récentes hors norme ?</button>
          <button class="suggestion-btn" onclick="useSuggestion(this)">Montre-moi l'historique du lot le plus récent</button>
          <button class="suggestion-btn" onclick="useSuggestion(this)">Y a-t-il des cuves vides en ce moment ?</button>
        </div>
      </div>
    </div>

    <div class="chat-bar">
      <form class="chat-form" id="chat-form" onsubmit="return false">
        <textarea id="chat-input" rows="1" placeholder="Posez votre question…" autocomplete="off"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
          oninput="autoResize(this)"></textarea>
        <button type="button" id="chat-send" onclick="sendMessage()" title="Envoyer">↑</button>
      </form>
      <div class="model-bar">
        <span style="color:var(--color-ink-tertiary)">Propulsé par</span>
        <select id="sel-provider" onchange="onProviderChange(this.value)" title="Fournisseur IA">
          <option value="gemini">Gemini (Google)</option>
          <option value="mistral">Mistral AI</option>
          <option value="anthropic">Claude (Anthropic)</option>
        </select>
        <span style="color:var(--color-ink-tertiary)">·</span>
        <select id="sel-model" title="Modèle">
          <option value="">— modèle —</option>
        </select>
        <span id="model-info" style="margin-left:auto;color:var(--color-ink-tertiary)">Shift+Entrée = saut de ligne</span>
      </div>
    </div>

  </div><!-- /chat-wrap -->

  <aside class="hist-drawer" id="hist-drawer">
    <div class="hist-inner">
      <div class="hist-head">
        <span class="ht">📋 Historique</span>
        <button class="hist-x" onclick="closeHistory()" title="Fermer">✕</button>
      </div>
      <div class="h-list" id="h-list"></div>
    </div>
  </aside>

  </div><!-- /chat-layout -->
</main>

<script src="lib/supabase.min.js"></script>
<script src="toast.js"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<script src="wb3-init.js"></script>
<script src="auth.js"></script>
<script src="nav.js"></script>
<script src="wb3-help.js"></script>
<script src="lib/marked.min.js"></script>
<script src="lib/dompurify.min.js"></script>
<script src="lib/chart.min.js"></script>

<script>
'use strict';

let _tenantId  = null;
let _jwt       = null;
let _provider    = 'gemini';
let _model       = 'gemini-2.0-flash';   // modèle économique par défaut
let _messages    = [];
let _streaming   = false;
let _sessionId   = String(Date.now());   // ID de la session courante
let _tokSession  = { input: 0, output: 0 };  // compteur cumulatif de la session

// ── Config marked.js ────────────────────────────────────────
marked.use({ gfm: true, breaks: true });

// ── Tables scrollables ───────────────────────────────────────
function wrapTables(container) {
  container.querySelectorAll('table').forEach(table => {
    if (table.parentElement?.classList.contains('table-wrap')) return;
    const wrap = document.createElement('div');
    wrap.className = 'table-wrap';
    table.parentNode.insertBefore(wrap, table);
    wrap.appendChild(table);
  });
}

// ── Rendu graphiques Chart.js ────────────────────────────────
function renderCharts(container) {
  container.querySelectorAll('pre code').forEach(block => {
    if (!block.className.includes('language-chart')) return;
    try {
      const cfg = JSON.parse(block.textContent.trim());
      if (!cfg.options) cfg.options = {};
      cfg.options.responsive    = true;
      cfg.options.maintainAspectRatio = true;
      // Palette VitiFlux
      const palette = ['#6a1b2a','#9c4455','#c97b8c','#e8b4be','#3d7a5e','#5ca882','#2b6cb0','#63b3ed'];
      if (cfg.data?.datasets) {
        cfg.data.datasets.forEach((ds, i) => {
          if (!ds.backgroundColor) ds.backgroundColor = cfg.type === 'line' ? 'transparent' : palette[i % palette.length];
          if (!ds.borderColor)     ds.borderColor     = palette[i % palette.length];
        });
      }
      const wrap = document.createElement('div');
      wrap.className = 'chart-wrap';
      const canvas = document.createElement('canvas');
      wrap.appendChild(canvas);
      block.closest('pre').replaceWith(wrap);
      new Chart(canvas, cfg);
    } catch (err) {
      block.textContent = '⚠ Graphique : ' + err.message;
    }
  });
}

// Modèle le plus économique en premier (sélectionné par défaut)
const PROVIDERS = {
  gemini:    { label: 'Gemini (Google)',    models: ['gemini-2.0-flash', 'gemini-2.5-flash', 'gemini-1.5-pro'] },
  mistral:   { label: 'Mistral AI',         models: ['mistral-small-latest', 'mistral-large-latest', 'open-mixtral-8x22b'] },
  anthropic: { label: 'Claude (Anthropic)', models: ['claude-haiku-4-5-20251001', 'claude-sonnet-4-6', 'claude-opus-4-8'] },
};

function onProviderChange(provider) {
  if (!PROVIDERS[provider]) return;
  _provider = provider;
  const sel = document.getElementById('sel-model');
  sel.innerHTML = PROVIDERS[provider].models
    .map(m => `<option value="${m}"${m === _model ? ' selected' : ''}>${m}</option>`)
    .join('');
  _model = sel.value;
}

function _initSelectors(provider, model) {
  const selP = document.getElementById('sel-provider');
  const selM = document.getElementById('sel-model');
  if (!selP || !selM) return;
  selP.value = PROVIDERS[provider] ? provider : 'gemini';
  selM.innerHTML = PROVIDERS[selP.value].models
    .map(m => `<option value="${m}"${m === model ? ' selected' : ''}>${m}</option>`)
    .join('');
  selM.addEventListener('change', () => { _model = selM.value; });
  _provider = selP.value;
  _model = selM.value;
}

// ── Init ────────────────────────────────────────────────────
(async function init() {
  if (typeof window.WB3DB === 'undefined') return showFatalError('Modules WB3 non chargés');

  const ctx = await WB3AppBoot.requireReadyContext();
  if (!ctx) return showFatalError('Aucun tenant accessible — reconnectez-vous');

  _tenantId = ctx.tenant.id;
  document.getElementById('tenant-pill').textContent = `🏢 ${ctx.tenant.nom} · ${ctx.tenant.role}`;

  // Récupérer la config IA
  try {
    const tol = await WB3DB.getTolerances({ force: true });
    if (tol.ia_module_enabled === false) {
      return showFatalError("Le module OenoPulse n'est pas activé pour ce tenant.\nActivez-le dans Paramètres ▸ 🍇 OenoPulse.");
    }
    const p = tol.ia_provider ?? 'gemini';
    const m = tol[`ia_model_${p}`] ?? PROVIDERS[p]?.models[0] ?? '';
    _initSelectors(p, m);
  } catch (e) {
    _initSelectors('gemini', 'gemini-2.5-flash');
  }

  // JWT pour l'Edge Function
  const session = await WB3Auth.getSession?.().catch(() => null);
  _jwt = session?.access_token ?? null;
  if (!_jwt) return showFatalError('Session expirée — rechargez la page');

  document.getElementById('btn-clear').addEventListener('click', clearConversation);
  window.addEventListener('beforeunload', saveSession);
}());

// ── Envoi message ────────────────────────────────────────────
async function sendMessage() {
  if (_streaming) return;
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  inp.style.height = '';

  _messages.push({ role: 'user', content: text });
  renderMessage('user', text);
  hideEmptyState();
  saveSession();

  _streaming = true;
  document.getElementById('chat-send').disabled = true;

  const aiDiv   = appendAIBubble();
  const bodyEl  = aiDiv.querySelector('.msg-body');
  const tokInfo = aiDiv.querySelector('.tok-info');

  try {
    const edgeFnUrl = WB3_CONFIG?.url?.replace(/\/$/, '')
      + '/functions/v1/wb3-ai';

    const resp = await fetch(edgeFnUrl, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${_jwt}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        messages:   _messages,
        tenant_id:  _tenantId,
        provider:   _provider,
        model:      _model || undefined,
      }),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: resp.statusText }));
      throw new Error(err.error || `Erreur ${resp.status}`);
    }

    let fullText = '';
    const reader = resp.body.getReader();
    const dec    = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop() ?? '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let ev;
        try { ev = JSON.parse(line.slice(6)); } catch { continue; }
        if (ev.type === 'text') {
          fullText += ev.content;
          bodyEl.textContent = fullText;
          // Estimation en temps réel dans la bulle (3.5 chars ≈ 1 token)
          if (tokInfo) tokInfo.textContent = `⟳ ~${Math.round(fullText.length / 3.5)} tokens…`;
          scrollBottom();
        } else if (ev.type === 'tool_start') {
          appendToolChip(aiDiv, ev.name, false);
        } else if (ev.type === 'tool_done') {
          updateToolChip(aiDiv, ev.name, ev.preview);
        } else if (ev.type === 'done') {
          _tokSession.input  += ev.input_tokens  || 0;
          _tokSession.output += ev.output_tokens || 0;
          const msgTok  = (ev.input_tokens || 0) + (ev.output_tokens || 0);
          const sessTok = _tokSession.input + _tokSession.output;
          // Affichage précis dans la bulle + résumé session en bas
          if (tokInfo) tokInfo.textContent =
            `↕ ${msgTok.toLocaleString('fr-FR')} tokens · session ∑ ${sessTok.toLocaleString('fr-FR')}`;
          const mi = document.getElementById('model-info');
          if (mi) mi.textContent = `${ev.model} · ∑ ${sessTok.toLocaleString('fr-FR')} tokens`;
        } else if (ev.type === 'error') {
          throw new Error(ev.message);
        }
      }
    }

    bodyEl.classList.remove('streaming');
    bodyEl.innerHTML = DOMPurify.sanitize(marked.parse(fullText), { ADD_ATTR: ['class'] });
    renderCharts(bodyEl);
    wrapTables(bodyEl);
    _messages.push({ role: 'assistant', content: fullText });
    saveSession();
    scrollBottom();

  } catch (e) {
    if (bodyEl) {
      bodyEl.classList.remove('streaming');
      bodyEl.innerHTML = `<span style="color:#dc2626;white-space:pre-wrap">⚠ ${escHtml(String(e?.message ?? e))}</span>`;
    }
    _messages.pop();
  } finally {
    _streaming = false;
    document.getElementById('chat-send').disabled = false;
    document.getElementById('chat-input').focus();
  }
}

// ── Rendu ────────────────────────────────────────────────────
function renderMessage(role, content) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'user' ? '👤' : '🤖'}</div>
    <div class="msg-body">${escHtml(content)}</div>`;
  document.getElementById('chat-history').appendChild(div);
  scrollBottom();
  return div;
}

function appendAIBubble() {
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="ai-content">
      <div class="msg-body streaming"></div>
      <div class="tool-chips" style="display:flex;flex-wrap:wrap;gap:4px"></div>
      <div class="tok-info"></div>
    </div>`;
  document.getElementById('chat-history').appendChild(div);
  scrollBottom();
  return div;
}

function appendToolChip(aiDiv, name, done) {
  const chips = aiDiv.querySelector('.tool-chips');
  if (!chips) return;
  const TOOL_LABELS = { etat_cave: '🏛 État cave', historique_lot: '📜 Historique lot', analyses_lot: '🔬 Analyses' };
  const chip = document.createElement('span');
  chip.className = 'tool-chip';
  chip.dataset.tool = name;
  chip.textContent = (TOOL_LABELS[name] ?? name) + '…';
  chips.appendChild(chip);
}

function updateToolChip(aiDiv, name, preview) {
  const chip = aiDiv.querySelector(`.tool-chip[data-tool="${name}"]`);
  if (!chip) return;
  chip.classList.add('done');
  const TOOL_LABELS = { etat_cave: '🏛 État cave', historique_lot: '📜 Historique lot', analyses_lot: '🔬 Analyses' };
  chip.textContent = `✓ ${TOOL_LABELS[name] ?? name}${preview ? ' — ' + preview : ''}`;
}

function hideEmptyState() {
  const el = document.getElementById('empty-state');
  if (el) el.remove();
}

function clearConversation() {
  saveSession();
  _messages   = [];
  _streaming  = false;
  _sessionId  = String(Date.now());
  _tokSession = { input: 0, output: 0 };
  document.getElementById('chat-history').innerHTML = `
    <div class="empty-chat" id="empty-state">
      <div class="icon">🍷</div>
      <h2>Nouvelle conversation</h2>
      <p>Posez-moi une question sur votre cave.</p>
      <div class="suggestion-row" id="suggestions">
        <button class="suggestion-btn" onclick="useSuggestion(this)">Quel est l'état de ma cave aujourd'hui ?</button>
        <button class="suggestion-btn" onclick="useSuggestion(this)">Quels lots ont des analyses récentes hors norme ?</button>
        <button class="suggestion-btn" onclick="useSuggestion(this)">Montre-moi l'historique du lot le plus récent</button>
        <button class="suggestion-btn" onclick="useSuggestion(this)">Y a-t-il des cuves vides en ce moment ?</button>
      </div>
    </div>`;
  document.getElementById('model-info').textContent = 'Shift+Entrée = saut de ligne';
  document.getElementById('chat-input').focus();
}

// ── Historique sessions (drawer inline qui comprime le chat) ──
const _HIST_KEY = 'wb3-ai-history';

function _getHistory() {
  try { return JSON.parse(localStorage.getItem(_HIST_KEY) || '[]'); } catch { return []; }
}

function saveSession() {
  if (!_messages.length) return;
  const firstUser = _messages.find(m => m.role === 'user');
  if (!firstUser) return;
  const title   = firstUser.content.slice(0, 70);
  const session = { id: _sessionId, title, messages: [..._messages], ts: Date.now() };
  const history = [session, ..._getHistory().filter(h => h.id !== _sessionId)].slice(0, 30);
  try { localStorage.setItem(_HIST_KEY, JSON.stringify(history)); } catch (_) { /* quota */ }
}

function openHistory() {
  _renderHistoryList();
  const d = document.getElementById('hist-drawer');
  if (d) d.classList.add('open');
}

function closeHistory() {
  const d = document.getElementById('hist-drawer');
  if (d) d.classList.remove('open');
}

function _renderHistoryList() {
  const list = document.getElementById('h-list');
  if (!list) return;
  const history = _getHistory();
  if (!history.length) {
    list.innerHTML = '<div class="h-empty">Aucune conversation enregistrée.<br>Envoyez un premier message pour créer une session.</div>';
    return;
  }
  list.innerHTML = history.map(h => {
    const d     = new Date(h.ts);
    const label = d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' })
      + ' ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    const msgs  = h.messages ? h.messages.length : '?';
    return `<div class="h-item" data-id="${h.id}">
      <div class="h-info">
        <div class="h-title">${escHtml(h.title)}</div>
        <div class="h-meta">${label} · ${msgs} msg</div>
      </div>
      <button class="h-del" title="Supprimer">🗑</button>
    </div>`;
  }).join('');

  // Câblage des évènements (évite les onclick inline et les soucis de quotes)
  list.querySelectorAll('.h-item').forEach(row => {
    const id = row.dataset.id;
    row.querySelector('.h-info').addEventListener('click', () => loadSession(id));
    row.querySelector('.h-del').addEventListener('click', e => { e.stopPropagation(); deleteSession(id); });
  });
}

function loadSession(id) {
  const session = _getHistory().find(h => h.id === id);
  if (!session) return;
  saveSession();
  _messages   = [...session.messages];
  _sessionId  = session.id;
  _tokSession = { input: 0, output: 0 };
  const chatEl = document.getElementById('chat-history');
  chatEl.innerHTML = '';
  for (const msg of _messages) {
    if (msg.role === 'user') {
      renderMessage('user', msg.content);
    } else {
      const div = document.createElement('div');
      div.className = 'msg assistant';
      div.innerHTML = `<div class="msg-avatar">🤖</div><div class="ai-content"><div class="msg-body"></div><div class="tool-chips"></div></div>`;
      const body = div.querySelector('.msg-body');
      body.innerHTML = DOMPurify.sanitize(marked.parse(msg.content), { ADD_ATTR: ['class'] });
      renderCharts(body);
      wrapTables(body);
      chatEl.appendChild(div);
    }
  }
  scrollBottom();
  closeHistory();
}

function deleteSession(id) {
  const history = _getHistory().filter(h => h.id !== id);
  localStorage.setItem(_HIST_KEY, JSON.stringify(history));
  _renderHistoryList();
}

function useSuggestion(btn) {
  document.getElementById('chat-input').value = btn.textContent;
  sendMessage();
}

function scrollBottom() {
  const h = document.getElementById('chat-history');
  h.scrollTop = h.scrollHeight;
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showFatalError(msg) {
  document.querySelector('.chat-history').innerHTML =
    `<div class="error-banner" style="margin:var(--space-5) auto;max-width:520px">${escHtml(msg)}</div>`;
  document.getElementById('chat-send').disabled = true;
}

async function logout() { await WB3Auth.signOut(); WB3Nav.navigateTop('app.html'); }
</script>

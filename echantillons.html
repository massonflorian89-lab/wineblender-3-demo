<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" type="image/png" sizes="32x32" href="img/icon-wineblender-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="img/icon-wineblender-16.png">
<link rel="shortcut icon" href="img/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="img/icon-wineblender-180.png">
<meta name="theme-color" content="#6a1b2a">
<title>Échantillons — WineBlender 3</title>
<link rel="stylesheet" href="theme.css">
<script>(function(){var t=localStorage.getItem('wb3_theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<style>
  /* .header-actions, .breadcrumb-flex, .tenant-pill, .drawer* → theme.css */
  #drawer.drawer { width: 620px; max-width: 96vw; }
  @media (max-width: 820px) { #drawer.drawer { width: 100vw; max-width: 100vw; } }

  .ech-bar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:var(--space-3); }
  .ech-bar input, .ech-bar select { padding:7px 10px; border:1px solid var(--color-border); border-radius:var(--radius-md); font:inherit; }
  .ech-bar .grow { flex:1; }

  .ech-table { width:100%; border-collapse:collapse; font-size:var(--text-footnote); }
  .ech-table th, .ech-table td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--color-border); white-space:nowrap; }
  .ech-table th { font-weight:600; color:var(--color-ink-secondary); position:sticky; top:0; background:var(--color-bg-elevated); z-index:1; }
  .ech-table td.num { text-align:right; font-variant-numeric:tabular-nums; }
  .ech-table tr.is-todo td { background:rgba(245,158,11,.06); }
  .ech-num { font-family:monospace; font-size:11px; color:var(--color-ink-secondary); }
  .ech-coul { display:inline-block; width:10px; height:10px; border-radius:50%; vertical-align:-1px; margin-right:5px; border:1px solid rgba(0,0,0,.15); }
  .coul-rouge{background:#b00020}.coul-blanc{background:#d4c089}.coul-rose{background:#d89dad}.coul-gris{background:#9e9ea0}.coul-orange{background:#e08a2b}
  .ech-chip { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:999px; font-size:10px; font-weight:600; }
  .chip-ok { background:#e6f4ea; color:#1d6b34; }
  .chip-todo { background:#fff4e0; color:#9a5b00; }
  .ech-actions { display:flex; gap:4px; }
  .icon-btn { border:none; background:transparent; cursor:pointer; font-size:14px; padding:3px 5px; border-radius:6px; }
  .icon-btn:hover { background:var(--color-bg-subtle); }

  .ech-form .row { display:flex; gap:10px; flex-wrap:wrap; }
  .ech-form .f { display:flex; flex-direction:column; gap:3px; margin-bottom:var(--space-3); flex:1; min-width:130px; }
  .ech-form label { font-size:var(--text-caption); color:var(--color-ink-secondary); font-weight:600; }
  .ech-form input, .ech-form select, .ech-form textarea { padding:8px 10px; border:1px solid var(--color-border); border-radius:var(--radius-md); font:inherit; width:100%; box-sizing:border-box; }
  .ech-form .hint { font-size:var(--text-caption); color:var(--color-ink-tertiary); }
  .src-tabs { display:flex; gap:6px; margin-bottom:var(--space-2); }
  .src-tabs button { padding:6px 12px; border:1px solid var(--color-border); border-radius:var(--radius-pill); background:var(--color-bg-elevated); cursor:pointer; font:inherit; }
  .src-tabs button.active { background:var(--color-primary,#6a1b2a); color:#fff; border-color:var(--color-primary,#6a1b2a); }
  .ech-total { font-weight:700; }
</style>
</head>
<body>

<header class="wb-header">
  <div class="breadcrumb-flex">
    <a href="app.html" class="home"><img decoding="async" class="home-logo" src="img/icon-wineblender-192.png" alt="">WB3</a>
    <span class="sep">/</span>
    <h1 data-help="Registre des échantillons présentés aux clients/courtiers (remplace ton tableau Excel) + édition d'étiquettes. Un échantillon peut pointer une cuve réelle ou un essai d'assemblage simulé.">🍾 Échantillons</h1>
  </div>
  <div class="header-actions">
    <span class="tenant-pill" id="tenant-pill">—</span>
    <a class="btn btn--header" href="parametres.html" title="Paramètres">⚙️</a>
    <button class="btn btn--header" onclick="logout()">Déconnexion</button>
  </div>
</header>

<main class="wb-main">
  <div id="boot" class="loading-state"><div class="spinner"></div>Chargement…</div>
  <div id="app" style="display:none">

    <div class="ech-bar">
      <input type="date" id="f-from" onchange="applyFilters()" title="Depuis">
      <span>→</span>
      <input type="date" id="f-to" onchange="applyFilters()" title="Jusqu'à">
      <select id="f-statut" onchange="applyFilters()" title="Statut">
        <option value="all">Tous</option>
        <option value="todo">À préparer</option>
        <option value="done">Réalisés</option>
      </select>
      <input type="text" id="f-search" class="grow" placeholder="Rechercher client, courtier, vin, cuve, n°…" oninput="applyFilters()">
      <button class="btn btn--secondary btn--sm" id="btn-labels" onclick="openLabels()" title="Éditer les étiquettes des échantillons filtrés">🏷 Étiquettes</button>
      <button class="btn btn--primary btn--sm" id="btn-new" data-help="Enregistre un nouvel échantillon : sa source (cuve ou essai), le client/courtier, le nombre de bouteilles. Un numéro unique est attribué." onclick="openForm()">+ Nouvel échantillon</button>
    </div>

    <div id="summary" class="ech-bar" style="color:var(--color-ink-secondary);font-size:var(--text-footnote)"></div>

    <div style="overflow:auto;max-height:calc(100vh - 230px);border:1px solid var(--color-border);border-radius:var(--radius-md)">
      <table class="ech-table" id="ech-table">
        <thead><tr>
          <th>Date</th><th>N°</th><th>Client</th><th>Vin</th><th>Couleur</th><th>Mill.</th>
          <th>Source</th><th>Qualité</th><th class="num">Btl</th><th class="num">Vol (L)</th><th>Statut</th><th></th>
        </tr></thead>
        <tbody id="ech-body"></tbody>
      </table>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<!-- Étiquettes : conteneur d'impression (rempli à la demande) -->
<div id="labels-root"></div>

<script src="lib/supabase.min.js"></script>
<script src="toast.js"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<script src="wb3-bus.js"></script>
<script src="wb3-freshness.js"></script>
<script src="wb3-init.js"></script>
<script src="auth.js"></script>
<script src="nav.js"></script>
<script src="wb3-help.js"></script>

<script>
'use strict';

const COULEURS = ['Rouge', 'Blanc', 'Rosé', 'Gris', 'Orange'];
const COUL_CLASS = { 'rouge':'coul-rouge', 'blanc':'coul-blanc', 'rosé':'coul-rose', 'rose':'coul-rose', 'gris':'coul-gris', 'orange':'coul-orange' };

let _canEdit  = true;
let _echs     = [];
let _clients  = [];
let _courtiers = [];
let _cuves    = [];
let _essais   = [];
let _editId   = null;
let _srcType  = 'cuve';

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmt(n){ return Number(n||0).toLocaleString('fr-FR',{maximumFractionDigits:2}); }
function todayIso(){ return new Date().toISOString().slice(0,10); }
function frDate(iso){ try{ return new Date(iso+'T00:00:00').toLocaleDateString('fr-FR'); }catch(_){ return iso||''; } }
function coulClass(c){ return COUL_CLASS[String(c||'').toLowerCase()] || ''; }

// ── Init ──────────────────────────────────────────────────────
(async function init(){
  const ctx = await WB3AppBoot.requireReadyContext({ maxWaitMs: 8000 });
  if (!ctx) { document.getElementById('boot').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div class="title">Session expirée</div></div>'; return; }
  document.getElementById('tenant-pill').textContent = `🏢 ${ctx.tenant.nom} · ${ctx.tenant.role}`;
  WB3Auth.onAuthChange(({ user }) => { if (!user) WB3Nav.navigateTop('app.html'); });

  // Garde module : migration 093 requise.
  if (WB3DB.ensureModule && !(await WB3DB.ensureModule('echantillon', 'boot'))) return;
  _canEdit = !WB3DB.isPrivileged || WB3DB.isPrivileged();
  if (!_canEdit) document.getElementById('btn-new')?.style.setProperty('display', 'none');

  await reloadAll();
  document.getElementById('boot').style.display = 'none';
  document.getElementById('app').style.display = '';
  render();
})();

async function reloadAll(){
  try {
    [_echs, _clients, _courtiers] = await Promise.all([
      WB3DB.listEchantillons(),
      WB3DB.listEchantillonClients('client'),
      WB3DB.listEchantillonClients('courtier'),
    ]);
  } catch(e){ toast('Erreur chargement : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error'); _echs = []; }
  // Sources (cuves + essais) — non bloquant.
  try { _cuves = WB3DB.queryCuverieEtat ? await WB3DB.queryCuverieEtat() : []; } catch(_){ _cuves = []; }
  try { _essais = WB3DB.listEssais ? await WB3DB.listEssais() : []; } catch(_){ _essais = []; }
}

// ── Registre ──────────────────────────────────────────────────
function _filtered(){
  const from = document.getElementById('f-from').value;
  const to   = document.getElementById('f-to').value;
  const st   = document.getElementById('f-statut').value;
  const q    = (document.getElementById('f-search').value || '').trim().toLowerCase();
  return _echs.filter(e => {
    if (from && (e.date_echantillon||'') < from) return false;
    if (to   && (e.date_echantillon||'') > to)   return false;
    if (st === 'todo' && e.realise) return false;
    if (st === 'done' && !e.realise) return false;
    if (q) {
      const hay = [e.numero, e.client, e.courtier, e.vin, e.cepage, e.couleur, e.qualite, _srcLabel(e)].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}
function applyFilters(){ render(); }

function _srcLabel(e){
  if (e.source_type === 'cuve') { const c = _cuves.find(x => x.contenant_id === e.contenant_id); return c ? c.contenant_nom : (e.contenant_id ? 'cuve' : '—'); }
  if (e.source_type === 'essai') { const s = _essais.find(x => x.id === e.essai_id); return '🧪 ' + (s ? s.nom : 'essai'); }
  return e.vin ? '✎ libre' : '—';
}

function render(){
  const list = _filtered();
  const body = document.getElementById('ech-body');
  body.innerHTML = list.length ? list.map(rowHTML).join('')
    : `<tr><td colspan="12" style="text-align:center;color:var(--color-ink-tertiary);padding:var(--space-6)">Aucun échantillon. Clique « + Nouvel échantillon ».</td></tr>`;
  const btl = list.reduce((s,e)=>s+(Number(e.nb_bouteilles)||0),0);
  const vol = list.reduce((s,e)=>s+(Number(e.volume_total_l)||0),0);
  const todo = list.filter(e=>!e.realise).length;
  document.getElementById('summary').innerHTML =
    `<span>${list.length} échantillon${list.length>1?'s':''}</span> · <span>${btl} bouteilles</span> · <span class="ech-total">${fmt(vol)} L</span>${todo?` · <span class="ech-chip chip-todo">${todo} à préparer</span>`:''}`;
}

function rowHTML(e){
  const stat = e.realise
    ? '<span class="ech-chip chip-ok">✓ réalisé</span>'
    : '<span class="ech-chip chip-todo">à préparer</span>';
  const toggle = _canEdit ? (e.realise
      ? `<button class="icon-btn" title="Marquer à préparer" onclick="toggleRealise('${e.id}',false)">↺</button>`
      : `<button class="icon-btn" title="Marquer réalisé" onclick="toggleRealise('${e.id}',true)">✓</button>`) : '';
  const edit = _canEdit ? `<button class="icon-btn" title="Modifier" onclick="openForm('${e.id}')">✏️</button>
      <button class="icon-btn" title="Supprimer" onclick="removeEch('${e.id}')">🗑</button>` : '';
  return `<tr class="${e.realise?'':'is-todo'}">
    <td>${frDate(e.date_echantillon)}</td>
    <td><span class="ech-num">${esc(e.numero)}</span></td>
    <td>${esc(e.client||'—')}${e.courtier?`<div class="hint" style="font-size:10px;color:var(--color-ink-tertiary)">${esc(e.courtier)}</div>`:''}</td>
    <td>${esc(e.vin||'—')}</td>
    <td>${e.couleur?`<span class="ech-coul ${coulClass(e.couleur)}"></span>${esc(e.couleur)}`:'—'}</td>
    <td>${esc(e.millesime||'—')}</td>
    <td>${esc(_srcLabel(e))}</td>
    <td>${esc(e.qualite||'—')}</td>
    <td class="num">${esc(e.nb_bouteilles||0)}</td>
    <td class="num">${fmt(e.volume_total_l)}</td>
    <td>${stat}</td>
    <td><div class="ech-actions">${toggle}${edit}</div></td>
  </tr>`;
}

async function toggleRealise(id, val){
  try { await WB3DB.setEchantillonRealise(id, val); const e = _echs.find(x=>x.id===id); if (e) e.realise = val; render(); }
  catch(err){ toast('Échec : ' + (WB3DB.errMsg ? WB3DB.errMsg(err) : err.message), 'error'); }
}

async function removeEch(id){
  const e = _echs.find(x=>x.id===id);
  if (!await WB3UI.confirm('Supprimer l\'échantillon ' + (e?esc(e.numero):'') + ' ?', { title:'Supprimer', okText:'Supprimer', danger:true })) return;
  try { await WB3DB.deleteEchantillon(id); _echs = _echs.filter(x=>x.id!==id); render(); toast('Supprimé', 'success'); }
  catch(err){ toast('Échec : ' + (WB3DB.errMsg ? WB3DB.errMsg(err) : err.message), 'error'); }
}

// ── Formulaire (drawer) ───────────────────────────────────────
function openForm(id){
  if (!_canEdit) { toast('Lecture seule : réservé aux responsables.', 'error'); return; }
  _editId = id || null;
  const e = id ? _echs.find(x=>x.id===id) : null;
  _srcType = e ? e.source_type : 'cuve';

  const clientList = _clients.map(c=>`<option value="${esc(c.nom)}">`).join('');
  const courtierList = _courtiers.map(c=>`<option value="${esc(c.nom)}">`).join('');
  const cuveOpts = _cuves.map(c=>`<option value="${esc(c.contenant_id)}" ${e&&e.contenant_id===c.contenant_id?'selected':''}>${esc(c.contenant_nom)}${c.lot_nom?' · '+esc(c.lot_nom):''}</option>`).join('');
  const essaiOpts = _essais.map(s=>`<option value="${esc(s.id)}" ${e&&e.essai_id===s.id?'selected':''}>${esc(s.nom)}</option>`).join('');
  const coulOpts = COULEURS.map(c=>`<option value="${c}" ${e&&(e.couleur||'').toLowerCase()===c.toLowerCase()?'selected':''}>${c}</option>`).join('');

  const ov = document.createElement('div');
  ov.id = 'form-overlay';
  ov.innerHTML = `
    <div class="drawer-backdrop" id="ech-backdrop"></div>
    <aside class="drawer" id="drawer">
      <div class="drawer-head">
        <h3>${id ? '✏️ Échantillon ' + esc(e.numero) : '🍾 Nouvel échantillon'}</h3>
        <button class="close-btn" onclick="closeForm()" aria-label="Fermer">×</button>
      </div>
      <div class="drawer-body ech-form">
        <div class="row">
          <div class="f" style="max-width:170px"><label>Date</label><input type="date" id="d-date" value="${e?esc(e.date_echantillon):todayIso()}"></div>
          <div class="f"><label>Qualité</label><input type="text" id="d-qualite" list="ql-list" value="${e?esc(e.qualite||''):''}" placeholder="ex. supérieur"></div>
        </div>
        <datalist id="ql-list"><option value="supérieur"><option value="courant"><option value="dégustation"></datalist>

        <label>Source de l'échantillon</label>
        <div class="src-tabs" data-help="D'où vient l'échantillon : une cuve réelle de la cuverie, un essai d'assemblage simulé, ou une saisie libre. Choisir une cuve/essai pré-remplit le vin, la couleur, le cépage et le millésime.">
          <button type="button" data-src="cuve"  class="${_srcType==='cuve'?'active':''}"  onclick="setSrc('cuve')">🛢 Cuve</button>
          <button type="button" data-src="essai" class="${_srcType==='essai'?'active':''}" onclick="setSrc('essai')">🧪 Essai simulé</button>
          <button type="button" data-src="libre" class="${_srcType==='libre'?'active':''}" onclick="setSrc('libre')">✎ Libre</button>
        </div>
        <div class="f" id="src-cuve"  style="display:${_srcType==='cuve'?'':'none'}">
          <select id="d-cuve" onchange="onPickCuve()"><option value="">— Choisir une cuve —</option>${cuveOpts}</select>
        </div>
        <div class="f" id="src-essai" style="display:${_srcType==='essai'?'':'none'}">
          <select id="d-essai" onchange="onPickEssai()"><option value="">— Choisir un essai —</option>${essaiOpts}</select>
          ${_essais.length?'':'<span class="hint">Aucun essai. Crée-en dans 🧪 Assemblage.</span>'}
        </div>

        <div class="row">
          <div class="f"><label>Vin (libellé étiquette)</label><input type="text" id="d-vin" value="${e?esc(e.vin||''):''}" placeholder="ex. Niellucio Rosé"></div>
        </div>
        <div class="row">
          <div class="f" style="max-width:160px"><label>Couleur</label><select id="d-couleur"><option value="">—</option>${coulOpts}</select></div>
          <div class="f"><label>Cépage</label><input type="text" id="d-cepage" value="${e?esc(e.cepage||''):''}"></div>
          <div class="f" style="max-width:120px"><label>Millésime</label><input type="number" id="d-millesime" value="${e&&e.millesime?esc(e.millesime):''}" placeholder="2025"></div>
          <div class="f" style="max-width:110px"><label>Lot</label><input type="text" id="d-lot" value="${e?esc(e.lot_texte||''):''}" placeholder="ex. 1"></div>
        </div>

        <div class="row">
          <div class="f"><label>Client</label><input type="text" id="d-client" list="cl-list" value="${e?esc(e.client||''):''}" placeholder="Nom du client"></div>
          <div class="f"><label>Courtier</label><input type="text" id="d-courtier" list="co-list" value="${e?esc(e.courtier||''):''}" placeholder="Courtier (optionnel)"></div>
        </div>
        <datalist id="cl-list">${clientList}</datalist>
        <datalist id="co-list">${courtierList}</datalist>

        <div class="row">
          <div class="f" style="max-width:140px"><label>Nb bouteilles</label><input type="number" min="0" id="d-nb" value="${e?esc(e.nb_bouteilles):'2'}" oninput="calcTotal()"></div>
          <div class="f" style="max-width:150px"><label>Vol. bouteille (L)</label><input type="number" step="0.01" min="0" id="d-volb" value="${e?esc(e.volume_bouteille_l):'0.75'}" oninput="calcTotal()"></div>
          <div class="f" style="max-width:150px"><label>Volume présenté (hL)</label><input type="number" step="any" id="d-volp" value="${e&&e.volume_presente!=null?esc(e.volume_presente):''}" placeholder="optionnel"></div>
          <div class="f"><label>Volume total</label><input type="text" id="d-total" readonly style="background:var(--color-bg-subtle)"></div>
        </div>
        <div class="f"><label>Information complémentaire</label><textarea id="d-info" rows="2">${e?esc(e.info||''):''}</textarea></div>
        <label class="toggle" style="display:inline-flex;align-items:center;gap:8px"><input type="checkbox" id="d-realise" ${e&&e.realise?'checked':''}> Échantillon réalisé (bouteilles préparées)</label>
      </div>
      <div class="drawer-foot">
        ${id?`<button class="btn btn--secondary" onclick="removeEch('${id}');closeForm()">🗑 Supprimer</button>`:''}
        <div class="actions-right" style="margin-left:auto;display:flex;gap:8px">
          <button class="btn btn--secondary" onclick="closeForm()">Fermer</button>
          <button class="btn btn--primary" onclick="saveForm()">💾 Enregistrer</button>
        </div>
      </div>
    </aside>`;
  document.body.appendChild(ov);
  document.getElementById('ech-backdrop').addEventListener('click', closeForm);
  requestAnimationFrame(() => {
    document.getElementById('ech-backdrop')?.classList.add('open');
    document.getElementById('drawer')?.classList.add('open');
  });
  calcTotal();
}
function closeForm(){ document.getElementById('form-overlay')?.remove(); _editId = null; }

function setSrc(t){
  _srcType = t;
  document.querySelectorAll('.src-tabs button').forEach(b => b.classList.toggle('active', b.dataset.src === t));
  document.getElementById('src-cuve').style.display  = t === 'cuve'  ? '' : 'none';
  document.getElementById('src-essai').style.display = t === 'essai' ? '' : 'none';
}
function onPickCuve(){
  const id = document.getElementById('d-cuve').value;
  const c = _cuves.find(x => x.contenant_id === id);
  if (!c) return;
  const set = (k,v) => { const el = document.getElementById(k); if (el && v != null && v !== '') el.value = v; };
  set('d-vin', c.lot_nom || '');
  set('d-cepage', c.cepages_resume || c.cepage || '');
  set('d-millesime', c.millesime || '');
  if (c.couleur) { const sel = document.getElementById('d-couleur'); const m = COULEURS.find(x => x.toLowerCase() === String(c.couleur).toLowerCase()); if (m) sel.value = m; }
  if (c.numero_lot) set('d-lot', c.numero_lot);
}
function onPickEssai(){
  const id = document.getElementById('d-essai').value;
  const s = _essais.find(x => x.id === id);
  if (!s) return;
  const el = document.getElementById('d-vin'); if (el && !el.value) el.value = s.nom || '';
}
function calcTotal(){
  const nb = Number(document.getElementById('d-nb')?.value) || 0;
  const vb = Number(document.getElementById('d-volb')?.value) || 0;
  const t = document.getElementById('d-total'); if (t) t.value = fmt(nb * vb) + ' L';
}

async function saveForm(){
  const val = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  const num = id => { const v = val(id); return v === '' ? null : Number(String(v).replace(',', '.')); };
  const client = val('d-client'), courtier = val('d-courtier');
  const fields = {
    id: _editId || undefined,
    date_echantillon: val('d-date') || todayIso(),
    source_type: _srcType,
    contenant_id: _srcType === 'cuve'  ? (val('d-cuve')  || null) : null,
    essai_id:     _srcType === 'essai' ? (val('d-essai') || null) : null,
    vin: val('d-vin') || null,
    couleur: val('d-couleur') || null,
    cepage: val('d-cepage') || null,
    millesime: num('d-millesime'),
    qualite: val('d-qualite') || null,
    lot_texte: val('d-lot') || null,
    client: client || null,
    courtier: courtier || null,
    volume_presente: num('d-volp'),
    nb_bouteilles: Math.max(0, Math.round(num('d-nb') || 0)),
    volume_bouteille_l: num('d-volb') ?? 0.75,
    info: val('d-info') || null,
    realise: document.getElementById('d-realise')?.checked || false,
  };
  if (!fields.vin && !fields.contenant_id && !fields.essai_id) { WB3UI.alert('Renseigne au moins une source (cuve/essai) ou un libellé de vin.', { title:'Champ manquant' }); return; }
  try {
    // Référentiel : ajoute les nouveaux clients/courtiers à la volée.
    if (client && !_clients.some(c => c.nom.toLowerCase() === client.toLowerCase())) { try { await WB3DB.addEchantillonClient(client, 'client'); } catch(_){} }
    if (courtier && !_courtiers.some(c => c.nom.toLowerCase() === courtier.toLowerCase())) { try { await WB3DB.addEchantillonClient(courtier, 'courtier'); } catch(_){} }
    await WB3DB.saveEchantillon(fields);
    closeForm();
    await reloadAll();
    render();
    toast('Échantillon enregistré', 'success');
  } catch(e){ WB3UI.alert('Échec : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : (e.message || e)), { title:'Erreur' }); }
}

// ── Étiquettes (Lot 3) — placeholder ──────────────────────────
function openLabels(){
  toast('Édition d\'étiquettes : disponible à la prochaine étape (Lot 3).', 'info');
}
</script>

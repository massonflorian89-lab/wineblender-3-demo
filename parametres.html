function handleAnalyseCsvDrop(e) {
  const file = e.dataTransfer?.files?.[0];
  if (file) _processAnalyseCsv(file);
}

function handleAnalyseCsvFile(input) {
  const file = input.files[0];
  if (file) _processAnalyseCsv(file);
}

function _processAnalyseCsv(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const result = _parseAnalyseCsv(e.target.result);
    if (result.error) { toast(result.error, 'error'); return; }
    _analyseImportParsed = result;
    _analyseCsvCols = result.csvCols;
    _renderAnalysesUI();
    _renderAnalysePreview(result);
  };
  reader.readAsText(file, 'UTF-8');
}

function _parseAnalyseCsv(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return { error: 'Fichier vide ou sans données' };
  const sep  = lines[0].includes(';') ? ';' : ',';
  const cols = lines[0].split(sep).map(c => c.trim());
  const m    = analysePrefs.import_mapping;
  const ci   = k => m[k] ? cols.indexOf(m[k]) : -1;
  const dateIdx = ci('date_col');
  if (dateIdx === -1) return { error: `Colonne date "${m.date_col||'Date'}" introuvable. Vérifiez le mapping.` };
  const lotIdx  = ci('lot_col');
  const pIdxs   = ANALYSE_PARAMS.map(p => ({ key: p.key, idx: ci(p.key) }));
  const rows = [], errors = [];
  for (let i = 1; i < lines.length; i++) {
    const cells   = splitCsvLine(lines[i], sep);
    const rawDate = (cells[dateIdx] || '').trim();
    if (!rawDate) continue;
    // parse fr DD/MM/YYYY → ISO
    let isoDate = rawDate;
    const dm = rawDate.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if (dm) isoDate = `${dm[3]}-${dm[2].padStart(2,'0')}-${dm[1].padStart(2,'0')}`;
    const lotRef = lotIdx >= 0 ? (cells[lotIdx]||'').trim() : null;
    const row = { date_analyse: isoDate, _lotRef: lotRef };
    let hasData = false;
    pIdxs.forEach(({ key, idx }) => {
      if (idx < 0) return;
      const v = parseFloat((cells[idx]||'').replace(',','.'));
      if (!isNaN(v)) { row[key] = v; hasData = true; }
    });
    if (!hasData) { errors.push(`Ligne ${i+1} : aucune valeur numérique → ignorée`); continue; }
    rows.push(row);
  }
  return { rows, errors, csvCols: cols };
}

function _renderAnalysePreview(parsed) {
  const { rows, errors } = parsed;
  const preview = document.getElementById('analyse-import-preview');
  if (!preview) return;
  const activeCols = ANALYSE_PARAMS.filter(p => rows.some(r => r[p.key] != null));
  preview.style.display = '';
  preview.innerHTML = `
    <div class="drawer-section">
      <div class="drawer-section-title">Vérification avant import</div>
      <div class="drawer-section-content" style="padding:var(--space-4)">
        <div style="display:flex;gap:var(--space-2);flex-wrap:wrap;margin-bottom:var(--space-3)">
          <span class="tag tag--success">✅ ${rows.length} analyse${rows.length>1?'s':''} prête${rows.length>1?'s':''}</span>
          ${errors.length ? `<span class="tag" style="background:var(--color-warning-soft);color:var(--color-warning)">⚠️ ${errors.length} ligne${errors.length>1?'s':''} ignorée${errors.length>1?'s':''}</span>` : ''}
        </div>
        ${errors.length ? `<details style="margin-bottom:var(--space-3)"><summary style="cursor:pointer;font-size:var(--text-caption);color:var(--color-warning)">Voir les lignes ignorées</summary><ul style="margin:var(--space-2) 0 0 var(--space-4);font-size:var(--text-caption)">${errors.map(e=>`<li>${escapeHtml(e)}</li>`).join('')}</ul></details>` : ''}
        ${rows.length ? `
        <div style="overflow-x:auto;margin-bottom:var(--space-4)">
          <table class="data-table">
            <thead><tr><th>Date</th><th>Lot réf.</th>${activeCols.map(p=>`<th>${p.label}</th>`).join('')}</tr></thead>
            <tbody>
              ${rows.slice(0,15).map(r=>`<tr><td style="white-space:nowrap">${escapeHtml(r.date_analyse)}</td><td>${r._lotRef?escapeHtml(r._lotRef):'<span style="color:var(--color-ink-tertiary)">—</span>'}</td>${activeCols.map(p=>`<td>${r[p.key]!=null?r[p.key]:'<span style="color:var(--color-ink-tertiary)">—</span>'}</td>`).join('')}</tr>`).join('')}
              ${rows.length>15?`<tr><td colspan="20" style="text-align:center;color:var(--color-ink-tertiary);font-size:var(--text-caption)">… et ${rows.length-15} autre${rows.length-15>1?'s':''}</td></tr>`:''}
            </tbody>
          </table>
        </div>
        <div style="display:flex;gap:var(--space-2)">
          <button class="btn" id="btn-analyse-import" onclick="confirmAnalyseImport()">✅ Importer ${rows.length} analyse${rows.length>1?'s':''}</button>
          <button class="btn btn--ghost" onclick="cancelAnalyseImport()">Annuler</button>
        </div>` : ''}
      </div>
    </div>`;
  preview.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function cancelAnalyseImport() {
  _analyseImportParsed = null;
  const p = document.getElementById('analyse-import-preview');
  if (p) p.style.display = 'none';
  const inp = document.getElementById('analyse-csv-input');
  if (inp) inp.value = '';
}

async function confirmAnalyseImport() {
  if (!_analyseImportParsed?.rows?.length) return;
  const btn = document.getElementById('btn-analyse-import');
  if (btn) { btn.disabled = true; btn.textContent = 'Import en cours…'; }
  const { rows } = _analyseImportParsed;
  let lots = [];
  try { lots = await WB3DB.listTable('lots', { order: 'nom' }); } catch(_) {}
  let ok = 0, skipped = 0;
  for (const r of rows) {
    let lot_id = null;
    if (r._lotRef) {
      const match = lots.find(l =>
        l.nom?.toLowerCase() === r._lotRef.toLowerCase() ||
        l.code?.toLowerCase() === r._lotRef.toLowerCase()
      );
      if (match) lot_id = match.id;
    }
    const payload = { date_analyse: r.date_analyse, lot_id: lot_id || undefined };
    ANALYSE_PARAMS.forEach(p => { if (r[p.key] != null) payload[p.key] = r[p.key]; });
    try { await WB3DB.insertRow('analyses', payload); ok++; }
    catch(e) { console.warn(e); skipped++; }
  }
  toast(`✅ ${ok} analyse${ok>1?'s':''} importée${ok>1?'s':''}${skipped?` · ${skipped} erreur(s)`:''}`, ok > 0 ? 'success' : 'error');
  cancelAnalyseImport();
}

async function exportTenantData() {
  const btn    = document.getElementById('btn-export-tenant');
  const status = document.getElementById('export-status');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Export en cours…'; }
  if (status) status.textContent = '';
  try {
    const data = await WB3DB.exportTenant();

    // Compte les éléments pour le retour utilisateur
    const sections = Object.entries(data || {})
      .filter(([, v]) => Array.isArray(v))
      .reduce((s, [, v]) => s + v.length, 0);

    const caveName = (data?.tenant?.slug || data?.tenant?.nom || 'cave')
      .toString().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    const stamp = new Date().toISOString().slice(0, 10);
    const fileName = `wb3-export-${caveName}-${stamp}.json`;

    WB3Nav.downloadFile(JSON.stringify(data, null, 2), fileName, 'application/json');

    if (status) status.textContent = `✅ ${sections} enregistrements exportés → ${fileName}`;
    toast('Export terminé', 'success');
  } catch (e) {
    console.error('[WB3 export]', e);
    if (status) status.textContent = '❌ ' + (e.message || 'Erreur export');
    toast('Échec de l\'export', 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '📦 Exporter toutes mes données (JSON)'; }
  }
}

async function applyTheme(key) {
  // 1. Appliquer visuellement dans cet iframe
  if (key) {
    document.documentElement.setAttribute('data-theme', key);
    localStorage.setItem('wb3_theme', key);
  } else {
    document.documentElement.removeAttribute('data-theme');
    localStorage.removeItem('wb3_theme');
  }
  // 2. Propager au shell parent (sidebar + autres iframes)
  try {
    if (window.parent && window.parent !== window) {
      window.parent.WB3Shell?.setTheme?.(key);
    }
  } catch(e) {}
  // 3. Sauvegarder dans Supabase
  try {
    await WB3DB.setUserPref('apparence', { theme: key || '' });
  } catch(e) { console.warn('[WB3] setUserPref apparence:', e); }
  // 4. Mettre à jour l'UI
  document.querySelectorAll('.theme-card').forEach(card => {
    const active = card.dataset.themeKey === key;
    card.classList.toggle('theme-card--active', active);
    const existing = card.querySelector('.theme-check');
    if (active && !existing) {
      const check = document.createElement('div');
      check.className = 'theme-check';
      check.textContent = '✓';
      card.appendChild(check);
    } else if (!active && existing) {
      existing.remove();
    }
  });
  // Synchroniser le sélecteur de mode (Clair/Sombre/Auto) avec le thème courant.
  const mode = (key === 'dark') ? 'dark' : (key === 'auto') ? 'auto' : 'light';
  document.querySelectorAll('.mode-btn').forEach(btn => {
    const on = btn.getAttribute('onclick') === "applyMode('" + (mode === 'light' ? '' : mode) + "')";
    btn.classList.toggle('is-active', on);
    btn.setAttribute('aria-pressed', on ? 'true' : 'false');
  });
  toast('Thème appliqué', 'success');
}

// ============================================================
// Réinitialisation des largeurs (sidebar W1/W3 + drawers W4)
//   « Supprime » les prefs via setUserPref(module, {}) → getUserPref renvoie {}
//   → valeurs par défaut (pattern user_preferences, pas de deleteUserPref).
//   N'affecte AUCUNE autre préférence (thème, vues, etc.).
// ============================================================
async function resetLayoutWidths() {
  const ok = await WB3UI.confirm(
    'Toutes vos largeurs personnalisées (barre latérale et panneaux) seront effacées et remises aux valeurs par défaut.',
    { title: 'Réinitialiser les largeurs ?', okText: 'Réinitialiser' }
  );
  if (!ok) return;

  // 1. Prefs durables. Modules à drawer = ceux qui en possèdent un (W4).
  const DRAWER_MODULES = ['cuverie', 'apports', 'lots', 'operations', 'produits'];
  try {
    await WB3DB.setUserPref('ui_sidebar', {});                            // sidebar (W1/W3)
    for (const m of DRAWER_MODULES) await WB3DB.setUserPref('drawer_width_' + m, {});
  } catch (e) { console.warn('[WB3] reset largeurs (prefs):', e); }

  // 2. Caches localStorage (anti-FOUC W1/W3).
  ['wb3_sidebar_width', 'wb3_nav_state', 'wb3_nav_collapsed'].forEach(k => {
    try { localStorage.removeItem(k); } catch (e) {}
  });

  // 3. Application immédiate (sans reload) : ce document ET le shell parent
  //    (même origine) si on est embarqué.
  _applyDefaultLayout(document);
  try {
    if (window.parent && window.parent !== window && window.parent.document) {
      _applyDefaultLayout(window.parent.document);
    }
  } catch (e) {}

  toast('Largeurs réinitialisées', 'success');
}

// Repose les valeurs par défaut sur un document donné (var CSS + état sidebar).
function _applyDefaultLayout(doc) {
  try {
    const de = doc.documentElement;
    de.style.setProperty('--wb3-nav-w', '220px');    // sidebar nav.js
    de.style.setProperty('--nav-w', '220px');        // sidebar shell
    de.style.setProperty('--wb3-drawer-w', '420px'); // drawers
    ['wb3-nav', 'shell-nav'].forEach(id => {
      const el = doc.getElementById(id);
      if (el) el.classList.remove('collapsed', 'wb3-large');   // retour état « normal »
    });
    if (doc.body) doc.body.classList.remove('wb3-collapsed', 'wb3-large');
    const sb = doc.getElementById('shell-body');
    if (sb) sb.classList.remove('nav-collapsed', 'nav-large');
    const tg = doc.getElementById('wb3-nav-toggle') || doc.getElementById('nav-toggle');
    if (tg) tg.textContent = '☰';
  } catch (e) {}
}

// Télécharge un fichier CSV trame avec headers + 1 ligne d'exemple.
function downloadImportTemplate() {
  const headers = IMPORT_CSV_COLUMNS.map(c => c.key).join(';');
  const example = IMPORT_CSV_COLUMNS.map(c => {
    switch (c.key) {
      case 'nom_produit':          return 'SO2 P18';
      case 'categorie':            return 'sulfites';
      case 'fournisseur':          return 'Cooper';
      case 'unite_utilisation':    return 'g/hL';
      case 'unite_stockage':       return 'kg';
      case 'concentration':        return '180';
      case 'dose_max':             return '60';
      case 'numero_lot':           return 'LOT-2026-001';
      case 'quantite_initiale':    return '25';
      case 'dluo':                 return '2027-12-31';
      case 'date_reception':       return '2026-05-01';
      case 'concentration_libelle':return '180 g actif / kg';
      default: return '';
    }
  }).join(';');
  const example2 = IMPORT_CSV_COLUMNS.map(c => {
    switch (c.key) {
      case 'nom_produit':          return 'SO2 liquide 180';
      case 'categorie':            return 'sulfites';
      case 'fournisseur':          return 'Lafort';
      case 'unite_utilisation':    return 'g/hL';
      case 'unite_stockage':       return 'L';
      case 'concentration':        return '180';
      case 'dose_max':             return '60';
      case 'numero_lot':           return 'LIQ-2026-A';
      case 'quantite_initiale':    return '50';
      case 'dluo':                 return '2028-06-30';
      case 'date_reception':       return '2026-05-01';
      case 'concentration_libelle':return '180 g/L';
      default: return '';
    }
  }).join(';');
  const csv = '﻿' + headers + '\n' + example + '\n' + example2 + '\n';  // BOM UTF-8 pour Excel
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'wb3-produits-import-trame.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// Lit un fichier CSV chargé par l'utilisateur, le parse, et déclenche la preview.
async function handleImportFile(ev) {
  const file = ev.target.files && ev.target.files[0];
  if (!file) return;
  const text = await file.text();
  const rows = parseImportCSV(text);
  if (!rows.length) {
    toast('Aucune ligne valide dans le CSV', 'error');
    return;
  }
  importRows = rows.map(r => ({ ...r, _selected: true, _errors: validateImportRow(r) }));

  // Charge les produits catalogue existants pour matcher les noms
  try {
    const { data } = await WB3DB.client.from('produits_catalogue')
      .select('id, nom, categorie, unite_stock, concentration, dose_max')
      .eq('tenant_id', WB3DB.getCurrentTenantId());
    importExistingProds = data || [];
  } catch (e) {
    console.warn('[WB3 import] catalogue existant KO :', e);
    importExistingProds = [];
  }

  renderImportPreview();
}

// Parser CSV simple : détecte séparateur (; ou ,) ; gère le BOM ; trim.
// Ne gère PAS les guillemets doubles (suffisant pour le cas trame).
function parseImportCSV(text) {
  // Strip BOM
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
  if (lines.length < 2) return [];
  // Détecter séparateur : ; en priorité (Excel français), sinon ,
  const sep = (lines[0].split(';').length >= lines[0].split(',').length) ? ';' : ',';
  const headers = lines[0].split(sep).map(h => h.trim().toLowerCase());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(sep).map(c => c.trim());
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = cols[idx] != null ? cols[idx] : ''; });
    // Skip lignes complètement vides
    if (Object.values(obj).every(v => !v)) continue;
    rows.push(obj);
  }
  return rows;
}

// Valide une ligne, retourne un tableau de codes d'erreur ([] si OK).
function validateImportRow(row) {
  const errs = [];
  IMPORT_CSV_COLUMNS.forEach(col => {
    const val = (row[col.key] || '').trim();
    if (col.required && !val) {
      errs.push(`${col.label} obligatoire`);
      return;
    }
    if (val && col.type === 'number') {
      if (isNaN(parseFloat(val))) errs.push(`${col.label} doit être un nombre`);
    }
    if (val && col.type === 'date') {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(val)) errs.push(`${col.label} format YYYY-MM-DD`);
    }
  });
  return errs;
}

function renderImportRow(row, i, allCats) {
  const hasErr = row._errors.length > 0;
  const existingMatch = importExistingProds.find(p =>
    p.nom && row.nom_produit &&
    p.nom.trim().toLowerCase() === row.nom_produit.trim().toLowerCase()
  );
  const statusBadge = hasErr
    ? `<span style="background:#fee2e2;color:#991b1b;padding:1px 6px;border-radius:var(--radius-sm);font-size:10px;font-weight:600" title="${escapeHtml(row._errors.join(' · '))}">⚠ erreur</span>`
    : existingMatch
      ? `<span style="background:#e0f2fe;color:#075985;padding:1px 6px;border-radius:var(--radius-sm);font-size:10px;font-weight:600" title="Produit catalogue existant — ajoute un lot à ce produit existant">📦 +lot</span>`
      : `<span style="background:#dcfce7;color:#166534;padding:1px 6px;border-radius:var(--radius-sm);font-size:10px;font-weight:600">✨ nouveau</span>`;

  const cells = IMPORT_CSV_COLUMNS.map(col => {
    const val = row[col.key] || '';
    const cellStyle = (col.required && !val) ? 'background:#fef2f2' : '';
    let input = '';
    if (col.type === 'cat' || col.type === 'unite_use' || col.type === 'unite_stock') {
      const listId = col.type === 'cat' ? 'import-cat-list'
                   : col.type === 'unite_use' ? 'import-unite-use-list'
                   : 'import-unite-stock-list';
      input = `<input type="text" list="${listId}" value="${escapeHtml(val)}"
        oninput="updateImportCell(${i},'${col.key}',this.value)"
        style="width:100%;border:0;background:transparent;padding:2px 4px">`;
    } else if (col.type === 'date') {
      input = `<input type="date" value="${escapeHtml(val)}"
        oninput="updateImportCell(${i},'${col.key}',this.value)"
        style="width:100%;border:0;background:transparent;padding:2px 4px">`;
    } else if (col.type === 'number') {
      input = `<input type="number" step="any" value="${escapeHtml(val)}"
        oninput="updateImportCell(${i},'${col.key}',this.value)"
        style="width:100%;border:0;background:transparent;padding:2px 4px;text-align:right">`;
    } else {
      input = `<input type="text" value="${escapeHtml(val)}"
        oninput="updateImportCell(${i},'${col.key}',this.value)"
        style="width:100%;border:0;background:transparent;padding:2px 4px">`;
    }
    return `<td style="padding:0;border-top:1px solid var(--color-border);${cellStyle}">${input}</td>`;
  }).join('');

  return `
    <tr style="${hasErr ? 'background:#fef2f2' : ''}">
      <td style="padding:6px 8px;text-align:center;border-top:1px solid var(--color-border)">
        <input type="checkbox" ${row._selected?'checked':''} ${hasErr?'disabled':''}
          onchange="importRows[${i}]._selected=this.checked;renderImportPreview()">
      </td>
      <td style="padding:6px 8px;border-top:1px solid var(--color-border)">${statusBadge}</td>
      ${cells}
    </tr>`;
}

function updateImportCell(idx, key, value) {
  importRows[idx][key] = value;
  importRows[idx]._errors = validateImportRow(importRows[idx]);
  // Re-render uniquement la ligne concernée + résumé compteurs
  // Simplification : re-render complet du preview (peu de lignes en pratique).
  renderImportPreview();
}

function importSelectAll(state) {
  importRows.forEach(r => { if (!r._errors.length) r._selected = state; });
  renderImportPreview();
}

// Batch insert atomique-best-effort : pour chaque ligne sélectionnée et
// sans erreur, on cherche le produit catalogue par nom (case-insensitive).
// Si trouvé → on ajoute juste un lot. Sinon → on crée d'abord le catalogue,
// puis le lot. Insertion séquentielle pour pouvoir rapporter les échecs
// ligne par ligne. Pas de rollback global (Supabase REST n'a pas de
// transaction multi-table) → on rapporte les succès / échecs au user.
async function confirmImport() {
  const status = document.getElementById('import-status');
  const btn    = document.getElementById('btn-confirm-import');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Import en cours…'; }
  if (status) status.textContent = '';

  const toImport = importRows.filter(r => r._selected && !r._errors.length);
  let okProd = 0, okLot = 0, errs = [];
  const tenantId = WB3DB.getCurrentTenantId();

  for (let i = 0; i < toImport.length; i++) {
    const row = toImport[i];
    if (status) status.textContent = `Import ${i+1}/${toImport.length}…`;
    try {
      // Cherche produit catalogue existant
      const nom = (row.nom_produit || '').trim();
      let existing = importExistingProds.find(p =>
        p.nom && p.nom.trim().toLowerCase() === nom.toLowerCase()
      );
      let produitId;
      if (existing) {
        produitId = existing.id;
      } else {
        // Création du produit catalogue.
        // Mapping CSV → schéma DB réel (schéma WB3) :
        //   - unite_utilisation (CSV) → dose_unite (DB)
        //   - unite_stockage    (CSV) → unite_stock (DB)
        //   - categorie obligatoire au schéma (DEFAULT 'autre' sinon)
        const { data: newProd, error: ePc } = await WB3DB.client
          .from('produits_catalogue')
          .insert({
            tenant_id:             tenantId,
            nom:                   nom,
            categorie:             row.categorie || 'autre',
            fournisseur:           row.fournisseur || null,
            dose_unite:            row.unite_utilisation || null,
            unite_stock:           row.unite_stockage || null,
            concentration:         row.concentration ? parseFloat(row.concentration) : null,
            concentration_libelle: row.concentration_libelle || null,
            dose_max:              row.dose_max ? parseFloat(row.dose_max) : null,
          })
          .select('id, nom, categorie, unite_stock, concentration, dose_max')
          .single();
        if (ePc || !newProd) throw ePc || new Error('Création catalogue échouée');
        produitId = newProd.id;
        importExistingProds.push(newProd);  // cache pour les lignes suivantes du même produit
        okProd++;
      }

      // Création du produit lot
      const qty = parseFloat(row.quantite_initiale);
      const { error: ePl } = await WB3DB.client
        .from('produits_lots')
        .insert({
          tenant_id:         tenantId,
          produit_id:        produitId,
          numero_lot:        (row.numero_lot || '').trim() || null,
          quantite_initiale: isNaN(qty) ? null : qty,
          quantite_actuelle: isNaN(qty) ? null : qty,
          unite:             row.unite_stockage || null,
          dluo:              row.dluo || null,
          date_reception:    row.date_reception || null,
          fournisseur:       row.fournisseur || null,
        });
      if (ePl) throw ePl;
      okLot++;
    } catch (e) {
      console.warn('[WB3 import] ligne', i, 'KO :', e);
      errs.push(`Ligne ${i+1} (${row.nom_produit || '?'}) : ${e.message || e}`);
    }
  }

  if (btn) { btn.disabled = false; btn.textContent = `✓ Importer ${toImport.length} ligne${toImport.length>1?'s':''}`; }

  if (errs.length === 0) {
    toast(`Import OK : ${okLot} lot${okLot>1?'s':''} créé${okLot>1?'s':''} (${okProd} nouveaux produits catalogue)`, 'success');
    importRows = [];
    renderProduitsImport();
  } else {
    const msg = `Import partiel : ${okLot} OK / ${errs.length} échec${errs.length>1?'s':''}.\n\n` + errs.slice(0, 10).join('\n');
    WB3UI.alert(msg, { title:'Import partiel' });
    if (status) status.innerHTML = `<span style="color:var(--color-danger)">${errs.length} échec${errs.length>1?'s':''} — voir détail dans l'alerte</span>`;
  }
}

  try {

    _apRdtDefaut = v;
    const el = document.getElementById('ap-rdt-saved');
    if (el) { el.style.display = ''; setTimeout(() => el.style.display = 'none', 2000); }

function apImportParseFile() {
  const file = document.getElementById('ap-import-file').files[0];
  if (!file) return;
  const isXLS = /\.(xlsx?)$/i.test(file.name);
  const reader = new FileReader();
  reader.onload = e => {
    try {
      let rows2D;
      if (isXLS) {
        if (typeof XLSX === 'undefined') { toast('Bibliothèque XLSX non chargée', 'error'); return; }
        const wb = XLSX.read(new Uint8Array(e.target.result), { type:'array', cellDates:true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        rows2D = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' })
          .map(row => row.map(c => { if (c instanceof Date) return c.toISOString().slice(0,10); return String(c??'').trim(); }));
      } else {
        const text = new TextDecoder('utf-8').decode(e.target.result);
        const lines = text.split(/\r?\n/).filter(l=>l.trim());
        const sep = lines[0].includes(';') ? ';' : ',';
        rows2D = lines.map(l => _apParseCSVLine(l, sep));
      }
      if (!rows2D.length) { toast('Fichier vide ou illisible', 'error'); return; }
      _apportsCsvHeaders = rows2D[0].map(h=>String(h).trim());
      _apportsCsvRows    = rows2D.slice(1,6).map(row=>row.map(c=>String(c??'').trim()));
      // Auto-mapping
      const autoMap = {
        'date':['date_apport'],'date apport':['date_apport'],'date_apport':['date_apport'],
        'heure':['heure_apport'],'numero':['numero'],'n°':['numero'],'num':['numero'],
        'apporteur':['apporteur'],'fournisseur':['apporteur'],'vigneron':['apporteur'],
        'provenance':['provenance'],'parcelle':['provenance'],'lieu-dit':['provenance'],
        'cepage':['cepage_libre'],'cépage':['cepage_libre'],'variete':['cepage_libre'],
        'millesime':['millesime'],'millésime':['millesime'],'annee':['millesime'],
        'poids':['poids_kg'],'poids_kg':['poids_kg'],'kg':['poids_kg'],
        'volume':['volume_hl'],'volume_hl':['volume_hl'],'hl':['volume_hl'],
        'degre':['degre_probable'],'degré':['degre_probable'],'tap':['degre_probable'],
        'tat':['tat'],'ph':['ph'],
        'temperature':['temperature_c'],'température':['temperature_c'],'temp':['temperature_c'],
        'notes':['notes'],'observations':['notes'],'commentaire':['notes'],
      };
      _apportsCsvMapping = {};
      _apportsCsvHeaders.forEach(h => {
        const norm = h.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim();
        const mapped = autoMap[norm] || autoMap[h.toLowerCase().trim()];
        if (mapped) _apportsCsvMapping[mapped[0]] = h;
      });
      _apBuildMappingUI();
      document.getElementById('ap-import-step-1').style.display = 'none';
      document.getElementById('ap-import-step-2').style.display = '';
    } catch(err) { toast('Erreur lecture : ' + err.message, 'error'); }
  };
  reader.readAsArrayBuffer(file);
}

function _apParseCSVLine(line, sep) {
  const result=[]; let cur='', inQ=false;
  for (let i=0;i<line.length;i++) {
    const c=line[i];
    if (c==='"') { inQ=!inQ; }
    else if (c===sep&&!inQ) { result.push(cur.trim()); cur=''; }
    else { cur+=c; }
  }
  result.push(cur.trim());
  return result;
}

function _apBuildMappingUI() {
  const container = document.getElementById('ap-import-mapping');
  const options = `<option value="">— Ignorer —</option>` +
    _apportsCsvHeaders.map(h=>`<option value="${escapeHtml(h)}">${escapeHtml(h)}</option>`).join('');
  container.innerHTML = APPORTS_IMPORT_FIELDS.map(f => {
    const sel = _apportsCsvMapping[f.key] || '';
    return `<div class="mapping-row">
      <label>${escapeHtml(f.label)}</label>
      <select class="select" data-field="${f.key}"
              onchange="_apportsCsvMapping['${f.key}']=this.value">
        ${options.replace(`value="${escapeHtml(sel)}"`,`value="${escapeHtml(sel)}" selected`)}
      </select></div>`;
  }).join('');
  // Aperçu
  document.getElementById('ap-import-preview').innerHTML = `
    <b style="font-size:var(--text-caption)">Aperçu (5 premières lignes)</b>
    <table><thead><tr>${_apportsCsvHeaders.map(h=>`<th>${escapeHtml(h)}</th>`).join('')}</tr></thead>
    <tbody>${_apportsCsvRows.map(row=>`<tr>${row.map(c=>`<td>${escapeHtml(c)}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
  // Compteur
  const file = document.getElementById('ap-import-file').files[0];
  if (file) {
    const r2 = new FileReader();
    r2.onload = e2 => {
      const total = e2.target.result.split(/\r?\n/).filter(l=>l.trim()).length - 1;
      const el = document.getElementById('ap-import-count');
      if (el) el.textContent = `(${total} lignes)`;
    };
    r2.readAsText(file,'UTF-8');
  }
}

async function apDoImport() {
  const file = document.getElementById('ap-import-file').files[0];
  if (!file) return;
  const btn = document.getElementById('ap-btn-do-import');
  btn.disabled = true; btn.textContent = 'Import en cours…';
  const isXLS = /\.(xlsx?)$/i.test(file.name);
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      let rows2D;
      if (isXLS) {
        const wb = XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
        const ws = wb.Sheets[wb.SheetNames[0]];
        rows2D = XLSX.utils.sheet_to_json(ws,{header:1,defval:''})
          .map(row=>row.map(c=>{if(c instanceof Date)return c.toISOString().slice(0,10);return String(c??'').trim();}));
      } else {
        const text=new TextDecoder('utf-8').decode(e.target.result);
        const lines=text.split(/\r?\n/).filter(l=>l.trim());
        const sep=lines[0].includes(';')?';':',';
        rows2D=lines.map(l=>_apParseCSVLine(l,sep));
      }
      const headers=rows2D[0].map(h=>String(h).trim());
      const dataLines=rows2D.slice(1);
      const rows=dataLines.map(cells=>{
        const row={meta:{}};
        APPORTS_IMPORT_FIELDS.forEach(f=>{
          const colName=_apportsCsvMapping[f.key]; if(!colName)return;
          const idx=headers.indexOf(colName); if(idx<0)return;
          const raw=String(cells[idx]??'').trim(); if(!raw)return;
          if(f.type==='int')        row[f.key]=parseInt(raw,10)||null;
          else if(f.type==='float') row[f.key]=parseFloat(raw.replace(',','.'))||null;
          else if(f.type==='date')  row[f.key]=/^\d{2}\/\d{2}\/\d{4}$/.test(raw)?raw.split('/').reverse().join('-'):raw;
          else row[f.key]=raw;
        });
        return row;
      }).filter(r=>Object.keys(r).length>2);
      const inserted = await WB3DB.importApportsBatch(rows);
      toast(`${inserted} apport${inserted>1?'s':''} importé${inserted>1?'s':''}`, 'success');
      _renderApportsImport();
    } catch(err) {
      toast('Erreur import : ' + err.message, 'error');
      btn.disabled=false; btn.textContent='Importer';
    }
  };
  reader.readAsArrayBuffer(file);
}

async function apExportCSV() {
  const statusEl = document.getElementById('ap-export-status');
  if (statusEl) statusEl.textContent = 'Chargement des apports…';
  try {
    const tenantId = WB3DB.getCurrentTenantId();
    const apports = await WB3DB.listTable('apports', {
      select: '*,lots(nom),contenants(nom)',
      filter: { tenant_id: tenantId },
      order: 'date_apport', ascending: false, limit: 10000,
    });
    if (!apports.length) { toast('Aucun apport à exporter', 'error'); if(statusEl)statusEl.textContent=''; return; }
    const headers = ['Numéro','Date','Heure','Apporteur','Provenance','Cépage','Millésime',
      'Lot','Contenant','Poids (kg)','Volume (hL)','Degré','TAT','pH','Température','Statut','Notes'];
    const rows = apports.map(a => [
      a.numero||'', a.date_apport||'', a.heure_apport||'',
      a.apporteur||'', a.provenance||'', a.cepage_libre||'', a.millesime||'',
      a.lots?.nom||'', a.contenants?.nom||'',
      a.poids_kg??'', a.volume_hl??'', a.degre_probable??'',
      a.tat??'', a.ph??'', a.temperature_c??'',
      a.statut||'', a.notes||'',
    ]);
    const csv = [headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(';')).join('\n');
    const blob = new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a2  = document.createElement('a');
    const today = new Date().toISOString().slice(0,10);
    a2.href=url; a2.download=`apports-${today}.csv`; a2.click();
    URL.revokeObjectURL(url);
    toast(`${apports.length} apport${apports.length>1?'s':''} exporté${apports.length>1?'s':''}`, 'success');
    if(statusEl) statusEl.textContent = `✓ ${apports.length} apports exportés`;
  } catch(e) {
    toast('Erreur export : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error');
    if(statusEl) statusEl.textContent='';
  }
}

          ].map(col => {
            const active = LOT_FIELDS_CATALOG.find(f=>f.key===col.field)?.always || lotFieldsPrefs[col.field] !== false;
            return `<span class="tag" style="padding:5px 10px;font-size:12px;${active?'':'opacity:.4'}">
              ${active ? '✓' : '○'} ${col.label}
            </span>`;
          }).join('')}
        </div>
        <p class="t-footnote" style="margin:var(--space-2) 0 0;color:var(--color-ink-tertiary)">
          Pour activer une colonne dans la cuverie, allez dans <a href="cuverie.html" style="color:var(--color-primary)">Cuverie</a> → ⚙ Colonnes.
        </p>
      </div>
    </div>

    <div class="drawer-section" style="margin-top:var(--space-4)">
      <div class="drawer-section-title">🏢 Société</div>
      <div class="drawer-section-content" style="padding:var(--space-4)">
        <p class="t-footnote" style="margin:0 0 var(--space-3)">Structures juridiques proposées à la saisie sur un lot (ex : négoce, cave coopérative). Renommer une entrée met à jour tous les lots existants qui la référencent.</p>
        <div style="display:flex;gap:6px;margin-bottom:var(--space-3);max-width:400px">
          <input type="text" id="societe-add" placeholder="Nouvelle société" style="flex:1;padding:7px 9px;border:1px solid var(--color-border);border-radius:var(--radius-md);font:inherit"
            onkeydown="if(event.key==='Enter')paramAddSociete()">
          <button class="btn btn--secondary btn--sm" onclick="paramAddSociete()">+ Ajouter</button>
        </div>
        <div id="societe-list" style="max-width:400px"></div>
      </div>
    </div>
  `;
  _renderSocieteList();
}

function _renderSocieteList() {
  const el = document.getElementById('societe-list');
  if (!el) return;
  if (!_paramSocietes.length) { el.innerHTML = '<div class="t-footnote" style="color:var(--color-ink-tertiary)">Aucune pour l\'instant.</div>'; return; }
  el.innerHTML = _paramSocietes.map(s => `<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--color-border)">
      <span style="flex:1">${escapeHtml(s.nom)}</span>
      <button class="btn btn--ghost btn--sm" title="Renommer" onclick="paramRenameSociete('${s.id}')">✏️</button>
      <button class="btn btn--ghost btn--sm" title="Supprimer" onclick="paramDeleteSociete('${s.id}')">🗑</button>
    </div>`).join('');
}

async function paramAddSociete() {
  const inp = document.getElementById('societe-add');
  const nom = (inp.value || '').trim(); if (!nom) return;
  try {
    await WB3DB.addLotSociete(nom);
    inp.value = '';
    _paramSocietes = await WB3DB.listLotSocietes();
    _renderSocieteList();
  } catch(e) { toast('Échec : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error'); }
}

async function paramRenameSociete(id) {
  const cur = _paramSocietes.find(x => x.id === id); if (!cur) return;
  const nv = await WB3UI.prompt('Renommer « ' + cur.nom + ' » :', { value: cur.nom });
  if (nv == null) return;
  const clean = String(nv).trim(); if (!clean || clean === cur.nom) return;
  try {
    await WB3DB.renameLotSociete(id, cur.nom, clean);
    _paramSocietes = await WB3DB.listLotSocietes();
    _renderSocieteList();
    toast('Renommé', 'success');
  } catch(e) { toast('Échec : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error'); }
}

async function paramDeleteSociete(id) {
  const cur = _paramSocietes.find(x => x.id === id); if (!cur) return;
  if (!await WB3UI.confirm(`Supprimer « ${cur.nom} » de la liste ? (les lots existants gardent ce nom)`, { title:'Supprimer', okText:'Supprimer', danger:true })) return;
  try {
    await WB3DB.deleteLotSociete(id);
    _paramSocietes = await WB3DB.listLotSocietes();
    _renderSocieteList();
  } catch(e) { toast('Échec : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error'); }
}

function _lotFieldToggle(checkbox) {
  const field = checkbox.dataset.field;
  lotFieldsPrefs[field] = checkbox.checked;
}

async function saveLotFieldsPrefs() {
  try {
    await WB3DB.setUserPref('lot_fields', lotFieldsPrefs);
    const saved = document.getElementById('lot-fields-saved');
    if (saved) { saved.style.display = ''; setTimeout(() => saved.style.display = 'none', 2500); }
    toast('Préférences enregistrées', 'success');
    _renderLotsVinUI();
  } catch(e) {
    console.error(e);
    toast('Erreur lors de la sauvegarde', 'error');
  }
}
</script>

</body>
</html>

// ============================================================
// Section analyses œnologiques
// ============================================================
// Phase 3 — Snapshot pondéré des analyses parents au moment de l'assemblage.
// Pour chaque parent assemblage (lot_filiation.source_type='assemblage'),
// récupère la dernière analyse ≤ date_operation de l'op d'assemblage. Puis
// calcule la moyenne pondérée par volume_hl du lien filiation sur 5 champs
// œnologiques clés (SO2 libre, SO2 total, pH, TAV, AV).
// Retourne null si aucun parent assemblage → la section n'est pas rendue.
async function _fetchParentsSnapshot(filParents) {
  const assemblageParents = (filParents || []).filter(p => p.source_type === 'assemblage' && p.lot);
  if (!assemblageParents.length) return null;

  const results = await Promise.all(assemblageParents.map(async p => {
    const dateAsm = p.operations?.date_operation;
    if (!dateAsm) return { p, analyse: null };
    try {
      const rows = await WB3DB.queryAnalyses({
        lot_id: p.parent_id,
        date_to: dateAsm,
        ascending: false,    // tri DESC pour avoir le plus récent en premier
      });
      return { p, analyse: (rows && rows[0]) || null };
    } catch (e) {
      console.warn('[WB3 lot-detail] analyse parent KO :', e);
      return { p, analyse: null };
    }
  }));

  const FIELDS = ['so2_libre', 'so2_total', 'ph', 'tav', 'acidite_volatile'];
  const weighted = {};
  FIELDS.forEach(k => {
    let sum = 0, weight = 0;
    results.forEach(({ p, analyse }) => {
      if (analyse && analyse[k] != null && p.volume_hl != null) {
        sum += Number(analyse[k]) * Number(p.volume_hl);
        weight += Number(p.volume_hl);
      }
    });
    weighted[k] = weight > 0 ? sum / weight : null;
  });

  // Garde uniquement les parents qui ont au moins UNE valeur exploitable
  // (pour l'affichage du détail).
  const validResults = results.filter(r => r.analyse && FIELDS.some(k => r.analyse[k] != null));
  if (!validResults.length) return null;

  return { parents: validResults, weighted };
}

// Phase 3 — Rendu du bandeau « pondéré parents » en italique gris.
function renderParentsSnapshot(snapshot) {
  if (!snapshot || !snapshot.parents || !snapshot.parents.length) return '';
  const FIELDS = [
    { k:'so2_libre',         l:'SO₂ libre',  u:'mg/L'  },
    { k:'so2_total',         l:'SO₂ total',  u:'mg/L'  },
    { k:'ph',                l:'pH',         u:''      },
    { k:'tav',               l:'TAV',        u:'% vol' },
    { k:'acidite_volatile',  l:'AV',         u:'g/L'   },
  ];
  const cardStyle = 'background:transparent;border:1px dashed var(--color-border);border-radius:var(--radius-sm);padding:6px 10px;text-align:center;font-style:italic;color:var(--color-ink-tertiary)';
  const cards = FIELDS
    .filter(f => snapshot.weighted[f.k] != null)
    .map(f => `
      <div style="${cardStyle}">
        <div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;opacity:.7;margin-bottom:2px">${escapeHtml(f.l)}</div>
        <div style="font-size:var(--text-callout);font-weight:600;font-variant-numeric:tabular-nums">${fmt(snapshot.weighted[f.k])}</div>
        ${f.u ? `<div style="font-size:9px;opacity:.7">${escapeHtml(f.u)}</div>` : ''}
      </div>`).join('');
  if (!cards) return '';

  const parentsList = snapshot.parents.map(({ p, analyse }) => {
    const nom = p.lot?.nom || '?';
    const vol = p.volume_hl != null ? `${fmt(p.volume_hl)} hL` : '';
    const dateA = analyse?.date_analyse ? new Date(analyse.date_analyse).toLocaleDateString('fr-FR') : '?';
    return `<li style="margin:2px 0">${escapeHtml(nom)} <span style="opacity:.7">· ${vol} · analyse du ${escapeHtml(dateA)}</span></li>`;
  }).join('');

  return `
    <div style="margin:var(--space-2) 0;padding:10px 12px;background:var(--color-bg-subtle);border-left:3px solid var(--color-border);border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:var(--text-footnote)">
      <div style="font-style:italic;color:var(--color-ink-tertiary);margin-bottom:6px">
        📋 <b>Snapshot pondéré des parents</b> (au moment de l'assemblage) — valeurs indicatives, à comparer avec les analyses propres ci-dessous.
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px;margin-bottom:var(--space-2)">${cards}</div>
      <details style="font-size:var(--text-caption);color:var(--color-ink-tertiary)">
        <summary style="cursor:pointer">${snapshot.parents.length} parent${snapshot.parents.length>1?'s':''} pris en compte</summary>
        <ul style="margin:6px 0 0 18px;padding:0">${parentsList}</ul>
      </details>
    </div>`;
}

function renderAnalysesSection(analyses, parentsSnapshot = null) {
  // Cas particulier : lot d'assemblage sans encore d'analyses propres MAIS
  // avec snapshot parents → on affiche quand même le bandeau pondéré.
  if (!analyses || analyses.length === 0) {
    const snapshotHtml = renderParentsSnapshot(parentsSnapshot);
    return `
    <div class="detail-section">
      <div class="section-head"><h2>📈 Analyses œnologiques</h2><span class="section-count">0</span>
        <button class="btn btn--primary btn--sm" onclick="openAnalyseModal()" style="margin-left:auto">+ Analyse</button>
      </div>
      <div class="section-body">
        ${snapshotHtml || '<p class="t-secondary" style="margin:0">Aucune analyse enregistrée pour ce lot.</p>'}
      </div>
    </div>`;
  }

  const sorted  = [...analyses].sort((a, b) => new Date(a.date_analyse) - new Date(b.date_analyse));
  const latest  = [...analyses].sort((a, b) => new Date(b.date_analyse) - new Date(a.date_analyse))[0];
  const hasSo2  = sorted.some(a => a.so2_libre != null || a.so2_total != null);
  const hasTav  = sorted.some(a => a.tav != null);
  const hasAv   = sorted.some(a => a.acidite_volatile != null);

  const alertBadge = (latest.so2_libre != null && latest.so2_libre < _analyseThresholds.libre_haut)
    ? `<span style="background:#fff0ea;color:#bd4800;padding:2px 8px;border-radius:var(--radius-pill);font-size:10px;font-weight:600;flex-shrink:0">⚠️ SO₂ libre &lt; ${_analyseThresholds.libre_haut} mg/L</span>`
    : '';

  // FML indicator — basé sur acide malique de la dernière analyse
  let fmlBadge = '';
  if (latest.acide_malique != null) {
    if (latest.acide_malique < 0.3) {
      fmlBadge = `<span style="background:#e8f5e9;color:#2e7d32;padding:2px 8px;border-radius:var(--radius-pill);font-size:10px;font-weight:600;flex-shrink:0">✓ FML complète</span>`;
    } else if (latest.acide_lactique != null && latest.acide_lactique > 0.2) {
      fmlBadge = `<span style="background:#e3f2fd;color:#1565c0;padding:2px 8px;border-radius:var(--radius-pill);font-size:10px;font-weight:600;flex-shrink:0">⟳ FML en cours (A.mal. ${fmt(latest.acide_malique)} g/L)</span>`;
    } else {
      fmlBadge = `<span style="background:var(--color-bg-subtle);color:var(--color-ink-tertiary);padding:2px 8px;border-radius:var(--radius-pill);font-size:10px;font-weight:600;flex-shrink:0">A. malique ${fmt(latest.acide_malique)} g/L</span>`;
    }
  }

  const avAlert = (latest.acidite_volatile != null && latest.acidite_volatile > _analyseThresholds.av_alert)
    ? `<span style="background:#fff3e0;color:#e65100;padding:2px 8px;border-radius:var(--radius-pill);font-size:10px;font-weight:600;flex-shrink:0">⚠️ AV ${fmt(latest.acidite_volatile)} g/L</span>`
    : '';

  return `
  <div class="detail-section">
    <div class="section-head">
      <h2>📈 Analyses œnologiques</h2>
      <span class="section-count">${analyses.length}</span>
      ${alertBadge}
      ${fmlBadge}
      ${avAlert}
      <button class="btn btn--primary btn--sm" onclick="openAnalyseModal()" style="margin-left:auto">+ Analyse</button>
    </div>
    <div class="section-body">
      ${renderParentsSnapshot(parentsSnapshot)}
      ${renderLatestAnalysis(latest)}
      ${hasSo2 ? renderSo2Chart(sorted) : ''}
      ${hasTav  ? renderTavChart(sorted) : ''}
      ${hasAv   ? renderAvChart(sorted)  : ''}
      ${renderAnalysesTable([...sorted].reverse())}
    </div>
  </div>`;
}

// Generic SVG line chart builder
function _buildLineChart(opts) {
  const W = opts.W || 600, H = opts.H || 180;
  const PAD = { top:18, right:32, bottom:36, left:44 };
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top  - PAD.bottom;

  const allDates = opts.series.flatMap(s => s.points.map(p => new Date(p.date).getTime())).filter(Boolean);
  const allVals  = opts.series.flatMap(s => s.points.map(p => p.val)).filter(v => v != null);
  if (!allDates.length || !allVals.length) return '';

  const xMin = Math.min(...allDates), xMax = Math.max(...allDates);
  const xRange = xMax - xMin || 1;

  const threshVals = (opts.thresholds || []).map(t => t.value);
  const rawYMax = Math.max(...allVals, ...threshVals, 1);
  const rawYMin = Math.min(0, ...allVals);
  const rawRange = rawYMax - rawYMin || 1;
  const yStep  = rawRange <= 30 ? 5 : rawRange <= 80 ? 10 : rawRange <= 200 ? 25 : rawRange <= 500 ? 50 : 100;
  const yMax   = Math.ceil(rawYMax  / yStep) * yStep;
  const yMin   = Math.floor(rawYMin / yStep) * yStep;
  const yRange = yMax - yMin;

  function xs(d) { return PAD.left + (d - xMin) / xRange * cW; }
  function ys(v) { return PAD.top  + cH - (v - yMin) / yRange * cH; }

  const yTicks = [];
  for (let v = yMin; v <= yMax; v += yStep) yTicks.push(v);

  // X ticks: month labels or individual dates when ≤ 4 points
  const allPts = opts.series.flatMap(s => s.points).sort((a, b) => new Date(a.date) - new Date(b.date));
  const xTickPts = [];
  if (allPts.length <= 4) {
    allPts.forEach(p => {
      const t = new Date(p.date).getTime();
      if (!xTickPts.find(x => x.t === t))
        xTickPts.push({ t, label: new Date(p.date).toLocaleDateString('fr-FR', { day:'2-digit', month:'short' }) });
    });
  } else {
    const seen = new Set();
    allPts.forEach(p => {
      const d = new Date(p.date);
      const key = `${d.getFullYear()}-${d.getMonth()}`;
      if (!seen.has(key)) {
        seen.add(key);
        xTickPts.push({ t: d.getTime(), label: d.toLocaleDateString('fr-FR', { month:'short', year:'2-digit' }) });
      }
    });
  }

  let s = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:260px;display:block">`;

  // Grid
  yTicks.forEach(v => {
    const y = ys(v).toFixed(1);
    s += `<line x1="${PAD.left}" y1="${y}" x2="${W-PAD.right}" y2="${y}" stroke="#e0e0e0" stroke-width="1"/>`;
  });

  // Threshold zone + line
  (opts.thresholds || []).forEach(t => {
    const y = ys(t.value).toFixed(1);
    s += `<line x1="${PAD.left}" y1="${y}" x2="${W-PAD.right}" y2="${y}" stroke="${t.color}" stroke-width="1.5" stroke-dasharray="5,3" opacity=".85"/>`;
    if (t.label) s += `<text x="${W-PAD.right+4}" y="${(+y+3.5).toFixed(1)}" font-size="9" fill="${t.color}">${escapeHtml(t.label)}</text>`;
  });

  // Axes
  s += `<line x1="${PAD.left}" y1="${PAD.top}" x2="${PAD.left}" y2="${PAD.top+cH}" stroke="#c0c0c0" stroke-width="1.5"/>`;
  s += `<line x1="${PAD.left}" y1="${PAD.top+cH}" x2="${W-PAD.right}" y2="${PAD.top+cH}" stroke="#c0c0c0" stroke-width="1.5"/>`;

  // Y labels
  yTicks.forEach(v => {
    s += `<text x="${PAD.left-5}" y="${(ys(v)+3.5).toFixed(1)}" font-size="10" text-anchor="end" fill="#6d6d6d">${v}</text>`;
  });
  if (opts.yLabel) {
    const midY = (PAD.top + cH / 2).toFixed(1);
    s += `<text x="10" y="${midY}" font-size="9" fill="#aaa" text-anchor="middle" transform="rotate(-90 10 ${midY})">${opts.yLabel}</text>`;
  }

  // X labels
  xTickPts.forEach(p => {
    s += `<text x="${xs(p.t).toFixed(1)}" y="${(PAD.top+cH+16).toFixed(1)}" font-size="9" text-anchor="middle" fill="#6d6d6d">${escapeHtml(p.label)}</text>`;
  });

  // Series: lines then dots
  opts.series.forEach(sr => {
    const vp = sr.points.filter(p => p.val != null);
    if (!vp.length) return;
    if (vp.length > 1) {
      const pts = vp.map(p => `${xs(new Date(p.date).getTime()).toFixed(1)},${ys(p.val).toFixed(1)}`).join(' ');
      const dash = sr.dash ? ` stroke-dasharray="${sr.dash}"` : '';
      s += `<polyline points="${pts}" fill="none" stroke="${sr.color}" stroke-width="${sr.width||2}"${dash} stroke-linejoin="round"/>`;
    }
    vp.forEach(p => {
      const cx = xs(new Date(p.date).getTime()).toFixed(1);
      const cy = ys(p.val).toFixed(1);
      const fill = sr.dotFill ? sr.dotFill(p.val) : sr.color;
      s += `<circle cx="${cx}" cy="${cy}" r="4" fill="${fill}" stroke="#fff" stroke-width="1.5"/>`;
    });
  });

  s += '</svg>';
  return s;
}

function _legend(items) {
  return `<div style="display:flex;gap:var(--space-4);flex-wrap:wrap;margin-top:6px;font-size:var(--text-caption);color:var(--color-ink-secondary)">
    ${items.map(i => `<span style="display:flex;align-items:center;gap:5px">
      <svg width="22" height="10" viewBox="0 0 22 10"><line x1="0" y1="5" x2="22" y2="5" stroke="${i.color}" stroke-width="${i.width||2}" ${i.dash?`stroke-dasharray="${i.dash}"`:''}/>
      ${i.dot ? `<circle cx="11" cy="5" r="3" fill="${i.dot}" stroke="#fff" stroke-width="1"/>` : ''}</svg>
      ${escapeHtml(i.label)}</span>`).join('')}
  </div>`;
}

function renderSo2Chart(sorted) {
  const librePoints = sorted.filter(a => a.so2_libre != null).map(a => ({ date: a.date_analyse, val: a.so2_libre }));
  const totalPoints = sorted.filter(a => a.so2_total != null).map(a => ({ date: a.date_analyse, val: a.so2_total }));
  if (!librePoints.length && !totalPoints.length) return '';

  const { libre_bas, libre_haut } = _analyseThresholds;
  const chart = _buildLineChart({
    W: 600, H: 200, yLabel: 'mg/L',
    thresholds: [
      { value: libre_bas,  color: '#d32f2f', label: String(libre_bas)  },
      { value: libre_haut, color: '#43a047', label: String(libre_haut) },
    ],
    series: [
      { points: totalPoints, color: '#1565c0', dash: '5,3', width: 1.8,
        dotFill: () => '#1565c0' },
      { points: librePoints, color: '#2e7d32', width: 2.5,
        dotFill: v => v < libre_bas ? '#d32f2f' : v < libre_haut ? '#f57c00' : '#2e7d32' },
    ],
  });

  return `
  <div style="margin-bottom:var(--space-5)">
    <div style="font-size:var(--text-caption);text-transform:uppercase;letter-spacing:.4px;color:var(--color-ink-tertiary);font-weight:600;margin-bottom:var(--space-2)">Évolution SO₂</div>
    ${chart}
    ${_legend([
      { color:'#2e7d32', dot:'#2e7d32', width:2.5, label:'SO₂ libre (mg/L)' },
      { color:'#1565c0', dot:'#1565c0', width:1.8, dash:'5,3', label:'SO₂ total (mg/L)' },
      { color:'#d32f2f', width:1.5, dash:'4,3', label:`Seuil bas ${libre_bas} mg/L` },
      { color:'#43a047', width:1.5, dash:'4,3', label:`Seuil haut ${libre_haut} mg/L` },
    ])}
  </div>`;
}

function renderTavChart(sorted) {
  const pts = sorted.filter(a => a.tav != null).map(a => ({ date: a.date_analyse, val: a.tav }));
  if (!pts.length) return '';

  const chart = _buildLineChart({
    W: 600, H: 160, yLabel: '% vol',
    thresholds: [],
    series: [{ points: pts, color: '#7b1fa2', width: 2.5, dotFill: () => '#7b1fa2' }],
  });

  return `
  <div style="margin-bottom:var(--space-5)">
    <div style="font-size:var(--text-caption);text-transform:uppercase;letter-spacing:.4px;color:var(--color-ink-tertiary);font-weight:600;margin-bottom:var(--space-2)">Évolution TAV</div>
    ${chart}
    ${_legend([{ color:'#7b1fa2', dot:'#7b1fa2', width:2.5, label:'Titre alcoométrique (% vol)' }])}
  </div>`;
}

function renderAvChart(sorted) {
  const pts = sorted.filter(a => a.acidite_volatile != null).map(a => ({ date: a.date_analyse, val: a.acidite_volatile }));
  if (!pts.length) return '';

  const av_alert = _analyseThresholds.av_alert;
  const chart = _buildLineChart({
    W: 600, H: 160, yLabel: 'g/L',
    thresholds: [
      { value: av_alert, color: '#f57c00', label: String(av_alert) },
      { value: 1.0,      color: '#d32f2f', label: '1.0' },
    ],
    series: [{ points: pts, color: '#e65100', width: 2.5,
      dotFill: v => v > 1.0 ? '#d32f2f' : v > av_alert ? '#f57c00' : '#e65100' }],
  });

  return `
  <div style="margin-bottom:var(--space-5)">
    <div style="font-size:var(--text-caption);text-transform:uppercase;letter-spacing:.4px;color:var(--color-ink-tertiary);font-weight:600;margin-bottom:var(--space-2)">Acidité volatile</div>
    ${chart}
    ${_legend([
      { color:'#e65100', dot:'#e65100', width:2.5, label:'Acidité volatile (g/L)' },
      { color:'#f57c00', width:1.5, dash:'4,3', label:`Seuil alerte ${av_alert} g/L` },
      { color:'#d32f2f', width:1.5, dash:'4,3', label:'Limite 1.0 g/L' },
    ])}
  </div>`;
}

async function saveAnalyse() {
  if (!currentLot) return;
  const btn = document.getElementById('an-save-btn');
  btn.disabled = true; btn.textContent = '…';

  const num = id => {
    const v = document.getElementById(id)?.value;
    return v === '' || v == null ? null : Number(v);
  };

  const payload = {
    lot_id:           currentLot.id,
    date_analyse:     document.getElementById('an-date').value,
    contenant_id:     document.getElementById('an-contenant').value || null,
    operateur:        document.getElementById('an-operateur').value.trim() || null,
    so2_libre:        num('an-so2l'),
    so2_total:        num('an-so2t'),
    so2_actif:        num('an-so2a'),
    ph:               num('an-ph'),
    ta:               num('an-ta'),
    acidite_volatile: num('an-av'),
    tav:              num('an-tav'),
    sucres_residuels: num('an-sr'),
    densite:          num('an-densite'),
    acide_malique:    num('an-malique'),
    acide_lactique:   num('an-lactique'),
    co2:              num('an-co2'),
    turbidite:        num('an-turbidite'),
    gf_neg5:          num('an-gfn5'),
    gf_pos5:          num('an-gfp5'),
    notes:            document.getElementById('an-notes').value.trim() || null,
  };

  if (!payload.date_analyse) {
    toast('La date est obligatoire', 'error');
    btn.disabled = false; btn.textContent = '💾 Enregistrer';
    return;
  }

  try {
    await WB3DB.insertRow('analyses', payload);
    toast('Analyse enregistrée ✓', 'success');
    closeAnalyseModal();
    await loadAndRender(currentLot.id);
  } catch(e) {
    toast('Erreur : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error');
    btn.disabled = false; btn.textContent = '💾 Enregistrer';
  }
}

function renderAnalysesTable(reversed) {
  const ALL_COLS = [
    { k:'so2_libre',        h:'SO₂L',    u:'mg/L',    d:1, alertFn: v => v < _analyseThresholds.libre_bas ? '#d32f2f' : v < _analyseThresholds.libre_haut ? '#f57c00' : null },
    { k:'so2_total',        h:'SO₂T',    u:'mg/L',    d:1, alertFn: null },
    { k:'so2_actif',        h:'SO₂Act.', u:'mg/L',    d:1, alertFn: null },
    { k:'ph',               h:'pH',      u:'',        d:2, alertFn: v => {
        const mn = _analyseThresholds.ph_min, mx = _analyseThresholds.ph_max;
        return (mn != null && v < mn) || (mx != null && v > mx) ? '#d32f2f' : null; } },
    { k:'ta',               h:'AT',      u:'g/L',     d:2, alertFn: null },
    { k:'acidite_volatile', h:'AV',      u:'g/L',     d:2, alertFn: v => v > 1.2 ? '#d32f2f' : v > _analyseThresholds.av_alert ? '#f57c00' : null },
    { k:'tav',              h:'TAV',     u:'%vol',    d:2, alertFn: v => {
        const mn = _analyseThresholds.tav_min, mx = _analyseThresholds.tav_max;
        return (mn != null && v < mn) || (mx != null && v > mx) ? '#d32f2f' : null; } },
    { k:'sucres_residuels', h:'SR',      u:'g/L',     d:1, alertFn: null },
    { k:'densite',          h:'Dens.',   u:'',        d:4, alertFn: null },
    { k:'temperature',      h:'T°',      u:'°C',      d:1, alertFn: v => (_analyseThresholds.temp_max != null && v > _analyseThresholds.temp_max) ? '#d32f2f' : null },
    { k:'acide_malique',    h:'A.Mal.',  u:'g/L',     d:2, alertFn: null },
    { k:'acide_lactique',   h:'A.Lac.',  u:'g/L',     d:2, alertFn: null },
    { k:'gf_neg5',          h:'GF-5°',  u:'°C',      d:1, alertFn: null },
    { k:'gf_pos5',          h:'GF+5°',  u:'°C',      d:1, alertFn: null },
    { k:'co2',              h:'CO₂',    u:'g/L',     d:2, alertFn: null },
    { k:'turbidite',        h:'NTU',    u:'NTU',     d:1, alertFn: null },
  ];
  const activeCols = ALL_COLS.filter(c => reversed.some(a => a[c.k] != null));
  if (!activeCols.length || !reversed.length) return '';

  const thS = 'text-align:right;padding:5px 8px;font-size:9px;text-transform:uppercase;letter-spacing:.4px;color:#6d6d6d;font-weight:600;border-bottom:1px solid var(--color-border);white-space:nowrap';
  const headers = `<th style="text-align:left;padding:5px 8px;font-size:9px;text-transform:uppercase;letter-spacing:.4px;color:#6d6d6d;font-weight:600;border-bottom:1px solid var(--color-border);white-space:nowrap">Date</th>`
    + activeCols.map(c => `<th style="${thS}">${c.h}${c.u?`<br><span style="font-weight:400;opacity:.6">${c.u}</span>`:''}</th>`).join('');

  const rows = reversed.map(a => {
    const contNom = a.contenants?.nom ? `<div style="font-size:9px;color:#aaa;margin-top:1px">🛢 ${escapeHtml(a.contenants.nom)}</div>` : '';
    const dateTd = `<td style="white-space:nowrap;font-size:var(--text-caption);color:var(--color-ink-tertiary);padding:6px 8px">${fmtDate(a.date_analyse)}${contNom}</td>`;
    const valTds = activeCols.map(c => {
      const v = a[c.k];
      const col = (c.alertFn && v != null) ? (c.alertFn(v) || '') : '';
      const style = col ? `color:${col};font-weight:600` : '';
      return `<td style="text-align:right;padding:6px 8px;font-size:var(--text-callout);${style}">${v != null ? Number(v).toFixed(c.d) : '<span style="color:#ccc">—</span>'}</td>`;
    }).join('');
    return `<tr style="border-bottom:1px solid var(--color-border)">${dateTd}${valTds}</tr>`;
  }).join('');

  return `
  <div style="overflow-x:auto;margin-top:var(--space-3)">
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="background:var(--color-bg-subtle)">${headers}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}
</script>

<!-- ── Modal Nouvelle analyse ── -->
<div class="an-backdrop" id="analyse-modal" onclick="if(event.target===this)closeAnalyseModal()">
  <div class="an-modal" role="dialog" aria-modal="true">
    <div class="an-modal-head">
      <span style="font-weight:700;font-size:var(--text-title-2)">📈 Nouvelle analyse</span>
      <button class="btn btn--secondary btn--sm" onclick="closeAnalyseModal()">✕</button>
    </div>
    <div class="an-modal-body" id="analyse-modal-body"></div>
    <div class="an-modal-foot">
      <button class="btn btn--secondary" onclick="closeAnalyseModal()">Annuler</button>
      <button class="btn btn--primary" id="an-save-btn" onclick="saveAnalyse()">💾 Enregistrer</button>
    </div>
  </div>
</div>

</body>
</html>

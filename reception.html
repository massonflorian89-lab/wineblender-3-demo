<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" type="image/png" sizes="32x32" href="img/icon-wineblender-32.png">
<link rel="shortcut icon" href="img/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="img/icon-wineblender-180.png">
<meta name="theme-color" content="#6a1b2a">
<title>Réception — VitiFlux</title>
<link rel="stylesheet" href="theme.css">
<script>(function(){var t=localStorage.getItem('wb3_theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<style>
  .cockpit { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:var(--space-3);
             margin-bottom:var(--space-4); }
  .kpi { background:var(--color-bg-elevated); border:1px solid var(--color-border);
         border-radius:var(--radius-lg); padding:var(--space-4); box-shadow:0 1px 4px rgba(0,0,0,.05); }
  .kpi .lbl { font-size:var(--text-caption); color:var(--color-ink-tertiary); text-transform:uppercase; letter-spacing:.04em; }
  .kpi .val { font-size:var(--text-display); font-weight:800; margin-top:4px; }
  .kpi .sub { font-size:var(--text-caption); color:var(--color-ink-tertiary); }
  .recep-card { background:var(--color-bg-elevated); border:1px solid var(--color-border);
                border-radius:var(--radius-lg); padding:var(--space-4); margin-bottom:var(--space-4); }
  .recep-card h3 { margin:0 0 var(--space-3); font-size:var(--text-callout); }
  table.recep { width:100%; border-collapse:collapse; font-size:var(--text-body-sm,14px); }
  table.recep th { text-align:left; color:var(--color-ink-tertiary); font-size:var(--text-caption); padding:6px 8px; }
  table.recep td { padding:6px 8px; border-top:1px solid var(--color-border); }
  .pill-jus { padding:2px 9px; border-radius:var(--radius-pill); font-size:var(--text-caption); font-weight:600; }
  .pill-egouttage { background:#e3f2fd; color:#1565c0; }
  .pill-presse    { background:#fce4ec; color:#ad1457; }
  .pill-autre     { background:var(--color-bg-subtle); color:var(--color-ink-secondary); }
  .statut-tag { padding:3px 10px; border-radius:var(--radius-pill); font-weight:700; font-size:var(--text-caption); }
  .statut-ouvert { background:#fff3e0; color:#e65100; }
  .statut-clos   { background:#e8f5e9; color:#2e7d32; }
</style>
</head>
<body>

<header class="wb-header">
  <div class="breadcrumb-flex">
    <a href="app.html" class="home"><img decoding="async" class="home-logo" src="img/icon-wineblender-192.png" alt="">VitiFlux</a>
    <span class="sep">/</span>
    <h1 style="font-size:var(--text-callout);font-weight:600;margin:0;color:#fff">🍇 Réception — bilan du jour</h1>
  </div>
  <div class="header-actions">
    <span class="tenant-pill" id="tenant-pill">—</span>
    <a class="btn btn--header" href="parametres.html" title="Paramètres">⚙️</a>
    <button class="btn btn--header" onclick="logout()">Déconnexion</button>
  </div>
</header>

<main class="wb-main">
  <div id="content">
    <div class="loading-state"><div class="spinner"></div>Chargement…</div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="lib/supabase.min.js"></script>
<script src="toast.js"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<script src="wb3-bus.js"></script>
<script src="wb3-init.js"></script>
<script src="auth.js"></script>
<script src="nav.js"></script>
<script src="wb3-help.js"></script>

<script>
'use strict';

let _cuves = [];          // contenants (cuves) du tenant
let _date  = new Date().toISOString().slice(0,10);
let _bilan = null;        // ligne v_bilan_reception_jour du jour
let _lignes = [];         // reception_jour_cuve du jour
let _candidats = [];      // cuves ayant reçu du jus ce jour (mig 091)
let _campRows = [];       // bilans de la campagne (pour export/courbe)
// Début de campagne par défaut : 1er août de l'année courante (vendange).
let _campFrom = (function(){ const y=new Date().getFullYear(); return `${y}-08-01`; })();

function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function fmt(n){ return n==null||isNaN(n)?'—':Number(n).toLocaleString('fr-FR',{maximumFractionDigits:1}); }
function fmtKg(n){ return Number(n||0).toLocaleString('fr-FR',{maximumFractionDigits:0}); }
function logout(){ WB3Auth.signOut().then(()=>WB3Nav.navigateTop('app.html')); }
function toast(a,b){ if(window.WB3Toast) return WB3Toast.legacy(a,b); }

// ── Init ──────────────────────────────────────────────────────────
(async function init(){
  if (typeof window.WB3DB === 'undefined' || typeof window.WB3Auth === 'undefined') {
    document.getElementById('content').innerHTML =
      '<div class="empty-state"><div class="icon">❌</div><div class="title">Modules WB3 non chargés</div></div>';
    return;
  }
  const ctx = await WB3AppBoot.requireReadyContext();
  if (!ctx) {
    document.getElementById('content').innerHTML =
      '<div class="empty-state"><div class="icon">⚠️</div><div class="title">Aucun tenant accessible</div></div>';
    return;
  }
  document.getElementById('tenant-pill').textContent = `🏢 ${ctx.tenant.nom} · ${ctx.tenant.role}`;

  // Garde module : migration 090 requise ET module « Réception » activé pour la
  // cave (sinon écran « module indisponible / désactivé »).
  if (WB3DB.ensureModule && !(await WB3DB.ensureModule('reception', 'content'))) return;

  renderShell();
  try { _cuves = await WB3DB.listTable('contenants', { select:'id,nom,type,capacite_hl', order:'nom', ascending:true }); }
  catch(e){ console.warn('[reception] cuves:', e); _cuves = []; }
  await loadDay();
})();

function renderShell(){
  document.getElementById('content').innerHTML = `
    <div class="recep-card" style="display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap">
      <label class="field-label" style="margin:0">📅 Jour de réception</label>
      <input type="date" id="r-date" class="input" style="max-width:180px" value="${_date}" max="${new Date().toISOString().slice(0,10)}" onchange="onDateChange(this.value)">
      <span id="r-statut"></span>
      <div style="flex:1"></div>
      <button class="btn btn--secondary btn--sm" id="r-toggle" onclick="toggleStatut()"></button>
    </div>

    <div class="cockpit" id="r-cockpit"></div>

    <div id="r-banner"></div>

    <div class="recep-card">
      <h3 data-help="<b>Rattacher</b> = dire au bilan du jour qu'une cuve contient le jus produit. La cuve existe déjà et peut être travaillée (collage…) <b>avant</b> d'être rattachée — tu peux le faire le soir ou le lendemain. C'est ça qui te donne le rendement du jour.">➕ Rattacher une cuve de jus</h3>
      <div class="field-row" style="align-items:flex-end;flex-wrap:wrap;gap:var(--space-2)">
        <div class="field"><label class="field-label">Cuve</label>
          <select class="select" id="r-cuve">${_cuveOptions()}</select></div>
        <div class="field"><label class="field-label" data-help="<b>Égouttage</b> = jus de goutte (avant pressurage, par gravité). <b>Presse</b> = jus extrait au pressoir. On les sépare pour comparer leurs rendements.">Type de jus</label>
          <select class="select" id="r-type">
            <option value="presse">Presse</option>
            <option value="egouttage">Égouttage</option>
            <option value="autre">Autre</option>
          </select></div>
        <div class="field" style="max-width:150px"><label class="field-label">Volume (hL)</label>
          <input type="number" class="input" id="r-vol" min="0" step="0.1" placeholder="120.0"></div>
        <button class="btn btn--secondary btn--sm" onclick="mesurerCuve()" data-help="Calcule le volume en hL à partir du <b>creux</b> mesuré (distance du haut de la cheminée à la surface du jus), via l'abaque de la cuve. La cuve doit être calibrée (Paramètres → Épalement).">📏 Mesurer</button>
        <button class="btn btn--primary btn--sm" onclick="rattacher()">Rattacher</button>
      </div>
      <div class="field-help">La cuve continue de vivre (collage, assemblage…) qu'elle soit rattachée ou non. Le rattachement ne sert qu'au bilan.</div>
    </div>

    <div class="recep-card">
      <h3>🧾 Cuves rattachées au <span id="r-day-label">${_date.split('-').reverse().join('/')}</span></h3>
      <div id="r-lignes"></div>
    </div>

    <div class="recep-card">
      <h3 style="display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap">
        📈 Campagne
        <span style="font-weight:400;font-size:var(--text-caption);color:var(--color-ink-tertiary)">depuis le</span>
        <input type="date" id="c-from" class="input" style="max-width:160px" value="${_campFrom}" onchange="loadCampagne()">
        <div style="flex:1"></div>
        <button class="btn btn--secondary btn--sm" onclick="exportCampagneCSV()">📥 Export CSV</button>
      </h3>
      <div id="r-campagne"><div class="loading-state"><div class="spinner"></div>Chargement…</div></div>
    </div>`;
}

function _cuveOptions(){
  return '<option value="">— Choisir une cuve —</option>' +
    _cuves.map(c => `<option value="${c.id}">${escapeHtml(c.nom)}${c.capacite_hl?` (${fmt(c.capacite_hl)} hL)`:''}</option>`).join('');
}

async function onDateChange(v){ _date = v; document.getElementById('r-day-label').textContent = v.split('-').reverse().join('/'); await loadDay(); }

async function loadDay(){
  try {
    const rows = await WB3DB.queryBilanReceptionJour({ from:_date, to:_date });
    _bilan = rows[0] || null;
    _lignes = _bilan ? await WB3DB.listReceptionCuves(_bilan.reception_jour_id) : [];
    _candidats = await WB3DB.receptionCandidats(_date);
  } catch(e){ console.error('[reception] loadDay:', e); toast('Erreur de chargement : '+(WB3DB.errMsg?WB3DB.errMsg(e):e.message),'error'); _bilan=null; _lignes=[]; _candidats=[]; }
  renderCockpit(); renderBanner(); renderLignes(); renderStatut();
  loadCampagne();
}

// Badge anti-oubli : cuves ayant reçu du jus aujourd'hui mais pas rattachées.
function renderBanner(){
  const host = document.getElementById('r-banner'); if (!host) return;
  const manquantes = (_candidats || []).filter(c => !c.rattachee && c.contenant_id);
  if (!manquantes.length){ host.innerHTML = ''; return; }
  host.innerHTML = `
    <div class="recep-card" style="border-color:#ffcc80;background:#fff8ef">
      <strong style="color:#e65100">⚠️ ${manquantes.length} cuve(s) ont reçu du jus aujourd'hui mais ne sont pas rattachées.</strong>
      <div style="margin-top:var(--space-2);display:flex;gap:var(--space-2);flex-wrap:wrap">
        ${manquantes.map(c => `<button class="btn btn--secondary btn--sm" onclick="prefill('${c.contenant_id}', ${Number(c.volume_entre_hl)||0})">
            ${escapeHtml(c.contenant_nom||'?')} · ${fmt(c.volume_entre_hl)} hL →</button>`).join('')}
      </div>
    </div>`;
}

// Pré-remplit le formulaire de rattachement depuis une cuve candidate.
function prefill(cuveId, vol){
  document.getElementById('r-cuve').value = cuveId;
  if (vol > 0){ const e=document.getElementById('r-vol'); e.value = Number(vol).toFixed(1); e.dataset.source='baremage'; }
  document.getElementById('r-vol').focus();
}

function renderStatut(){
  const statut = _bilan?.statut || 'ouvert';
  document.getElementById('r-statut').innerHTML = `<span class="statut-tag statut-${statut}">${statut==='clos'?'✅ Clôturé':'🟠 Ouvert'}</span>`;
  document.getElementById('r-toggle').textContent = statut==='clos' ? '↩︎ Rouvrir le bilan' : '✅ Clôturer le bilan';
}

function renderCockpit(){
  const b = _bilan || {};
  const obj = b.objectif_kg_hl != null ? Number(b.objectif_kg_hl) : null;
  const rdt = b.rendement_kg_hl != null ? Number(b.rendement_kg_hl) : null;
  const coef = b.coef_extraction_pct != null ? Number(b.coef_extraction_pct) : null;
  const coefGood = coef != null && coef >= 100;
  const rdtGood  = rdt != null && obj != null && rdt <= obj;
  document.getElementById('r-cockpit').innerHTML = `
    <div class="kpi"><div class="lbl">Raisin entré</div><div class="val">${fmtKg(b.poids_total_kg)}</div><div class="sub">kg (apports du jour)</div></div>
    <div class="kpi"><div class="lbl">Jus rattaché</div><div class="val">${fmt(b.volume_total_hl)}</div>
      <div class="sub">hL · ${fmt(b.volume_egouttage_hl)} égouttage / ${fmt(b.volume_presse_hl)} presse</div></div>
    <div class="kpi"><div class="lbl">Rendement</div><div class="val" style="color:${rdt==null?'':(rdtGood?'#15803d':'#b91c1c')}">${rdt!=null?fmt(rdt):'—'}</div>
      <div class="sub">kg/hL ${obj!=null?`· objectif ${fmt(obj)}`:''}</div></div>
    <div class="kpi" data-help="<b>Coefficient d'extraction</b> : volume de jus obtenu rapporté au volume théorique attendu (poids ÷ objectif). <b>100 %</b> = pile la cible. Au-dessus = tu as extrait plus de jus que prévu ; en dessous = moins.">
      <div class="lbl">Extraction</div><div class="val" style="color:${coef==null?'':(coefGood?'#15803d':'#b91c1c')}">${coef!=null?fmt(coef)+' %':'—'}</div>
      <div class="sub">vs objectif (100 % = cible)</div></div>
    <div class="kpi"><div class="lbl">Cuves rattachées</div><div class="val">${b.nb_cuves_rattachees||0}</div>
      <div class="sub">${b.part_egouttage_pct!=null?fmt(b.part_egouttage_pct)+' % égouttage':'—'}</div></div>`;
}

function renderLignes(){
  const host = document.getElementById('r-lignes');
  if (!_lignes.length){ host.innerHTML = '<div class="tr-empty" style="color:var(--color-ink-tertiary);padding:var(--space-2)">Aucune cuve rattachée à ce jour. Rattache une cuve de jus ci-dessus (le soir ou le lendemain en cas de rush).</div>'; return; }
  host.innerHTML = `<table class="recep">
    <thead><tr><th>Cuve</th><th>Type</th><th style="text-align:right">Volume</th><th>Mesure</th><th></th></tr></thead>
    <tbody>${_lignes.map(l => {
      const nom = l.contenants?.nom || l.contenant_nom_snap || '?';
      return `<tr>
        <td><strong>${escapeHtml(nom)}</strong></td>
        <td><span class="pill-jus pill-${l.type_jus}">${l.type_jus}</span></td>
        <td style="text-align:right"><strong>${fmt(l.volume_hl)}</strong> hL</td>
        <td style="color:var(--color-ink-tertiary);font-size:var(--text-caption)">${l.source_mesure||'—'}</td>
        <td style="text-align:right"><button class="btn btn--ghost btn--sm" onclick="detacher('${l.id}')" title="Détacher">✕</button></td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

// ── Actions ───────────────────────────────────────────────────────
async function mesurerCuve(){
  const cuveId = document.getElementById('r-cuve').value;
  if (!cuveId){ toast('Choisis d\'abord une cuve','error'); return; }
  const mesure = prompt('Mesure du creux (cm, du haut de la cheminée à la surface du jus) :');
  if (mesure == null) return;
  const cm = parseFloat(String(mesure).replace(',','.'));
  if (isNaN(cm)){ toast('Mesure invalide','error'); return; }
  try {
    const hl = await WB3DB.volumeFromMesure(cuveId, cm, 'creux');
    if (hl == null){ toast('Pas d\'abaque pour cette cuve — saisis le volume à la main','warning'); return; }
    document.getElementById('r-vol').value = Number(hl).toFixed(1);
    document.getElementById('r-vol').dataset.source = 'baremage';
    toast(`Volume mesuré : ${fmt(hl)} hL`,'success');
  } catch(e){ toast('Mesure impossible : '+(WB3DB.errMsg?WB3DB.errMsg(e):e.message),'error'); }
}

async function rattacher(){
  const cuveId = document.getElementById('r-cuve').value;
  const type   = document.getElementById('r-type').value;
  const volEl  = document.getElementById('r-vol');
  const vol    = parseFloat(volEl.value);
  if (!cuveId){ toast('Choisis une cuve','error'); return; }
  if (isNaN(vol) || vol <= 0){ toast('Volume invalide','error'); return; }
  const source = volEl.dataset.source === 'baremage' ? 'baremage' : 'manuel';
  try {
    await WB3DB.receptionRattacher(_date, cuveId, type, vol, { source });
    volEl.value = ''; delete volEl.dataset.source;
    document.getElementById('r-cuve').value = '';
    toast('Cuve rattachée','success');
    await loadDay();
  } catch(e){ toast('Rattachement impossible : '+(WB3DB.errMsg?WB3DB.errMsg(e):e.message),'error'); }
}

async function detacher(ligneId){
  if (!(await WB3UI.confirm('Détacher cette cuve du bilan du jour ?\n(La cuve et son jus ne sont pas affectés.)', { title:'Détacher', okText:'Détacher', danger:true }))) return;
  try { await WB3DB.receptionDetacher(ligneId); toast('Cuve détachée','success'); await loadDay(); }
  catch(e){ toast('Erreur : '+(WB3DB.errMsg?WB3DB.errMsg(e):e.message),'error'); }
}

async function toggleStatut(){
  const next = (_bilan?.statut === 'clos') ? 'ouvert' : 'clos';
  try { await WB3DB.receptionSetStatut(_date, next); toast(next==='clos'?'Bilan clôturé':'Bilan rouvert','success'); await loadDay(); }
  catch(e){ toast('Erreur : '+(WB3DB.errMsg?WB3DB.errMsg(e):e.message),'error'); }
}

// ── Campagne (Lot 3) ──────────────────────────────────────────────
async function loadCampagne(){
  _campFrom = document.getElementById('c-from')?.value || _campFrom;
  const host = document.getElementById('r-campagne'); if (!host) return;
  try {
    _campRows = await WB3DB.queryBilanReceptionJour({ from:_campFrom, to:new Date().toISOString().slice(0,10) });
  } catch(e){ host.innerHTML = `<div class="tr-empty">Erreur : ${escapeHtml(WB3DB.errMsg?WB3DB.errMsg(e):e.message)}</div>`; return; }
  renderCampagne();
}

function renderCampagne(){
  const host = document.getElementById('r-campagne');
  const rows = (_campRows||[]).filter(r => Number(r.volume_total_hl) > 0);
  if (!rows.length){ host.innerHTML = '<div class="tr-empty" style="color:var(--color-ink-tertiary)">Aucun jus rattaché sur la période.</div>'; return; }
  // Cumuls
  const kg = rows.reduce((s,r)=>s+(Number(r.poids_total_kg)||0),0);
  const eg = rows.reduce((s,r)=>s+(Number(r.volume_egouttage_hl)||0),0);
  const pr = rows.reduce((s,r)=>s+(Number(r.volume_presse_hl)||0),0);
  const vol = eg + pr;
  const rdt = vol>0 ? kg/vol : null;
  const obj = rows.map(r=>Number(r.objectif_kg_hl)).filter(x=>x>0);
  const objMoy = obj.length ? obj.reduce((a,b)=>a+b,0)/obj.length : null;
  const coef = (vol>0 && objMoy) ? (vol*objMoy/kg*100) : null;
  const coefGood = coef!=null && coef>=100;

  // Sparkline rendement (chronologique)
  const chrono = [...rows].reverse(); // rows sont desc → asc
  const series = chrono.map(r => r.rendement_kg_hl!=null ? Number(r.rendement_kg_hl) : null).filter(x=>x!=null);
  const spark = _sparkline(series, objMoy);

  host.innerHTML = `
    <div class="cockpit">
      <div class="kpi"><div class="lbl">Raisin cumulé</div><div class="val">${fmtKg(kg)}</div><div class="sub">kg</div></div>
      <div class="kpi"><div class="lbl">Jus cumulé</div><div class="val">${fmt(vol)}</div><div class="sub">hL · ${fmt(eg)} égout. / ${fmt(pr)} presse</div></div>
      <div class="kpi"><div class="lbl">Rendement moyen</div><div class="val">${rdt!=null?fmt(rdt):'—'}</div><div class="sub">kg/hL ${objMoy?`· obj. ${fmt(objMoy)}`:''}</div></div>
      <div class="kpi"><div class="lbl">Extraction</div><div class="val" style="color:${coef==null?'':(coefGood?'#15803d':'#b91c1c')}">${coef!=null?fmt(coef)+' %':'—'}</div><div class="sub">moyenne campagne</div></div>
      <div class="kpi"><div class="lbl">Jours</div><div class="val">${rows.length}</div><div class="sub">de réception</div></div>
    </div>
    ${series.length>1 ? `<div style="margin:var(--space-2) 0"><div class="lbl" style="font-size:var(--text-caption);color:var(--color-ink-tertiary)">Rendement jour par jour (kg/hL)</div>${spark}</div>` : ''}
    <table class="recep" style="margin-top:var(--space-2)">
      <thead><tr><th>Jour</th><th style="text-align:right">Raisin (kg)</th><th style="text-align:right">Jus (hL)</th>
        <th style="text-align:right">Égout./Presse</th><th style="text-align:right">Rdt</th><th style="text-align:right">Extraction</th><th>Statut</th></tr></thead>
      <tbody>${rows.map(r => {
        const c = r.coef_extraction_pct!=null?Number(r.coef_extraction_pct):null;
        return `<tr>
          <td>${r.date_reception.split('-').reverse().join('/')}</td>
          <td style="text-align:right">${fmtKg(r.poids_total_kg)}</td>
          <td style="text-align:right">${fmt(r.volume_total_hl)}</td>
          <td style="text-align:right;color:var(--color-ink-tertiary)">${fmt(r.volume_egouttage_hl)} / ${fmt(r.volume_presse_hl)}</td>
          <td style="text-align:right;font-weight:600">${r.rendement_kg_hl!=null?fmt(r.rendement_kg_hl):'—'}</td>
          <td style="text-align:right;font-weight:600;color:${c==null?'':(c>=100?'#15803d':'#b91c1c')}">${c!=null?fmt(c)+' %':'—'}</td>
          <td><span class="statut-tag statut-${r.statut}">${r.statut==='clos'?'clos':'ouvert'}</span></td>
        </tr>`;}).join('')}</tbody>
    </table>`;
}

// Mini-courbe SVG (sans dépendance). data = nombres ; ref = ligne objectif.
function _sparkline(data, ref){
  if (!data || data.length < 2) return '';
  const W=560, H=70, P=6;
  const min = Math.min(...data, ref||Infinity), max = Math.max(...data, ref||-Infinity);
  const span = (max-min)||1;
  const x = i => P + i*(W-2*P)/(data.length-1);
  const y = v => H-P - (v-min)/span*(H-2*P);
  const pts = data.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const refLine = (ref!=null) ? `<line x1="${P}" y1="${y(ref).toFixed(1)}" x2="${W-P}" y2="${y(ref).toFixed(1)}" stroke="#b91c1c" stroke-dasharray="4 3" stroke-width="1"/>` : '';
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;height:auto;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-bg-subtle)">
    ${refLine}<polyline points="${pts}" fill="none" stroke="#6a1b2a" stroke-width="2"/>
    ${data.map((v,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="2.5" fill="#6a1b2a"/>`).join('')}</svg>`;
}

function exportCampagneCSV(){
  const rows = (_campRows||[]).filter(r => Number(r.volume_total_hl) > 0);
  if (!rows.length){ toast('Rien à exporter sur la période','error'); return; }
  const head = ['Jour','Raisin_kg','Jus_total_hL','Egouttage_hL','Presse_hL','Rendement_kg_hl','Objectif_kg_hl','Extraction_pct','Statut'];
  const lines = rows.map(r => [r.date_reception, r.poids_total_kg, r.volume_total_hl, r.volume_egouttage_hl,
    r.volume_presse_hl, r.rendement_kg_hl, r.objectif_kg_hl, r.coef_extraction_pct, r.statut]);
  const csv = [head, ...lines].map(row => row.map(v => `"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob(['﻿'+csv], { type:'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `bilan_reception_${_campFrom}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
}
</script>

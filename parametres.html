<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" type="image/png" sizes="32x32" href="img/icon-wineblender-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="img/icon-wineblender-16.png">

<link rel="apple-touch-icon" sizes="180x180" href="img/icon-wineblender-180.png">

<script>(function(){var t=localStorage.getItem('wb3_theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<style>
  /* .header-actions, .breadcrumb-flex, .tenant-pill → theme.css (composants partagés) */
  .settings-footer-credit {
    text-align: center;
    color: var(--color-ink-tertiary);
    font-size: 11px;
    letter-spacing: .4px;
    padding: var(--space-4) 0 var(--space-2);
  }
  .add-form {
    display: flex;
    gap: var(--space-2);
    margin-bottom: var(--space-4);
  }
  .add-form input { flex: 1; }
  .coming-soon {
    background: var(--color-bg-subtle);
    border: 2px dashed var(--color-border);
    border-radius: var(--radius-md);
    padding: var(--space-5);
    text-align: center;
    color: var(--color-ink-tertiary);
  }
  .coming-soon .icon { font-size: 32px; margin-bottom: var(--space-2); }
  /* ===== Drag-and-drop travées ===== */
  .list-item.dragging { opacity:.35; }
  .list-item.drag-over { border-color:var(--color-primary) !important; background:var(--color-primary-soft) !important; }
  /* ===== Sous-onglets cuverie ===== */
  .subtab-bar {
    display: flex;
    gap: var(--space-1);
    padding-bottom: var(--space-3);
    border-bottom: 1px solid var(--color-border);
    margin-bottom: var(--space-4);
    flex-wrap: wrap;
  }
  .subtab-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 6px 15px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--color-border);
    background: var(--color-bg-elevated);
    color: var(--color-ink-secondary);
    font-size: var(--text-callout);
    font-weight: 500;
    cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
  }
  .subtab-btn .subtab-ic { display: inline-flex; align-items: center; justify-content: center; width: 17px; height: 17px; flex-shrink: 0; }
  .subtab-btn .subtab-ic svg { width: 16px; height: 16px; display: block; }
  .subtab-btn:hover { background: var(--color-bg-subtle); color: var(--color-ink); }
  .subtab-btn.active {
    background: var(--color-primary);
    color: #fff;
    border-color: var(--color-primary);
  }
  /* ===== Icônes du menu latéral Paramètres (SVG cohérentes) ===== */
  .settings-nav-item .snav-ic {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; flex-shrink: 0;
  }
  .settings-nav-item .snav-ic svg { width: 17px; height: 17px; display: block; }
  /* ===== Détail dépliable épalement (données brutes + calcul) ===== */
  .ep-detail-toggle {
    background:none; border:1px solid var(--color-border); border-radius:6px; cursor:pointer;
    width:22px; height:22px; color:var(--color-ink-tertiary); line-height:1; font-size:12px;
    transition: transform var(--duration-fast) var(--ease-soft), background var(--duration-fast), color var(--duration-fast), border-color var(--duration-fast);
  }
  .ep-detail-toggle:hover { background:var(--color-bg-subtle); color:var(--color-ink); }
  .ep-detail-toggle.open { transform:rotate(90deg); color:var(--color-primary); border-color:var(--color-primary); }
  .ep-detail-row > td { background:var(--color-bg-subtle); padding:0 12px; }
  .ep-detail-box { padding:12px 4px; animation: fade-in var(--duration-base) var(--ease-soft) both; }
  .ep-det-grid { display:flex; gap:22px; flex-wrap:wrap; }
  .ep-det-col { min-width:180px; }
  .ep-det-h { font-size:var(--text-caption); font-weight:700; color:var(--color-ink-secondary); margin-bottom:6px; }
  .ep-raw { border-collapse:collapse; font-size:var(--text-caption); }
  .ep-raw td { padding:2px 12px 2px 0; }
  .ep-raw td:first-child { color:var(--color-ink-tertiary); }
  .ep-raw td:last-child { font-weight:600; font-variant-numeric:tabular-nums; }
  .ep-points { max-height:170px; overflow:auto; border:1px solid var(--color-border); border-radius:6px; min-width:150px; }
  .ep-points > div { display:flex; justify-content:space-between; gap:14px; padding:3px 9px; font-size:var(--text-caption); border-bottom:1px solid var(--color-border); }
  .ep-points > div:last-child { border-bottom:none; }
  .ep-points span { color:var(--color-ink-tertiary); }
  .ep-det-formula { font-size:var(--text-caption); color:var(--color-ink-secondary); line-height:1.6; }
  .ep-calc { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .ep-calc input, .ep-calc select { padding:5px 7px; border:1px solid var(--color-border); border-radius:6px; font:inherit; background:var(--color-bg); color:var(--color-ink); }
  /* ===== Sélecteur de thème ===== */
  .theme-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: var(--space-3);
  }
  .theme-card {
    position: relative;
    display: flex; flex-direction: column; align-items: flex-start;
    gap: 7px; padding:var(--space-3);
    border: 2px solid var(--color-border);
    border-radius: var(--radius-md);
    background: var(--color-bg-elevated);
    cursor: pointer; text-align: left; font-family: inherit;
    transition: border-color .15s, box-shadow .15s;
  }
  .theme-card:hover { border-color: var(--color-primary); }
  .theme-card--active {
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--color-primary) 20%, transparent);
  }
  .theme-swatch {
    display: flex; border-radius: 6px; overflow: hidden;
    width: 100%; height: 28px;
  }
  .theme-swatch-primary { flex: 3; }
  .theme-swatch-accent  { flex: 1; }
  .theme-label { font-weight: 600; font-size: var(--text-callout); color: var(--color-ink); }
  .theme-desc  { font-size:var(--text-caption); color: var(--color-ink-tertiary); line-height: 1.3; }
  .theme-check {
    position: absolute; top: 7px; right: 7px;
    background: var(--color-primary); color: #fff;
    border-radius: 50%; width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size:var(--text-caption); font-weight: 700;
  }
  /* ===== Sélecteur de mode (Clair / Sombre / Auto) ===== */
  .mode-toggle { display:flex; gap:var(--space-2); flex-wrap:wrap; }
  .mode-btn {
    flex:1; min-width:120px;
    display:flex; align-items:center; justify-content:center; gap:6px;
    padding:10px var(--space-3);
    border:2px solid var(--color-border); border-radius:var(--radius-md);
    background:var(--color-bg-elevated); color:var(--color-ink);
    font-family:inherit; font-size:var(--text-callout); font-weight:600;
    cursor:pointer; transition:border-color .15s, background .15s;
  }
  .mode-btn:hover { border-color:var(--color-primary); }
  .mode-btn.is-active {
    border-color:var(--color-primary);
    background:color-mix(in srgb, var(--color-primary) 12%, var(--color-bg-elevated));
    box-shadow:0 0 0 3px color-mix(in srgb, var(--color-primary) 20%, transparent);
  }

  /* Import CSV apports (dans section paramètres) */
  .mapping-row { display:flex; align-items:center; gap:var(--space-2); margin-bottom:var(--space-2); }
  .mapping-row label { width:130px; flex-shrink:0; font-size:var(--text-caption); font-weight:500; }
  .mapping-row select { flex:1; }
  .import-preview { font-size:var(--text-caption); overflow-x:auto; margin-top:var(--space-3); }
  .import-preview table { border-collapse:collapse; min-width:100%; }
  .import-preview th,
  .import-preview td { border:1px solid var(--color-border); padding:3px 7px; white-space:nowrap; }
  .import-preview th  { background:var(--color-bg-subtle); }
</style>
</head>

<main class="wb-main">

  <div class="settings-layout">

    <!-- Sidebar nav -->
    <nav class="settings-nav" id="settings-nav">

      <button class="settings-nav-item" data-section="apports_vue">🍇 Apports</button>

<!-- SDK Supabase + couches WB3 -->

<script src="config.js"></script>
<script src="db.js"></script>
<script src="wb3-bus.js"></script>
<script src="wb3-freshness.js"></script>

<script>
'use strict';

const CUVE_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="1em" height="1em" style="vertical-align:-.15em" aria-hidden="true"><rect x="3" y="3" width="14" height="13" rx="1.2" fill="#ccd8e4" stroke="#7a96b0" stroke-width="1.3"/><ellipse cx="10" cy="3" rx="7" ry="2.2" fill="#e0eaf4" stroke="#7a96b0" stroke-width="1.3"/><ellipse cx="10" cy="16" rx="7" ry="2.2" fill="#b8cad8" stroke="#7a96b0" stroke-width="1.3"/><line x1="3" y1="8.5" x2="17" y2="8.5" stroke="#7a96b0" stroke-width="0.7"/><line x1="3" y1="12.5" x2="17" y2="12.5" stroke="#7a96b0" stroke-width="0.7"/><line x1="14" y1="17.5" x2="14" y2="20" stroke="#7a96b0" stroke-width="1.6"/></svg>`;

// ============================================================
// État local
// ============================================================
let activeSection       = 'profil';
let activeCuverieSubtab = 'travees';
let activeLotSubtab     = 'champs';
let activeInventaireSubtab = 'cuve';
let _isAdmin            = false;   // rôle admin du tenant courant (gate onglet Audit)
let travees    = [];
let contenants = [];
let editingTraveeId     = null;
let editingContenantId  = null;

// ============================================================
// Toast
// ============================================================
function toast(a, b){ if (window.WB3Toast) return WB3Toast.legacy(a, b); }

async function logout() {
  await WB3Auth.signOut();
  WB3Nav.navigateTop('app.html');
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

// ============================================================
// Init
// ============================================================
(async function init() {
  if (typeof window.supabase === 'undefined' || !window.supabase.createClient) {
    document.getElementById('settings-content').innerHTML =
      `<div class="empty-state"><div class="icon">❌</div><div class="title">SDK Supabase non chargé</div></div>`;
    return;
  }

  try { await WB3Auth.restoreSession(); }
  catch(e) { console.error(e); }

  if (!WB3DB.getCurrentUser()) {
    document.getElementById('settings-content').innerHTML = `
      <div class="empty-state">
        <div class="icon">🔐</div>
        <div class="title">Session expirée</div>
        <div class="desc">Reconnecte-toi pour accéder aux paramètres.</div>
        <div class="actions"><a href="app.html" class="btn">Aller à la connexion</a></div>
      </div>`;
    return;
  }

  const tenant = await WB3Bootstrap.waitTenant(8000);
  if (!tenant) {
    document.getElementById('settings-content').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div><div class="title">Aucun tenant accessible</div></div>`;
    return;
  }
  document.getElementById('tenant-pill').textContent = `🏢 ${tenant.nom} · ${tenant.role}`;

  // Onglets Audit + Utilisateurs : admin uniquement (données/actions sensibles)
  _isAdmin = (tenant.role === 'admin');
  if (!_isAdmin) {
    ['audit', 'utilisateurs'].forEach(sec => {
      const b = document.querySelector(`#settings-nav [data-section="${sec}"]`);
      if (b) b.remove();
    });
  }
  // Corbeille (suppressions définitives) : privilégiés uniquement (PERMISSIONS.md).
  if (WB3DB.can && !WB3DB.can('corbeille.access')) {
    const cb = document.querySelector('#settings-nav [data-section="corbeille"]');
    if (cb) cb.remove();
  }
  // Onglet Modules : créateur de l'application (super-admin plateforme) uniquement.
  try {
    if (WB3DB.isPlatformAdmin && await WB3DB.isPlatformAdmin()) {
      const nm = document.getElementById('nav-modules'); if (nm) nm.style.display = '';
    } else {
      const nm = document.getElementById('nav-modules'); if (nm) nm.remove();
    }
  } catch (_) { const nm = document.getElementById('nav-modules'); if (nm) nm.remove(); }

  // Setup nav
  document.querySelectorAll('#settings-nav .settings-nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#settings-nav .settings-nav-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeSection = btn.dataset.section;
      renderSection();
    });
  });
  _decorateSettingsNav();   // icônes SVG cohérentes (WB3Icons)

  // Lire la section demandée via ?section=analyses (ou autre)
  // "contenants" est maintenant un sous-onglet de cuverie_group
  // Sous-onglets de cuverie_group accessibles par deep-link (?section=epalement)
  const _cuverieSubtabSections = { contenants: 'contenants', epalement: 'epalement' };
  const urlSection = new URLSearchParams(window.location.search).get('section');
  if (urlSection) {
    const mappedSection = _cuverieSubtabSections[urlSection] ? 'cuverie_group' : urlSection;
    const navBtn = document.querySelector(`[data-section="${mappedSection}"]`);
    if (navBtn) {
      document.querySelectorAll('#settings-nav .settings-nav-item').forEach(b => b.classList.remove('active'));
      navBtn.classList.add('active');
      activeSection = mappedSection;
      if (_cuverieSubtabSections[urlSection]) activeCuverieSubtab = _cuverieSubtabSections[urlSection];
    }
  }

  // Charger le thème depuis Supabase et l'appliquer (écrase le localStorage si différent)
  try {
    const pref = await WB3DB.getUserPref('apparence');
    if (pref && typeof pref.theme !== 'undefined') {
      const key = pref.theme || '';
      if (key) {
        document.documentElement.setAttribute('data-theme', key);
        localStorage.setItem('wb3_theme', key);
      } else {
        document.documentElement.removeAttribute('data-theme');
        localStorage.removeItem('wb3_theme');
      }
      try { window.parent?.WB3Shell?.setTheme?.(key); } catch(e) {}
    }
  } catch(e) { /* fallback localStorage déjà appliqué en head */ }

  await loadTravees();
  subscribeRealtime();
  renderSection();
})();

// ============================================================
// Realtime
// ============================================================
function subscribeRealtime() {
  WB3DB.subscribeTable('contenants', (payload) => {
    if (payload.eventType === 'INSERT') {
      contenants.push(payload.new);
    } else if (payload.eventType === 'UPDATE') {
      const i = contenants.findIndex(c => c.id === payload.new.id);
      if (i >= 0) contenants[i] = payload.new;
    } else if (payload.eventType === 'DELETE') {
      contenants = contenants.filter(c => c.id !== payload.old.id);
    }
    if (activeSection === 'cuverie_group' && activeCuverieSubtab === 'contenants') _renderContenantsUI();
  });

  WB3DB.subscribeTable('travees', (payload) => {
    if (payload.eventType === 'INSERT') {
      travees.push(payload.new);
    } else if (payload.eventType === 'UPDATE') {
      const i = travees.findIndex(t => t.id === payload.new.id);
      if (i >= 0) travees[i] = payload.new;
    } else if (payload.eventType === 'DELETE') {
      travees = travees.filter(t => t.id !== payload.old.id);
    }
    sortTravees();
    if (activeSection === 'cuverie_group' && activeCuverieSubtab === 'travees') renderTravees();
  });
}

function sortTravees() {
  travees.sort((a, b) => (a.ordre - b.ordre) || a.nom.localeCompare(b.nom, 'fr'));
}

// ============================================================
// Chargement données
// ============================================================
async function loadTravees() {
  try {
    travees = await WB3DB.listTable('travees', { order: 'ordre' });
    sortTravees();
  } catch(e) {
    console.error('[WB3 paramètres] erreur loadTravees:', e);
    travees = [];
  }
}

// ============================================================
// Rendu : section active
// ============================================================
function renderSection() {
  if      (activeSection === 'cuverie_group')   renderCuverieGroup();
  else if (activeSection === 'apports_vue')     renderApportsVueSettings();
  else if (activeSection === 'lots_vin')        renderLotsVinGroup();
  else if (activeSection === 'operations_vue')  renderOperationsVueSettings();
  else if (activeSection === 'produits')        renderProduitsGroup();
  else if (activeSection === 'inventaire')       renderInventaireGroup();
  else if (activeSection === 'analyses')        renderAnalysesSection();
  else if (activeSection === 'qualite')         renderQualiteSection();
  else if (activeSection === 'echantillons')    renderEchantillonsSettings();
  else if (activeSection === 'cepages')         renderCepagesSection();
  else if (activeSection === 'profil')          renderProfil();
  else if (activeSection === 'corbeille')       renderCorbeille();
  else if (activeSection === 'utilisateurs')    renderUsersSection();
  else if (activeSection === 'modules')         renderModulesSection();
  else if (activeSection === 'audit')           renderAudit();
  else if (activeSection === 'apparence')       renderApparenceSection();
}

// ============================================================
// Modules par cave — créateur de l'app (super-admin plateforme, mig 074)
//   Active/désactive les modules vendange optionnels par tenant.
// ============================================================
// Modules complémentaires (facturables). Apports = SOCLE (toujours actif, retiré d'ici).
const PLATFORM_MODULES = [
  { key: 'reception',   label: '🧺 Réception coopérative', mig: '090/091' },
  { key: 'epalement',   label: '⚖️ Épalement (barémage)',  mig: '060/061' },
  { key: 'assemblage',  label: '🧪 Assemblage / essais',   mig: '063' },
  { key: 'echantillon', label: '🍾 Échantillons clients',  mig: '093' },
  { key: 'planning',    label: '🗓️ Planning / fiches',     mig: '064/070' },
  { key: 'inventaire',  label: '📦 Inventaire',            mig: '066' },
  { key: 'plan_cave',   label: '🗺 Plan de cave & mur',    mig: '092' },
];

async function renderModulesSection() {
  const root = document.getElementById('settings-content');
  if (!WB3DB.isPlatformAdmin || !(await WB3DB.isPlatformAdmin())) {
    root.innerHTML = `<div class="empty-state"><div class="icon">🔒</div><div class="title">Réservé au créateur de l'application</div></div>`;
    return;
  }
  let tenants = [];
  try { tenants = await WB3DB.platformListTenants(); }
  catch (e) { root.innerHTML = `<p style="color:var(--color-danger)">${escapeHtml(WB3DB.errMsg ? WB3DB.errMsg(e) : (e.message || e))}</p>`; return; }

  const cur = WB3DB.getCurrentTenantId ? WB3DB.getCurrentTenantId() : null;
  root.innerHTML = `
    <div class="settings-section-head"><h2>🧩 Modules par cave</h2>
      <p class="muted">Active ou désactive les modules vendange optionnels, cave par cave. Les modules cœur (cuverie, apports, analyses, opérations) restent toujours actifs.</p></div>
    <div class="card" style="padding:var(--space-4)">
      <div class="field" style="max-width:420px">
        <label class="field-label">Cave (tenant)</label>
        <select class="select" id="pm-tenant" onchange="loadTenantModules()">
          ${tenants.map(t => `<option value="${t.id}"${t.id === cur ? ' selected' : ''}>${escapeHtml(t.nom)}${t.slug ? ' · ' + escapeHtml(t.slug) : ''}</option>`).join('')}
        </select>
      </div>
      <div id="pm-list" style="margin-top:var(--space-3)"><div class="loading-state"><div class="spinner"></div>Chargement…</div></div>
    </div>`;
  await loadTenantModules();
}

async function loadTenantModules() {
  const box = document.getElementById('pm-list');
  const tid = document.getElementById('pm-tenant')?.value;
  if (!box || !tid) return;
  let rows = [];
  try { rows = await WB3DB.platformListTenantModules(tid); }
  catch (e) { box.innerHTML = `<p style="color:var(--color-danger)">${escapeHtml(WB3DB.errMsg ? WB3DB.errMsg(e) : (e.message || e))}</p>`; return; }
  const stored = {}; rows.forEach(r => { stored[r.module_key] = r.enabled; });
  box.innerHTML = PLATFORM_MODULES.map(m => {
    const on = stored[m.key] !== false; // absent = activé par défaut
    return `<label style="display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);padding:11px 4px;border-top:1px solid var(--color-border-subtle,#eee)">
      <span><b>${m.label}</b> <span class="muted" style="font-size:var(--text-caption)">mig ${m.mig}</span></span>
      <input type="checkbox" ${on ? 'checked' : ''} onchange="toggleTenantModule('${tid}','${m.key}',this.checked)" style="width:20px;height:20px;cursor:pointer">
    </label>`;
  }).join('');
}

async function toggleTenantModule(tenantId, key, enabled) {
  try {
    await WB3DB.platformSetTenantModule(tenantId, key, enabled);
    toast(`${PLATFORM_MODULES.find(m => m.key === key)?.label || key} ${enabled ? 'activé' : 'désactivé'}`, 'success');
  } catch (e) {
    toast('Échec : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : (e.message || e)), 'error');
    await loadTenantModules();
  }
}

async function _loadMembers() {
  const box = document.getElementById('u-list');
  if (!box) return;
  try {
    const rows = await WB3DB.adminListMembers();
    if (!rows.length) { box.innerHTML = `<p class="muted">Aucun membre.</p>`; return; }
    box.innerHTML = `<table class="data-table"><thead><tr><th>Email</th><th>Rôle</th><th></th></tr></thead><tbody>${
      rows.map(m => `<tr>
        <td>${escapeHtml(m.email || '—')}${m.is_self ? ' <span class="muted">(vous)</span>' : ''}</td>
        <td><select class="select select--sm" onchange="adminChangeRole('${m.user_id}', this.value)" ${m.is_self ? 'disabled title="Vous ne pouvez pas changer votre propre rôle"' : ''}>${_roleOptions(m.role)}</select></td>
        <td style="text-align:right">${m.is_self ? '' : `<button class="btn btn--ghost btn--sm" onclick="adminRemoveUser('${m.user_id}','${escapeHtml(m.email||'')}')">Retirer</button>`}</td>
      </tr>`).join('')}</tbody></table>`;
  } catch (e) {
    box.innerHTML = `<p style="color:var(--color-danger)">${escapeHtml(WB3DB.errMsg ? WB3DB.errMsg(e) : (e.message || e))}</p>`;
  }
}

async function adminAddUser() {
  const email = document.getElementById('u-email').value.trim();
  const pass  = document.getElementById('u-pass').value;
  const role  = document.getElementById('u-role').value;
  if (!email) { toast('Email requis', 'error'); return; }
  try {
    const r = await WB3DB.adminCreateUser({ email, password: pass || null, role });
    if (r && r.assignedOnly) toast('Rôle assigné (compte existant). Pour créer de nouveaux comptes, déploie la fonction admin-create-user.', 'success');
    else toast('Utilisateur créé / mis à jour', 'success');
    document.getElementById('u-email').value = '';
    document.getElementById('u-pass').value = '';
    await _loadMembers();
  } catch (e) { toast('Échec : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : (e.message || e)), 'error'); }
}

async function adminChangeRole(userId, role) {
  try {
    // set_membership prend l'email ; on récupère depuis la liste déjà chargée via le RPC.
    const rows = await WB3DB.adminListMembers();
    const m = rows.find(x => x.user_id === userId);
    if (!m) { toast('Membre introuvable', 'error'); return; }
    await WB3DB.adminSetMembership(null, m.email, role);
    toast('Rôle mis à jour', 'success');
    await _loadMembers();
  } catch (e) { toast('Échec : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : (e.message || e)), 'error'); await _loadMembers(); }
}

async function adminRemoveUser(userId, email) {
  const ok = await WB3UI.confirm(`Retirer ${email || 'cet utilisateur'} du compte ? Son accès sera révoqué (le compte de connexion subsiste).`,
    { title: 'Retirer un membre', okText: 'Retirer', danger: true });
  if (!ok) return;
  try {
    await WB3DB.adminRemoveMembership(null, userId);
    toast('Membre retiré', 'success');
    await _loadMembers();
  } catch (e) { toast('Échec : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : (e.message || e)), 'error'); }
}

            const when = new Date(r.created_at).toLocaleString('fr-FR',
              { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });

            const fields = (r.changed_fields || []).length

            return `<div style="border-bottom:1px solid var(--color-border)">

  }
}

function toggleAuditDetail(i) {
  const el = document.getElementById('audit-detail-' + i);
  const caret = document.getElementById('audit-caret-' + i);
  if (!el) return;
  if (el.style.display !== 'none') { el.style.display = 'none'; if (caret) caret.textContent = '▾'; return; }
  const r = (window._auditRows || [])[i];
  if (!r) return;
  let html = '';
  if (r.action === 'UPDATE') {
    const fields = r.changed_fields || [];
    html = `<table style="width:100%;border-collapse:collapse;font-size:var(--text-caption)">
      <thead><tr style="background:var(--color-bg-subtle);text-align:left">
        <th style="padding:4px 8px">Champ</th><th style="padding:4px 8px">Avant</th><th style="padding:4px 8px">Après</th>
      </tr></thead><tbody>
      ${fields.map(f => `<tr style="border-top:1px solid var(--color-border)">
        <td style="padding:4px 8px;font-weight:600">${escapeHtml(f)}</td>
        <td style="padding:4px 8px;color:#c62828">${escapeHtml(_auditFmt(r.old_data?.[f]))}</td>
        <td style="padding:4px 8px;color:#2e7d32">${escapeHtml(_auditFmt(r.new_data?.[f]))}</td>
      </tr>`).join('')}
      </tbody></table>`;
  } else {
    const snap = r.action === 'DELETE' ? r.old_data : r.new_data;
    html = `<pre style="margin:0;padding:var(--space-3);background:var(--color-bg-subtle);border-radius:var(--radius-sm);font-size:var(--text-caption);overflow:auto;max-height:300px">${escapeHtml(JSON.stringify(snap, null, 2))}</pre>`;
  }
  el.innerHTML = html;
  el.style.display = 'block';
  if (caret) caret.textContent = '▴';
}

function _auditFmt(v) {
  if (v === null || v === undefined) return '∅';
  if (typeof v === 'object') return JSON.stringify(v);
  return String(v);
}

    sub: r => [r.date_apport, r.cepage_libre, r.volume_hl!=null?`${r.volume_hl} hL`:null].filter(Boolean).join(' · ') },

  { table:'produits_catalogue', label:'🧪 Produits',   libelle: r => r.nom || r.id.slice(0,8),
    sub: r => [r.categorie, r.fournisseur].filter(Boolean).join(' · ') },

    sub: r => [r.operateur, r.so2_libre!=null?`SO₂L ${r.so2_libre}`:null].filter(Boolean).join(' · ') },
];

async function renderCorbeille() {
  const root = document.getElementById('settings-content');
  root.innerHTML = `
    <h2>🗑 Corbeille</h2>
    <p class="lead">Éléments archivés (masqués des listes mais conservés pour la traçabilité).
       Tu peux les restaurer à tout moment.</p>
    <div id="corbeille-body"><div class="loading-state"><div class="spinner"></div>Chargement…</div></div>
  `;

  const body = document.getElementById('corbeille-body');
  try {
    const results = await Promise.all(
      CORBEILLE_TABLES.map(t =>
        WB3DB.listTable(t.table, { includeArchived: true })
          .then(rows => (rows || []).filter(r => r.archived_at))
          .catch(() => [])
      )
    );

    const totalArchived = results.reduce((s, arr) => s + arr.length, 0);
    if (totalArchived === 0) {
      body.innerHTML = `<div class="drawer-section"><div class="drawer-section-content"
        style="padding:var(--space-5);text-align:center;color:var(--color-ink-tertiary)">
        ✅ Corbeille vide — aucun élément archivé.</div></div>`;
      return;
    }

    body.innerHTML = CORBEILLE_TABLES.map((t, i) => {
      const rows = results[i];
      if (!rows.length) return '';
      const items = rows
        .sort((a, b) => (b.archived_at || '').localeCompare(a.archived_at || ''))
        .map(r => {
          const when = r.archived_at
            ? new Date(r.archived_at).toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric' })
            : '';
          const sub = (t.sub(r) || '');
          return `<div style="display:flex;align-items:center;gap:var(--space-3);
                       padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--color-border)">
            <div style="flex:1;min-width:0">
              <div style="font-weight:600;font-size:var(--text-callout)">${escapeHtml(String(t.libelle(r)))}</div>
              <div style="font-size:var(--text-caption);color:var(--color-ink-tertiary)">
                ${escapeHtml(sub)}${sub?' · ':''}archivé le ${when}</div>
            </div>
            <button class="btn btn--secondary btn--sm"
              onclick="restoreItem('${t.table}','${r.id}', this)">♻️ Restaurer</button>
          </div>`;
        }).join('');
      return `<div class="drawer-section">
        <div class="drawer-section-title">${t.label} <span style="opacity:.6">(${rows.length})</span></div>
        <div class="drawer-section-content" style="padding:0">${items}</div>
      </div>`;
    }).join('');
  } catch (e) {
    body.innerHTML = `<div class="drawer-section"><div class="drawer-section-content"
      style="padding:var(--space-4);color:var(--color-danger)">❌ ${escapeHtml(e.message)}</div></div>`;
  }
}

async function restoreItem(table, id, btn) {
  if (btn) { btn.disabled = true; btn.textContent = '⏳…'; }
  try {
    await WB3DB.restore(table, id);
    toast('Élément restauré', 'success');
    renderCorbeille();
  } catch (e) {
    toast('Erreur : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error');
    if (btn) { btn.disabled = false; btn.textContent = '♻️ Restaurer'; }
  }
}

function _echPartnerRows(arr, role){
  if (!arr.length) return '<div class="t-footnote" style="color:var(--color-ink-tertiary)">Aucun pour l\'instant.</div>';
  return arr.map(c => `<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--color-border)">
      <span style="flex:1">${_echEsc(c.nom)}</span>
      <button class="btn btn--ghost btn--sm" title="Renommer" onclick="echRenamePartner('${c.id}','${role}')">✏️</button>
      <button class="btn btn--ghost btn--sm" title="Supprimer" onclick="echDeletePartner('${c.id}','${role}')">🗑</button>
    </div>`).join('');
}
function _renderEchPartners(){
  const c1 = document.getElementById('ech-list-client'); if (c1) c1.innerHTML = _echPartnerRows(_echClients, 'client');
  const c2 = document.getElementById('ech-list-courtier'); if (c2) c2.innerHTML = _echPartnerRows(_echCourtiers, 'courtier');
}
async function _echReloadPartners(){
  try { [_echClients, _echCourtiers] = await Promise.all([WB3DB.listEchantillonClients('client'), WB3DB.listEchantillonClients('courtier')]); } catch(_){}
  _renderEchPartners();
}
async function echAddPartner(role){
  const inp = document.getElementById(role === 'courtier' ? 'ech-add-courtier' : 'ech-add-client');
  const nom = (inp.value || '').trim(); if (!nom) return;
  try { await WB3DB.addEchantillonClient(nom, role); inp.value = ''; await _echReloadPartners(); }
  catch(e){ toast('Échec : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error'); }
}
async function echRenamePartner(id, role){
  const arr = role === 'courtier' ? _echCourtiers : _echClients;
  const cur = arr.find(x => x.id === id); if (!cur) return;
  const nv = await WB3UI.prompt('Renommer « ' + cur.nom + ' » :', { value: cur.nom });
  if (nv == null) return;
  const clean = String(nv).trim(); if (!clean || clean === cur.nom) return;
  try { await WB3DB.renameEchantillonClient(id, cur.nom, clean, role); await _echReloadPartners(); toast('Renommé', 'success'); }
  catch(e){ toast('Échec : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error'); }
}
async function echDeletePartner(id, role){
  const arr = role === 'courtier' ? _echCourtiers : _echClients;
  const cur = arr.find(x => x.id === id); if (!cur) return;
  if (!await WB3UI.confirm('Supprimer « ' + cur.nom + ' » de la liste ? (les échantillons existants gardent ce nom)', { title:'Supprimer', okText:'Supprimer', danger:true })) return;
  try { await WB3DB.deleteEchantillonClient(id); await _echReloadPartners(); }
  catch(e){ toast('Échec : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error'); }
}

function _echLogoPick(ev){
  const f = ev.target.files && ev.target.files[0]; if (!f) return;
  const rd = new FileReader();
  rd.onload = () => {
    const img = new Image();
    img.onload = () => {
      const maxW = 260, sc = Math.min(1, maxW / img.width);
      const cv = document.createElement('canvas');
      cv.width = Math.max(1, Math.round(img.width * sc)); cv.height = Math.max(1, Math.round(img.height * sc));
      cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
      const url = cv.toDataURL('image/png');
      _echPrefsCache.logo = url;
      document.getElementById('ech-logo-prev').innerHTML = '<img src="' + url + '" style="max-width:100%;max-height:100%">';
    };
    img.src = rd.result;
  };
  rd.readAsDataURL(f);
}
function _echLogoClear(){
  _echPrefsCache.logo = null;
  const el = document.getElementById('ech-logo-prev');
  if (el) el.innerHTML = '<span class="t-footnote" style="color:var(--color-ink-tertiary)">aucun</span>';
}
async function saveEchantillonsSettings(){
  const p = {
    ..._echPrefsCache,
    tel:   document.getElementById('ech-tel').value.trim(),
    qr:    document.getElementById('ech-qr').checked,
    avery: document.getElementById('ech-avery').value,
  };
  try { await WB3DB.setUserPref('echantillon', p); _echPrefsCache = { ...p }; toast('Réglages enregistrés', 'success'); }
  catch(e){ toast('Échec : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : (e.message||e)), 'error'); }
}

const INVENTAIRE_SUBTABS = [
  { key:'cuve',    ic:'tank',  label:'Cuves'    },
  { key:'produit', ic:'flask', label:'Produits' },
];
let _invSessions = [];
let _invOpenId   = null;
let _invLignes   = [];

function _invNum(x){
  if (x == null || x === '') return '';
  const n = Number(x);
  if (Number.isNaN(n)) return '';
  return (Math.round(n * 1000) / 1000).toLocaleString('fr-FR');
}
function _invPriv(){ return !!(WB3DB.isPrivileged && WB3DB.isPrivileged()); }

async function renderInventaireGroup() {
  const root = document.getElementById('settings-content');
  // Garde module : migration 066 requise (inventaire + inventaire_ligne)
  if (WB3DB.ensureModule && !(await WB3DB.ensureModule('inventaire', root))) return;
  const tabs = INVENTAIRE_SUBTABS.map(t => `
    <button class="subtab-btn${activeInventaireSubtab === t.key ? ' active' : ''}"

      ${_subIc(t.ic)}${t.label}

}
function setInventaireSubtab(key) {
  activeInventaireSubtab = key;
  _invOpenId = null; _invLignes = [];
  document.querySelectorAll('.subtab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.subtab === key));

async function _renderInventaireSub() {
  const root = document.getElementById('inventaire-sub');
  if (!root) return;
  const type = activeInventaireSubtab;
  root.innerHTML = '<div class="loading-state"><div class="spinner"></div>Chargement…</div>';
  try {
    _invSessions = await WB3DB.listInventaires(type);

    root.innerHTML = `<p style="color:var(--color-danger)">Erreur : ${escapeHtml(e.message || e)}</p>`;

  }

  const list = _invSessions.length ? `
    <table class="data-table" style="margin-top:var(--space-2)">
      <thead><tr><th>Date</th><th>Libellé</th><th>Statut</th><th></th></tr></thead>
      <tbody>
        ${_invSessions.map(s => `<tr${s.id === _invOpenId ? ' style="background:var(--color-bg-subtle)"' : ''}>

                ? '<span class="tag">🔒 Clos</span>'
                : '<span class="tag tag--success">✏️ Ouvert</span>'}</td>
          <td style="text-align:right;white-space:nowrap">
            <button class="btn btn--ghost btn--sm" onclick="openInventaire('${s.id}')">${s.id === _invOpenId ? 'Rafraîchir' : 'Ouvrir'}</button>
            ${_invPriv() ? `<button class="btn btn--ghost btn--sm" style="color:var(--color-danger)" onclick="deleteInventaire('${s.id}')" title="Supprimer">🗑</button>` : ''}
          </td>
        </tr>`).join('')}
      </tbody>
    </table>` : `<p style="color:var(--color-ink-tertiary);margin-top:var(--space-2)">Aucun inventaire ${labelType} pour l'instant.</p>`;

  root.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;gap:var(--space-2);flex-wrap:wrap">
      <div>
        <h3 style="margin:0">📦 Inventaire ${labelType}</h3>
        <p style="margin:2px 0 0;font-size:var(--text-caption);color:var(--color-ink-tertiary)">
          Comparez la quantité théorique (système) à la quantité comptée, expliquez les écarts.</p>
      </div>
      <button class="btn btn--primary btn--sm" data-help="Démarre un inventaire du stock produits : tu comptes le réel, l'écart avec le stock théorique est enregistré." onclick="newInventaire()">+ Nouvel inventaire</button>
    </div>
    ${list}
    <div id="inv-detail" style="margin-top:var(--space-4)"></div>`;

  if (_invOpenId) _renderInventaireDetail();

async function newInventaire() {
  const type = activeInventaireSubtab;
  const libelle = await WB3UI.prompt(`Libellé de l'inventaire ${type === 'cuve' ? 'cuves' : 'produits'} (optionnel) :`,
    { title: 'Nouvel inventaire', placeholder: 'ex. Inventaire fin de mois', okText: 'Créer' });
  if (libelle === null) return;   // annulé
  try {
    const inv = await WB3DB.createInventaire({ type, libelle: libelle.trim() || null });
    const lignes = await _invSnapshot(type);
    if (lignes.length) await WB3DB.addInventaireLignes(inv.id, lignes);
    await openInventaire(inv.id);   // recharge les lignes fraîchement créées
    toast(`✅ Inventaire créé — ${lignes.length} ligne${lignes.length > 1 ? 's' : ''}`);
  } catch (e) {
    console.error('[inventaire] new', e);
    toast('Échec : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : (e.message || e)), 'error');
  }
}

// Snapshot du théorique au lancement
async function _invSnapshot(type) {
  if (type === 'cuve') {
    const etat = await WB3DB.queryCuverieEtat();
    return etat
      .filter(c => Number(c.volume_actuel_hl ?? c.volume_total_hl ?? 0) > 0 || c.lot_nom)
      .map(c => ({
        ref_id: c.contenant_id,
        ref_label: c.contenant_nom,
        ref_detail: c.lot_nom || null,
        unite: 'hL',
        qte_theorique: Number(c.volume_actuel_hl ?? c.volume_total_hl ?? 0),
      }));
  }
  const lots = await WB3DB.getProduitLots();
  return lots.map(l => ({
    ref_id: l.id,
    ref_label: (l.produits_catalogue?.nom || 'Produit') + (l.numero_lot ? ' · ' + l.numero_lot : ''),
    ref_detail: l.fournisseur || l.produits_catalogue?.fournisseur || null,
    unite: l.unite || l.produits_catalogue?.unite_stock || '',
    qte_theorique: l.quantite_actuelle != null ? Number(l.quantite_actuelle) : null,
  }));
}

async function openInventaire(id) {
  _invOpenId = id;
  try { _invLignes = await WB3DB.getInventaireLignes(id); }
  catch (e) { toast('Erreur chargement : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : (e.message || e)), 'error'); return; }
  await _renderInventaireSub();
  document.getElementById('inv-detail')?.scrollIntoView({ behavior:'smooth', block:'start' });
}

async function deleteInventaire(id) {
  const s = _invSessions.find(x => x.id === id);
  const ok = await WB3UI.confirm(`Supprimer définitivement l'inventaire du ${s ? new Date(s.date_inventaire+'T00:00:00').toLocaleDateString('fr') : ''} ?`,
    { title: 'Supprimer l\'inventaire', okText: 'Supprimer', danger: true });
  if (!ok) return;
  try {
    await WB3DB.deleteInventaire(id);
    if (_invOpenId === id) { _invOpenId = null; _invLignes = []; }
    await _renderInventaireSub();
    toast('🗑 Inventaire supprimé');
  } catch (e) {
    console.error('[inventaire] delete', e);
    toast('Suppression refusée (privilégié uniquement).', 'error');
  }
}

async function _renderInventaireDetail() {
  const box = document.getElementById('inv-detail');
  if (!box) return;
  const sess = _invSessions.find(s => s.id === _invOpenId);
  if (!sess) { box.innerHTML = ''; return; }
  if (!_invLignes.length) {
    try { _invLignes = await WB3DB.getInventaireLignes(_invOpenId); }
    catch (e) { box.innerHTML = `<p style="color:var(--color-danger)">${escapeHtml(e.message||e)}</p>`; return; }
  }
  const clos = sess.statut === 'clos';
  const dis = clos ? 'disabled' : '';

  const rows = _invLignes.map(l => `
    <tr>
      <td>${escapeHtml(l.ref_label || '—')}${l.ref_detail ? `<br><small style="color:var(--color-ink-tertiary)">${escapeHtml(l.ref_detail)}</small>` : ''}</td>
      <td style="text-align:right;white-space:nowrap">${_invNum(l.qte_theorique)} ${escapeHtml(l.unite || '')}</td>
      <td style="text-align:right">
        <input type="number" step="0.001" value="${l.qte_comptee != null ? l.qte_comptee : ''}" ${dis}
               style="width:90px;text-align:right" onchange="invSetComptee('${l.id}', this.value)">
      </td>
      <td style="text-align:right;white-space:nowrap" id="inv-delta-${l.id}">${_invDeltaCell(l.qte_theorique, l.qte_comptee)}</td>
      <td><input type="text" value="${escapeHtml(l.explication || '')}" ${dis}
                 placeholder="Explication de l'écart…" style="width:100%" onchange="invSetExplication('${l.id}', this.value)"></td>
    </tr>`).join('');

  box.innerHTML = `
    <div class="drawer-section">
      <div class="drawer-section-title" style="display:flex;align-items:center;justify-content:space-between;gap:var(--space-2);flex-wrap:wrap">
        <span>${escapeHtml(sess.libelle || 'Inventaire')} — ${escapeHtml(new Date(sess.date_inventaire+'T00:00:00').toLocaleDateString('fr'))}
          ${clos ? '<span class="tag">🔒 Clos</span>' : ''}</span>
        <span id="inv-summary" style="font-size:var(--text-caption);font-weight:400"></span>
      </div>
      <div class="drawer-section-content" style="padding:var(--space-3)">
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead><tr>
              <th>${activeInventaireSubtab === 'cuve' ? 'Cuve' : 'Produit · lot'}</th>
              <th style="text-align:right">Théorique</th>
              <th style="text-align:right">Compté</th>
              <th style="text-align:right">Écart</th>
              <th>Explication</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <div style="display:flex;gap:var(--space-2);margin-top:var(--space-3)">
          ${_invPriv() ? (clos
            ? `<button class="btn btn--secondary btn--sm" onclick="invSetStatut('${sess.id}','ouvert')">🔓 Rouvrir</button>`
            : `<button class="btn btn--secondary btn--sm" onclick="invSetStatut('${sess.id}','clos')">🔒 Clôturer</button>`) : ''}
          <button class="btn btn--ghost btn--sm" onclick="invExportCsv()">📤 Export CSV</button>
        </div>
      </div>
    </div>`;
  _invRefreshTotals();
}

function _invDeltaCell(theo, comptee) {
  if (comptee == null || comptee === '') return '<span style="color:var(--color-ink-tertiary)">—</span>';
  const d = Number(comptee) - Number(theo || 0);
  const eps = Math.abs(d) < 1e-9;
  const col = eps ? 'var(--color-ink-tertiary)' : (d < 0 ? '#c62828' : '#1565c0');
  const sign = d > 0 ? '+' : '';
  return `<span style="color:${col};font-weight:600">${sign}${_invNum(d)}</span>`;
}
function _invRefreshTotals() {
  const el = document.getElementById('inv-summary'); if (!el) return;
  const counted = _invLignes.filter(l => l.qte_comptee != null).length;
  let ecartTot = 0;
  _invLignes.forEach(l => { if (l.qte_comptee != null) ecartTot += (Number(l.qte_comptee) - Number(l.qte_theorique || 0)); });
  const unite = activeInventaireSubtab === 'cuve' ? 'hL' : '';
  const col = Math.abs(ecartTot) < 1e-9 ? 'var(--color-ink-tertiary)' : (ecartTot < 0 ? '#c62828' : '#1565c0');
  el.innerHTML = `${counted}/${_invLignes.length} comptées · écart total : <b style="color:${col}">${ecartTot>0?'+':''}${_invNum(ecartTot)} ${unite}</b>`;
}

async function invSetComptee(id, raw) {
  const val = String(raw).trim() === '' ? null : parseFloat(String(raw).replace(',', '.'));
  const lg = _invLignes.find(l => l.id === id); if (!lg) return;
  lg.qte_comptee = (val == null || Number.isNaN(val)) ? null : val;
  const cell = document.getElementById('inv-delta-' + id);
  if (cell) cell.innerHTML = _invDeltaCell(lg.qte_theorique, lg.qte_comptee);
  _invRefreshTotals();
  try { await WB3DB.updateInventaireLigne(id, { qte_comptee: lg.qte_comptee }); }
  catch (e) { console.error('[inventaire] comptee', e); toast('Échec sauvegarde', 'error'); }
}
async function invSetExplication(id, val) {
  const lg = _invLignes.find(l => l.id === id); if (lg) lg.explication = val;
  try { await WB3DB.updateInventaireLigne(id, { explication: val.trim() || null }); }
  catch (e) { console.error('[inventaire] explication', e); toast('Échec sauvegarde', 'error'); }
}
async function invSetStatut(id, statut) {
  try {
    await WB3DB.setInventaireStatut(id, statut);
    const s = _invSessions.find(x => x.id === id); if (s) s.statut = statut;
    await _renderInventaireSub();
    toast(statut === 'clos' ? '🔒 Inventaire clôturé' : '🔓 Inventaire rouvert');
  } catch (e) { console.error('[inventaire] statut', e); toast('Échec : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : (e.message || e)), 'error'); }
}

function invExportCsv() {
  const sess = _invSessions.find(s => s.id === _invOpenId); if (!sess) return;
  const head = ['ref', 'detail', 'unite', 'theorique', 'compte', 'ecart', 'explication'];
  const lines = [head.join(';')].concat(_invLignes.map(l => {
    const ecart = (l.qte_comptee != null) ? (Number(l.qte_comptee) - Number(l.qte_theorique || 0)) : '';
    return [l.ref_label, l.ref_detail || '', l.unite || '', l.qte_theorique ?? '',
            l.qte_comptee ?? '', ecart, (l.explication || '').replace(/[\r\n;]+/g, ' ')]
      .map(v => String(v).replace('.', ',')).join(';');
  }));
  const blob = new Blob(['﻿' + lines.join('\r\n')], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `inventaire_${activeInventaireSubtab}_${sess.date_inventaire}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// Normalisation nom de cuve : A1-1 → A1-01 (padding du n° après le dernier
// tiret sur 2 chiffres). Format Richemer. Buv.001 / barriques inchangés.
function _epNormCuve(nom) {
  const s = String(nom || '').trim();
  const m = s.match(/^(.*-)(\d+)$/);
  if (!m) return s;
  return m[1] + m[2].padStart(2, '0');
}

// Une cuve est « calibrée » si elle a un abaque (modele) OU un coef linéaire.
function _epIsCalibree(b) { return !!(b && (b.modele_id || b.volume_metrique_hl_cm)); }

// ── Affectation manuelle d'un modèle à une cuve ──────────────
async function epSetModele(contenantId, modeleId) {
  try {
    await WB3DB.saveBaremage(contenantId, { modele_id: modeleId || null });
    const b = _epBaremages.find(x => x.contenant_id === contenantId);
    if (b) b.modele_id = modeleId || null;
    else _epBaremages.push({ contenant_id: contenantId, modele_id: modeleId || null });
    toast('Abaque affecté', 'success');
  } catch(e) {
    toast('Erreur : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error');
  }
}

  det = document.createElement('tr');

// Parse texte → [{creux_cm, volume_hl}]. Séparateurs : tab/espace/,/;
function _epParsePoints(text) {
  return String(text||'').split('\n').map(l => {
    const m = l.trim().split(/[\s,;]+/).filter(Boolean);
    if (m.length < 2) return null;
    const c = parseFloat(m[0].replace(',','.')), v = parseFloat(m[1].replace(',','.'));
    return (isNaN(c)||isNaN(v)) ? null : { creux_cm:c, volume_hl:v };
  }).filter(Boolean);
}

// ── Import du classeur Excel ─────────────────────────────────
async function epImportFile(input) {
  const file = input.files[0];
  if (!file) return;
  if (typeof XLSX === 'undefined') { toast('Parseur XLSX non chargé', 'error'); return; }
  const report = document.getElementById('ep-import-report');
  report.innerHTML = '<div class="spinner"></div> Lecture du classeur…';
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(new Uint8Array(buf), { type: 'array', cellFormula: true });

    // 1. Index contenants WB3 par nom normalisé
    const contByNorm = {};
    _epContenants.forEach(c => { contByNorm[_epNormCuve(c.nom)] = c; });

    // 2. Onglets abaque → modèles
    const SKIP = new Set(['grille', 'barriques', 'feuil1']);
    const modeleIdByNom = {};
    let nbModeles = 0, nbPoints = 0;
    for (const sheetName of wb.SheetNames) {
      if (SKIP.has(sheetName.trim().toLowerCase())) continue;
      const ws = wb.Sheets[sheetName];
      if (!ws || !ws['!ref']) continue;
      // détecter un abaque : A1 ~ "Hauteur"/"Creux", D1 ~ "Volume (hL)".
      // (certains onglets titrent A1 "Creux (cm)" au lieu de "Hauteur (cm)".)
      const a1 = ws['A1'] && String(ws['A1'].v || '');
      const d1 = ws['D1'] && String(ws['D1'].v || '');
      if (!/hauteur|creux/i.test(a1 || '') || !/volume.*hl/i.test(d1 || '')) continue;
      // points bruts : col A (mesure) → col D (volume hL)
      const range = XLSX.utils.decode_range(ws['!ref']);
      const raw = [];
      for (let R = range.s.r + 1; R <= range.e.r; R++) {
        const ca = ws[XLSX.utils.encode_cell({ r: R, c: 0 })];
        const cd = ws[XLSX.utils.encode_cell({ r: R, c: 3 })];
        if (!ca || ca.v == null || !cd || cd.v == null) continue;
        const a = Number(ca.v), vol = Number(cd.v);
        if (isNaN(a) || isNaN(vol)) continue;
        raw.push({ a, vol });
      }
      if (raw.length < 2) continue;
      // ── Normalisation du SENS (conventions mixtes dans le classeur) ──
      // Certains onglets indexent col A par CREUX (volume décroissant), d'autres
      // par HAUTEUR depuis le bas (volume croissant). On normalise TOUT en
      // creux→volume : si croissant (= hauteur), creux = maxHauteur − a.
      raw.sort((p, q) => p.a - q.a);
      const increasing = raw[raw.length - 1].vol > raw[0].vol;
      const maxA = raw[raw.length - 1].a;
      const points = increasing
        ? raw.map(p => ({ creux_cm: maxA - p.a, volume_hl: p.vol }))
        : raw.map(p => ({ creux_cm: p.a,        volume_hl: p.vol }));
      const capMatch = sheetName.match(/(\d+(?:[.,]\d+)?)/);
      const cap = capMatch ? parseFloat(capMatch[1].replace(',', '.')) : null;
      report.innerHTML = `<div class="spinner"></div> Modèle « ${escapeHtml(sheetName)} » (${points.length} points)…`;
      const modeleId = await WB3DB.saveModele({ nom: sheetName, capacite_nominale_hl: cap });
      await WB3DB.replaceModelePoints(modeleId, points);
      modeleIdByNom[sheetName] = modeleId;
      nbModeles++; nbPoints += points.length;
    }

    // 3. Onglet Grille → contenant_baremage (+ mapping via formule LOOKUP)
    const grille = wb.Sheets['Grille'] || wb.Sheets['grille'];
    let nbCuves = 0; const introuvables = [];
    if (grille && grille['!ref']) {
      const range = XLSX.utils.decode_range(grille['!ref']);
      const cellNum = (R, c) => {
        const cell = grille[XLSX.utils.encode_cell({ r: R, c })];
        return cell && cell.v != null && cell.v !== '' ? Number(cell.v) : null;
      };
      const cellStr = (R, c) => {
        const cell = grille[XLSX.utils.encode_cell({ r: R, c })];
        return cell && cell.v != null ? String(cell.v).trim() : '';
      };
      for (let R = range.s.r + 1; R <= range.e.r; R++) {
        const cuveRaw = cellStr(R, 3); // D = Cuve
        if (!cuveRaw) continue;
        const cont = contByNorm[_epNormCuve(cuveRaw)];
        if (!cont) { introuvables.push(cuveRaw); continue; }
        // modèle depuis la formule LOOKUP de la colonne K (index 10)
        const kCell = grille[XLSX.utils.encode_cell({ r: R, c: 10 })];
        let modeleId = null;
        if (kCell && kCell.f) {
          const m = kCell.f.match(/'([^']+)'!/);
          if (m && modeleIdByNom[m[1]]) modeleId = modeleIdByNom[m[1]];
        }
        await WB3DB.saveBaremage(cont.id, {
          modele_id:             modeleId,
          hauteur_totale_cm:     cellNum(R, 4),  // E
          hauteur_cachee_cm:     cellNum(R, 5),  // F
          volume_metrique_hl_cm: cellNum(R, 6),  // G
          hauteur_cheminee_cm:   cellNum(R, 7),  // H
          volume_nominal_hl:     cellNum(R, 11), // L
          type_mesure:           cellStr(R, 12) || 'creux', // M
        });
        nbCuves++;
      }
    }

    report.innerHTML = `
      <div style="padding:10px 12px;background:#ecfdf5;border:1px solid #6ee7b7;border-radius:var(--radius-sm);color:#065f46">
        ✓ Import terminé : <b>${nbModeles}</b> modèle(s) (${nbPoints} points),
        <b>${nbCuves}</b> cuve(s) calibrée(s).
        ${introuvables.length ? `<br><span style="color:#92400e">⚠ ${introuvables.length} cuve(s) Excel non trouvées dans WB3 : ${escapeHtml(introuvables.slice(0,15).join(', '))}${introuvables.length>15?'…':''}</span>` : ''}
      </div>`;
    input.value = '';
    // recharger l'état
    [_epModeles, _epBaremages] = await Promise.all([WB3DB.listModeles(), WB3DB.listBaremages()]);
    _renderEpalementUI();
  } catch(e) {
    console.error('[épalement import]', e);
    report.innerHTML = `<div style="color:var(--color-danger)">❌ ${escapeHtml(e.message)}</div>`;
  }
}

function renderTravees() {
  const root = _getSubRoot();
  root.innerHTML = `
    <h2>📍 Travées</h2>
    <p class="lead">Organise ta cave en travées (zones physiques). Les contenants pourront être affectés à une travée pour faciliter le filtrage et le regroupement.</p>

    <form class="add-form" onsubmit="event.preventDefault(); addTravee()">
      <input class="input" type="text" id="new-travee-nom" maxlength="60" placeholder="Nom de la travée (ex : Travée A, Chai nord, Cellier)">
      <button class="btn" type="submit">+ Ajouter</button>
    </form>

    <div id="travees-list"></div>
  `;
  renderTraveesList();
}

function renderTraveesList() {
  const list = document.getElementById('travees-list');
  if (!travees.length) {
    list.innerHTML = `
      <div class="empty-state" style="padding: var(--space-8) var(--space-4)">
        <div class="icon">📍</div>
        <div class="title">Aucune travée pour l'instant</div>
        <div class="desc">Ajoute ta première travée avec le formulaire ci-dessus.</div>
      </div>`;
    return;
  }

  // Compter les contenants par travée pour info
  list.innerHTML = '<div class="sortable-list" id="sortable"></div>';
  const sortable = document.getElementById('sortable');
  travees.forEach((t) => {
    const el = document.createElement('div');
    el.className = 'list-item';
    el.draggable = true;
    el.dataset.traveeId = t.id;
    el.innerHTML = `
      <span class="order-handle">⋮⋮</span>
      <div class="item-main">
        <div class="nom">${escapeHtml(t.nom)}</div>
        ${t.description ? `<div class="desc">${escapeHtml(t.description)}</div>` : ''}
      </div>
      <div class="item-actions">
        <button title="Renommer" onclick="renameTravee('${t.id}')">✏️</button>
        <button class="danger" title="Supprimer" onclick="deleteTravee('${t.id}')">🗑</button>
      </div>
    `;
    sortable.appendChild(el);
  });
  initTraveesDragDrop(sortable);
}

function initTraveesDragDrop(sortable) {
  const items = [...sortable.querySelectorAll('.list-item[data-travee-id]')];
  let dragId = null;
  items.forEach(item => {
    item.addEventListener('dragstart', e => {
      dragId = item.dataset.traveeId;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => {
      items.forEach(el => el.classList.remove('dragging', 'drag-over'));
      dragId = null;
    });
    item.addEventListener('dragover', e => {
      e.preventDefault();
      items.forEach(el => el.classList.remove('drag-over'));
      if (item.dataset.traveeId !== dragId) item.classList.add('drag-over');
    });
    item.addEventListener('drop', async e => {
      e.preventDefault();
      const destId = item.dataset.traveeId;
      if (!dragId || dragId === destId) return;
      const srcIdx  = travees.findIndex(t => t.id === dragId);
      const destIdx = travees.findIndex(t => t.id === destId);
      if (srcIdx < 0 || destIdx < 0) return;
      const [moved] = travees.splice(srcIdx, 1);
      travees.splice(destIdx, 0, moved);
      dragId = null;
      await reorderTravees();
    });
  });
}

async function reorderTravees() {
  try {
    await Promise.all(travees.map((t, i) => WB3DB.updateRow('travees', t.id, { ordre: (i + 1) * 10 })));
    renderTraveesList();
    toast('Ordre mis à jour', 'success');
  } catch(e) {
    toast('Erreur réordonnancement : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error');
    await loadTravees();
    renderTraveesList();
  }
}

async function addTravee() {
  const input = document.getElementById('new-travee-nom');
  const nom = input.value.trim();
  if (!nom) return;
  try {
    const maxOrdre = travees.length ? Math.max(...travees.map(t => t.ordre)) : 0;
    await WB3DB.insertRow('travees', { nom, ordre: maxOrdre + 1 });
    input.value = '';
    toast('Travée créée', 'success');
  } catch(e) {
    if (e.code === '23505' || /duplicate/i.test(e.message)) {
      toast('Une travée avec ce nom existe déjà', 'error');
    } else {
      toast('Erreur : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error');
    }
  }
}

async function renameTravee(id) {
  const t = travees.find(x => x.id === id);
  if (!t) return;
  const newNom = await WB3UI.prompt('Nouveau nom de la travée :', { title:'Renommer la travée', value:t.nom, okText:'Renommer' });
  if (!newNom || newNom.trim() === t.nom) return;
  try {
    await WB3DB.updateRow('travees', id, { nom: newNom.trim() });
    toast('Travée renommée', 'success');
  } catch(e) {
    if (e.code === '23505') toast('Ce nom est déjà utilisé', 'error');
    else toast('Erreur : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error');
  }
}

async function deleteTravee(id) {
  const t = travees.find(x => x.id === id);
  if (!t) return;
  if (!(await WB3UI.confirm(`Supprimer la travée "${t.nom}" ?\n\nLes contenants qui lui sont rattachés ne seront pas supprimés (juste désaffectés).`, { title:'Supprimer la travée', okText:'Supprimer', danger:true }))) return;
  try {
    await WB3DB.deleteRow('travees', id);
    toast('Travée supprimée', 'success');
  } catch(e) { toast('Erreur : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error'); }
}

async function moveTravee(id, direction) {
  const i = travees.findIndex(t => t.id === id);
  const j = i + direction;
  if (i < 0 || j < 0 || j >= travees.length) return;
  const a = travees[i];
  const b = travees[j];
  // Échange des ordres en base
  try {
    await WB3DB.updateRow('travees', a.id, { ordre: b.ordre });
    await WB3DB.updateRow('travees', b.id, { ordre: a.ordre });
    // Optimisme local : sort et render avant que realtime ne mette à jour
    [a.ordre, b.ordre] = [b.ordre, a.ordre];
    sortTravees();
    renderTraveesList();
  } catch(e) { toast('Erreur réordonnancement : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error'); }
}

async function saveCuveriePrefs() {
  // Merge sur l'existant : NE PAS écraser les prefs gérées ailleurs
  // (table_columns, plan_color, plan_dense) — sinon la config colonnes /
  // les réglages de la vue plan seraient perdus à chaque enregistrement ici.
  const newPrefs = {
    ...cuveriePrefs,
    default_view:  document.querySelector('#pref-view input[name="view"]:checked')?.value   || 'table',
    default_group: document.querySelector('#pref-group input[name="group"]:checked')?.value || 'none',
    default_sort:  document.querySelector('#pref-sort input[name="sort"]:checked')?.value   || 'nom',
    page_size:     Number(document.querySelector('#pref-pagesize input[name="pagesize"]:checked')?.value || 50),
    wall_view:     document.getElementById('pref-wallview')?.value || 'auto',
    visible_stats: Array.from(document.querySelectorAll('#pref-stats input[type="checkbox"]:checked'))
      .map(i => i.dataset.stat),
  };

  if (!newPrefs.visible_stats.length) {
    toast('Sélectionne au moins une tuile à afficher', 'error');
    return;
  }

  if (!await WB3Bootstrap.waitTenant(5000)) {
    toast('Tenant non chargé — recharge la page', 'error');
    return;
  }

  try {
    await WB3DB.setUserPref('cuverie', newPrefs);
    cuveriePrefs = newPrefs;
    toast('Préférences enregistrées', 'success');
  } catch(e) {
    console.error(e);
    toast('Erreur : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error');
  }
}

function updateContenantFormBarrel() {
  const type   = document.getElementById('cf-type')?.value;
  const barrel = document.getElementById('cf-barrel-fields');
  if (barrel) barrel.style.display = BARREL_TYPES.has(type) ? '' : 'none';
}

function closeContenantForm() {
  const fa = document.getElementById('contenant-form-area');
  if (fa) { fa.style.display = 'none'; fa.innerHTML = ''; }
  editingContenantId = null;
}

async function saveContenant() {
  const nom  = document.getElementById('cf-nom')?.value.trim();
  const type = document.getElementById('cf-type')?.value;
  const capa = parseFloat(document.getElementById('cf-capa')?.value);
  if (!nom)               { toast('Le nom est obligatoire', 'error'); return; }
  if (isNaN(capa) || capa <= 0) { toast('La capacité doit être > 0', 'error'); return; }

  const isBarrel  = BARREL_TYPES.has(type);
  const travee_id = document.getElementById('cf-travee')?.value || null;

  const payload = {
    nom, type, capacite_hl: capa,
    travee_id:          travee_id || null,
    materiau:           document.getElementById('cf-mat')?.value.trim()    || null,
    marque:             document.getElementById('cf-marque')?.value.trim() || null,
    annee_mise_service: parseInt(document.getElementById('cf-annee')?.value || '') || null,
    actif:              document.getElementById('cf-actif')?.checked ?? true,
    tonnelier:    isBarrel ? (document.getElementById('cf-tonnelier')?.value.trim()    || null) : null,
    origine_bois: isBarrel ? (document.getElementById('cf-origine')?.value.trim()      || null) : null,
    chauffe:      isBarrel ? (document.getElementById('cf-chauffe')?.value             || null) : null,
    specificites: isBarrel ? (document.getElementById('cf-specificites')?.value.trim() || null) : null,
  };

  try {
    if (editingContenantId) {
      const row = await WB3DB.updateRow('contenants', editingContenantId, payload);
      if (row) {
        const i = contenants.findIndex(x => x.id === editingContenantId);
        if (i >= 0) contenants[i] = row; else contenants.push(row);
      }
      toast('Contenant mis à jour', 'success');
    } else {
      const row = await WB3DB.insertRow('contenants', { ...payload, tags: [] });
      if (row) contenants.push(row);
      toast('Contenant créé', 'success');
    }
    closeContenantForm();
    _renderContenantsUI();
  } catch(e) {
    if (e.code === '23505' || /duplicate/i.test(e.message))
      toast('Un contenant avec ce nom existe déjà', 'error');
    else
      toast('Erreur : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error');
  }
}

async function deleteContenant(id) {
  const c = contenants.find(x => x.id === id);
  if (!c) return;
  if (!(await WB3UI.confirm(`Supprimer "${c.nom}" ?\n\nSi ce contenant est associé à des lots ou des opérations, la suppression sera bloquée.`, { title:'Supprimer le contenant', okText:'Supprimer', danger:true }))) return;
  try {
    await WB3DB.deleteRow('contenants', id);
    contenants = contenants.filter(x => x.id !== id);
    if (editingContenantId === id) closeContenantForm();
    _renderContenantsUI();
    toast('Contenant supprimé', 'success');
  } catch(e) {
    if (e.code === '23503' || /foreign key/i.test(e.message))
      toast('Ce contenant est utilisé — impossible à supprimer', 'error');
    else
      toast('Erreur : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error');
  }
}

let cepages = [];

async function renderCepagesSection() {
  const root = document.getElementById('settings-content');

    cepages = await WB3DB.listTable('cepages', { order: 'ordre' });

function _renderCepagesUI() {
  const root = document.getElementById('settings-content');
  const byCouleur = { rouge:[], blanc:[], rose:[], gris:[] };
  cepages.filter(c => c.actif).forEach(c => { if (byCouleur[c.couleur]) byCouleur[c.couleur].push(c); });

async function addCepage() {
  const nom = document.getElementById('new-cepage-nom').value.trim();
  const couleur = document.getElementById('new-cepage-couleur').value;
  if (!nom) return;
  try {
    const maxOrdre = cepages.length ? Math.max(...cepages.map(c => c.ordre)) : 0;
    await WB3DB.insertRow('cepages', { nom, couleur, ordre: maxOrdre + 1 });
    document.getElementById('new-cepage-nom').value = '';
    cepages = await WB3DB.listTable('cepages', { order: 'ordre' });
    _renderCepagesUI();
    toast('Cépage ajouté', 'success');
  } catch(e) {
    if (e.code === '23505' || /duplicate/i.test(e.message)) toast('Ce cépage existe déjà', 'error');
    else toast('Erreur : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error');
  }
}

async function renameCepage(id) {
  const c = cepages.find(x => x.id === id);
  if (!c) return;
  const newNom = await WB3UI.prompt('Nouveau nom du cépage :', { title:'Renommer le cépage', value:c.nom, okText:'Renommer' });
  if (!newNom || newNom.trim() === c.nom) return;
  try {
    await WB3DB.updateRow('cepages', id, { nom: newNom.trim() });
    cepages = await WB3DB.listTable('cepages', { order: 'ordre' });
    _renderCepagesUI();
    toast('Cépage renommé', 'success');
  } catch(e) {
    if (e.code === '23505') toast('Ce nom est déjà utilisé', 'error');
    else toast('Erreur : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error');
  }
}

async function deleteCepage(id) {
  const c = cepages.find(x => x.id === id);
  if (!c) return;
  if (!(await WB3UI.confirm(`Supprimer le cépage "${c.nom}" ?\n\nLes lots qui l'utilisent ne seront pas affectés.`, { title:'Supprimer le cépage', okText:'Supprimer', danger:true }))) return;
  try {
    await WB3DB.deleteRow('cepages', id);
    cepages = cepages.filter(x => x.id !== id);
    _renderCepagesUI();
    toast('Cépage supprimé', 'success');
  } catch(e) { toast('Erreur : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error'); }
}

async function loadStandardCepages() {
  if (!(await WB3UI.confirm(`Charger les ${CEPAGES_STANDARD.length} cépages standards ?\n\nLes cépages déjà présents ne seront pas dupliqués.`, { title:'Cépages standards', okText:'Charger' }))) return;
  const existing = new Set(cepages.map(c => c.nom.toLowerCase()));
  const toAdd    = CEPAGES_STANDARD.filter(c => !existing.has(c.nom.toLowerCase()));
  if (!toAdd.length) { toast('Tous les cépages standards sont déjà présents', 'info'); return; }
  let maxOrdre = cepages.length ? Math.max(...cepages.map(c => c.ordre)) : 0;
  let ok = 0;
  for (const c of toAdd) {
    try {
      maxOrdre++;
      await WB3DB.insertRow('cepages', { nom: c.nom, couleur: c.couleur, ordre: maxOrdre });
      ok++;
    } catch(_) {}
  }
  cepages = await WB3DB.listTable('cepages', { order: 'ordre' });
  _renderCepagesUI();
  toast(`${ok} cépage${ok > 1 ? 's' : ''} ajouté${ok > 1 ? 's' : ''}`, 'success');
}

function handleCSVFile(input) {
  const file = input.files[0];

  const reader = new FileReader();
  reader.onload = (e) => {
    const parsed = parseCSV(e.target.result);
    if (parsed.error) { toast(parsed.error, 'error'); return; }
    if (!parsed.rows.length) { toast('Aucune ligne valide dans le fichier', 'error'); return; }
    window._importParsed = parsed;
    renderImportPreview(parsed);
  };
  reader.readAsText(file, 'UTF-8');
}

// ----- Parseur CSV -----
function parseCSV(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);  // BOM
  const lines = text.split(/\r?\n/);
  const nonEmpty = lines.filter(l => l.trim());
  if (nonEmpty.length < 2) return { error: 'Fichier vide ou sans données' };

  const header = nonEmpty[0];
  const sep    = header.includes(';') ? ';' : ',';
  const cols   = header.split(sep).map(h => h.trim().toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, ''));  // retire accents

  function findCol(...candidates) {
    for (const c of candidates) {
      const i = cols.findIndex(h => h.includes(c));
      if (i >= 0) return i;
    }
    return -1;
  }

  const VALID_TYPES = new Set(['cuve','foudre','fut','demi_muid','cuve_bois','pressoir','autre']);
  const CHAUFFE_MAP = { 'légère':'legere','legere':'legere','l':'legere','légère (l)':'legere',
    'moyenne':'moyenne','m':'moyenne','moyenne (m)':'moyenne',
    'forte':'forte','f':'forte','forte (f)':'forte',
    'extra-forte':'extra_forte','extra_forte':'extra_forte','ef':'extra_forte','extra-forte (ef)':'extra_forte' };

  const ci = {
    travee:      findCol('travee', 'zone', 'secteur'),
    nom:         findCol('cuve', 'nom', 'contenant'),
    type:        findCol('type'),
    capa:        findCol('capacite', 'capacit', 'cap', 'hl'),
    mat:         findCol('materiaux', 'materiau', 'matiere', 'mat'),
    marque:      findCol('marque', 'fabricant', 'constructeur'),
    tonnelier:   findCol('tonnelier'),
    annee:       findCol('annee', 'date', 'service', 'mise'),
    origine:     findCol('origine', 'bois'),
    chauffe:     findCol('chauffe'),
    specificites:findCol('specificites', 'specificit', 'particularites', 'notes'),
  };

  if (ci.nom  === -1) return { error: 'Colonne "Cuve" introuvable dans l\'en-tête' };
  if (ci.capa === -1) return { error: 'Colonne "Capacité" introuvable dans l\'en-tête' };

  const rows   = [];
  const errors = [];

  for (let i = 1; i < nonEmpty.length; i++) {
    const cells   = splitCsvLine(nonEmpty[i], sep);
    const nom     = cells[ci.nom]?.trim() || '';
    const capaRaw = (cells[ci.capa] || '').trim().replace(',', '.');

    if (!nom) { errors.push(`Ligne ${i + 1} : nom vide → ignorée`); continue; }

    const capa = parseFloat(capaRaw);
    if (isNaN(capa) || capa <= 0) {
      errors.push(`Ligne ${i + 1} ("${nom}") : capacité invalide ("${capaRaw}") → ignorée`);
      continue;
    }

    const typeRaw = (ci.type >= 0 ? (cells[ci.type] || '').trim().toLowerCase().replace(/[-\s]/g,'_') : '');
    const type    = VALID_TYPES.has(typeRaw) ? typeRaw : 'cuve';
    const isBarrel = ['fut','foudre','demi_muid','cuve_bois'].includes(type);
    const chauffeRaw = (ci.chauffe >= 0 ? (cells[ci.chauffe] || '').trim().toLowerCase() : '');

    rows.push({
      traveeNom:          ci.travee   >= 0 ? (cells[ci.travee]   || '').trim() : '',
      nom,
      type,
      capacite_hl:        capa,
      materiau:           ci.mat      >= 0 ? (cells[ci.mat]      || '').trim() || null : null,
      marque:             ci.marque   >= 0 ? (cells[ci.marque]   || '').trim() || null : null,
      tonnelier:          ci.tonnelier>= 0 ? (cells[ci.tonnelier]|| '').trim() || null : null,
      annee_mise_service: parseAnnee(ci.annee >= 0 ? (cells[ci.annee] || '').trim() : ''),
      origine_bois:       isBarrel && ci.origine >= 0 ? (cells[ci.origine] || '').trim() || null : null,
      chauffe:            isBarrel ? (CHAUFFE_MAP[chauffeRaw] || null) : null,
      specificites:       isBarrel && ci.specificites >= 0 ? (cells[ci.specificites] || '').trim() || null : null,
    });
  }
  return { rows, errors };
}

function splitCsvLine(line, sep) {
  const cells = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"')          { inQ = !inQ; }
    else if (c === sep && !inQ) { cells.push(cur); cur = ''; }
    else                    { cur += c; }
  }
  cells.push(cur);
  return cells;
}

function parseAnnee(s) {
  if (!s) return null;
  const m = s.match(/\b(19|20)\d{2}\b/);
  if (m) return parseInt(m[0], 10);
  const n = parseInt(s, 10);
  return (!isNaN(n) && n >= 1900 && n <= 2100) ? n : null;
}

// ----- Import effectif -----
async function confirmImport() {
  const parsed = window._importParsed;
  if (!parsed?.rows?.length) return;

  const btn = document.getElementById('btn-import-confirm');
  if (btn) { btn.disabled = true; btn.textContent = 'Import en cours…'; }

  const { rows } = parsed;
  let created = 0, skipped = 0;
  const importErrors = [];

  try {
    // 1. Créer les travées manquantes
    const traveeMap = new Map(travees.map(t => [t.nom.toLowerCase(), t.id]));
    const neededNames = [...new Set(rows.filter(r => r.traveeNom).map(r => r.traveeNom))];
    const missing     = neededNames.filter(n => !traveeMap.has(n.toLowerCase()));

    if (missing.length) {
      let maxOrdre = travees.length ? Math.max(...travees.map(t => t.ordre)) : 0;
      for (const nomT of missing) {
        maxOrdre++;
        await WB3DB.insertRow('travees', { nom: nomT, ordre: maxOrdre });
      }
      await loadTravees();
      travees.forEach(t => traveeMap.set(t.nom.toLowerCase(), t.id));
    }

    // 2. Insérer les contenants
    for (const r of rows) {
      const travee_id = r.traveeNom ? (traveeMap.get(r.traveeNom.toLowerCase()) || null) : null;
      try {
        await WB3DB.insertRow('contenants', {
          nom:                r.nom,
          type:               r.type || 'cuve',
          capacite_hl:        r.capacite_hl,
          travee_id,
          materiau:           r.materiau           || null,
          marque:             r.marque             || null,
          tonnelier:          r.tonnelier          || null,
          annee_mise_service: r.annee_mise_service || null,
          origine_bois:       r.origine_bois       || null,
          chauffe:            r.chauffe            || null,
          specificites:       r.specificites       || null,
          actif: true, tags: [],
        });
        created++;
      } catch(e) {
        if (e.code === '23505' || /duplicate/i.test(e.message)) {
          skipped++;
        } else {
          importErrors.push(`"${r.nom}" : ${e.message}`);
        }
      }
    }

    // 3. Résultat
    let msg = `✅ ${created} contenant${created > 1 ? 's' : ''} importé${created > 1 ? 's' : ''}`;
    if (skipped) msg += ` · ${skipped} doublon${skipped > 1 ? 's' : ''} ignoré${skipped > 1 ? 's' : ''}`;
    toast(msg, 'success');
    if (importErrors.length) {
      console.warn('[WB3 import errors]', importErrors);
      toast(`⚠️ ${importErrors.length} erreur(s) — voir console`, 'error');
    }
    cancelImport();

  } catch(e) {
    toast('Erreur import : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error');
    console.error(e);
    if (btn) { btn.disabled = false; btn.textContent = `Importer ${rows.length} contenants`; }
  }
}

async function _qualiteReset(cle) {
  const s = QUALITE_SEUILS.find(x => x.cle === cle);
  if (!s) return;
  try {
    await WB3DB.resetTolerance(cle);   // helper centralisé db.js
    _qualiteVals[cle] = s.defaut;
    await WB3DB.getTolerances({ force: true });
    _renderQualiteUI();
    toast(`"${s.label}" remis au défaut (${s.defaut})`, 'success');
  } catch(e) {
    toast('Erreur : ' + (WB3DB.errMsg ? WB3DB.errMsg(e) : e.message), 'error');
  }
}

// Paires min<max à valider + bornes plausibles par clé.
const QUALITE_PAIRS  = [['ph_min','ph_max'], ['tav_min','tav_max']];
const QUALITE_BORNES = {
  ph_min:[0,14], ph_max:[0,14], tav_min:[0,25], tav_max:[0,25],
  av_max:[0,5], so2_libre_max:[0,500], temp_max:[0,60],
  analyse_retard_jours:[1,365], fa_stuck_jours:[1,60],
};

function _qualiteValidate() {
  const vals = {};
  for (const s of QUALITE_SEUILS) {
    const input = document.getElementById('q-' + s.cle);
    if (!input) continue;
    const v = parseFloat(input.value);
    if (isNaN(v)) return { ok:false, msg:`"${s.label}" : valeur numérique requise.` };
    if (v < 0)    return { ok:false, msg:`"${s.label}" : valeur négative interdite.` };
    const b = QUALITE_BORNES[s.cle];
    if (b && (v < b[0] || v > b[1]))
      return { ok:false, msg:`"${s.label}" : valeur hors plage plausible (${b[0]}–${b[1]}).` };
    vals[s.cle] = v;
  }
  for (const [lo, hi] of QUALITE_PAIRS) {
    if (vals[lo] != null && vals[hi] != null && vals[lo] >= vals[hi]) {
      const sLo = QUALITE_SEUILS.find(x => x.cle === lo);
      const sHi = QUALITE_SEUILS.find(x => x.cle === hi);
      return { ok:false, msg:`"${sLo.label}" doit être strictement inférieur à "${sHi.label}".` };
    }
  }
  return { ok:true, vals };
}

async function saveQualiteSeuils() {
  if (WB3DB.can && !WB3DB.can('qualite.edit')) { toast('Lecture seule : modifier les seuils est réservé aux responsables.', 'error'); return; }
  const check = _qualiteValidate();
  if (!check.ok) { toast('⚠ ' + check.msg, 'error'); return; }
  try {
    // Écriture via helper centralisé db.js (RLS privilégié appliquée serveur).
    for (const [cle, val] of Object.entries(check.vals)) {
      await WB3DB.setTolerance(cle, val);
    }
    await WB3DB.getTolerances({ force: true });
    const el = document.getElementById('qualite-saved');
    if (el) { el.style.display = ''; setTimeout(() => el.style.display = 'none', 2500); }
    toast('Seuils qualité enregistrés', 'success');
    _renderQualiteUI();
  } catch(e) {
    // RLS refuse un non-privilégié → message clair
    const msg = /row-level security|permission|policy/i.test(e.message || '')
      ? 'Droits insuffisants : seuls les rôles admin/œnologue peuvent modifier les seuils.'
      : e.message;
    toast('Erreur : ' + msg, 'error');
  }
}

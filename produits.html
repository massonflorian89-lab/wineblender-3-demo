<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" type="image/png" sizes="32x32" href="img/icon-wineblender-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="img/icon-wineblender-16.png">
<link rel="shortcut icon" href="img/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="img/icon-wineblender-180.png">
<meta name="theme-color" content="#6a1b2a">
<title>Produits œnologiques — WineBlender 3</title>
<link rel="stylesheet" href="theme.css">
<script>(function(){var t=localStorage.getItem('wb3_theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<style>
  /* .header-actions, .breadcrumb-flex, .tenant-pill → theme.css (composants partagés) */

  /* Drawer produit élargi : la table des lots en stock a beaucoup de
     colonnes (n° lot, qté init, qté actuelle, unité, DLUO, date_reception,
     fournisseur) → 420px par défaut clippe à droite. */
  #drawer.drawer { width: 720px; max-width: 96vw; }
  /* 9.1bis — tablette/mobile : l'override id ci-dessus battait la règle plein
     écran de theme.css (≤820). On rétablit le plein écran au pouce. */
  @media (max-width: 820px) { #drawer.drawer { width: 100vw; max-width: 100vw; } }

  /* Bande couleur carte */
  .contenant-card-pro { position:relative; overflow:hidden; }
  .cat-strip { position:absolute; top:0; left:0; right:0; height:4px; }

  /* Badge catégorie */
  .cat-badge {
    display:inline-flex; align-items:center; gap:var(--space-1);
    padding:2px 8px; border-radius:var(--radius-pill);
    font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.4px;
    white-space:nowrap; flex-shrink:0;
  }

  /* Badge DLUO */
  .dluo-badge {
    display:inline-flex; align-items:center; gap:var(--space-1);
    padding:2px 8px; border-radius:var(--radius-pill);
    font-size:10px; font-weight:600; letter-spacing:.3px;
    white-space:nowrap; flex-shrink:0;
  }
  .dluo-ok     { background:#e6f4ea; color:#2e7d32; }
  .dluo-alerte { background:#fff3e0; color:#e65100; }
  .dluo-expire { background:#ffebee; color:#b00020; }
  .dluo-inconnu{ background:#f5f5f5; color:#888; }

  /* Pagination */
  .pagination-bar  { display:flex; align-items:center; justify-content:center; gap:var(--space-3); padding:var(--space-4) 0 var(--space-2); }
  .pagination-info { font-size:var(--text-callout); color:var(--color-ink-tertiary); min-width:180px; text-align:center; }

  /* Drawer — lignes lots */
  .lot-row {
    display:flex; align-items:center; gap:var(--space-2);
    padding:6px 0; border-bottom:1px solid var(--color-border);
  }
  .lot-row:last-child { border-bottom:none; }
  .lot-row input  { flex:1; min-width:0; }
  .lot-row .w80   { width:80px; flex-shrink:0; }
  .lot-row .w100  { width:100px; flex-shrink:0; }
  .lot-row .wdate { width:130px; flex-shrink:0; }
  .lot-row-label  {
    font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px;
    color:var(--color-ink-tertiary); margin-bottom:var(--space-1);
    display:grid; grid-template-columns:1fr 80px 80px 100px 130px 28px;
    gap:var(--space-2); padding:0 0 4px; border-bottom:1px solid var(--color-border);
  }

  /* Mode vue catalogue — expand lots inline */
  .produit-lots-list {
    margin-top:var(--space-2); border-top:1px solid var(--color-border);
    padding-top:var(--space-2);
  }
  .produit-lot-row {
    display:flex; align-items:center; gap:var(--space-2);
    padding:4px 0; font-size:var(--text-caption); color:var(--color-ink-secondary);
  }
  .produit-lot-row:not(:last-child) { border-bottom:1px solid var(--color-bg-subtle); }

  /* Vue tableau stock */
  .col-filter-btn {
    display:inline-flex; align-items:center; background:none; border:none; cursor:pointer;
    padding:2px 3px; border-radius:3px; font-size:10px; color:var(--color-ink-tertiary);
    transition:color .15s,background .15s; vertical-align:middle; margin-left:3px;
  }
  .col-filter-btn:hover  { color:var(--color-ink-secondary); background:var(--color-bg-subtle); }
  .col-filter-btn.active { color:var(--color-primary); }
  .col-filter-dropdown {
    position:fixed; background:var(--color-bg-elevated); border:1px solid var(--color-border);
    border-radius:var(--radius-md); box-shadow:0 8px 32px rgba(0,0,0,.22);
    padding:var(--space-2); min-width:230px; max-width:290px; z-index:2000; display:none;
  }
  .col-filter-dropdown.open { display:block; }
  .col-filter-title  { font-weight:600; font-size:var(--text-caption); margin-bottom:var(--space-1); color:var(--color-ink-secondary); }
  .col-filter-search { width:100%; box-sizing:border-box; margin-bottom:var(--space-1); }
  .col-filter-values {
    max-height:200px; overflow-y:auto; border:1px solid var(--color-border);
    border-radius:var(--radius-sm); margin-bottom:var(--space-1); background:var(--color-bg);
  }
  .col-filter-value-item {
    display:flex; align-items:center; gap:var(--space-2); padding:5px 8px; cursor:pointer;
    font-size:var(--text-caption); color:var(--color-ink);
  }
  .col-filter-value-item:hover { background:var(--color-bg-subtle); }
  .col-filter-footer {
    display:flex; justify-content:space-between; align-items:center;
    padding-top:var(--space-1); border-top:1px solid var(--color-border); gap:var(--space-1);
  }
</style>
</head>
<body>

<header class="wb-header">
  <div class="breadcrumb-flex">
    <a href="app.html" class="home"><img decoding="async" class="home-logo" src="img/icon-wineblender-192.png" alt="">WB3</a>
    <span class="sep">/</span>
    <h1>🧪 Produits œnologiques</h1>
  </div>
  <div class="header-actions">
    <span class="tenant-pill" id="tenant-pill">—</span>
    <button class="btn btn--header" onclick="logout()">Déconnexion</button>
  </div>
</header>

<main class="wb-main">

  <div class="stats-grid" id="stats">
    <div class="stat-card"><div class="label">Chargement…</div><div class="value">—</div></div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="catalogue">🧪 Catalogue <span class="count" data-count="catalogue">0</span></button>
    <button class="tab" data-tab="stock">📦 Stock (lots) <span class="count" data-count="stock">0</span></button>
    <button class="tab" data-tab="alertes">🔔 Alertes DLUO <span class="count" data-count="alertes">0</span></button>
  </div>

  <div class="action-bar">
    <div class="group" id="view-mode">
      <button data-view="grid">▦ Grille</button>
      <button class="active" data-view="table">☰ Tableau</button>
    </div>
    <div class="group" id="sort-mode">
      <button class="active" data-sort="nom">A→Z</button>
      <button data-sort="categorie">Catégorie</button>
    </div>
    <div style="flex:1"></div>
    <button class="btn btn--secondary btn--sm" id="btn-clear-filters" onclick="clearAllColumnFilters()" style="display:none">✕ Filtres actifs</button>
    <button class="btn btn--secondary btn--sm" onclick="exportCSV()">📤 CSV</button>
  </div>

  <div class="filters-bar">
    <div class="search-input">
      <input type="text" id="search" placeholder="Rechercher produit, fournisseur, numéro lot…" autocomplete="off">
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap" id="cat-chips">
      <button class="chip active" data-cat="all">Toutes catégories</button>
    </div>
  </div>

  <div id="content">
    <div class="loading-state"><div class="spinner"></div>Chargement…</div>
  </div>
  <div class="pagination-bar" id="pagination-bar" style="display:none"></div>

</main>

<button class="fab" onclick="openDrawer()" title="Nouveau produit">+</button>

<div class="drawer-backdrop" id="drawer-backdrop" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head">
    <h3 id="drawer-title">Nouveau produit</h3>
    <button class="close-btn" onclick="closeDrawer()">×</button>
  </div>
  <div class="drawer-body" id="drawer-body">

    <div class="drawer-section">
      <div class="drawer-section-title">Identification</div>
      <div class="field">
        <label class="field-label">Nom du produit *</label>
        <input class="input" type="text" id="f-nom" placeholder="Ex : Sulfite de potassium, Levure EC1118…">
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">Catégorie *</label>
          <select class="select" id="f-categorie">
            <option value="so2">SO₂ / Sulfitage</option>
            <option value="levure">Levure</option>
            <option value="enzyme">Enzyme</option>
            <option value="colle">Colle / Clarification</option>
            <option value="tanin">Tanin</option>
            <option value="acidifiant">Acidifiant</option>
            <option value="desacidifiant">Désacidifiant</option>
            <option value="nutriment">Nutriment / Activateur</option>
            <option value="correcteur_alcool">Correcteur alcool</option>
            <option value="filtre">Filtre / Filtration</option>
            <option value="autre" selected>Autre</option>
          </select>
        </div>
        <div class="field">
          <label class="field-label">Sous-catégorie</label>
          <input class="input" type="text" id="f-sous-cat" placeholder="Ex : bentonite, PVPP…">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">Fournisseur</label>
          <input class="input" type="text" id="f-fournisseur" placeholder="Oenostyle, Laffort…">
        </div>
        <div class="field">
          <label class="field-label">Réf. fournisseur</label>
          <input class="input" type="text" id="f-ref" placeholder="Code article…">
        </div>
      </div>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-title">Dosage recommandé <span style="font-size:var(--text-caption);font-weight:400;color:var(--color-ink-tertiary)">(indicatif)</span></div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">Dose min</label>
          <input class="input" type="number" id="f-dose-min" min="0" step="any" placeholder="0">
        </div>
        <div class="field">
          <label class="field-label">Dose max</label>
          <input class="input" type="number" id="f-dose-max" min="0" step="any" placeholder="0">
        </div>
        <div class="field" style="flex:0 0 110px">
          <label class="field-label">Unité</label>
          <input class="input" list="dose-unites" id="f-dose-unite" placeholder="g/hL">
          <datalist id="dose-unites">
            <option value="g/hL"><option value="mL/hL"><option value="mg/L">
            <option value="g/100L"><option value="cL/hL"><option value="g">
            <option value="kg"><option value="mL">
          </datalist>
        </div>
      </div>
      <div class="field">
        <label class="field-label">Unité de stock</label>
        <input class="input" list="stock-unites" id="f-unite-stock" placeholder="kg">
        <datalist id="stock-unites">
          <option value="kg"><option value="g"><option value="L">
          <option value="mL"><option value="unité">
        </datalist>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">Concentration (g actif / unité stock)</label>
          <input class="input" type="number" id="f-concentration" min="0" step="any" placeholder="ex : 180">
          <div class="field-help" style="margin-top:3px;font-size:10.5px;color:var(--color-ink-tertiary)">P18 → 180 g SO₂/L · Metabisulfite → 570 g SO₂/kg · Levure → laisser vide</div>
        </div>
        <div class="field" style="flex:0 0 160px">
          <label class="field-label">Libellé concentration</label>
          <input class="input" type="text" id="f-concentration-libelle" placeholder="P18, 18 %, SO₂ 180 g/L…">
        </div>
      </div>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-title">Notes</div>
      <div class="field">
        <textarea class="input" id="f-notes" rows="2" placeholder="Observations, précautions…" style="resize:vertical"></textarea>
      </div>
    </div>

    <div class="drawer-section" id="section-lots" style="display:none">
      <div class="drawer-section-title">
        Lots en stock
        <button class="btn btn--ghost btn--sm" style="float:right;margin-top:-4px" onclick="addLotRow()">+ Lot</button>
      </div>
      <div class="lot-row-label">
        <span>N° lot</span><span>Qté init.</span><span>Qté act.</span><span>Unité</span><span>DLUO</span><span></span>
      </div>
      <div id="f-lots-rows"></div>
    </div>

  </div>
  <div class="drawer-foot">
    <button class="btn btn--danger" id="btn-delete" onclick="deleteCurrent()" style="display:none">🗑 Archiver</button>
    <div class="actions-right">
      <button class="btn btn--secondary" onclick="closeDrawer()">Annuler</button>
      <button class="btn" onclick="saveProduit()">Enregistrer</button>
    </div>
  </div>
</aside>

<div id="col-filter-dropdown" class="col-filter-dropdown" onclick="event.stopPropagation()"></div>
<div class="toast" id="toast"></div>

<script src="lib/supabase.min.js"></script>
<script src="toast.js"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<script src="wb3-bus.js"></script>
<script src="wb3-freshness.js"></script>
<script src="wb3-init.js"></script>
<script src="auth.js"></script>
<script src="nav.js"></script>

<script>
'use strict';

// ============================================================
// Catalogue catégories
// ============================================================
const CAT_META = {
  so2:               { label:'SO₂',            icon:'🧪', color:'#e65100', bg:'#fff0e0' },
  levure:            { label:'Levure',          icon:'🦠', color:'#f57f17', bg:'#fffde7' },
  enzyme:            { label:'Enzyme',          icon:'⚗️',  color:'#795548', bg:'#efebe9' },
  colle:             { label:'Colle',           icon:'🧹', color:'#2e7d32', bg:'#e6f4ea' },
  tanin:             { label:'Tanin',           icon:'🍂', color:'#6d4c41', bg:'#efebe9' },
  acidifiant:        { label:'Acidifiant',      icon:'⬆️', color:'#558b2f', bg:'#f1f8e9' },
  desacidifiant:     { label:'Désacidifiant',   icon:'⬇️', color:'#0277bd', bg:'#e1f5fe' },
  nutriment:         { label:'Nutriment',       icon:'💊', color:'#6a1b9a', bg:'#f3e5f5' },
  correcteur_alcool: { label:'Correcteur alc.', icon:'🔢', color:'#37474f', bg:'#eceff1' },
  filtre:            { label:'Filtre',          icon:'🔬', color:'#00695c', bg:'#e0f2ef' },
  autre:             { label:'Autre',           icon:'📦', color:'#546e7a', bg:'#eceff1' },
};
function getCat(key) { return CAT_META[key] || { label:key||'—', icon:'📦', color:'#546e7a', bg:'#eceff1' }; }

const DLUO_META = {
  ok:      { label:'OK',      cls:'dluo-ok'     },
  alerte:  { label:'< 30 j',  cls:'dluo-alerte' },
  expire:  { label:'Expiré',  cls:'dluo-expire' },
  inconnu: { label:'—',       cls:'dluo-inconnu'},
};

function statutDluo(dluo) {
  if (!dluo) return 'inconnu';
  const d = new Date(dluo), now = new Date();
  now.setHours(0,0,0,0);
  if (d < now) return 'expire';
  const soon = new Date(now); soon.setDate(soon.getDate()+30);
  if (d <= soon) return 'alerte';
  return 'ok';
}

const STOCK_COLS = [
  { key:'produit_nom',  label:'Produit',    sortKey:'produit_nom',  numeric:false, defaultVisible:true },
  { key:'categorie',    label:'Catégorie',  sortKey:'categorie',    numeric:false, defaultVisible:true },
  { key:'numero_lot',   label:'N° lot',     sortKey:'numero_lot',   numeric:false, defaultVisible:true },
  { key:'dluo',         label:'DLUO',       sortKey:'dluo',         numeric:false, defaultVisible:true },
  { key:'quantite_act', label:'Stock',      sortKey:'quantite_act', numeric:true,  defaultVisible:true },
  { key:'fournisseur',  label:'Fournisseur',sortKey:'fournisseur',  numeric:false, defaultVisible:true },
  { key:'date_reception',label:'Réception', sortKey:'date_reception',numeric:false,defaultVisible:false},
];

// ============================================================
// État
// ============================================================
let catalogue   = [];
let lots        = [];
let _canManage  = true;   // rôle autorisé à gérer le catalogue (caviste = consultation)
let activeTab   = 'catalogue';
// Défaut tableau + persistance localStorage
let viewMode    = (() => { try { return localStorage.getItem('wb3_produits_view') || 'table'; } catch(_) { return 'table'; } })();
let sortBy      = 'nom';
let sortAsc     = true;
let filterCat   = 'all';
let searchQuery = '';
let currentPage = 1;
const PAGE_SIZE = 50;
let editingId   = null;
let lotRows     = [];
let columnFilters   = {};
let activeFilterCol = null;

// ============================================================
// Toast / utils
// ============================================================
function toast(a, b){ if (window.WB3Toast) return WB3Toast.legacy(a, b); }
function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmt(n,d=1) { return Number(n||0).toLocaleString('fr-FR',{maximumFractionDigits:d}); }
async function logout() { await WB3Auth.signOut(); WB3Nav.navigateTop('app.html'); }

// ============================================================
// Auth & init
// ============================================================
(async function init() {
  if (typeof window.supabase === 'undefined' || typeof window.WB3DB === 'undefined') {
    document.getElementById('content').innerHTML =
      `<div class="empty-state"><div class="icon">❌</div><div class="title">Modules WB3 non chargés</div></div>`;
    return;
  }
  const ctx = await WB3AppBoot.requireReadyContext();
  if (!ctx) {
    document.getElementById('content').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div><div class="title">Aucun tenant accessible</div></div>`;
    document.querySelector('.fab').style.display = 'none'; return;
  }
  const { tenant } = ctx;
  document.getElementById('tenant-pill').textContent = `🏢 ${tenant.nom} · ${tenant.role}`;
  _canManage = !WB3DB.can || WB3DB.can('produits.manage');
  if (!_canManage) document.querySelector('.fab')?.style.setProperty('display', 'none');
  await Promise.all([loadCatalogue(), loadLots()]);
  await applyProduitsVuePrefs();
  subscribeRealtime();
  buildCatChips();
  setupEventListeners();
  render();
})();

// ============================================================
// Chargement
// ============================================================
async function applyProduitsVuePrefs() {
  try {
    const p = await WB3DB.getUserPref('produits_vue');
    if (p) {
      if (p.view_mode) viewMode = p.view_mode;
      if (p.sort_by)   sortBy   = p.sort_by;
      if (typeof p.sort_asc === 'boolean') sortAsc = p.sort_asc;
      if (p.active_tab) {
        activeTab = p.active_tab;
        document.querySelectorAll('#tabs .tab').forEach(b =>
          b.classList.toggle('active', b.dataset.tab === activeTab));
      }
    }
  } catch(e) { console.warn('[WB3 produits] applyProduitsVuePrefs:', e); }
  // Sync UI bouton toujours (pref user, localStorage ou défaut 'table')
  document.querySelectorAll('#view-mode button[data-view]').forEach(b =>
    b.classList.toggle('active', b.dataset.view === viewMode));
}

async function loadCatalogue() {
  try {
    catalogue = await WB3DB.listTable('produits_catalogue', { order: 'nom' });
  } catch(e) { console.error('[WB3 produits]', e); catalogue = []; }
}

async function loadLots() {
  try {
    lots = await WB3DB.getProduitLots();
  } catch(e) { console.error('[WB3 lots produits]', e); lots = []; }
}

let _rtTimer = null;
function _debouncedFullReload() {
  clearTimeout(_rtTimer);
  _rtTimer = setTimeout(async () => {
    await Promise.all([loadCatalogue(), loadLots()]);
    buildCatChips(); render();
  }, 150);
}

function subscribeRealtime() {
  WB3DB.subscribeTable('produits_catalogue', _debouncedFullReload);
  WB3DB.subscribeTable('produits_lots',      _debouncedFullReload);
}

// ============================================================
// Chips catégories
// ============================================================
function buildCatChips() {
  const cats = [...new Set(catalogue.map(p => p.categorie).filter(Boolean))].sort();
  const bar  = document.getElementById('cat-chips');
  bar.innerHTML = `<button class="chip active" data-cat="all">Toutes catégories</button>` +
    cats.map(c => { const m = getCat(c); return `<button class="chip" data-cat="${escapeHtml(c)}">${m.icon} ${escapeHtml(m.label)}</button>`; }).join('');
  bar.querySelectorAll('.chip').forEach(chip =>
    chip.addEventListener('click', () => {
      bar.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active'); filterCat = chip.dataset.cat; currentPage = 1; render();
    })
  );
}

// ============================================================
// Filtrage
// ============================================================
function getFilteredCatalogue() {
  return catalogue
    .filter(p => filterCat === 'all' || p.categorie === filterCat)
    .filter(p => {
      if (!searchQuery) return true;
      const hay = [p.nom, p.fournisseur, p.sous_categorie, p.categorie, p.reference_fournisseur, p.notes].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(searchQuery);
    })
    .sort((a,b) => {
      const av = sortBy==='categorie'?a.categorie:a.nom, bv = sortBy==='categorie'?b.categorie:b.nom;
      const c = String(av||'').localeCompare(String(bv||''),'fr');
      return sortAsc ? c : -c;
    });
}

function getFilteredLots() {
  return lots
    .filter(l => {
      if (filterCat !== 'all') {
        const cat = l.produits_catalogue?.categorie;
        if (cat !== filterCat) return false;
      }
      if (searchQuery) {
        const hay = [
          l.produits_catalogue?.nom, l.numero_lot,
          l.produits_catalogue?.fournisseur, l.fournisseur, l.notes
        ].filter(Boolean).join(' ').toLowerCase();
        if (!hay.includes(searchQuery)) return false;
      }
      return passesColumnFilters(l);
    })
    .sort((a,b) => {
      let av, bv;
      if      (sortBy==='nom')           { av=a.produits_catalogue?.nom||''; bv=b.produits_catalogue?.nom||''; }
      else if (sortBy==='categorie')     { av=a.produits_catalogue?.categorie||''; bv=b.produits_catalogue?.categorie||''; }
      else if (sortBy==='dluo')          { av=a.dluo||'9999'; bv=b.dluo||'9999'; }
      else if (sortBy==='quantite_act')  { return sortAsc?(a.quantite_actuelle||0)-(b.quantite_actuelle||0):(b.quantite_actuelle||0)-(a.quantite_actuelle||0); }
      else                               { av=a[sortBy]||''; bv=b[sortBy]||''; }
      const c = String(av).localeCompare(String(bv),'fr'); return sortAsc ? c : -c;
    });
}

function getFilteredAlertes() {
  return lots.filter(l => {
    const s = statutDluo(l.dluo);
    return s === 'expire' || s === 'alerte';
  }).sort((a,b) => {
    if (!a.dluo && b.dluo) return 1;
    if (a.dluo && !b.dluo) return -1;
    return a.dluo < b.dluo ? -1 : 1;
  });
}

// ============================================================
// Rendu principal
// ============================================================
function render() {
  renderStats(); renderTabCounts();
  const btnCF = document.getElementById('btn-clear-filters');
  if (btnCF) btnCF.style.display = (activeTab === 'stock' && viewMode === 'table' && hasActiveColumnFilters()) ? '' : 'none';

  const container   = document.getElementById('content');

  if (activeTab === 'catalogue') {
    const items = getFilteredCatalogue();
    document.getElementById('pagination-bar').style.display = 'none';
    if (!items.length) {
      container.innerHTML = !catalogue.length
        ? `<div class="empty-state"><div class="icon">🧪</div><div class="title">Aucun produit dans le catalogue</div>
           <div class="desc">Ajoutez vos premiers intrants œnologiques.</div>
           ${_canManage ? `<div class="actions"><button class="btn" onclick="openDrawer()">+ Nouveau produit</button></div>` : ''}</div>`
        : `<div class="empty-state"><div class="icon">🔍</div><div class="title">Aucun résultat</div><div class="desc">Modifiez vos filtres.</div></div>`;
      return;
    }
    if (viewMode === 'table') renderCatalogueTable(items);
    else {
      container.innerHTML = '<div class="cuverie-grid" id="produit-grid"></div>';
      document.getElementById('produit-grid').append(...items.map(renderCatalogueCard));
    }
  }
  else if (activeTab === 'stock') {
    const items = getFilteredLots();
    if (!items.length) {
      document.getElementById('pagination-bar').style.display = 'none';
      container.innerHTML = !lots.length
        ? `<div class="empty-state"><div class="icon">📦</div><div class="title">Aucun lot en stock</div>
           <div class="desc">Ajoutez un produit puis renseignez ses lots.</div></div>`
        : `<div class="empty-state"><div class="icon">🔍</div><div class="title">Aucun résultat</div></div>`;
      return;
    }
    const total = items.length;
    const pages = Math.max(1, Math.ceil(total/PAGE_SIZE));
    if (currentPage > pages) currentPage = pages;
    const paged = items.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
    if (viewMode === 'grid') renderStockGrid(paged); else renderStockTable(paged);
    renderPagination(total);
  }
  else { // alertes
    const items = getFilteredAlertes();
    document.getElementById('pagination-bar').style.display = 'none';
    if (!items.length) {
      container.innerHTML = `<div class="empty-state"><div class="icon">✅</div>
        <div class="title">Aucune alerte DLUO</div>
        <div class="desc">Tous les lots sont dans les délais.</div></div>`;
      return;
    }
    container.innerHTML = '<div class="cuverie-grid" id="alerte-grid"></div>';
    document.getElementById('alerte-grid').append(...items.map(renderAlerteCard));
  }
}

// ============================================================
// Filtres colonnes (vue tableau stock)
// ============================================================
function getRawValue(key, l) {
  const pc = l.produits_catalogue || {};
  switch(key) {
    case 'produit_nom':   return pc.nom || '';
    case 'categorie':     return getCat(pc.categorie).label;
    case 'numero_lot':    return l.numero_lot || '';
    case 'dluo':          return l.dluo || '';
    case 'quantite_act':  return l.quantite_actuelle;
    case 'fournisseur':   return l.fournisseur || pc.fournisseur || '';
    case 'date_reception':return l.date_reception || '';
    default: return '';
  }
}
function isNumericCol(key) { return ['quantite_act'].includes(key); }
function getUniqueValues(key) {
  const vals = new Set();
  lots.forEach(l => { const r=getRawValue(key,l); vals.add(r==null?'':String(r)); });
  return [...vals].sort((a,b)=>(!a&&b)?1:(a&&!b)?-1:a.localeCompare(b,'fr'));
}
function isFilterActive(key) {
  const f=columnFilters[key]; if (!f) return false;
  if (f.type==='values') return f.values?.length>0;
  if (f.type==='range')  return (f.min!=null&&f.min!=='') || (f.max!=null&&f.max!=='');
  return false;
}
function hasActiveColumnFilters() { return Object.keys(columnFilters).some(k=>isFilterActive(k)); }
function passesColumnFilters(l) {
  for (const [key, filter] of Object.entries(columnFilters)) {
    if (!isFilterActive(key)) continue;
    const raw = getRawValue(key, l);
    if (filter.type==='values') { if (!filter.values.includes(raw==null?'':String(raw))) return false; }
    else if (filter.type==='range') {
      const num=Number(raw);
      if (filter.min!=null&&filter.min!==''&&num<Number(filter.min)) return false;
      if (filter.max!=null&&filter.max!==''&&num>Number(filter.max)) return false;
    }
  }
  return true;
}
function openFilterDropdown(event, colKey) {
  event.stopPropagation();
  if (activeFilterCol===colKey) { closeFilterDropdown(); return; }
  activeFilterCol=colKey;
  const dd=document.getElementById('col-filter-dropdown');
  dd.innerHTML=buildFilterContent(colKey); dd.classList.add('open');
  const rect=event.currentTarget.getBoundingClientRect();
  let left=rect.left; if (left+260>window.innerWidth-8) left=window.innerWidth-268; if (left<8) left=8;
  dd.style.left=left+'px'; dd.style.top=(rect.bottom+4)+'px';
}
function closeFilterDropdown() { activeFilterCol=null; document.getElementById('col-filter-dropdown').classList.remove('open'); }
function buildFilterContent(key) {
  const col=STOCK_COLS.find(c=>c.key===key), filter=columnFilters[key]||{};
  if (isNumericCol(key)) {
    const minV=filter.type==='range'&&filter.min!=null?filter.min:'';
    const maxV=filter.type==='range'&&filter.max!=null?filter.max:'';
    return `<div class="col-filter-title">🔢 ${escapeHtml(col?.label||key)}</div>
      <div class="col-filter-range">
        <input class="input" type="number" id="cf-min" placeholder="Min" value="${minV}">
        <span style="color:var(--color-ink-tertiary);flex-shrink:0">→</span>
        <input class="input" type="number" id="cf-max" placeholder="Max" value="${maxV}">
      </div>
      <div class="col-filter-footer">
        <button class="btn btn--ghost btn--sm" onclick="clearColumnFilter('${key}')">✕ Effacer</button>
        <button class="btn btn--sm" onclick="applyRangeFilter('${key}')">Appliquer</button>
      </div>`;
  }
  const uv=getUniqueValues(key), av=filter.type==='values'&&Array.isArray(filter.values)?filter.values:[];
  const valItems=uv.length===0
    ?`<div style="padding:var(--space-2);color:var(--color-ink-tertiary);font-size:var(--text-caption)">Aucune valeur</div>`
    :uv.map(v=>`<label class="col-filter-value-item">
      <input type="checkbox" value="${escapeHtml(v)}" ${av.includes(v)?'checked':''} onchange="toggleFilterValue('${key}',this.value,this.checked)">
      <span>${v===''?'<em style="color:var(--color-ink-tertiary)">vide</em>':escapeHtml(v)}</span></label>`).join('');
  return `<div class="col-filter-title">🔡 ${escapeHtml(col?.label||key)}</div>
    <input class="input col-filter-search" type="text" placeholder="Rechercher…" oninput="filterValuesSearch(this.value)">
    <div class="col-filter-values" id="cf-values-list">${valItems}</div>
    <div class="col-filter-footer">
      <button class="btn btn--ghost btn--sm" onclick="clearColumnFilter('${key}')">✕ Effacer</button>
      <button class="btn btn--ghost btn--sm" onclick="selectAllFilterValues()">Tout décocher</button>
    </div>`;
}
function toggleFilterValue(key,value,checked) {
  if (!columnFilters[key]||columnFilters[key].type!=='values') columnFilters[key]={type:'values',values:[]};
  const vals=columnFilters[key].values;
  if (checked&&!vals.includes(value)) vals.push(value);
  else if (!checked) columnFilters[key].values=vals.filter(v=>v!==value);
  render();
}
function applyRangeFilter(key) {
  const min=document.getElementById('cf-min')?.value.trim(), max=document.getElementById('cf-max')?.value.trim();
  if (!min&&!max) delete columnFilters[key];
  else columnFilters[key]={type:'range',min:min!==''?Number(min):null,max:max!==''?Number(max):null};
  closeFilterDropdown(); render();
}
function clearColumnFilter(key)   { delete columnFilters[key]; closeFilterDropdown(); render(); }
function clearAllColumnFilters()  { columnFilters={}; render(); }
function selectAllFilterValues()  {
  const list=document.getElementById('cf-values-list'); if (!list||!activeFilterCol) return;
  list.querySelectorAll('input[type=checkbox]').forEach(cb=>{cb.checked=false;});
  if (columnFilters[activeFilterCol]) columnFilters[activeFilterCol].values=[];
  render();
}
function filterValuesSearch(query) {
  const list=document.getElementById('cf-values-list'); if (!list) return;
  const q=query.toLowerCase();
  list.querySelectorAll('.col-filter-value-item').forEach(item=>{
    const text=item.querySelector('span')?.textContent.toLowerCase()||'';
    item.style.display=q===''||text.includes(q)?'':'none';
  });
}

// Stats / Tabs

function renderStats() {
  const today = new Date().toISOString().slice(0,10);
  const soon  = new Date(Date.now()+30*86400000).toISOString().slice(0,10);
  const alertes = lots.filter(l => l.dluo && l.dluo <= soon);
  const expires = lots.filter(l => l.dluo && l.dluo < today);
  const stockTotal = lots.reduce((s,l)=>s+(Number(l.quantite_actuelle)||0),0);
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="label">Produits catalogue</div><div class="value">${catalogue.filter(p=>p.actif).length}</div></div>
    <div class="stat-card"><div class="label">Lots en stock</div><div class="value">${lots.length}</div></div>
    <div class="stat-card"><div class="label">Alertes DLUO (< 30 j)</div><div class="value" style="color:${alertes.length?'var(--color-warn)':'inherit'}">${alertes.length}</div></div>
    <div class="stat-card"><div class="label">Lots expirés</div><div class="value" style="color:${expires.length?'var(--color-error)':'inherit'}">${expires.length}</div></div>`;
}

function renderTabCounts() {
  document.querySelector('[data-count="catalogue"]').textContent = catalogue.length;
  document.querySelector('[data-count="stock"]').textContent     = lots.length;
  const today = new Date().toISOString().slice(0,10);
  const soon  = new Date(Date.now()+30*86400000).toISOString().slice(0,10);
  document.querySelector('[data-count="alertes"]').textContent   = lots.filter(l=>l.dluo&&l.dluo<=soon).length;
}

// ============================================================
// Pagination
// ============================================================
function renderPagination(total) {
  const bar=document.getElementById('pagination-bar'), pages=Math.ceil(total/PAGE_SIZE);
  if (pages<=1) { bar.style.display='none'; return; }
  const start=(currentPage-1)*PAGE_SIZE+1, end=Math.min(currentPage*PAGE_SIZE,total);
  bar.style.display='';
  bar.innerHTML=`
    <button class="btn btn--ghost btn--sm" onclick="goToPage(${currentPage-1})" ${currentPage===1?'disabled':''}>← Précédent</button>
    <span class="pagination-info">${start}–${end} sur ${total}</span>
    <button class="btn btn--ghost btn--sm" onclick="goToPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>Suivant →</button>`;
}
function goToPage(p) {
  const pages=Math.max(1,Math.ceil(getFilteredLots().length/PAGE_SIZE));
  currentPage=Math.max(1,Math.min(p,pages)); render();
}

// ============================================================
// Event listeners
// ============================================================
function setupEventListeners() {
  document.querySelectorAll('#tabs .tab').forEach(tab =>
    tab.addEventListener('click', () => {
      document.querySelectorAll('#tabs .tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active'); activeTab=tab.dataset.tab; currentPage=1;
      // Tri par défaut selon onglet
      if (activeTab==='stock') { sortBy='dluo'; sortAsc=true; }
      else { sortBy='nom'; sortAsc=true; }
      render();
    })
  );
  document.querySelectorAll('#view-mode button[data-view]').forEach(btn =>
    btn.addEventListener('click', () => {
      document.querySelectorAll('#view-mode button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); viewMode=btn.dataset.view;
      try { localStorage.setItem('wb3_produits_view', viewMode); } catch(_) {}
      // Sync Supabase : merge avec la pref existante (sort_by, active_tab, etc.)
      WB3DB.getUserPref('produits_vue').then(p =>
        WB3DB.setUserPref('produits_vue', { ...(p || {}), view_mode: viewMode })
      ).catch(e => console.warn('[WB3 produits] setUserPref:', e));
      render();
    })
  );
  document.querySelectorAll('#sort-mode button[data-sort]').forEach(btn =>
    btn.addEventListener('click', () => {
      if (sortBy===btn.dataset.sort) sortAsc=!sortAsc;
      else { document.querySelectorAll('#sort-mode button').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); sortBy=btn.dataset.sort; sortAsc=true; }
      currentPage=1; render();
    })
  );
  document.getElementById('search').addEventListener('input', e => {
    searchQuery=e.target.value.trim().toLowerCase(); currentPage=1; render();
  });
  document.addEventListener('keydown', e => { if (e.key==='Escape') { closeFilterDropdown(); closeDrawer(); } });
  document.addEventListener('click', () => { if (activeFilterCol) closeFilterDropdown(); });
}

// ============================================================
// Drawer
// ============================================================
function openDrawer(produitId = null, lotId = null) {
  if (!_canManage) { toast('Lecture seule : la gestion du catalogue est réservée aux responsables.', 'error'); return; }
  editingId = produitId;
  document.getElementById('drawer-title').textContent = produitId ? 'Modifier le produit' : 'Nouveau produit';
  document.getElementById('btn-delete').style.display = (produitId && WB3DB.isPrivileged()) ? '' : 'none';
  document.getElementById('section-lots').style.display = produitId ? '' : 'none';

  if (produitId) {
    const p = catalogue.find(x => x.id === produitId);
    if (!p) return;
    document.getElementById('f-nom').value          = p.nom || '';
    document.getElementById('f-categorie').value    = p.categorie || 'autre';
    document.getElementById('f-sous-cat').value     = p.sous_categorie || '';
    document.getElementById('f-fournisseur').value  = p.fournisseur || '';
    document.getElementById('f-ref').value          = p.reference_fournisseur || '';
    document.getElementById('f-dose-min').value     = p.dose_min != null ? p.dose_min : '';
    document.getElementById('f-dose-max').value     = p.dose_max != null ? p.dose_max : '';
    document.getElementById('f-dose-unite').value          = p.dose_unite || '';
    document.getElementById('f-unite-stock').value         = p.unite_stock || '';
    document.getElementById('f-concentration').value       = p.concentration != null ? p.concentration : '';
    document.getElementById('f-concentration-libelle').value = p.concentration_libelle || '';
    document.getElementById('f-notes').value               = p.notes || '';
    // Lots de ce produit
    lotRows = lots.filter(l => l.produit_id === produitId).map(l => ({
      id: l.id, numero_lot: l.numero_lot||'', quantite_initiale: l.quantite_initiale,
      quantite_actuelle: l.quantite_actuelle, unite: l.unite||'', dluo: l.dluo||'',
    }));
  } else {
    document.getElementById('f-nom').value          = '';
    document.getElementById('f-categorie').value    = 'autre';
    document.getElementById('f-sous-cat').value     = '';
    document.getElementById('f-fournisseur').value  = '';
    document.getElementById('f-ref').value          = '';
    document.getElementById('f-dose-min').value     = '';
    document.getElementById('f-dose-max').value     = '';
    document.getElementById('f-dose-unite').value          = '';
    document.getElementById('f-unite-stock').value         = '';
    document.getElementById('f-concentration').value       = '';
    document.getElementById('f-concentration-libelle').value = '';
    document.getElementById('f-notes').value               = '';
    lotRows = [];
  }
  renderLotRows();
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-backdrop').classList.add('open');
  setTimeout(() => document.getElementById('f-nom').focus(), 200);
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-backdrop').classList.remove('open');
  editingId = null;
}

// ── Lignes lots du drawer ────────────────────────────────────
function renderLotRows() {
  const container = document.getElementById('f-lots-rows');
  if (!lotRows.length) { container.innerHTML = ''; return; }
  container.innerHTML = lotRows.map((row, i) => `
    <div class="lot-row">
      <input class="input" type="text" placeholder="N° lot" value="${escapeHtml(row.numero_lot)}"
        oninput="lotRows[${i}].numero_lot=this.value">
      <input class="input w80" type="number" min="0" step="0.001" placeholder="Init."
        value="${row.quantite_initiale??''}" oninput="lotRows[${i}].quantite_initiale=parseFloat(this.value)||null">
      <input class="input w80" type="number" min="0" step="0.001" placeholder="Act."
        value="${row.quantite_actuelle??''}" oninput="lotRows[${i}].quantite_actuelle=parseFloat(this.value)||null">
      <input class="input w100" list="stock-unites" placeholder="Unité" value="${escapeHtml(row.unite)}"
        oninput="lotRows[${i}].unite=this.value">
      <input class="input wdate" type="date" value="${row.dluo}"
        oninput="lotRows[${i}].dluo=this.value">
      <button class="btn btn--ghost btn--sm" onclick="removeLotRow(${i})">✕</button>
    </div>`).join('');
}
function addLotRow()     { lotRows.push({ id:null, numero_lot:'', quantite_initiale:null, quantite_actuelle:null, unite:'', dluo:'' }); renderLotRows(); }
function removeLotRow(i) { lotRows.splice(i,1); renderLotRows(); }

// ── Sauvegarde ───────────────────────────────────────────────
async function saveProduit() {
  if (!_canManage) { toast('Lecture seule : la gestion du catalogue est réservée aux responsables.', 'error'); return; }
  const nom = document.getElementById('f-nom').value.trim();
  if (!nom) { toast('Le nom est obligatoire', 'error'); return; }

  const parseNum = id => { const v=parseFloat(document.getElementById(id).value); return isNaN(v)?null:v; };

  const payload = {
    nom,
    categorie:             document.getElementById('f-categorie').value,
    sous_categorie:        document.getElementById('f-sous-cat').value.trim() || null,
    fournisseur:           document.getElementById('f-fournisseur').value.trim() || null,
    reference_fournisseur: document.getElementById('f-ref').value.trim() || null,
    dose_min:              parseNum('f-dose-min'),
    dose_max:              parseNum('f-dose-max'),
    dose_unite:            document.getElementById('f-dose-unite').value.trim() || null,
    unite_stock:           document.getElementById('f-unite-stock').value.trim() || null,
    concentration:         parseNum('f-concentration'),
    concentration_libelle: document.getElementById('f-concentration-libelle').value.trim() || null,
    notes:                 document.getElementById('f-notes').value.trim() || null,
  };

  try {
    const tenantId = WB3DB.getCurrentTenantId();
    let produitId = editingId;

    if (produitId) {
      const saved = await WB3DB.updateRow('produits_catalogue', produitId, payload);
      if (saved) {
        const idx = catalogue.findIndex(p => p.id === produitId);
        if (idx >= 0) catalogue[idx] = saved;
      }
    } else {
      const row = await WB3DB.insertRow('produits_catalogue', payload);
      produitId = row.id;
      catalogue.push(row);
    }

    await WB3DB.saveProduitLotsGraph(produitId, lotRows.map(r => ({
      id:                r.id || null,
      numero_lot:        r.numero_lot.trim() || null,
      quantite_initiale: r.quantite_initiale,
      quantite_actuelle: r.quantite_actuelle,
      unite:             r.unite.trim() || null,
      dluo:              r.dluo || null,
    })));

    toast(editingId ? 'Produit mis à jour' : 'Produit enregistré', 'success');
    closeDrawer();
    await loadLots();
    buildCatChips(); render();
  } catch(e) { console.error(e); toast('Erreur : ' + e.message, 'error'); }
}

async function deleteCurrent() {
  if (!editingId) return;
  const p = catalogue.find(x => x.id === editingId);
  if (!p || !(await WB3UI.confirm(`Archiver "${p.nom}" ?\n\nLe produit et ses lots seront masqués mais conservés pour la traçabilité.\nRécupérable dans Paramètres → Corbeille.`, { title:'Archiver le produit', okText:'Archiver' }))) return;
  try {
    const delId = editingId;
    // Archive le produit catalogue + tous ses lots associés (cohérence)
    const lotsAArchiver = lots.filter(l => l.produit_id === delId);
    await Promise.all([
      WB3DB.softDelete('produits_catalogue', delId),
      ...lotsAArchiver.map(l => WB3DB.softDelete('produits_lots', l.id)),
    ]);
    toast('Produit archivé', 'success');
    catalogue = catalogue.filter(x => x.id !== delId);
    lots = lots.filter(l => l.produit_id !== delId);
    closeDrawer(); buildCatChips(); render();
  } catch(e) { toast('Erreur : ' + e.message, 'error'); }
}

// ============================================================
// Export CSV
// ============================================================
function exportCSV() {
  const items = activeTab==='catalogue' ? getFilteredCatalogue() : getFilteredLots();
  if (!items.length) { toast('Aucun élément à exporter', 'error'); return; }
  let csv;
  if (activeTab === 'catalogue') {
    const h = ['Nom','Catégorie','Sous-catégorie','Fournisseur','Réf. fourn.','Dose min','Dose max','Unité dose','Unité stock','Notes'];
    const r = items.map(p=>[p.nom,p.categorie,p.sous_categorie||'',p.fournisseur||'',p.reference_fournisseur||'',p.dose_min??'',p.dose_max??'',p.dose_unite||'',p.unite_stock||'',p.notes||'']);
    csv = [h,...r].map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(';')).join('\n');
  } else {
    const h = ['Produit','Catégorie','N° lot','DLUO','Statut DLUO','Qté initiale','Qté actuelle','Unité','Fournisseur','Réception'];
    const r = items.map(l=>{
      const pc=l.produits_catalogue||{}; const s=statutDluo(l.dluo);
      return [pc.nom||'—',pc.categorie||'',l.numero_lot||'',l.dluo||'',DLUO_META[s].label,l.quantite_initiale??'',l.quantite_actuelle??'',l.unite||pc.unite_stock||'',l.fournisseur||pc.fournisseur||'',l.date_reception||''];
    });
    csv = [h,...r].map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(';')).join('\n');
  }
  const today = new Date().toISOString().slice(0,10);
  const blob = new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=`produits-${activeTab}-${today}.csv`; a.click();
  URL.revokeObjectURL(url);
  toast(`Export CSV OK`, 'success');
}

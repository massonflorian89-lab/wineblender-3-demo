<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" type="image/png" sizes="32x32" href="img/icon-wineblender-32.png">
<meta name="theme-color" content="#6a1b2a">
<title>Intrants & Enrichissements — VitiFlux</title>
<link rel="stylesheet" href="theme.css">
<script>(function(){var t=localStorage.getItem('wb3_theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<style>
  .tabs-bar {
    display:flex; gap:0; border-bottom:2px solid var(--color-border);
    margin-bottom:var(--space-5);
  }
  .tab-btn {
    padding:10px 20px; font-size:var(--text-callout); font-weight:600;
    background:none; border:none; cursor:pointer;
    color:var(--color-ink-tertiary); border-bottom:2px solid transparent;
    margin-bottom:-2px; transition:color .14s, border-color .14s;
  }
  .tab-btn.active { color:var(--color-primary); border-bottom-color:var(--color-primary); }
  .tab-btn:hover  { color:var(--color-ink); }

  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  .toolbar {
    display:flex; align-items:center; gap:var(--space-3);
    flex-wrap:wrap; margin-bottom:var(--space-4);
  }
  .toolbar select, .toolbar input {
    padding:7px 10px; border:1px solid var(--color-border);
    border-radius:var(--radius-md); font-size:var(--text-footnote);
    background:var(--color-bg-elevated); color:var(--color-ink);
    min-width:0;
  }
  .toolbar .spacer { flex:1; }

  /* ── Table ─────────────────────────────────────────────── */
  .data-table { width:100%; border-collapse:collapse; font-size:var(--text-footnote); }
  .data-table th {
    text-align:left; padding:8px 12px;
    background:var(--color-bg-subtle); font-weight:600; font-size:11px;
    text-transform:uppercase; letter-spacing:.4px; color:var(--color-ink-tertiary);
    border-bottom:1px solid var(--color-border); position:sticky; top:0;
  }
  .data-table td { padding:9px 12px; border-bottom:1px solid var(--color-border-subtle); vertical-align:top; }
  .data-table tr:last-child td { border-bottom:none; }
  .data-table tbody tr:hover { background:var(--color-bg-subtle); }
  .data-table .num { text-align:right; font-variant-numeric:tabular-nums; font-family:var(--font-mono); }
  .data-table .actions { text-align:right; white-space:nowrap; }
  .data-table .actions button { background:none; border:none; cursor:pointer; font-size:14px; padding:2px 4px; }
  .data-table .actions button:hover { opacity:.7; }

  /* ── Enrichissement calc ────────────────────────────────── */
  .calc-box {
    background:var(--color-bg-subtle); border:1px solid var(--color-border);
    border-radius:var(--radius-md); padding:var(--space-4); margin-top:var(--space-4);
  }
  .calc-result {
    display:flex; gap:var(--space-4); flex-wrap:wrap; margin-top:var(--space-3);
  }
  .calc-item {
    background:var(--color-bg-elevated); border-radius:var(--radius-md);
    padding:10px 16px; text-align:center; min-width:120px; flex:1;
  }
  .calc-val { font-size:var(--text-title-2); font-weight:700; color:var(--color-primary); }
  .calc-lbl { font-size:var(--text-caption); color:var(--color-ink-tertiary); margin-top:2px; }

  .brix-row { display:flex; align-items:center; gap:var(--space-2); flex-wrap:wrap; }
  .brix-row input { flex:1; min-width:80px; }
  .brix-sep { font-size:var(--text-caption); color:var(--color-ink-tertiary); }

  .type-badge {
    display:inline-flex; align-items:center; gap:4px;
    padding:2px 8px; border-radius:var(--radius-pill);
    font-size:11px; font-weight:600;
    background:var(--color-bg-subtle); color:var(--color-ink-secondary);
  }
  .type-badge.mcr     { background:#e3f2fd; color:#1565c0; }
  .type-badge.sacchar { background:#f3e5f5; color:#6a1b9a; }
</style>
</head>
<body>

<header class="wb-header">
  <div class="breadcrumb-flex">
    <a href="app.html" class="home"><img decoding="async" class="home-logo" src="img/icon-wineblender-192.png" alt="">VitiFlux</a>
    <span class="sep">/</span>
    <h1 style="font-size:var(--text-callout);font-weight:600;margin:0">🧪 Intrants &amp; Enrichissements</h1>
  </div>
  <div class="header-actions">
    <span class="tenant-pill" id="tenant-pill">—</span>
    <a class="btn btn--header" href="parametres.html" title="Paramètres">⚙️</a>
    <button class="btn btn--header" onclick="logout()">Déconnexion</button>
  </div>
</header>

<main class="wb-main">
  <div id="content">
    <div class="loading-state"><div class="spinner"></div>Chargement…</div>
  </div>
</main>

<div class="toast" id="toast"></div>

<!-- ── Modal formulaire ───────────────────────────────────────── -->
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900;overflow-y:auto;padding:32px 16px" onclick="if(event.target===this)closeModal()">
  <div id="modal-box" style="max-width:560px;margin:0 auto;background:var(--color-bg-elevated);border-radius:var(--radius-lg);padding:var(--space-6);position:relative">
    <h2 id="modal-title" style="margin:0 0 var(--space-5);font-size:var(--text-title-2)"></h2>
    <form id="modal-form" onsubmit="submitForm(event)">
      <div id="modal-fields"></div>
      <div style="display:flex;gap:var(--space-3);margin-top:var(--space-5)">
        <button type="submit" class="btn btn--primary" id="btn-submit">Enregistrer</button>
        <button type="button" class="btn btn--secondary" onclick="closeModal()">Annuler</button>
      </div>
    </form>
  </div>
</div>

<script src="lib/supabase.min.js"></script>
<script src="toast.js"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<script src="wb3-init.js"></script>
<script src="auth.js"></script>
<script src="nav.js"></script>
<script src="wb3-help.js"></script>

<script>
'use strict';

// ── État ─────────────────────────────────────────────────────
let _activeTab   = 'traitements';
let _traitements = [];
let _enrichissements = [];
let _lots        = [];
let _contenants  = [];
let _lotsByCont  = {};   // contenant_id → [{ nom, millesime, couleur, volume_hl }]
let _mcrDefaut   = 700;
let _filterLot   = '';
let _filterType  = '';
let _editingId   = null;
let _editingMode = null; // 'traitement' | 'enrichissement'

const fmt = v => v != null ? Number(v).toLocaleString('fr-FR', { maximumFractionDigits: 3 }) : '—';
const fmtDate = d => d ? new Date(d + 'T00:00:00').toLocaleDateString('fr-FR') : '—';
const esc = s => (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── Init ─────────────────────────────────────────────────────
(async function init() {
  if (typeof window.WB3DB === 'undefined' || typeof window.WB3Auth === 'undefined') {
    document.getElementById('content').innerHTML =
      `<div class="empty-state"><div class="icon">❌</div><div class="title">Modules WB3 non chargés</div><div class="desc">Rechargez la page (Ctrl+Maj+R).</div></div>`;
    return;
  }

  const ctx = await WB3AppBoot.requireReadyContext();
  if (!ctx) {
    document.getElementById('content').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div><div class="title">Aucun tenant accessible</div><div class="desc">Connectez-vous et réessayez.</div></div>`;
    return;
  }

  const pill = document.getElementById('tenant-pill');
  if (pill) pill.textContent = `🏢 ${ctx.tenant.nom} · ${ctx.tenant.role}`;

  const params = new URLSearchParams(location.search);
  _filterLot = params.get('lot_id') || '';

  try {
    const tenantId = WB3DB.getCurrentTenantId();
    const [traitements, enrichissements, lots, contenants, lotCont, tol] = await Promise.all([
      (async () => WB3DB.queryTraitements({ lot_id: _filterLot || undefined }))().catch(() => []),
      (async () => WB3DB.queryEnrichissements({ lot_id: _filterLot || undefined }))().catch(() => []),
      WB3DB.queryLots ? (async () => WB3DB.queryLots({ actif: null }))().catch(() => []) : Promise.resolve([]),
      WB3DB.client.from('contenants').select('id,nom,capacite_hl').eq('tenant_id', tenantId).eq('actif', true).order('nom').then(r => r.data || []).catch(() => []),
      WB3DB.client.from('lot_contenants').select('contenant_id,volume_hl,lot:lots!lot_id(id,nom,millesime,couleur)').eq('tenant_id', tenantId).then(r => r.data || []).catch(() => []),
      WB3DB.getTolerances ? (async () => WB3DB.getTolerances())().catch(() => ({})) : Promise.resolve({}),
    ]);
    _traitements     = traitements;
    _enrichissements = enrichissements;
    _lots            = lots;
    _contenants      = contenants;
    _mcrDefaut       = Number(tol?.mcr_concentration_defaut || 700);
    // Construire la map contenant → lots pour l'affichage dans les menus
    _lotsByCont = {};
    lotCont.forEach(lc => {
      if (!_lotsByCont[lc.contenant_id]) _lotsByCont[lc.contenant_id] = [];
      if (lc.lot) _lotsByCont[lc.contenant_id].push({ ...lc.lot, volume_hl: lc.volume_hl });
    });
  } catch(e) {
    console.error('[traitements] init error:', e);
  }

  renderAll();
}());

// ── Rendu principal ──────────────────────────────────────────
function renderAll() {
  document.getElementById('content').innerHTML = `
    <div class="tabs-bar">
      <button class="tab-btn ${_activeTab==='traitements'?'active':''}"  onclick="switchTab('traitements')">🔬 Intrants (${_traitements.length})</button>
      <button class="tab-btn ${_activeTab==='enrichissements'?'active':''}" onclick="switchTab('enrichissements')">🍬 Enrichissements (${_enrichissements.length})</button>
    </div>

    <div id="tab-traitements"    class="tab-panel ${_activeTab==='traitements'?'active':''}">
      ${renderTabTraitements()}
    </div>
    <div id="tab-enrichissements" class="tab-panel ${_activeTab==='enrichissements'?'active':''}">
      ${renderTabEnrichissements()}
    </div>
  `;
}

function switchTab(t) { _activeTab = t; renderAll(); }

// ── Onglet Intrants ──────────────────────────────────────────
function renderTabTraitements() {
  const TT = WB3DB.TRAITEMENT_TYPES || {};
  const filtered = _traitements.filter(t =>
    (!_filterLot  || t.lot_id === _filterLot) &&
    (!_filterType || t.type   === _filterType)
  );
  const typeOpts = Object.entries(TT).map(([k,v]) =>
    `<option value="${k}" ${_filterType===k?'selected':''}>${v.icon} ${v.label}</option>`
  ).join('');

  const rows = filtered.map(t => {
    const tt = TT[t.type] || { icon:'📦', label: t.type };
    const cible = t.lot?.nom ? `🍷 ${esc(t.lot.nom)}` : t.contenant?.nom ? `🛢 ${esc(t.contenant.nom)}` : '—';
    return `<tr>
      <td>${fmtDate(t.date_traitement)}</td>
      <td><span class="type-badge">${tt.icon} ${tt.label}</span></td>
      <td>${esc(t.produit)}</td>
      <td class="num">${fmt(t.dose)} ${esc(t.unite)}</td>
      <td>${cible}</td>
      <td>${esc(t.operateur || '—')}</td>
      <td>${esc(t.notes || '')}</td>
      <td class="actions">
        <button onclick="openTraitementForm('${t.id}')" title="Modifier">✏️</button>
        <button onclick="deleteTrait('${t.id}')" title="Supprimer">🗑</button>
      </td>
    </tr>`;
  }).join('');

  return `
    <div class="toolbar">
      <select onchange="_filterType=this.value;renderAll()">
        <option value="">Tous les types</option>
        ${typeOpts}
      </select>
      <div class="spacer"></div>
      <button class="btn btn--secondary btn--sm" onclick="exportCsvTraitements()">⬇ CSV</button>
      <button class="btn btn--primary btn--sm" onclick="openTraitementForm(null)">+ Intrant</button>
    </div>
    ${filtered.length === 0 ? `<div class="empty-state"><div class="icon">🔬</div><div class="title">Aucun intrant</div><div class="desc">Cliquez sur « + Intrant » pour enregistrer un traitement.</div></div>` : `
    <div style="overflow-x:auto">
      <table class="data-table">
        <thead><tr>
          <th>Date</th><th>Type</th><th>Produit</th><th>Dose</th><th>Cible</th><th>Opérateur</th><th>Notes</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`}
  `;
}

// ── Onglet Enrichissements ───────────────────────────────────
function renderTabEnrichissements() {
  const filtered = _enrichissements.filter(e =>
    !_filterLot || e.lot_id === _filterLot
  );

  const rows = filtered.map(e => {
    const cible = e.lot?.nom ? `🍷 ${esc(e.lot.nom)}` : e.contenant?.nom ? `🛢 ${esc(e.contenant.nom)}` : '—';
    const gain = (Number(e.tav_vise) - Number(e.tav_actuel)).toFixed(2);
    const badge = e.type === 'mcr'
      ? `<span class="type-badge mcr">MCR</span>`
      : `<span class="type-badge sacchar">Saccharose</span>`;
    const conc = e.type === 'mcr' && e.concentration_g_l
      ? `${fmt(e.concentration_g_l)} g/L${e.concentration_brix ? ` / ${fmt(e.concentration_brix)}°Brix` : ''}` : '—';
    return `<tr>
      <td>${fmtDate(e.date_enrichissement)}</td>
      <td>${badge}</td>
      <td>${cible}</td>
      <td class="num">${fmt(e.tav_actuel)} → ${fmt(e.tav_vise)} %vol (+${gain})</td>
      <td class="num">${fmt(e.volume_hl)} hL</td>
      <td>${conc}</td>
      <td class="num">${e.dose_calculee != null ? fmt(e.dose_calculee)+' '+esc(e.unite) : '—'}</td>
      <td class="num">${e.dose_reelle   != null ? fmt(e.dose_reelle)+' '+esc(e.unite) : '—'}</td>
      <td class="num">${e.volume_ajoute_hl ? '+'+fmt(e.volume_ajoute_hl)+' hL' : '—'}</td>
      <td>${esc(e.operateur || '—')}</td>
      <td class="actions">
        <button onclick="openEnrichissementForm('${e.id}')" title="Modifier">✏️</button>
        <button onclick="deleteEnrich('${e.id}')" title="Supprimer">🗑</button>
      </td>
    </tr>`;
  }).join('');

  return `
    <div class="toolbar">
      <div class="spacer"></div>
      <button class="btn btn--secondary btn--sm" onclick="exportCsvEnrichissements()">⬇ CSV</button>
      <button class="btn btn--primary btn--sm" onclick="openEnrichissementForm(null)">+ Enrichissement</button>
    </div>
    ${filtered.length === 0 ? `<div class="empty-state"><div class="icon">🍬</div><div class="title">Aucun enrichissement</div><div class="desc">Cliquez sur « + Enrichissement » pour enregistrer une chaptalisation.</div></div>` : `
    <div style="overflow-x:auto">
      <table class="data-table">
        <thead><tr>
          <th>Date</th><th>Type</th><th>Cible</th><th>TAV actuel → visé</th><th>Volume</th><th>Conc. MCR</th><th>Dose calculée</th><th>Dose réelle</th><th>Vol. ajouté</th><th>Opérateur</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`}
  `;
}

// ── Formulaire Intrant ───────────────────────────────────────
function openTraitementForm(id) {
  _editingId   = id;
  _editingMode = 'traitement';
  const t  = id ? _traitements.find(x => x.id === id) : null;
  const TT = WB3DB.TRAITEMENT_TYPES || {};
  const TU = WB3DB.TRAITEMENT_UNITES || ['g/hL','mL/hL','g','kg'];

  const typeOpts  = Object.entries(TT).map(([k,v]) => `<option value="${k}" ${t?.type===k?'selected':''}>${v.icon} ${v.label}</option>`).join('');
  const uniteOpts = TU.map(u => `<option ${t?.unite===u?'selected':''}>${u}</option>`).join('');
  const lotOpts   = _lots.map(l => `<option value="${l.id}" ${t?.lot_id===l.id?'selected':''}>${l.nom}${l.millesime?' '+l.millesime:''}</option>`).join('');

  document.getElementById('modal-title').textContent = id ? 'Modifier l\'intrant' : 'Nouvel intrant';
  document.getElementById('modal-fields').innerHTML = `
    <div style="display:grid;gap:var(--space-3)">
      <label>Type *<br><select name="type" required style="width:100%">${typeOpts}</select></label>
      <label>Produit (nom commercial) *<br><input name="produit" required value="${esc(t?.produit||'')}" style="width:100%"></label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)">
        <label>Dose *<br><input name="dose" type="number" step="0.0001" required value="${t?.dose??''}" style="width:100%"></label>
        <label>Unité *<br><select name="unite" required style="width:100%">${uniteOpts}</select></label>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)">
        <label>Date *<br><input name="date_traitement" type="date" required value="${t?.date_traitement||today()}" style="width:100%"></label>
        <label>Heure<br><input name="heure_traitement" type="time" value="${t?.heure_traitement||''}" style="width:100%"></label>
      </div>
      <label>Lot<br><select name="lot_id" style="width:100%"><option value="">— Aucun —</option>${lotOpts}</select></label>
      <label>Contenant<br><select name="contenant_id" style="width:100%"><option value="">— Aucun —</option>${contOptions(t?.contenant_id)}</select></label>
      <label>Opérateur<br><input name="operateur" value="${esc(t?.operateur||'')}" style="width:100%"></label>
      <label>Notes<br><textarea name="notes" rows="2" style="width:100%">${esc(t?.notes||'')}</textarea></label>
    </div>
  `;
  openModal();
}

// ── Formulaire Enrichissement ────────────────────────────────
function openEnrichissementForm(id) {
  _editingId   = id;
  _editingMode = 'enrichissement';
  const e       = id ? _enrichissements.find(x => x.id === id) : null;
  const conc_gl = e?.concentration_g_l ?? _mcrDefaut;
  const conc_bx = e?.concentration_brix ?? (WB3DB.glToBrix ? WB3DB.glToBrix(conc_gl) : null);
  const lotOpts  = _lots.map(l => `<option value="${l.id}" ${e?.lot_id===l.id?'selected':''}>${l.nom}${l.millesime?' '+l.millesime:''}</option>`).join('');

  document.getElementById('modal-title').textContent = id ? 'Modifier l\'enrichissement' : 'Nouvel enrichissement';
  document.getElementById('modal-fields').innerHTML = `
    <div style="display:grid;gap:var(--space-3)">
      <label>Type *<br>
        <select name="type" required style="width:100%" onchange="updateCalcDisplay()">
          <option value="saccharose" ${(!e||e.type==='saccharose')?'selected':''}>Saccharose</option>
          <option value="mcr" ${e?.type==='mcr'?'selected':''}>MCR (Moût Concentré Rectifié)</option>
        </select>
      </label>
      <label>Lot<br><select name="lot_id" style="width:100%"><option value="">— Aucun —</option>${lotOpts}</select></label>
      <label>Contenant<br><select name="contenant_id" style="width:100%"><option value="">— Aucun —</option>${contOptions(e?.contenant_id)}</select></label>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--space-3)">
        <label>TAV actuel (%vol) *<br><input name="tav_actuel" type="number" step="0.1" required value="${e?.tav_actuel??''}" oninput="updateCalcDisplay()" style="width:100%"></label>
        <label>TAV visé (%vol) *<br><input name="tav_vise"   type="number" step="0.1" required value="${e?.tav_vise??''}"   oninput="updateCalcDisplay()" style="width:100%"></label>
        <label>Volume (hL) *<br><input name="volume_hl" type="number" step="0.01" required value="${e?.volume_hl??''}" oninput="updateCalcDisplay()" style="width:100%"></label>
      </div>

      <div id="mcr-conc-row" style="${(!e||e.type==='mcr')?'':'display:none'}">
        <label>Concentration MCR</label>
        <div class="brix-row" style="margin-top:4px">
          <input name="concentration_g_l" type="number" step="0.01" value="${conc_gl||''}" placeholder="g/L" oninput="syncBrix(this)" style="flex:1">
          <span class="brix-sep">g/L ⇄</span>
          <input id="inp-brix" type="number" step="0.01" value="${conc_bx??''}" placeholder="°Brix" oninput="syncGl(this)" style="flex:1">
          <span class="brix-sep">°Brix</span>
        </div>
        <div style="font-size:11px;color:var(--color-ink-tertiary);margin-top:3px">Les deux champs se synchronisent · Défaut tenant : ${_mcrDefaut} g/L</div>
      </div>

      <div class="calc-box" id="calc-box">
        <div style="font-size:var(--text-footnote);font-weight:600;margin-bottom:var(--space-2)">Calcul automatique</div>
        <div class="calc-result" id="calc-result"><div class="calc-item"><div class="calc-val">—</div><div class="calc-lbl">Saisir les valeurs ci-dessus</div></div></div>
      </div>

      <label>Dose réelle appliquée<br>
        <div style="display:flex;gap:var(--space-2);align-items:center">
          <input name="dose_reelle" type="number" step="0.001" value="${e?.dose_reelle??''}" placeholder="laisser vide = dose calculée" style="flex:1">
          <span id="dose-unite-lbl" style="font-size:var(--text-footnote);color:var(--color-ink-tertiary)">kg</span>
        </div>
      </label>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)">
        <label>Date *<br><input name="date_enrichissement" type="date" required value="${e?.date_enrichissement||today()}" style="width:100%"></label>
        <label>Heure<br><input name="heure_enrichissement" type="time" value="${e?.heure_enrichissement||''}" style="width:100%"></label>
      </div>
      <label>Opérateur<br><input name="operateur" value="${esc(e?.operateur||'')}" style="width:100%"></label>
      <label>Notes<br><textarea name="notes" rows="2" style="width:100%">${esc(e?.notes||'')}</textarea></label>
    </div>
  `;
  // Surveiller changement type pour afficher/masquer la rangée MCR
  document.querySelector('[name="type"]')?.addEventListener('change', e => {
    document.getElementById('mcr-conc-row').style.display = e.target.value === 'mcr' ? '' : 'none';
    updateCalcDisplay();
  });
  updateCalcDisplay();
  openModal();
}

// ── Calcul en temps réel ─────────────────────────────────────
function updateCalcDisplay() {
  const f  = document.getElementById('modal-form');
  if (!f) return;
  const type    = f.elements.type?.value;
  const tav_act = parseFloat(f.elements.tav_actuel?.value);
  const tav_vis = parseFloat(f.elements.tav_vise?.value);
  const vol     = parseFloat(f.elements.volume_hl?.value);
  const conc_gl = parseFloat(f.querySelector('[name="concentration_g_l"]')?.value || 0) || _mcrDefaut;

  const ule = document.getElementById('dose-unite-lbl');
  if (ule) ule.textContent = type === 'mcr' ? 'L' : 'kg';

  if (!Number.isFinite(tav_act) || !Number.isFinite(tav_vis) || !Number.isFinite(vol)) {
    document.getElementById('calc-result').innerHTML = `<div class="calc-item"><div class="calc-val">—</div><div class="calc-lbl">Saisir les valeurs</div></div>`;
    return;
  }
  const calc = WB3DB.calcEnrichissement({ type, tav_actuel: tav_act, tav_vise: tav_vis, volume_hl: vol, concentration_g_l: conc_gl });
  const delta = (tav_vis - tav_act).toFixed(2);
  let html = `
    <div class="calc-item"><div class="calc-val">${delta > 0 ? '+' : ''}${delta} %vol</div><div class="calc-lbl">Gain TAV</div></div>
    <div class="calc-item"><div class="calc-val">${Number(calc.dose_calculee).toLocaleString('fr-FR', { maximumFractionDigits:2 })} ${calc.unite}</div><div class="calc-lbl">Dose calculée</div></div>
  `;
  if (type === 'mcr' && calc.volume_ajoute_hl) {
    html += `<div class="calc-item"><div class="calc-val">+${Number(calc.volume_ajoute_hl).toLocaleString('fr-FR',{maximumFractionDigits:3})} hL</div><div class="calc-lbl">Volume ajouté</div></div>`;
  }
  document.getElementById('calc-result').innerHTML = html;
}

// Synchronisation Brix ↔ g/L
function syncBrix(inp) {
  const gl   = parseFloat(inp.value);
  const brix = gl && WB3DB.glToBrix ? WB3DB.glToBrix(gl) : null;
  const brixInp = document.getElementById('inp-brix');
  if (brixInp && brix != null) brixInp.value = brix;
  updateCalcDisplay();
}
function syncGl(inp) {
  const brix = parseFloat(inp.value);
  const gl   = brix && WB3DB.brixToGl ? WB3DB.brixToGl(brix) : null;
  const glInp = document.querySelector('[name="concentration_g_l"]');
  if (glInp && gl != null) glInp.value = gl;
  updateCalcDisplay();
}

// ── Soumission ───────────────────────────────────────────────
async function submitForm(e) {
  e.preventDefault();
  const f = new FormData(e.target);
  const get = k => f.get(k) || null;

  try {
    document.getElementById('btn-submit').disabled = true;
    if (_editingMode === 'traitement') {
      const payload = {
        type:             get('type'),
        produit:          get('produit'),
        dose:             parseFloat(get('dose')),
        unite:            get('unite'),
        date_traitement:  get('date_traitement'),
        heure_traitement: get('heure_traitement') || null,
        lot_id:           get('lot_id')       || null,
        contenant_id:     get('contenant_id') || null,
        operateur:        get('operateur')    || null,
        notes:            get('notes')        || null,
      };
      if (_editingId) payload.id = _editingId;
      await WB3DB.saveTraitement(payload);
      _traitements = await WB3DB.queryTraitements().catch(() => []);
    } else {
      const type = get('type');
      const calc = WB3DB.calcEnrichissement({
        type,
        tav_actuel:       parseFloat(get('tav_actuel')),
        tav_vise:         parseFloat(get('tav_vise')),
        volume_hl:        parseFloat(get('volume_hl')),
        concentration_g_l:parseFloat(get('concentration_g_l')) || _mcrDefaut,
      });
      const payload = {
        type,
        tav_actuel:           parseFloat(get('tav_actuel')),
        tav_vise:             parseFloat(get('tav_vise')),
        volume_hl:            parseFloat(get('volume_hl')),
        concentration_g_l:    type === 'mcr' ? (parseFloat(get('concentration_g_l')) || _mcrDefaut) : null,
        concentration_brix:   type === 'mcr' ? (parseFloat(document.getElementById('inp-brix')?.value) || null) : null,
        dose_calculee:        calc.dose_calculee,
        dose_reelle:          parseFloat(get('dose_reelle')) || null,
        unite:                calc.unite,
        volume_ajoute_hl:     calc.volume_ajoute_hl || null,
        date_enrichissement:  get('date_enrichissement'),
        heure_enrichissement: get('heure_enrichissement') || null,
        lot_id:               get('lot_id')       || null,
        contenant_id:         get('contenant_id') || null,
        operateur:            get('operateur')    || null,
        notes:                get('notes')        || null,
      };
      if (_editingId) payload.id = _editingId;
      await WB3DB.saveEnrichissement(payload);
      _enrichissements = await WB3DB.queryEnrichissements().catch(() => []);
    }
    closeModal();
    renderAll();
    WB3Toast.show({ level: 'success', message: 'Enregistré ✓' });
  } catch(err) {
    WB3Toast.show({ level: 'error', message: err.message || 'Erreur enregistrement' });
  } finally {
    document.getElementById('btn-submit').disabled = false;
  }
}

// ── Suppression ──────────────────────────────────────────────
async function deleteTrait(id) {
  if (!confirm('Supprimer cet intrant ?')) return;
  try {
    await WB3DB.deleteTraitement(id);
    _traitements = await WB3DB.queryTraitements().catch(() => []);
    renderAll();
    WB3Toast.show({ level: 'success', message: 'Intrant supprimé' });
  } catch(e) { WB3Toast.show({ level: 'error', message: e.message }); }
}
async function deleteEnrich(id) {
  if (!confirm('Supprimer cet enrichissement ?\nNote : l\'ajustement volumétrique associé ne sera pas supprimé.')) return;
  try {
    await WB3DB.deleteEnrichissement(id);
    _enrichissements = await WB3DB.queryEnrichissements().catch(() => []);
    renderAll();
    WB3Toast.show({ level: 'success', message: 'Enrichissement supprimé' });
  } catch(e) { WB3Toast.show({ level: 'error', message: e.message }); }
}

// ── CSV ──────────────────────────────────────────────────────
function exportCsvTraitements() {
  const TT = WB3DB.TRAITEMENT_TYPES || {};
  const cols = ['date','type','produit','dose','unite','lot','contenant','operateur','notes'];
  const rows = _traitements.map(t => [
    t.date_traitement, (TT[t.type]?.label || t.type), t.produit,
    t.dose, t.unite,
    t.lot?.nom || '', t.contenant?.nom || '',
    t.operateur || '', t.notes || '',
  ]);
  dlCsv('vitiflux-intrants-' + today() + '.csv', cols, rows);
}
function exportCsvEnrichissements() {
  const cols = ['date','type','lot','contenant','tav_actuel','tav_vise','volume_hl','conc_g_l','conc_brix','dose_calculee','dose_reelle','unite','volume_ajoute_hl','operateur','notes'];
  const rows = _enrichissements.map(e => [
    e.date_enrichissement, e.type,
    e.lot?.nom || '', e.contenant?.nom || '',
    e.tav_actuel, e.tav_vise, e.volume_hl,
    e.concentration_g_l || '', e.concentration_brix || '',
    e.dose_calculee || '', e.dose_reelle || '', e.unite,
    e.volume_ajoute_hl || '', e.operateur || '', e.notes || '',
  ]);
  dlCsv('vitiflux-enrichissements-' + today() + '.csv', cols, rows);
}
function dlCsv(filename, cols, rows) {
  const q = v => '"' + String(v == null ? '' : v).replace(/"/g, '""') + '"';
  const csv = '﻿' + [cols, ...rows].map(r => r.map(q).join(';')).join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
  a.download = filename; a.click();
}

// ── Helpers ──────────────────────────────────────────────────
function today() { return new Date().toISOString().slice(0, 10); }

// Génère les <option> de la liste Contenant avec lot + volume
function contOptions(selectedId) {
  return _contenants.map(c => {
    const lots = _lotsByCont[c.id] || [];
    const vol  = lots.reduce((s, l) => s + (Number(l.volume_hl) || 0), 0);
    let desc;
    if (lots.length === 0) {
      desc = c.capacite_hl ? `vide · ${c.capacite_hl} hL` : 'vide';
    } else if (lots.length === 1) {
      const l = lots[0];
      const lbl = l.nom + (l.millesime ? ` ${l.millesime}` : '');
      desc = c.capacite_hl
        ? `${lbl} · ${vol} / ${c.capacite_hl} hL`
        : `${lbl} · ${vol} hL`;
    } else {
      desc = c.capacite_hl
        ? `${lots.length} lots · ${vol} / ${c.capacite_hl} hL`
        : `${lots.length} lots · ${vol} hL`;
    }
    return `<option value="${c.id}"${c.id === selectedId ? ' selected' : ''}>${esc(c.nom)} — ${esc(desc)}</option>`;
  }).join('');
}
function openModal()  { document.getElementById('modal-overlay').style.display = ''; }
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; _editingId = null; _editingMode = null; }
async function logout() { await WB3Auth.signOut(); WB3Nav.navigateTop('app.html'); }

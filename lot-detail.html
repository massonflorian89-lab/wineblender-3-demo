<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" type="image/png" sizes="32x32" href="img/icon-wineblender-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="img/icon-wineblender-16.png">
<link rel="shortcut icon" href="img/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="img/icon-wineblender-180.png">
<meta name="theme-color" content="#6a1b2a">
<title>Fiche lot — WineBlender 3</title>
<link rel="stylesheet" href="theme.css">
<script>(function(){var t=localStorage.getItem('wb3_theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<style>
  /* .header-actions, .breadcrumb-flex, .tenant-pill → theme.css (composants partagés) */

  /* ── Hero ── */
  .lot-hero {
    position:relative; overflow:hidden;
    background:var(--color-bg-elevated);
    border-radius:var(--radius-lg);
    box-shadow:0 1px 4px rgba(0,0,0,.06);
    padding:var(--space-6);
    margin-bottom:var(--space-5);
  }
  .hero-strip {
    position:absolute; top:0; left:0; right:0; height:5px;
  }
  .hero-strip.rouge { background:#b00020; }
  .hero-strip.blanc { background:#d4c089; }
  .hero-strip.rose  { background:#d89dad; }
  .hero-strip.gris  { background:#9e9ea0; }

  .hero-top { display:flex; align-items:flex-start; gap:var(--space-5); flex-wrap:wrap; }
  .hero-identity { flex:1; min-width:180px; }
  .hero-nom  { font-size:var(--text-title-1); font-weight:700; color:var(--color-ink); margin-bottom:var(--space-1); }
  .hero-meta { font-size:var(--text-callout); color:var(--color-ink-tertiary); margin-bottom:var(--space-3); }
  .hero-badges { display:flex; gap:var(--space-2); flex-wrap:wrap; }

  .hero-volumes {
    display:flex; gap:var(--space-6); flex-wrap:wrap;
    align-items:center;
  }
  .hero-vol-item { text-align:center; min-width:80px; }
  .hero-vol-val  { font-size:var(--text-title-2); font-weight:700; color:var(--color-primary); }
  .hero-vol-lbl  { font-size:var(--text-caption); color:var(--color-ink-tertiary); text-transform:uppercase; letter-spacing:.4px; margin-top:2px; }
  .hero-vol-val.gain { color:var(--color-success); }
  .hero-vol-val.perte { color:var(--color-warning); }

  /* Statut badges (mêmes que lots.html) */
  .statut-badge {
    display:inline-flex; align-items:center; gap:var(--space-1);
    padding:3px 9px; border-radius:var(--radius-pill);
    font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.4px;
    white-space:nowrap;
  }
  .statut-vendange      { background:#f5ede0; color:#836539; }
  .statut-mout          { background:#faf3e7; color:#8b6738; }
  .statut-mout_stabule  { background:#faf7e5; color:#836d2d; }
  .statut-mout_debourbe { background:#faf0d7; color:#8f641f; }
  .statut-fa            { background:#fff0ea; color:#bd4800; }
  .statut-fml           { background:#fff3e7; color:#ac5800; }
  .statut-vin           { background:#fce9ec; color:#b00020; }
  .statut-elevage       { background:#e8f0fa; color:#1a4870; }
  .statut-vin_filtre    { background:#f3e0e3; color:#9a0025; }
  .statut-pre_mise      { background:#ece8f5; color:#5a3a8a; }
  .statut-conditionne   { background:#f0ece5; color:#555; }
  .statut-sorti         { background:#f2f2f2; color:#6d6d6d; }
  .statut-archive       { background:#f2f2f2; color:#6d6d6d; }

  /* ── KPIs mini ── */
  .kpi-row {
    display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr));
    gap:var(--space-3); margin-bottom:var(--space-5);
  }
  .kpi-mini {
    background:var(--color-bg-elevated);
    border-radius:var(--radius-md);
    padding:var(--space-4) var(--space-5);
    box-shadow:0 1px 3px rgba(0,0,0,.05);
    display:flex; align-items:center; gap:var(--space-3);
  }
  .kpi-mini .icon { font-size:var(--text-title-1); flex-shrink:0; }
  .kpi-mini .val  { font-size:var(--text-title-2); font-weight:700; color:var(--color-primary); }
  .kpi-mini .lbl  { font-size:var(--text-caption); color:var(--color-ink-tertiary); }

  /* ── Sections ── */
  .detail-section {
    background:var(--color-bg-elevated);
    border-radius:var(--radius-lg);
    box-shadow:0 1px 3px rgba(0,0,0,.05);
    margin-bottom:var(--space-5);
    overflow:hidden;
  }
  .section-head {
    display:flex; align-items:center; gap:var(--space-2);
    padding:var(--space-3) var(--space-5);
    border-bottom:1px solid var(--color-border);
  }
  .section-head h2 {
    flex:1; margin:0;
    font-size:var(--text-callout); font-weight:600;
    color:var(--color-ink-secondary);
    text-transform:uppercase; letter-spacing:.5px;
  }
  .section-count {
    background:var(--color-bg-mute); color:var(--color-ink-tertiary);
    padding:2px 8px; border-radius:var(--radius-pill);
    font-size:var(--text-caption); font-weight:600;
  }
  .section-body { padding:var(--space-4) var(--space-5); }

  /* ── Cépages ── */
  .cepage-chips { display:flex; gap:var(--space-2); flex-wrap:wrap; }
  .cepage-chip {
    background:var(--color-bg-mute); border-radius:var(--radius-pill);
    padding:4px 12px; font-size:var(--text-footnote); color:var(--color-ink-secondary);
    display:inline-flex; align-items:center; gap:6px;
  }
  .cepage-chip .pct { color:var(--color-ink-tertiary); font-size:var(--text-caption); }

  /* ── Contenants ── */
  .cont-chips { display:flex; gap:var(--space-2); flex-wrap:wrap; }
  .cont-chip {
    background:var(--color-info-soft);
    border:1px solid rgba(25,118,210,.15);
    border-radius:var(--radius-md);
    padding:6px 12px; font-size:var(--text-footnote); color:var(--color-info);
    display:inline-flex; align-items:center; gap:6px;
    transition:border-color .15s, box-shadow .15s;
  }
  a.cont-chip:hover {
    border-color:var(--color-info);
    box-shadow:0 2px 8px rgba(25,118,210,.15);
  }

  /* ── Table apports ── */
  .apports-table { width:100%; border-collapse:collapse; font-size:var(--text-callout); }
  .apports-table th, .apports-table td {
    text-align:left; padding:8px 10px; border-bottom:1px solid var(--color-border);
  }
  .apports-table th {
    font-size:var(--text-caption); text-transform:uppercase; letter-spacing:.4px;
    color:var(--color-ink-tertiary); font-weight:600; background:var(--color-bg-subtle);
  }
  .apports-table tbody tr:last-child td { border-bottom:none; }
  .apports-table tbody tr:hover td { background:var(--color-bg-subtle); }
  .num { text-align:right; }

  /* ── Timeline opérations ── */
  .timeline {
    display:flex; flex-direction:column; gap:var(--space-3);
    padding:var(--space-4) var(--space-5);
  }
  .tl-item { display:flex; gap:var(--space-3); }
  .tl-spine {
    display:flex; flex-direction:column; align-items:center; flex-shrink:0; width:32px;
  }
  .tl-dot {
    width:32px; height:32px; border-radius:50%;
    background:var(--color-primary); color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:var(--text-callout); flex-shrink:0;
    box-shadow:0 2px 8px rgba(26,72,112,.3);
  }
  .tl-line { flex:1; width:2px; background:var(--color-border); margin-top:var(--space-1); min-height:16px; }
  .tl-item:last-child .tl-line { display:none; }

  .tl-card {
    flex:1; background:var(--color-bg);
    border:1px solid var(--color-border);
    border-radius:var(--radius-md);
    padding:var(--space-3) var(--space-4);
    margin-bottom:var(--space-1);
    min-width:0;
  }
  .tl-card-head {
    display:flex; align-items:center; gap:var(--space-2);
    flex-wrap:wrap; margin-bottom:var(--space-2);
  }
  .tl-date { font-size:var(--text-caption); color:var(--color-ink-tertiary); font-weight:600; white-space:nowrap; }
  .tl-type { font-size:var(--text-callout); font-weight:600; color:var(--color-ink); }
  .tl-vol  { font-size:var(--text-caption); color:var(--color-ink-tertiary); margin-left:auto; white-space:nowrap; }

  .role-badge {
    display:inline-flex; align-items:center;
    padding:2px 8px; border-radius:var(--radius-pill);
    font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.4px;
    white-space:nowrap;
  }
  .role-source      { background:#fff0ea; color:#bd4800; }
  .role-destination { background:var(--color-success-soft); color:var(--color-success); }
  .role-traite      { background:var(--color-info-soft); color:var(--color-info); }
  .op-stat-realise  { background:var(--color-success-soft); color:var(--color-success); }
  .op-stat-planifie { background:var(--color-warning-soft); color:var(--color-warning); }
  .op-stat-annule   { background:#f2f2f2; color:#6d6d6d; }

  .tl-details { display:flex; flex-direction:column; gap:var(--space-2); }
  .tl-detail-line {
    font-size:var(--text-footnote); color:var(--color-ink-secondary);
    display:flex; align-items:baseline; gap:var(--space-2); flex-wrap:wrap;
  }
  .tl-detail-lbl {
    color:var(--color-ink-tertiary); flex-shrink:0; width:86px;
    font-size:var(--text-caption); text-transform:uppercase; letter-spacing:.3px;
  }
  .chips-inline { display:flex; gap:var(--space-1); flex-wrap:wrap; }
  .chip-prod {
    background:var(--color-bg-mute); border-radius:var(--radius-pill);
    padding:2px 8px; font-size:var(--text-caption);
  }
  .chip-cont {
    background:var(--color-info-soft); color:var(--color-info);
    border-radius:var(--radius-pill); padding:2px 8px; font-size:var(--text-caption);
  }
  .chip-lot {
    background:var(--color-bg-mute); border-radius:var(--radius-pill);
    padding:2px 8px; font-size:var(--text-caption);
  }
  .tl-notes {
    font-size:var(--text-footnote); color:var(--color-ink-tertiary);
    margin-top:var(--space-2); padding-top:var(--space-2);
    border-top:1px solid var(--color-border); font-style:italic;
  }

  /* ── Généalogie arbre ── */
  .genea-tree-wrap {
    display:flex; align-items:flex-start; gap:var(--space-4);
    flex-wrap:wrap; padding:var(--space-2) 0 var(--space-1);
  }
  .genea-tree-col { display:flex; flex-direction:column; gap:var(--space-2); min-width:0; }
  .genea-tree-label {
    font-size:10px; text-transform:uppercase; letter-spacing:.5px;
    font-weight:600; color:var(--color-ink-tertiary); margin-bottom:var(--space-1);
    text-align:center;
  }
  .genea-tree-arrow {
    font-size:var(--text-title-1); color:var(--color-ink-tertiary); flex-shrink:0;
    display:flex; align-items:center; padding-top:34px;
  }
  .genea-tree-node {
    display:flex; flex-direction:column; gap:3px; padding:10px 13px;
    border-radius:var(--radius-md); border:1.5px solid var(--color-border);
    background:var(--color-bg-elevated); cursor:pointer;
    transition:all .15s; min-width:130px; text-align:left; font-family:inherit;
    max-width:210px;
  }
  .genea-tree-node--parent:hover { border-color:#7b1fa2; box-shadow:0 2px 8px rgba(123,31,162,.15); }
  .genea-tree-node--child:hover  { border-color:#2e7d32; box-shadow:0 2px 8px rgba(46,125,50,.15); }
  .genea-node-name { font-weight:600; font-size:var(--text-callout); color:var(--color-ink); }
  .genea-node-sub  { font-size:var(--text-caption); color:var(--color-ink-tertiary); }
  .genea-node-vol  { font-size:var(--text-caption); color:var(--color-primary); font-weight:600; }
  .genea-node-tag  {
    display:inline-block; font-size:9px; padding:1px 5px;
    border-radius:3px; font-weight:500; margin-top:2px; align-self:flex-start;
  }
  .genea-tag-auto   { background:#e3f2fd; color:#1565c0; }
  .genea-tag-manual { background:#f3e5f5; color:#6a1b9a; }
  .genea-tag-ops    { background:var(--color-bg-subtle); color:var(--color-ink-tertiary); }
  .genea-current-node {
    display:flex; flex-direction:column; align-items:center; gap:var(--space-1);
    background:var(--color-primary); color:#fff; padding:12px 18px;
    border-radius:var(--radius-md); font-weight:600; font-size:var(--text-callout);
    min-width:140px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,.12);
  }
  .genea-current-sub { font-size:10px; opacity:.75; font-weight:400; }

  /* ── Stepper état lot ── */
  .statut-stepper {
    background:var(--color-bg-elevated); border-radius:var(--radius-lg);
    box-shadow:0 1px 3px rgba(0,0,0,.05);
    padding:var(--space-4) var(--space-5); margin-bottom:var(--space-5);
  }
  .stepper-track {
    display:flex; align-items:flex-start; overflow-x:auto;
    padding-bottom:var(--space-1); scrollbar-width:thin; gap:0;
  }
  .step-node {
    display:flex; flex-direction:column; align-items:center;
    flex-shrink:0; min-width:66px;
  }
  .step-dot {
    width:30px; height:30px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:var(--text-footnote); border:2px solid; transition:all .2s;
  }
  .step-dot.done    { background:var(--color-success); border-color:var(--color-success); color:#fff; }
  .step-dot.current { background:var(--color-primary); border-color:var(--color-primary); color:#fff; box-shadow:0 0 0 5px rgba(26,72,112,.12); }
  .step-dot.future  { background:var(--color-bg-mute); border-color:var(--color-border); color:var(--color-ink-tertiary); }
  .step-label {
    font-size:9px; text-align:center; margin-top:5px; line-height:1.3;
    max-width:62px; text-transform:uppercase; letter-spacing:.3px; word-break:break-word;
  }
  .step-label.done    { color:var(--color-success); font-weight:600; }
  .step-label.current { color:var(--color-primary); font-weight:700; }
  .step-label.future  { color:var(--color-ink-quaternary); }
  .step-connector {
    flex:1; height:2px; min-width:12px; align-self:flex-start;
    margin-top:14px; flex-shrink:1;
  }
  .step-connector.done    { background:var(--color-success); }
  .step-connector.current { background:linear-gradient(90deg,var(--color-success) 50%,var(--color-border) 50%); }
  .step-connector.future  { background:var(--color-border); }

  .stepper-actions {
    margin-top:var(--space-3); padding-top:var(--space-3);
    border-top:1px solid var(--color-border);
    display:flex; align-items:center; gap:var(--space-2); flex-wrap:wrap;
  }
  .stepper-next-lbl {
    font-size:var(--text-caption); color:var(--color-ink-tertiary);
    font-weight:600; text-transform:uppercase; letter-spacing:.4px;
    white-space:nowrap; flex-shrink:0;
  }
  .next-state-btn {
    display:inline-flex; align-items:center; gap:5px;
    padding:6px 14px; border-radius:var(--radius-md);
    border:1.5px solid var(--color-primary); background:transparent;
    color:var(--color-primary); font-size:var(--text-callout);
    font-family:inherit; font-weight:600; cursor:pointer; transition:all .14s;
  }
  .next-state-btn:hover { background:var(--color-primary); color:#fff; }

  /* ── Analyse modal ── */
  .an-backdrop {
    position:fixed;inset:0;background:rgba(0,0,0,.45);
    z-index:200;display:flex;align-items:center;justify-content:center;
    padding:var(--space-4);opacity:0;pointer-events:none;transition:opacity .18s;
  }
  .an-backdrop.open { opacity:1; pointer-events:auto; }
  .an-modal {
    background:var(--color-bg-elevated);border-radius:var(--radius-lg);
    box-shadow:0 12px 48px rgba(0,0,0,.22);
    width:100%;max-width:620px;max-height:90vh;
    display:flex;flex-direction:column;
    transform:translateY(10px);transition:transform .18s;
  }
  .an-backdrop.open .an-modal { transform:none; }
  .an-modal-head {
    padding:var(--space-4) var(--space-5);
    border-bottom:1px solid var(--color-border);
    display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  }
  .an-modal-body { overflow-y:auto;padding:var(--space-4) var(--space-5);flex:1; }
  .an-modal-foot {
    padding:var(--space-3) var(--space-5);
    border-top:1px solid var(--color-border);
    display:flex;gap:var(--space-2);justify-content:flex-end;flex-shrink:0;
  }
  .an-section { margin-bottom:var(--space-4); }
  .an-section-title {
    font-size:9px;font-weight:700;color:var(--color-ink-tertiary);
    text-transform:uppercase;letter-spacing:.5px;
    margin-bottom:var(--space-2);padding-bottom:var(--space-1);
    border-bottom:1px solid var(--color-border);
  }
  .an-grid { display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3); }
  .an-grid.c3 { grid-template-columns:1fr 1fr 1fr; }
  .an-field { display:flex;flex-direction:column;gap:3px; }
  .an-field label { font-size:10px;font-weight:600;color:var(--color-ink-tertiary);text-transform:uppercase;letter-spacing:.4px; }
  .an-field .u { font-size:9px;opacity:.7;font-weight:400;text-transform:none; }
  @media(max-width:480px) { .an-grid,.an-grid.c3 { grid-template-columns:1fr 1fr; } }

  /* ── Responsive ── */
  @media(max-width:600px) {
    .hero-volumes { gap:var(--space-4); }
    .timeline     { padding:var(--space-3); }
    .section-body { padding:var(--space-3); }
    .tl-detail-lbl { width:70px; }
  }

  /* ── Blocs de section (séparateurs de niveau supérieur) ── */
  .bloc-label {
    font-size:10px; font-weight:700; text-transform:uppercase;
    letter-spacing:.8px; color:var(--color-ink-tertiary);
    padding:var(--space-2) 0; border-bottom:1px solid var(--color-border);
    margin-bottom:var(--space-4); margin-top:var(--space-7);
    display:flex; align-items:center; gap:var(--space-2);
  }
  .bloc-label:first-of-type { margin-top:0; }

  /* ── Variantes de points timeline (mouvement) ── */
  .tl-dot--apport     { background:#2e7d32; }
  .tl-dot--entree     { background:var(--color-success); }
  .tl-dot--sortie     { background:#c62828; }
  .tl-dot--transfert  { background:var(--color-info); }
  .tl-dot--sortie-def { background:#6a1b9a; }
  .tl-card--annule    { opacity:.55; border-style:dashed; }

  /* ══ Dossier de lot imprimable (Phase 6) ══ */
  #dossier-print { display:none; }
  #dossier-print .dp-title { font-size:20px; font-weight:700; margin:0 0 2px; }
  #dossier-print .dp-sub { font-size:12px; color:#555; margin:0 0 14px; }
  #dossier-print h2.dp-h { font-size:var(--text-callout); font-weight:700; margin:18px 0 8px;
       border-bottom:1.5px solid #333; padding-bottom:3px; }
  #dossier-print table { width:100%; border-collapse:collapse; font-size:var(--text-caption); margin-bottom:6px; }
  #dossier-print th, #dossier-print td { border:1px solid #bbb; padding:4px 6px;
       text-align:left; vertical-align:top; }
  #dossier-print th { background:#eee; font-weight:600; }
  #dossier-print .dp-id-grid { display:grid; grid-template-columns:repeat(2,1fr);
       gap:4px 24px; font-size:12px; margin-bottom:6px; }
  #dossier-print .dp-id-grid b { display:inline-block; min-width:130px; color:#555; font-weight:600; }
  #dossier-print .dp-sign { display:flex; gap:var(--space-10); margin-top:30px; }
  #dossier-print .dp-sign div { flex:1; border-top:1px solid #333; padding-top:var(--space-1);
       font-size:var(--text-caption); color:#555; }
  #dossier-print .dp-foot { margin-top:var(--space-6); font-size:10px; color:#777;
       border-top:1px solid #ccc; padding-top:6px; }
  @media print {
    body > * { display:none !important; }
    body > #dossier-print { display:block !important;
       position:static; color:#000; background:#fff;
       font-family:-apple-system,"Segoe UI",Roboto,sans-serif; padding:0; margin:0; }
    .dp-block { page-break-inside:avoid; }
    @page { margin:14mm; }
  }
</style>
</head>
<body>

<header class="wb-header">
  <div class="breadcrumb-flex">
    <a href="app.html" class="home"><img decoding="async" class="home-logo" src="img/icon-wineblender-192.png" alt="">WB3</a>
    <span class="sep">/</span>
    <a href="lots.html" class="home">🍷 Lots</a>
    <span class="sep">/</span>
    <h1 data-help="Fiche complète d'un lot : son parcours cuve par cuve, ses analyses, son bilan volumétrique et sa filiation." id="page-title" style="font-size:var(--text-callout);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin:0">Chargement…</h1>
  </div>
  <div class="header-actions">
    <span class="tenant-pill" id="tenant-pill">—</span>
    <a class="btn btn--header" href="parametres.html" title="Paramètres">⚙️</a>

<script>
'use strict';

// ============================================================
// État courant (pour actions)
// ============================================================
let currentLot = null;
let _analyseThresholds = { libre_bas: 15, libre_haut: 30, av_alert: 0.9 };

// ============================================================
// Constantes
// ============================================================
const STATUT_LABELS = {
  vendange:'🍇 Vendange', mout:'🌊 Moût', mout_stabule:'🧊 Stabulation',
  mout_debourbe:'🔽 Débourbage', fa:'🌡 Ferm. alc.', fml:'🧫 Ferm. malo.',
  vin:'🍷 Vin', elevage:'🛢 Élevage', vin_filtre:'🔬 Filtré',
  pre_mise:'📦 Pré-mise', conditionne:'🍾 Conditionné', sorti:'🚪 Sorti',
};
const COULEUR_LABELS = { rouge:'Rouge', blanc:'Blanc', rose:'Rosé', gris:'Gris' };
const COULEUR_ICONS  = { rouge:'🔴', blanc:'⚪', rose:'🌸', gris:'🩶' };
const LOT_STATUT_SUFFIX = {
  mout_debourbe:'.DB', mout_stabule:'.DB',
  fa:'.FA', fml:'.FML', elevage:'.EL', vin_filtre:'.F', pre_mise:'.PM',
};

const STATUT_MAIN_PATH = [
  { key:'vendange',    icon:'🍇', label:'Vendange' },
  { key:'mout',        icon:'🌊', label:'Moût' },
  { key:'fa',          icon:'🌡', label:'Ferm. alc.' },
  { key:'fml',         icon:'🧫', label:'Ferm. malo.' },
  { key:'vin',         icon:'🍷', label:'Vin' },
  { key:'elevage',     icon:'🛢', label:'Élevage' },
  { key:'pre_mise',    icon:'📦', label:'Pré-mise' },
  { key:'conditionne', icon:'🍾', label:'Conditionné' },
  { key:'sorti',       icon:'🚪', label:'Sorti' },
];
const STATUT_MAIN_IDX = {
  vendange:0, mout:1, mout_stabule:1, mout_debourbe:1,
  fa:2, fml:3, vin:4, vin_filtre:4, elevage:5, pre_mise:6, conditionne:7, sorti:8,
};
const STATUT_TRANSITIONS = {
  vendange:    ['mout'],
  mout:        ['mout_stabule','mout_debourbe','fa'],
  mout_stabule:['mout_debourbe','fa'],
  mout_debourbe:['fa'],
  fa:          ['fml','vin'],
  fml:         ['vin'],
  vin:         ['vin_filtre','elevage','pre_mise'],
  elevage:     ['vin_filtre','pre_mise'],
  vin_filtre:  ['pre_mise'],
  pre_mise:    ['conditionne'],
  conditionne: ['sorti'],
  sorti:       [],
};

const OP_ICONS = {
  soutirage:'🔄', assemblage:'🧬', sulfitage:'🧪', collage:'🍂', filtration:'🔬',
  levurage:'🦠', enzymage:'⚗️', chaptalisation:'🍯', acidification:'⬆️',
  desacidification:'⬇️', malo:'🧫', mise_en_bouteille:'🍾', autre:'⚙️',
  // Ajustements de cave
  complement_de_plein:'💧', ouillage:'🪣', ajustement_volume:'⚖️',
  correction_jauge:'📏', perte_technique:'📉', correction_administrative:'📋',
};
const CAT_ICONS = {
  so2:'🧪', levure:'🦠', enzyme:'⚗️', colle:'🧹', tanin:'🍂',
  acidifiant:'⬆️', desacidifiant:'⬇️', nutriment:'💊',
  correcteur_alcool:'🔢', filtre:'🔬', autre:'📦',
};

// ============================================================
// Utilitaires
// ============================================================
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt(n) {
  if (n == null || n === '') return '—';
  const num = parseFloat(n);
  if (isNaN(num)) return '—';
  return num % 1 === 0 ? String(num) : num.toFixed(2).replace(/\.?0+$/, '');
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d + 'T00:00:00').toLocaleDateString('fr-FR', {
    day:'numeric', month:'long', year:'numeric'
  });
}

function groupByKey(arr, key) {
  const map = {};
  (arr || []).forEach(item => {
    const k = item[key];
    if (!map[k]) map[k] = [];
    map[k].push(item);
  });
  return map;
}

function toast(a, b){ if (window.WB3Toast) return WB3Toast.legacy(a, b); }

async function logout() { await WB3Auth.signOut(); WB3Nav.navigateTop('app.html'); }

// ============================================================
// Init
// ============================================================
(async function init() {
  if (typeof window.supabase === 'undefined' || !window.supabase.createClient ||
      typeof window.WB3DB === 'undefined' || typeof window.WB3Auth === 'undefined') {
    document.getElementById('content').innerHTML =
      `<div class="empty-state"><div class="icon">❌</div><div class="title">Modules WB3 non chargés</div></div>`;
    return;
  }

  const ctx = await WB3AppBoot.requireReadyContext();
  if (!ctx) {
    document.getElementById('content').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div><div class="title">Aucun tenant accessible</div></div>`;
    return;
  }
  const { tenant } = ctx;
  document.getElementById('tenant-pill').textContent = `🏢 ${tenant.nom} · ${tenant.role}`;

  const params = new URLSearchParams(window.location.search);
  const lotId  = params.get('id');
  if (!lotId) {
    document.getElementById('content').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div><div class="title">Lot introuvable</div>
       <div class="desc">Aucun identifiant de lot dans l'URL.</div>
       <div class="actions"><a href="lots.html" class="btn">← Lots</a></div></div>`;
    return;
  }

  await loadAndRender(lotId);
})();

// ============================================================
// Chargement & rendu
// ============================================================
async function loadAndRender(lotId) {
  try {
    const [{ lot, apports, opLots, prodByOp, contByOp, othersByOp }, filiation, cuveHistory, analyses, analysePrefsRaw, mouvements, ajustements] = await Promise.all([
      WB3DB.getLotDetail(lotId),
      WB3DB.queryLotFiliation(lotId).catch(() => ({ parents: [], children: [] })),
      WB3DB.queryLotContenantHistory(lotId).catch(() => []),
      WB3DB.queryAnalyses({ lot_id: lotId, ascending: true }).catch(() => []),
      WB3DB.getUserPref('analyses').catch(() => ({})),
      WB3DB.getLotMouvements(lotId).catch(() => []),
      WB3DB.getAjustements({ lot_id: lotId }).catch(() => []),
    ]);
    if (analysePrefsRaw?.so2_thresholds) {
      _analyseThresholds = { ..._analyseThresholds, ...analysePrefsRaw.so2_thresholds };
    }
    // Workflow 4 — enrichir les seuils avec wb3_tolerances (mig 056+058)
    if (WB3DB.getTolerances) {
      try {
        const tol = await WB3DB.getTolerances();
        if (tol) {
          if (tol.av_max      != null) _analyseThresholds.av_alert   = Number(tol.av_max);
          if (tol.ph_min      != null) _analyseThresholds.ph_min     = Number(tol.ph_min);
          if (tol.ph_max      != null) _analyseThresholds.ph_max     = Number(tol.ph_max);
          if (tol.tav_min     != null) _analyseThresholds.tav_min    = Number(tol.tav_min);
          if (tol.tav_max     != null) _analyseThresholds.tav_max    = Number(tol.tav_max);
          if (tol.temp_max    != null) _analyseThresholds.temp_max   = Number(tol.temp_max);
          if (tol.so2_libre_max != null) _analyseThresholds.libre_haut = Number(tol.so2_libre_max);
        }
      } catch(_) {}
    }

    document.getElementById('page-title').textContent = lot.nom;
    document.title = `${lot.nom} — WineBlender 3`;

    opLots.sort((a, b) =>
      new Date(b.operations.date_operation) - new Date(a.operations.date_operation)
    );

    // Phase 3 — snapshot des analyses parents (au moment de l'assemblage).
    // Calculé uniquement pour les lots issus d'un assemblage (filiation
    // source_type='assemblage'). Affiché en italique gris dans la section
    // Analyses pour la traçabilité « d'où viennent ces valeurs ».
    const parentsSnapshot = await _fetchParentsSnapshot(filiation.parents || []);

    renderPage(lot, apports, opLots, prodByOp, contByOp, othersByOp, filiation, cuveHistory, analyses, mouvements, ajustements, parentsSnapshot);

  } catch(e) {
    console.error('[WB3 lot-detail]', e);
    document.getElementById('content').innerHTML =
      `<div class="empty-state"><div class="icon">❌</div><div class="title">Erreur de chargement</div>
       <div class="desc">${escapeHtml(e.message)}</div>
       <div class="actions"><a href="lots.html" class="btn">← Lots</a></div></div>`;
  }
}

// ============================================================
// Dossier de lot imprimable (Phase 6) — print CSS natif
// ============================================================
let _dossierCtx = null;

const _DP_STATUT = { realise:'Réalisé', planifie:'Planifié', annule:'Annulé' };

function buildDossier() {
  const c = _dossierCtx;
  if (!c || !c.lot) { toast('Données du lot non chargées', 'error'); return; }
  const { lot, sortedOps, prodByOp, contByOp, analyses, filiation } = c;

  const tenant = (WB3DB.getCurrentTenant && WB3DB.getCurrentTenant()?.nom) || '';
  const editLe = new Date().toLocaleString('fr-FR', { dateStyle:'long', timeStyle:'short' });

  const ceps = (lot.lot_cepages || [])
    .filter(x => x.cepages || x.cepage_libre)
    .sort((a,b) => (b.pourcentage||0) - (a.pourcentage||0))
    .map(x => `${escapeHtml(x.cepages?.nom || x.cepage_libre || '?')}${x.pourcentage!=null?` ${fmt(x.pourcentage)} %`:''}`)
    .join(', ') || '—';
  const conts = (lot.lot_contenants || [])
    .filter(lc => lc.contenants)
    .map(lc => `${escapeHtml(lc.contenants.nom)}${lc.volume_hl!=null?` (${fmt(lc.volume_hl)} hL)`:''}`)
    .join(', ') || '—';

  const fil = filiation || { parents:[], children:[] };
  const filP = (fil.parents  || []).filter(p => p.lot);
  const filC = (fil.children || []).filter(x => x.lot);

  // ── Opérations : dédupe par op.id, ordre chronologique ──
  const opMap = new Map();
  (sortedOps || []).forEach(ol => {
    const op = ol.operations; if (!op) return;
    let e = opMap.get(op.id);
    if (!e) { e = { op, roles:new Set() }; opMap.set(op.id, e); }
    if (ol.role) e.roles.add(ol.role);
  });
  const ops = [...opMap.values()].sort((a,b) =>
    (a.op.date_operation||'') < (b.op.date_operation||'') ? -1 : 1);

  const opRows = ops.length ? ops.map(({op, roles}) => {
    const prods = (prodByOp[op.id] || []).map(p => {
      const pc = p.produits_lots?.produits_catalogue;
      const nl = p.produits_lots?.numero_lot;
      return pc ? `${escapeHtml(pc.nom)}${p.quantite!=null?` ${fmt(p.quantite)} ${escapeHtml(p.unite||'')}`:''}${nl?` (lot ${escapeHtml(nl)})`:''}` : '';
    }).filter(Boolean).join(' ; ') || '—';
    const cnts = (contByOp[op.id] || []).map(x => x.contenants?.nom).filter(Boolean)
      .map(escapeHtml).join(', ') || '—';
    const role = [...roles].map(r => ({source:'Source',destination:'Destination',traite:'Traité'}[r]||r)).join(', ') || '—';
    return `<tr>
      <td style="white-space:nowrap">${fmtDate(op.date_operation)}</td>
      <td>${escapeHtml((op.type_operation||'').replace(/_/g,' '))}</td>
      <td>${role}</td>
      <td>${cnts}</td>
      <td>${prods}</td>
      <td style="text-align:right;white-space:nowrap">${op.volume_hl!=null?fmt(op.volume_hl):'—'}</td>
      <td>${escapeHtml(op.operateur||'—')}</td>
      <td>${escapeHtml(op.reference||'—')}</td>
      <td>${_DP_STATUT[op.statut]||escapeHtml(op.statut||'')}</td>
      <td>${escapeHtml(op.notes||'')}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="10" style="text-align:center;color:#777">Aucune opération</td></tr>`;

  // ── Analyses ──
  const anls = [...(analyses||[])].sort((a,b) =>
    new Date(a.date_analyse) - new Date(b.date_analyse));
  const T = _analyseThresholds;
  // alertFn par paramètre pour le dossier
  const _dAlertColor = (k, v) => {
    if (v == null) return null;
    if (k==='so2_libre')        return v > (T.libre_haut||120) ? '#c00' : null;
    if (k==='acidite_volatile') return v > (T.av_alert||1.5)   ? '#c00' : null;
    if (k==='ph')               return (T.ph_min!=null && v<T.ph_min)||(T.ph_max!=null&&v>T.ph_max) ? '#c00' : null;
    if (k==='tav')              return (T.tav_min!=null&&v<T.tav_min)||(T.tav_max!=null&&v>T.tav_max) ? '#c00' : null;
    if (k==='temperature')      return T.temp_max!=null&&v>T.temp_max ? '#c00' : null;
    return null;
  };
  const anlRows = anls.length ? anls.map(a => {
    const c = (k,v) => { const col=_dAlertColor(k,v); return col?`style="text-align:right;color:${col};font-weight:700"`:'style="text-align:right"'; };
    const v = (k,v2) => { const col=_dAlertColor(k,v2); return v2!=null?`${fmt(v2)}${col?' ⚠':''}` : '—'; };
    return `<tr>
      <td style="white-space:nowrap">${fmtDate(a.date_analyse)}</td>
      <td ${c('so2_libre',a.so2_libre)}>${v('so2_libre',a.so2_libre)}</td>
      <td style="text-align:right">${a.so2_total!=null?fmt(a.so2_total):'—'}</td>
      <td ${c('tav',a.tav)}>${v('tav',a.tav)}</td>
      <td ${c('acidite_volatile',a.acidite_volatile)}>${v('acidite_volatile',a.acidite_volatile)}</td>
      <td ${c('ph',a.ph)}>${v('ph',a.ph)}</td>
      <td ${c('temperature',a.temperature)}>${v('temperature',a.temperature)}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="7" style="text-align:center;color:#777">Aucune analyse</td></tr>`;

  // ── Bilan qualité (workflow 4 — Phase C) ──
  // Alertes actives sur la dernière analyse, retard analyse
  const lastAnl = anls.length ? anls[anls.length-1] : null;
  const qualAlerts = [];
  if (lastAnl) {
    [['so2_libre','SO₂ libre'],['acidite_volatile','AV'],['ph','pH'],['tav','TAV'],['temperature','T°']].forEach(([k,lbl]) => {
      if (_dAlertColor(k, lastAnl[k])) qualAlerts.push(`${lbl} : ${fmt(lastAnl[k])}`);
    });
  }
  const daysSinceAnal = lastAnl
    ? Math.round((Date.now() - new Date(lastAnl.date_analyse+'T00:00:00'))/86400000) : null;
  const analEnRetard  = daysSinceAnal == null || daysSinceAnal > (T.analyse_retard_jours || 30);
  const qualStatut    = qualAlerts.length > 0 ? '🔴 Alerte analytique'
    : analEnRetard ? '🟡 Analyse en retard'
    : '🟢 OK';
  const qualBlock = `
    <div class="dp-block">
      <h2 class="dp-h">Bilan qualité — ${qualStatut}</h2>
      <table><tbody>
        <tr><td style="min-width:160px"><b>Statut qualité</b></td><td>${qualStatut}</td></tr>
        <tr><td><b>Dernière analyse</b></td>
          <td>${lastAnl ? fmtDate(lastAnl.date_analyse) + ` (il y a ${daysSinceAnal} j)` : 'Aucune'}</td></tr>
        <tr><td><b>Alertes analytiques</b></td>
          <td>${qualAlerts.length ? qualAlerts.map(a => `⚠ ${escapeHtml(a)}`).join(' · ') : '✓ Aucune'}</td></tr>
        <tr><td><b>Retard analyse</b></td>
          <td>${analEnRetard ? `⚠ ${daysSinceAnal == null ? 'Aucune analyse' : `${daysSinceAnal} jours (seuil ${T.analyse_retard_jours||30} j)`}` : '✓ À jour'}</td></tr>
      </tbody></table>
    </div>`;

  // ── Filiation ──
  const filRow = (f, dir) => {
    const l = f.lot;
    return `<tr>
      <td>${dir}</td>
      <td>${escapeHtml(l.nom||'')}</td>
      <td style="font-family:monospace">${escapeHtml(l.numero_lot||'—')}</td>
      <td style="text-align:right">${f.volume_hl!=null?fmt(f.volume_hl):'—'}</td>
      <td>${escapeHtml(f.source_type||'manuel')}</td>
    </tr>`;
  };
  const filRows = (filP.length || filC.length)
    ? filP.map(p => filRow(p,'← Source')).join('') + filC.map(x => filRow(x,'→ Issu')).join('')
    : `<tr><td colspan="5" style="text-align:center;color:#777">Aucune filiation</td></tr>`;

  const html = `
    <div class="dp-block">
      <div class="dp-title">Dossier de lot — ${escapeHtml(lot.nom||'')}</div>
      <div class="dp-sub">${escapeHtml(tenant)} · Document de traçabilité · Édité le ${escapeHtml(editLe)}</div>
      <div class="dp-id-grid">
        <div><b>N° de lot</b> ${escapeHtml((lot.numero_lot||'—') + (LOT_STATUT_SUFFIX[lot.statut]||''))}</div>
        <div><b>Millésime</b> ${lot.millesime||'—'}</div>
        <div><b>Couleur</b> ${COULEUR_ICONS[lot.couleur]||''} ${escapeHtml(lot.couleur||'—')}</div>
        <div><b>Statut</b> ${escapeHtml(lot.statut||'—')}</div>
        <div><b>Volume initial</b> ${lot.volume_initial_hl!=null?fmt(lot.volume_initial_hl)+' hL':'—'}</div>
        <div><b>Volume actuel</b> ${lot.volume_actuel_hl!=null?fmt(lot.volume_actuel_hl)+' hL':'—'}</div>
        <div><b>Appellation</b> ${escapeHtml(lot.appellation||'—')}</div>
        <div><b>Type</b> ${escapeHtml(lot.type_lot||'—')}</div>
      </div>
      <div class="dp-id-grid">
        <div><b>Cépages</b> ${ceps}</div>
        <div><b>Contenants actuels</b> ${conts}</div>
      </div>
      ${lot.notes ? `<div style="font-size:var(--text-caption);margin-top:var(--space-1)"><b style="color:#555">Notes :</b> ${escapeHtml(lot.notes)}</div>` : ''}
    </div>

    <div class="dp-block">
      <h2 class="dp-h">Historique des opérations (${ops.length})</h2>
      <table><thead><tr>
        <th>Date</th><th>Type</th><th>Rôle</th><th>Contenants</th><th>Produits / doses</th>
        <th>Vol. hL</th><th>Opérateur</th><th>Réf.</th><th>Statut</th><th>Notes</th>
      </tr></thead><tbody>${opRows}</tbody></table>
    </div>

    ${qualBlock}

    <div class="dp-block">
      <h2 class="dp-h">Analyses (${anls.length})</h2>
      <table><thead><tr>
        <th>Date</th><th>SO₂ libre (mg/L)</th><th>SO₂ total (mg/L)</th>
        <th>TAV (%vol)</th><th>AV (g/L)</th><th>pH</th><th>T° (°C)</th>
      </tr></thead><tbody>${anlRows}</tbody></table>
    </div>

    <div class="dp-block">
      <h2 class="dp-h">Filiation</h2>
      <table><thead><tr>
        <th>Sens</th><th>Lot</th><th>N° lot</th><th>Volume hL</th><th>Origine</th>
      </tr></thead><tbody>${filRows}</tbody></table>
    </div>

    <div class="dp-block">
      <h2 class="dp-h">Validation</h2>
      <div class="dp-sign">
        <div>Caviste / Opérateur<br><br>&nbsp;</div>
        <div>Œnologue / Responsable<br><br>&nbsp;</div>
        <div>Date &amp; cachet<br><br>&nbsp;</div>
      </div>
      <div class="dp-foot">
        Document généré par WineBlender 3 le ${escapeHtml(editLe)} —
        traçabilité conforme : opérations réalisées verrouillées, journal de mouvements immuable.
        Lot ID ${escapeHtml(lot.id)}.
      </div>
    </div>`;

  let el = document.getElementById('dossier-print');
  if (!el) {
    el = document.createElement('div');
    el.id = 'dossier-print';
    document.body.appendChild(el);
  }
  el.innerHTML = html;
  window.print();
}

// ============================================================
// Rendu de la page
// ============================================================
function renderPage(lot, apports, sortedOps, prodByOp, contByOp, othersByOp, filiation = { parents: [], children: [] }, cuveHistory = [], analyses = [], mouvements = [], ajustements = [], parentsSnapshot = null) {
  currentLot = lot;
  _dossierCtx = { lot, sortedOps, prodByOp, contByOp, analyses, filiation };
  const vol_init = lot.volume_initial_hl;
  const vol_act  = lot.volume_actuel_hl;

  const ceps = (lot.lot_cepages || [])
    .sort((a, b) => (b.pourcentage || 0) - (a.pourcentage || 0));
  const conts = (lot.lot_contenants || [])
    .filter(lc => lc.contenants)
    .map(lc => ({ id: lc.contenants.id, nom: lc.contenants.nom, vol: lc.volume_hl, cap: lc.contenants.capacite_hl }));

  const nbProduits = Object.values(prodByOp).reduce((s, arr) => s + arr.length, 0);

  const evolution = (vol_init != null && vol_act != null)
    ? vol_act - vol_init : null;

  // ── Filiation explicite (table lot_filiation) ──────────────
  const filParents  = (filiation.parents  || []).filter(p => p.lot);
  const filChildren = (filiation.children || []).filter(c => c.lot);

  // ── Généalogie via opérations (déduite des rôles) ──────────
  const opsParentIds  = new Set(filParents.map(p => p.parent_id));
  const opsChildIds   = new Set(filChildren.map(c => c.lot_id));
  const gParents  = new Map();
  const gChildren = new Map();
  sortedOps.forEach(ol => {
    const opId = ol.operations.id;
    if (ol.role === 'destination') {
      (othersByOp[opId] || []).filter(o2 => o2.role === 'source' && o2.lots)

// ============================================================
// Synthèse produits œnologiques (lot)
// ============================================================
function _doseCalc(quantite, _unite, concentration, volHl) {
  if (concentration == null || quantite == null || quantite === 0) return { gActif: null, mgL: null };
  const gActif = quantite * concentration; // concentration = g actif / unite_stock
  const mgL = (volHl && volHl > 0) ? (gActif / (volHl * 100)) * 1000 : null;
  return { gActif, mgL };
}

function renderProduitsSection(prodByOp, sortedOps, lot, contByOp) {
  const usages = [];
  sortedOps.forEach(ol => {
    const opId = ol.operations.id;
    const prods = prodByOp[opId] || [];
    if (!prods.length) return;
    const volOl   = ol.volume_hl;
    const volOp   = ol.operations.volume_hl;
    const volConts = (contByOp[opId] || []).filter(c => c.role === 'implique')
                      .reduce((s, c) => s + (Number(c.volume_hl) || 0), 0);
    const volHl = volOl || (volConts > 0 ? volConts : null) || volOp || lot.volume_actuel_hl;
    prods.forEach(p => {
      const pl = p.produits_lots;
      const pc = pl?.produits_catalogue;
      if (!pc) return;
      usages.push({ opId, date: ol.operations.date_operation, type_op: ol.operations.type_operation, pc, pl, quantite: p.quantite, unite: p.unite, volHl });
    });
  });
  if (!usages.length) return '';

  const byProd = new Map();
  usages.forEach(u => {
    const cid = u.pc.id;
    if (!byProd.has(cid)) byProd.set(cid, { pc: u.pc, usages: [] });
    byProd.get(cid).usages.push(u);
  });

  const thStyle = 'text-align:left;padding:5px 10px;font-size:var(--text-caption);text-transform:uppercase;letter-spacing:.4px;color:var(--color-ink-tertiary);font-weight:600;border-bottom:1px solid var(--color-border);white-space:nowrap';
  const thR = thStyle + ';text-align:right';

  const blocks = [...byProd.values()].map(({ pc, usages: pu }) => {
    const totalQty = pu.reduce((s, u) => s + (u.quantite || 0), 0);
    const { gActif: totalGActif } = _doseCalc(totalQty, pc.unite_stock, pc.concentration, null);

    const detailRows = pu.map(u => {
      const typeLabel = (u.type_op || '').replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());
      const { gActif, mgL } = _doseCalc(u.quantite, u.unite, pc.concentration, u.volHl);
      const now = new Date();
      const dluo = u.pl?.dluo ? new Date(u.pl.dluo) : null;
      const dluoExpired = dluo && dluo < now;
      const dluoStr = dluo
        ? `<span style="color:${dluoExpired ? 'var(--color-danger)' : 'var(--color-ink-tertiary)'};font-size:.85em" title="DLUO">${dluoExpired ? '⚠️ ' : ''}DLUO ${dluo.toLocaleDateString('fr-FR', { month:'short', year:'numeric' })}</span>`
        : '';
      return `<tr style="border-top:1px solid var(--color-border-light,#f0f0f0)">
        <td style="padding:5px 10px;font-size:var(--text-caption);color:var(--color-ink-tertiary);white-space:nowrap">${fmtDate(u.date)}</td>
        <td style="padding:5px 10px;font-size:var(--text-caption)">${typeLabel}</td>
        <td style="padding:5px 10px;font-size:var(--text-caption);font-family:monospace">${u.pl?.numero_lot ? escapeHtml(u.pl.numero_lot) : '—'} ${dluoStr}</td>
        <td style="padding:5px 10px;font-size:var(--text-caption);text-align:right;white-space:nowrap;color:var(--color-ink-tertiary)">${u.volHl != null ? `${fmt(u.volHl)} hL` : '—'}</td>
        <td style="padding:5px 10px;font-size:var(--text-caption);text-align:right;white-space:nowrap">${u.quantite != null ? `${fmt(u.quantite)} ${u.unite||''}` : '—'}</td>
        <td style="padding:5px 10px;font-size:var(--text-caption);text-align:right;white-space:nowrap">${gActif != null ? (gActif>=1000?`${fmt(gActif/1000)} kg`:`${fmt(gActif)} g`) : '—'}</td>
        <td style="padding:5px 10px;font-size:var(--text-caption);text-align:right;white-space:nowrap;${mgL!=null&&pc.dose_max!=null&&mgL>pc.dose_max?'color:var(--color-danger);font-weight:600':''}">${mgL != null ? `${fmt(mgL)} mg/L` : '—'}</td>
      </tr>`;
    }).join('');

    const totalActifStr = totalGActif != null ? (totalGActif >= 1000 ? `${fmt(totalGActif/1000)} kg actif` : `${fmt(totalGActif)} g actif`) : null;
    const doseMaxAlert = pc.dose_max != null ? `<span style="font-size:var(--text-caption);color:var(--color-ink-tertiary);opacity:.7">max ${pc.dose_max} mg/L</span>` : '';
    const mgLValues = pu.map(u => _doseCalc(u.quantite, u.unite, pc.concentration, u.volHl).mgL).filter(v => v != null);
    const maxMgL = mgLValues.length ? Math.max(...mgLValues) : null;
    const doseBadge = maxMgL != null && pc.dose_max != null
      ? maxMgL > pc.dose_max
        ? `<span style="background:#d32f2f22;color:#d32f2f;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700">⚠️ Dose max dépassée</span>`
        : maxMgL > 0.9 * pc.dose_max
          ? `<span style="background:#f57c0022;color:#f57c00;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700">⚠️ Proche du max</span>`
          : ''
      : '';

    return `
    <div style="background:var(--color-bg-elevated);border:1px solid var(--color-border);border-radius:var(--radius-md);overflow:hidden">
      <div style="display:flex;align-items:center;gap:var(--space-2);padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--color-border);flex-wrap:wrap">
        <span style="font-weight:600;font-size:var(--text-callout)">${CAT_ICONS[pc.categorie]||'📦'} ${escapeHtml(pc.nom)}</span>
        ${pc.categorie ? `<span style="font-size:var(--text-caption);color:var(--color-ink-tertiary);background:var(--color-bg-subtle);padding:1px 8px;border-radius:var(--radius-pill)">${escapeHtml(pc.categorie)}</span>` : ''}
        <span style="margin-left:auto;font-size:var(--text-caption);color:var(--color-ink-tertiary)">${pu.length} utilisation${pu.length>1?'s':''}</span>
        ${totalActifStr ? `<span style="font-size:var(--text-caption);color:var(--color-ink-secondary);font-weight:600">${totalActifStr}</span>` : ''}
        ${doseMaxAlert}
        ${doseBadge}
      </div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="background:var(--color-bg-subtle)">
            <th style="${thStyle}">Date</th>
            <th style="${thStyle}">Opération</th>
            <th style="${thStyle}">Lot produit</th>
            <th style="${thR}">Vol. traité</th>
            <th style="${thR}">Quantité</th>
            <th style="${thR}">M. active</th>
            <th style="${thR}">Dose</th>
          </tr></thead>
          <tbody>${detailRows}</tbody>
          ${pu.length > 1 ? `<tfoot><tr style="border-top:2px solid var(--color-border);background:var(--color-bg-subtle)">
            <td colspan="4" style="padding:6px 10px;font-size:var(--text-caption);font-weight:600;color:var(--color-ink-secondary)">Total</td>
            <td style="padding:6px 10px;text-align:right;font-size:var(--text-caption);font-weight:600;white-space:nowrap">${fmt(totalQty)} ${pc.unite_stock||''}</td>
            <td style="padding:6px 10px;text-align:right;font-size:var(--text-caption);font-weight:600;white-space:nowrap">${totalActifStr || '—'}</td>
            <td></td>
          </tr></tfoot>` : ''}
        </table>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="detail-section">
    <div class="section-head"><h2>🧪 Produits œnologiques utilisés</h2><span class="section-count">${usages.length} utilisation${usages.length>1?'s':''}</span></div>
    <div class="section-body" style="display:flex;flex-direction:column;gap:var(--space-3)">${blocks}</div>
  </div>`;
}

// ============================================================
// Parcours cuves
// ============================================================
function renderCuveHistory(history) {
  if (!history.length) return '';

  const EVT = {
    entree:   { icon:'🟢', label:'Entrée',    cls:'color:var(--color-success)' },
    sortie:   { icon:'🔴', label:'Sortie',    cls:'color:var(--color-danger)'  },
    backfill: { icon:'🔵', label:'Affectation initiale', cls:'color:var(--color-info)' },
  };

  // Groupe par cuve pour résumer le séjour
  const rows = history.map(h => {
    const e = EVT[h.type_evt] || { icon:'⚪', label: h.type_evt, cls:'' };
    const date = h.date_evt
      ? new Date(h.date_evt).toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric' })
      : '—';
    const nom   = escapeHtml(h.contenant_nom_snap || '?');
    const cid   = h.contenant_id;
    const cuveLink = cid
      ? `<button class="nav-chip" onclick="WB3Nav.navigate('contenant-detail.html?id=${cid}')">${nom}</button>`
      : `<span style="font-weight:600;font-size:var(--text-callout)">${nom}</span>`;
    const vol = h.volume_hl != null ? `${fmt(h.volume_hl)} hL` : '—';
    return `
      <tr>
        <td style="white-space:nowrap;font-size:var(--text-caption);color:var(--color-ink-tertiary);padding:7px 10px">${date}</td>
        <td style="padding:7px 10px">
          <span style="${e.cls};font-size:var(--text-footnote)">${e.icon}</span>
          <span style="font-size:var(--text-caption);color:var(--color-ink-secondary);margin-left:var(--space-1)">${e.label}</span>
        </td>
        <td style="padding:7px 10px;font-size:var(--text-callout)">${cuveLink}</td>
        <td style="padding:7px 10px;text-align:right;font-size:var(--text-caption);color:var(--color-ink-secondary);white-space:nowrap">${vol}</td>
      </tr>`;
  }).join('');

  return `
  <div class="detail-section">
    <div class="section-head">
      <h2>📍 Parcours cuves</h2>
      <span class="section-count">${history.length} événement${history.length > 1 ? 's' : ''}</span>
    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:var(--text-callout)">
        <thead>
          <tr style="background:var(--color-bg-subtle)">
            <th style="text-align:left;padding:6px 10px;font-size:var(--text-caption);text-transform:uppercase;letter-spacing:.4px;color:var(--color-ink-tertiary);font-weight:600;border-bottom:1px solid var(--color-border)">Date</th>
            <th style="text-align:left;padding:6px 10px;font-size:var(--text-caption);text-transform:uppercase;letter-spacing:.4px;color:var(--color-ink-tertiary);font-weight:600;border-bottom:1px solid var(--color-border)">Événement</th>
            <th style="text-align:left;padding:6px 10px;font-size:var(--text-caption);text-transform:uppercase;letter-spacing:.4px;color:var(--color-ink-tertiary);font-weight:600;border-bottom:1px solid var(--color-border)">Cuve</th>
            <th style="text-align:right;padding:6px 10px;font-size:var(--text-caption);text-transform:uppercase;letter-spacing:.4px;color:var(--color-ink-tertiary);font-weight:600;border-bottom:1px solid var(--color-border)">Volume</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

// ============================================================
// Timeline unifiée « Ligne de vie »
// ============================================================
function renderLifelineTimeline(mouvements, sortedOps, apports, prodByOp, contByOp, othersByOp, analyses = []) {
  const mvtOpIds = new Set((mouvements || []).map(m => m.operation_id).filter(Boolean));

  const opMap = {};
  (sortedOps || []).forEach(ol => { opMap[ol.operations.id] = { ol, op: ol.operations }; });

  const events = [];

  (apports || []).forEach(a => events.push({ type: 'apport', date: a.date_apport, data: a }));
  (analyses || []).forEach(a => events.push({ type: 'analyse', date: a.date_analyse, data: a }));

  (mouvements || []).forEach(m => events.push({
    type: 'mouvement', date: m.date_mouvement, data: m,
    opCtx: m.operation_id ? opMap[m.operation_id] : null,
  }));

  (sortedOps || []).forEach(ol => {
    if (!mvtOpIds.has(ol.operations.id))
      events.push({ type: 'operation', date: ol.operations.date_operation, data: { ol, op: ol.operations } });
  });

  events.sort((a, b) => {
    const da = a.date ? new Date(a.date) : new Date(0);
    const db = b.date ? new Date(b.date) : new Date(0);
    return da - db;
  });

  if (!events.length) return '<div class="section-body"><p class="t-secondary" style="margin:0">Aucun événement enregistré pour ce lot.</p></div>';

  const SENS_META = {
    entree:            { icon: '🟢', lbl: 'Entrée en cuve',     cls: 'tl-dot--entree' },
    sortie:            { icon: '🔴', lbl: 'Sortie de cuve',      cls: 'tl-dot--sortie' },
    transfert:         { icon: '🔄', lbl: 'Transfert',           cls: 'tl-dot--transfert' },
    sortie_definitive: { icon: '🚪', lbl: 'Sortie définitive',   cls: 'tl-dot--sortie-def' },
  };

  function _contenantLink(id, nom) {
    if (!nom) return null;
    return id
      ? `<button class="nav-chip" onclick="WB3Nav.navigate('contenant-detail.html?id=${id}')">🛢 ${escapeHtml(nom)}</button>`
      : `<span>🛢 ${escapeHtml(nom)}</span>`;
  }

  const items = events.map((ev, i) => {
    const isLast = i === events.length - 1;
    if (ev.type === 'apport') {
      const a = ev.data;
      const annule = a.statut === 'annule';
      const detail = [
        a.apporteur ? `👤 ${escapeHtml(a.apporteur)}` : '',
        a.provenance || a.cepage_libre ? `📍 ${escapeHtml(a.provenance || a.cepage_libre)}` : '',
        a.millesime ? `📅 ${a.millesime}` : '',
        a.volume_hl != null ? `${fmt(a.volume_hl)} hL` : '',
        a.poids_kg  != null ? `${fmt(a.poids_kg)} kg`  : '',
      ].filter(Boolean).join(' · ');
      return `<div class="tl-item">
        <div class="tl-spine"><div class="tl-dot tl-dot--apport">🍇</div>${!isLast ? '<div class="tl-line"></div>' : ''}</div>
        <div class="tl-card${annule ? ' tl-card--annule' : ''}">
          <div class="tl-card-head">
            <span class="tl-date">${fmtDate(a.date_apport)}</span>
            <span class="tl-type">Apport reçu${a.numero ? ` · #${escapeHtml(a.numero)}` : ''}</span>
            ${annule ? `<span class="role-badge op-stat-annule">✕ Annulé</span>` : `<span class="role-badge op-stat-realise">✓ Reçu</span>`}
          </div>
          ${detail ? `<div class="tl-details"><div class="tl-detail-line"><span class="tl-detail-lbl">Détails</span>${detail}</div></div>` : ''}
        </div>
      </div>`;
    }

    if (ev.type === 'mouvement') {
      const m = ev.data;
      const sm = SENS_META[m.sens] || { icon: '⚪', lbl: m.sens || '—', cls: '' };
      const opTypeLabel = m.type_operation ? m.type_operation.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()) : '';
      const srcId  = m.contenant_source?.id  || m.contenant_source_id;
      const srcNom = m.contenant_source?.nom;
      const dstId  = m.contenant_dest?.id   || m.contenant_dest_id;
      const dstNom = m.contenant_dest?.nom;
      const srcLnk = _contenantLink(srcId, srcNom);
      const dstLnk = _contenantLink(dstId, dstNom);
      const ctx = ev.opCtx;
      const opInfo = ctx ? [
        ctx.op.reference ? `#${escapeHtml(ctx.op.reference)}` : '',
        ctx.op.operateur ? `👤 ${escapeHtml(ctx.op.operateur)}` : '',
        ctx.op.statut !== 'realise' ? `<span class="role-badge op-stat-${ctx.op.statut}">${{realise:'✓ Réalisé',planifie:'⏳ Planifié',annule:'✕ Annulé'}[ctx.op.statut]||ctx.op.statut}</span>` : '',
      ].filter(Boolean).join(' · ') : '';
      const mvtLine = (srcLnk && dstLnk) ? `${srcLnk} → ${dstLnk}` : srcLnk || dstLnk || '';
      return `<div class="tl-item">
        <div class="tl-spine"><div class="tl-dot ${sm.cls}">${sm.icon}</div>${!isLast ? '<div class="tl-line"></div>' : ''}</div>
        <div class="tl-card">
          <div class="tl-card-head">
            <span class="tl-date">${fmtDate(m.date_mouvement)}</span>
            <span class="tl-type">${sm.lbl}</span>
            ${opTypeLabel ? `<span class="role-badge role-traite">${opTypeLabel}</span>` : ''}
            ${m.volume_hl != null ? `<span class="tl-vol">📏 ${fmt(m.volume_hl)} hL</span>` : ''}
          </div>
          ${mvtLine || opInfo ? `<div class="tl-details">
            ${mvtLine ? `<div class="tl-detail-line"><span class="tl-detail-lbl">Contenants</span><div class="chips-inline">${mvtLine}</div></div>` : ''}
            ${opInfo  ? `<div class="tl-detail-line"><span class="tl-detail-lbl">Opération</span>${opInfo}</div>` : ''}
          </div>` : ''}
        </div>
      </div>`;
    }

    if (ev.type === 'operation') {
      const { ol, op } = ev.data;
      const icon = OP_ICONS[op.type_operation] || '⚙️';
      const typeLabel = op.type_operation.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());
      const roleClass = { source:'role-source', destination:'role-destination', traite:'role-traite' }[ol.role] || 'role-traite';
      const roleLabel = { source:'← Source', destination:'→ Destination', traite:'Traité' }[ol.role] || ol.role;
      const statCls = `op-stat-${op.statut}`;
      const statLbl = { realise:'✓ Réalisé', planifie:'⏳ Planifié', annule:'✕ Annulé' }[op.statut] || op.statut;
      const volStr = (ol.volume_hl != null ? ol.volume_hl : op.volume_hl) != null
        ? `📏 ${fmt(ol.volume_hl != null ? ol.volume_hl : op.volume_hl)} hL` : '';
      const prods = (prodByOp[op.id] || []).map(p => {
        const pc = p.produits_lots?.produits_catalogue;
        return pc ? `<span class="chip-prod">${CAT_ICONS[pc.categorie]||'📦'} ${escapeHtml(pc.nom)}${p.quantite != null ? ` · ${fmt(p.quantite)} ${p.unite||''}` : ''}</span>` : '';
      }).filter(Boolean).join('');
      const contsHtml = (contByOp[op.id] || []).map(c => {
        const n = c.contenants?.nom; const cid = c.contenants?.id;
        if (!n) return '';
        return cid ? `<button class="chip-cont nav-chip" onclick="WB3Nav.navigate('contenant-detail.html?id=${cid}')">🛢 ${escapeHtml(n)}</button>` : `<span class="chip-cont">🛢 ${escapeHtml(n)}</span>`;
      }).filter(Boolean).join('');
      const othersHtml = (othersByOp[op.id] || []).map(ol2 => {
        const l = ol2.lots; if (!l) return '';
        return `<button class="chip-lot nav-chip" onclick="WB3Nav.navigate('lot-detail.html?id=${l.id}')">🍷 ${escapeHtml(l.nom)}</button>`;
      }).filter(Boolean).join('');
      const extras = [
        op.reference ? `#${escapeHtml(op.reference)}` : '',
        op.operateur ? `👤 ${escapeHtml(op.operateur)}` : '',
      ].filter(Boolean).join(' · ');
      return `<div class="tl-item" id="op-${op.id}">
        <div class="tl-spine"><div class="tl-dot">${icon}</div>${!isLast ? '<div class="tl-line"></div>' : ''}</div>
        <div class="tl-card">
          <div class="tl-card-head">
            <span class="tl-date">${fmtDate(op.date_operation)}</span>
            <span class="tl-type">${typeLabel}</span>
            <span class="role-badge ${roleClass}">${roleLabel}</span>
            <span class="role-badge ${statCls}">${statLbl}</span>
            ${volStr ? `<span class="tl-vol">${volStr}</span>` : ''}
          </div>
          <div class="tl-details">
            ${extras    ? `<div class="tl-detail-line"><span class="tl-detail-lbl">Info</span>${extras}</div>` : ''}
            ${prods     ? `<div class="tl-detail-line"><span class="tl-detail-lbl">Produits</span><div class="chips-inline">${prods}</div></div>` : ''}
            ${contsHtml ? `<div class="tl-detail-line"><span class="tl-detail-lbl">Contenants</span><div class="chips-inline">${contsHtml}</div></div>` : ''}
            ${othersHtml? `<div class="tl-detail-line"><span class="tl-detail-lbl">Autres lots</span><div class="chips-inline">${othersHtml}</div></div>` : ''}
          </div>
          ${(op.notes || ol.notes) ? `<div class="tl-notes">${escapeHtml(op.notes || ol.notes)}</div>` : ''}
        </div>
      </div>`;
    }

    if (ev.type === 'analyse') {
      const a = ev.data;
      const keyParams = [
        a.so2_libre        != null ? `SO₂ libre ${fmt(a.so2_libre)} mg/L`         : '',
        a.so2_total        != null ? `SO₂ total ${fmt(a.so2_total)} mg/L`         : '',
        a.tav              != null ? `TAV ${fmt(a.tav)} %vol`                     : '',
        a.acidite_volatile != null ? `AV ${fmt(a.acidite_volatile)} g/L`          : '',
        a.ph               != null ? `pH ${fmt(a.ph)}`                            : '',
      ].filter(Boolean).join(' · ');
      const so2Color = a.so2_libre != null
        ? (a.so2_libre < _analyseThresholds.libre_bas ? '#d32f2f'
           : a.so2_libre < _analyseThresholds.libre_haut ? '#f57c00'
           : '#2e7d32')
        : null;
      return `<div class="tl-item">
        <div class="tl-spine"><div class="tl-dot" style="background:#e3f2fd;font-size:var(--text-callout)">🧪</div>${!isLast ? '<div class="tl-line"></div>' : ''}</div>
        <div class="tl-card">
          <div class="tl-card-head">
            <span class="tl-date">${fmtDate(a.date_analyse)}</span>
            <span class="tl-type">Analyse œnologique</span>
            ${so2Color ? `<span style="background:${so2Color}22;color:${so2Color};padding:1px 8px;border-radius:999px;font-size:10px;font-weight:700">SO₂ ${fmt(a.so2_libre)} mg/L</span>` : ''}
          </div>
          ${keyParams ? `<div class="tl-details"><div class="tl-detail-line"><span class="tl-detail-lbl">Valeurs</span>${keyParams}</div></div>` : ''}
          ${a.notes ? `<div class="tl-notes">${escapeHtml(a.notes)}</div>` : ''}
        </div>
      </div>`;
    }

    return '';
  }).filter(Boolean).join('');

  return `<div class="timeline">${items}</div>`;
}

// ============================================================
// P2-2 — Bilan volumétrique (cohérence apports/mouvements/ajustements
// vs lot.volume_actuel_hl).
// ------------------------------------------------------------
// Le volume actuel d'un lot est maintenu par le trigger
// lot_contenants_sync_volume (mig 025) = Σ lot_contenants.volume_hl.
// Cette section recalcule indépendamment ce volume via les flux
// historiques pour révéler tout écart (signe de bypass du chemin durci
// ou bug de double-comptage). En présence d'écart, l'opérateur peut
// rechercher la cause via la timeline ci-dessous.
// ============================================================
function renderBilanVolumetrique(lot, mouvements, apports, ajustements) {
  if (!lot) return '';

  // Apports actifs uniquement (annulés = exclus du bilan)
  const apportsValides = (apports || []).filter(a => a.statut !== 'annule');
  const sumApports = apportsValides.reduce((s, a) => s + (Number(a.volume_hl) || 0), 0);

  // Mouvements : entrées = sens 'entree' (assemblage destination).
  // Sorties = 'sortie' (assemblage source) + 'sortie_definitive'
  // (mise en bouteille / sortie lot). 'transfert' = neutre pour ce lot
  // (sortie d'une cuve + entrée d'une autre, même lot → volume inchangé).
  let sumEntrees = 0, sumSorties = 0;
  (mouvements || []).forEach(m => {
    const v = Number(m.volume_hl) || 0;
    if (m.sens === 'entree')                                  sumEntrees += v;
    else if (m.sens === 'sortie' || m.sens === 'sortie_definitive') sumSorties += v;
    // 'transfert' ignoré (neutre)
  });

  // Ajustements (peuvent être + ou −)
  const sumAjust = (ajustements || []).reduce((s, a) => s + (Number(a.delta_hl) || 0), 0);

  const calcule = sumApports + sumEntrees - sumSorties + sumAjust;
  const actuel  = Number(lot.volume_actuel_hl) || 0;
  const ecart   = actuel - calcule;
  const ecartAbs = Math.abs(ecart);

  const ok = ecartAbs <= 0.01;
  const color    = ok ? 'var(--color-success)' : 'var(--color-danger)';
  const bgColor  = ok ? 'rgba(46,125,50,.08)'  : 'rgba(211,47,47,.10)';
  const borderColor = ok ? 'var(--color-success)' : 'var(--color-danger)';
  const icon = ok ? '✅' : '⚠️';
  const label = ok ? 'Bilan cohérent' : 'Écart détecté';

  const ecartTxt = ecart === 0
    ? '0 hL'
    : (ecart > 0 ? '+' : '') + fmt(ecart) + ' hL';

  // Ligne de détail repliable : seulement utile en cas d'écart, mais
  // toujours utile pour les power-users. On l'affiche compacte.
  const detail = [
    apportsValides.length ? `📥 Apports : ${fmt(sumApports)} hL (${apportsValides.length})` : '',
    sumEntrees ? `🟢 Entrées (assemblage) : ${fmt(sumEntrees)} hL` : '',
    sumSorties ? `🔴 Sorties : ${fmt(sumSorties)} hL` : '',
    sumAjust   ? `⚖️ Ajustements : ${sumAjust>0?'+':''}${fmt(sumAjust)} hL (${(ajustements||[]).length})` : '',
  ].filter(Boolean).join(' · ') || 'Aucun flux historisé';

  return `
  <div class="detail-section" style="border-left:3px solid ${borderColor};background:${bgColor}">
    <div class="section-head">
      <h2 style="display:flex;align-items:center;gap:var(--space-2)">
        <span style="font-size:1.2em">${icon}</span>
        <span>Bilan volumétrique — ${escapeHtml(label)}</span>
      </h2>
      <span class="section-count" style="background:${color};color:#fff">${ecartTxt}</span>
    </div>
    <div class="section-body" style="display:flex;flex-direction:column;gap:6px">
      <div style="font-family:monospace;font-size:var(--text-callout);font-weight:600">
        ${fmt(sumApports)} hL <span style="color:var(--color-ink-tertiary);font-weight:400">apports</span>
        ${sumEntrees ? ` + ${fmt(sumEntrees)} hL <span style="color:var(--color-ink-tertiary);font-weight:400">entrées</span>` : ''}
        ${sumSorties ? ` − ${fmt(sumSorties)} hL <span style="color:var(--color-ink-tertiary);font-weight:400">sorties</span>` : ''}
        ${sumAjust   ? ` ${sumAjust>0?'+':'−'} ${fmt(Math.abs(sumAjust))} hL <span style="color:var(--color-ink-tertiary);font-weight:400">ajust.</span>` : ''}
        = <span style="color:${color}">${fmt(calcule)} hL calculé</span>
        <span style="color:var(--color-ink-tertiary);font-weight:400"> · volume actuel base : ${fmt(actuel)} hL</span>
      </div>
      <div style="font-size:var(--text-caption);color:var(--color-ink-tertiary)">${detail}</div>
      ${ok ? '' : `<div style="font-size:var(--text-caption);color:${color};font-weight:600">
        Écart non négligeable (> 0,01 hL). Causes possibles : opération supprimée sans corrective, apport
        annulé avant Sprint cohérence, INSERT direct sur lot_contenants. Consulter le journal ci-dessous pour identifier.
      </div>`}
    </div>
  </div>`;
}

// ============================================================
// Journal des mouvements physiques (table brute)
// ============================================================
function renderJournalMouvements(mouvements) {
  if (!mouvements || !mouvements.length) return '';

    entree:            { icon: '🟢', lbl: 'Entrée' },
    sortie:            { icon: '🔴', lbl: 'Sortie' },
    transfert:         { icon: '🔄', lbl: 'Transfert' },
    sortie_definitive: { icon: '🚪', lbl: 'Sortie définitive' },
  };

  const rows = [...mouvements].sort((a, b) =>
    (a.date_mouvement || '') < (b.date_mouvement || '') ? -1 : 1
  ).map(m => {
    const sm = SENS_META[m.sens] || { icon: '⚪', lbl: m.sens || '—' };

    const dstId  = m.contenant_dest?.id   || m.contenant_dest_id;
    const dstNom = m.contenant_dest?.nom;
    const srcHtml = srcNom ? (srcId ? `<button class="nav-chip" onclick="WB3Nav.navigate('contenant-detail.html?id=${srcId}')">🛢 ${escapeHtml(srcNom)}</button>` : `🛢 ${escapeHtml(srcNom)}`) : '—';
    const dstHtml = dstNom ? (dstId ? `<button class="nav-chip" onclick="WB3Nav.navigate('contenant-detail.html?id=${dstId}')">🛢 ${escapeHtml(dstNom)}</button>` : `🛢 ${escapeHtml(dstNom)}`) : '—';
    const dateStr = m.date_mouvement
      ? new Date(m.date_mouvement + (m.date_mouvement.includes('T') ? '' : 'T00:00:00')).toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric' })

    return `<tr>

function renderAjustementsSection(ajustements) {
  if (!ajustements || !ajustements.length) return '';

  const AJUST_ICONS = {
    complement_de_plein:'💧', ouillage:'🪣', ajustement_volume:'⚖️',
    correction_jauge:'📏', perte_technique:'📉', correction_administrative:'📋',
  };
  const AJUST_LABELS = {
    complement_de_plein:'Complément de plein', ouillage:'Ouillage',
    ajustement_volume:'Ajustement volume', correction_jauge:'Correction de jauge',
    perte_technique:'Perte technique', correction_administrative:'Correction admin.',
  };
  const thS = 'text-align:left;padding:6px 10px;font-size:var(--text-caption);text-transform:uppercase;letter-spacing:.4px;color:var(--color-ink-tertiary);font-weight:600;border-bottom:1px solid var(--color-border)';

  const rows = [...ajustements].sort((a, b) =>
    (a.date_operation || '') < (b.date_operation || '') ? -1 : 1
  ).map(a => {
    const dateStr = a.date_operation
      ? new Date(a.date_operation + 'T00:00:00').toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric' })
      : '—';
    const icon  = AJUST_ICONS[a.type_operation] || '⚙️';
    const lbl   = AJUST_LABELS[a.type_operation] || a.type_operation;
    const contNom = a.contenant?.nom;
    const contId  = a.contenant?.id;
    const contHtml = contNom
      ? (contId ? `<button class="nav-chip" onclick="WB3Nav.navigate('contenant-detail.html?id=${contId}')">🛢 ${escapeHtml(contNom)}</button>` : `🛢 ${escapeHtml(contNom)}`)
      : '<span style="color:var(--color-ink-tertiary)">—</span>';
    const delta = Number(a.delta_hl);
    const pct   = a.delta_pct != null ? Number(a.delta_pct) : null;
    const sign  = delta >= 0 ? '+' : '';
    const deltaColor = delta > 0 ? 'color:#2e7d32' : delta < 0 ? 'color:#c62828' : '';
    const absPct = pct != null ? Math.abs(pct) : null;
    let seuilBadge = '';
    if (absPct != null) {
      if (absPct > 5)        seuilBadge = `<span style="background:#fce8e8;color:#c62828;border:1px solid #f5b4b4;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:700">>${'5'}%</span>`;

      else if (absPct > 0.5) seuilBadge = `<span style="background:#fff8e1;color:#e65100;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:700">${Math.abs(pct).toFixed(1)}%</span>`;
    }
    const operateur = a.operateur ? `<span style="font-size:var(--text-caption);color:var(--color-ink-tertiary)">👤 ${escapeHtml(a.operateur)}</span>` : '';
    return `<tr>
      <td style="white-space:nowrap;font-size:var(--text-caption);color:var(--color-ink-tertiary);padding:7px 10px">${dateStr}</td>
      <td style="padding:7px 10px;font-size:var(--text-callout)">${icon} <span style="font-size:var(--text-caption)">${escapeHtml(lbl)}</span></td>
      <td style="padding:7px 10px">${contHtml}</td>
      <td style="padding:7px 10px;text-align:right;font-family:monospace;font-size:var(--text-caption);white-space:nowrap">
        ${fmt(a.volume_avant_hl)} → ${fmt(a.volume_apres_hl)} hL
      </td>
      <td style="padding:7px 10px;text-align:right;font-family:monospace;font-size:var(--text-caption);white-space:nowrap;${deltaColor}">
        ${sign}${fmt(delta)} hL ${seuilBadge}
      </td>
      <td style="padding:7px 10px;font-size:var(--text-caption);color:var(--color-ink-secondary);max-width:200px">
        ${a.motif ? escapeHtml(a.motif) : '<span style="opacity:.4">—</span>'}
        ${operateur}
      </td>
    </tr>`;
  }).join('');

  return `
  <div class="detail-section">
    <div class="section-head">
      <h2>⚖️ Ajustements de cave</h2>
      <span class="section-count">${ajustements.length} ajustement${ajustements.length > 1 ? 's' : ''}</span>
      <a class="btn btn--secondary btn--sm" style="margin-left:auto" href="qualite-traca.html" title="Diagnostics volumes">🩺 Vérif. volumes</a>
    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:var(--text-callout)">
        <thead><tr style="background:var(--color-bg-subtle)">
          <th style="${thS}">Date</th>
          <th style="${thS}">Type</th>
          <th style="${thS}">Cuve</th>
          <th style="${thS};text-align:right">Avant → Après</th>
          <th style="${thS};text-align:right">Δ</th>
          <th style="${thS}">Motif / Opérateur</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>

  </div>`;
}

  const op   = ol.operations;
  const opId = op.id;

  const icon      = OP_ICONS[op.type_operation] || '⚙️';
  const typeLabel = op.type_operation.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());

  const roleClass = { source:'role-source', destination:'role-destination', traite:'role-traite' }[ol.role] || 'role-traite';
  const roleLabel = { source:'← Source', destination:'→ Destination', traite:'Traité' }[ol.role] || ol.role;

  const statCls = `op-stat-${op.statut}`;
  const statLbl = { realise:'✓ Réalisé', planifie:'⏳ Planifié', annule:'✕ Annulé' }[op.statut] || op.statut;

  const prods  = prodByOp[opId]  || [];
  const conts  = contByOp[opId]  || [];
  const others = othersByOp[opId]|| [];

  const prodsHtml = prods
    .map(p => {
      const pc = p.produits_lots?.produits_catalogue;
      if (!pc) return '';
      const qty = p.quantite != null ? `<b>${fmt(p.quantite)} ${p.unite || ''}</b>` : '';
      const concLabel = pc.concentration_libelle
        ? `<span style="opacity:.6;font-size:.9em"> (${escapeHtml(pc.concentration_libelle)})</span>` : '';
      let actifStr = '';
      if (pc.concentration != null && p.quantite != null) {
        const gActif = p.quantite * pc.concentration;
        const label = gActif >= 1000 ? `${fmt(gActif/1000)} kg` : `${fmt(gActif)} g`;
        actifStr = `<span style="color:var(--color-ink-tertiary);font-size:.88em"> → ${label} actif</span>`;
      }
      return `<span class="chip-prod">${CAT_ICONS[pc.categorie]||'📦'} ${escapeHtml(pc.nom)}${concLabel}${qty ? ` · ${qty}${actifStr}` : ''}</span>`;

  const contsHtml = conts
    .map(c => {
      const n = c.contenants?.nom;

      if (!n) return '';
      const v = c.volume_hl != null ? ` · <b>${fmt(c.volume_hl)} hL</b>` : '';
      const roleTag = c.role === 'source' ? `<span style="font-size:.8em;margin-left:3px;opacity:.65">src</span>`

      return cid
        ? `<button class="chip-cont nav-chip" onclick="WB3Nav.navigate('contenant-detail.html?id=${cid}')">🛢 ${escapeHtml(n)}${v}${roleTag}</button>`
        : `<span class="chip-cont">🛢 ${escapeHtml(n)}${v}</span>`;
    }).filter(Boolean).join('');

  const othersHtml = others
    .map(ol2 => {
      const l = ol2.lots;
      if (!l) return '';
      const arrow = { source:'← ', destination:'→ ', traite:'' }[ol2.role] || '';
      const num = l.numero_lot ? ` <span style="font-family:monospace;font-size:.85em;opacity:.6">[${escapeHtml(l.numero_lot)}]</span>` : '';
      const vol = ol2.volume_hl != null ? ` · <b>${fmt(ol2.volume_hl)} hL</b>` : '';
      const roleChip = ol2.role === 'source'
        ? `<span style="font-size:.8em;background:#fff8e1;color:#e65100;padding:1px 4px;border-radius:3px;margin-left:3px">src</span>`
        : ol2.role === 'destination'
        ? `<span style="font-size:.8em;background:#e8f5e9;color:#2e7d32;padding:1px 4px;border-radius:3px;margin-left:3px">dst</span>` : '';
      return `<button class="chip-lot nav-chip" onclick="WB3Nav.navigate('lot-detail.html?id=${l.id}')">🍷 ${arrow}${escapeHtml(l.nom)}${num}${vol}${roleChip}</button>`;
    }).filter(Boolean).join('');

  const volStr = (ol.volume_hl != null ? ol.volume_hl : op.volume_hl) != null
    ? `📏 ${fmt(ol.volume_hl != null ? ol.volume_hl : op.volume_hl)} hL` : '';

  const extras = [
    op.reference ? `<span style="font-size:var(--text-caption);color:var(--color-ink-tertiary)">#${escapeHtml(op.reference)}</span>` : '',
    op.operateur  ? `<span style="font-size:var(--text-caption);color:var(--color-ink-tertiary)">👤 ${escapeHtml(op.operateur)}</span>` : '',
  ].filter(Boolean).join('');

  const notes = op.notes || ol.notes;

  return `
  <div class="tl-item" id="op-${opId}">
    <div class="tl-spine">
      <div class="tl-dot">${icon}</div>
      ${!isLast ? '<div class="tl-line"></div>' : ''}
    </div>
    <div class="tl-card">
      <div class="tl-card-head">
        <span class="tl-date">${fmtDate(op.date_operation)}</span>
        <span class="tl-type">${typeLabel}</span>
        <span class="role-badge ${roleClass}">${roleLabel}</span>
        <span class="role-badge ${statCls}">${statLbl}</span>
        ${volStr ? `<span class="tl-vol">${volStr}</span>` : ''}
        ${extras}
      </div>
      <div class="tl-details">
        ${prodsHtml  ? `<div class="tl-detail-line"><span class="tl-detail-lbl">Produits</span><div class="chips-inline">${prodsHtml}</div></div>` : ''}
        ${contsHtml  ? `<div class="tl-detail-line"><span class="tl-detail-lbl">Contenants</span><div class="chips-inline">${contsHtml}</div></div>` : ''}
        ${othersHtml ? `<div class="tl-detail-line"><span class="tl-detail-lbl">Autres lots</span><div class="chips-inline">${othersHtml}</div></div>` : ''}
      </div>
      ${notes ? `<div class="tl-notes">${escapeHtml(notes)}</div>` : ''}
    </div>
  </div>`;
}

function renderStatutStepper(lot) {
  const curStatut = lot.statut;
  const curIdx    = STATUT_MAIN_IDX[curStatut] ?? -1;
  const nexts     = STATUT_TRANSITIONS[curStatut] || [];

  const track = STATUT_MAIN_PATH.map((step, i) => {
    const cls = i < curIdx ? 'done' : i === curIdx ? 'current' : 'future';
    const connCls = i < curIdx ? 'done' : i === curIdx ? 'current' : 'future';
    const connector = i < STATUT_MAIN_PATH.length - 1
      ? `<div class="step-connector ${connCls}"></div>` : '';
    return `<div class="step-node">
        <div class="step-dot ${cls}">${step.icon}</div>
        <div class="step-label ${cls}">${step.label}</div>
      </div>${connector}`;
  }).join('');

  const actionsHtml = nexts.length ? `
    <div class="stepper-actions">
      <span class="stepper-next-lbl">Passer à →</span>
      ${nexts.map(s => {
        const step = STATUT_MAIN_PATH.find(p => p.key === s) || { icon:'↗', label: STATUT_LABELS[s] || s };
        return `<button class="next-state-btn" onclick="advanceLotStatut('${s}')">${step.icon} ${step.label}</button>`;
      }).join('')}
    </div>` : '';

  return `<div class="statut-stepper">
    <div class="stepper-track">${track}</div>
    ${actionsHtml}
  </div>`;
}

async function advanceLotStatut(nextStatut) {
  if (!currentLot) return;
  const prev = currentLot.statut;
  try {
    await WB3DB.updateRow('lots', currentLot.id, { statut: nextStatut });
    toast(`Passé en « ${STATUT_LABELS[nextStatut] || nextStatut} »`, 'success');
    await loadAndRender(currentLot.id);
  } catch(e) {
    toast(`Erreur : ${WB3DB.errMsg ? WB3DB.errMsg(e) : e.message}`, 'error');
  }
}
